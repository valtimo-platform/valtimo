name: "Deployer - Build and push Docker image"

on:
  push:
    branches:
      - "release/**"
    paths:
      - .github/workflows/deployer_ci.yml
      - backend/**
  pull_request:
    branches:
      - "release/**"
    paths:
      - .github/workflows/deployer_ci.yml
      - backend/**
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  packages: write

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: gradle

      - name: Build WAR
        run: ./gradlew -PincludeDev=false :backend:app:gzac:assemble

      - name: Prepare deployment folder
        run: |
          mkdir backend/deployment
          mv backend/app/gzac/build/ backend/app/gzac/Dockerfile backend/deployment/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: gzac-backend-deployment
          retention-days: 1
          path: backend/deployment/

  push_image:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve backend tree hash
        id: backend_tree
        run: echo "tree=$(git rev-parse HEAD:backend)" >> "$GITHUB_OUTPUT"

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gzac-backend
          tags: |
            type=raw,value=${{ env.BRANCH_NAME }}.${{ github.run_number }}
            type=raw,value=commit-${{ github.sha }}
            type=raw,value=contents-${{ steps.backend_tree.outputs.tree }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/heads/release/') }}
          flavor: |
            latest=false

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: gzac-backend-deployment
          path: backend/deployment/

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: ./backend/deployment/Dockerfile
          context: backend/deployment/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
