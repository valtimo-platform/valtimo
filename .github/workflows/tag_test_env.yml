name: Tag test environment image
on:
  workflow_call:
    inputs:
      image:
        description: "Fully qualified Docker image name"
        required: true
        type: string
      image_tag:
        description: "Tag produced in the build job"
        required: true
        type: string
      test_environment_name:
        description: "Explicit test environment name"
        required: true
        type: string
      source_sha:
        description: "Commit SHA to embed in the derived tag"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  tag_test_env:
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ inputs.image }}
      SRC_IMAGE: ${{ inputs.image_tag }}
      SOURCE_SHA: ${{ inputs.source_sha }}
      TEST_ENVIRONMENT_NAME: ${{ inputs.test_environment_name }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image for test environment
        run: |
          TARGET_TAG="testEnv-${TEST_ENVIRONMENT_NAME}-${SOURCE_SHA}-${{ github.run_number }}"
          docker pull "${SRC_IMAGE}"
          docker tag "${SRC_IMAGE}" "${IMAGE}:${TARGET_TAG}"
          docker push "${SRC_IMAGE}:${TARGET_TAG}"
