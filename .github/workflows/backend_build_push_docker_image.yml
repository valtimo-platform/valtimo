name: Backend - build and push docker image

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      backend_libraries_build_artifact_name:
        required: true
        description: Name of the backend build artifact to download with 'download-artifact'
        type: "string"
      variant:
        description: "Which backend app to build. Each variant is its own Gradle module under :backend:apps:* (dev | gzac | valtimo | evenementenvergunning)."
        required: false
        type: string
        default: dev
      push_to_dockerhub:
        description: "Push the built image to Docker Hub as well"
        required: false
        type: boolean
        default: false
      release_image_tag:
        description: "Tag to use when pushing the Docker Hub release image"
        required: false
        type: string
      project_version:
        description: "Version stamped into the built app (manifest / reported as valtimo-backend-libraries). Falls back to gradle.properties projectVersion when empty."
        required: false
        type: string
        default: ""
    outputs:
      built_image:
        description: "Primary tag of the Docker image that was built"
        value: ${{ jobs.generate_tags.outputs.primary_tag }}

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  resolve_variant:
    runs-on: ubuntu-latest
    outputs:
      module: ${{ steps.resolve.outputs.module }}
      image_name: ${{ steps.resolve.outputs.image_name }}
      tag_kind: ${{ steps.resolve.outputs.tag_kind }}
    steps:
      - name: Resolve variant parameters
        id: resolve
        run: |
          case "${{ inputs.variant }}" in
            dev)
              # Developer console — the PR-CI test-env image. Ships under the
              # gzac-backend ghcr name with `test` tags so it never collides
              # with the released gzac-backend image (same name, `production`).
              echo "module=dev" >> "$GITHUB_OUTPUT"
              echo "image_name=gzac-backend" >> "$GITHUB_OUTPUT"
              echo "tag_kind=test" >> "$GITHUB_OUTPUT"
              ;;
            gzac)
              echo "module=gzac" >> "$GITHUB_OUTPUT"
              echo "image_name=gzac-backend" >> "$GITHUB_OUTPUT"
              echo "tag_kind=production" >> "$GITHUB_OUTPUT"
              ;;
            valtimo)
              echo "module=valtimo" >> "$GITHUB_OUTPUT"
              echo "image_name=valtimo-backend" >> "$GITHUB_OUTPUT"
              echo "tag_kind=production" >> "$GITHUB_OUTPUT"
              ;;
            evenementenvergunning)
              echo "module=evenementenvergunning" >> "$GITHUB_OUTPUT"
              echo "image_name=gzac-evenementenvergunning-backend" >> "$GITHUB_OUTPUT"
              echo "tag_kind=production" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown variant '${{ inputs.variant }}' (expected: dev, gzac, valtimo, evenementenvergunning)"
              exit 1
              ;;
          esac

  assemble:
    needs: resolve_variant
    runs-on: ubuntu-latest
    name: "assemble-${{ inputs.variant }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Download built libraries
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.backend_libraries_build_artifact_name }}
          path: .

      - run: ./gradlew :backend:apps:${{ needs.resolve_variant.outputs.module }}:assemble ${{ inputs.project_version != '' && format('-PprojectVersion={0}', inputs.project_version) || '' }}

      - name: Prepare deployment folder
        run: |
          mkdir backend/deployment
          mv backend/apps/${{ needs.resolve_variant.outputs.module }}/build/ backend/apps/${{ needs.resolve_variant.outputs.module }}/Dockerfile backend/deployment/

      - name: Archive deployment folder
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.variant }}-backend-deployment
          path: backend/deployment/
          retention-days: 1

  generate_tags:
    needs: resolve_variant
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.generate_tags.outputs.tags }}
      primary_tag: ${{ steps.primary_tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve backend tree hash
        id: backend_tree
        run: echo "tree=$(git rev-parse HEAD:backend)" >> "$GITHUB_OUTPUT"
      - name: Generate image tags
        id: generate_tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ needs.resolve_variant.outputs.image_name }}
          tags: |
            type=raw,value=${{ env.BRANCH_NAME }}-${{ needs.resolve_variant.outputs.tag_kind }}.${{ github.run_number }}
            type=raw,value=commit-${{ needs.resolve_variant.outputs.tag_kind }}-${{ github.sha }}
            type=raw,value=contents-${{ needs.resolve_variant.outputs.tag_kind }}-${{ steps.backend_tree.outputs.tree }}
          flavor: |
            latest=false

      - name: Extract primary image tag
        id: primary_tag
        run: |
          full_tag='${{ fromJson(steps.generate_tags.outputs.json).tags[0] }}'
          echo "tag=${full_tag##*:}" >> "$GITHUB_OUTPUT"

  build_image:
    needs:
      - resolve_variant
      - assemble
      - generate_tags
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release image inputs
        if: ${{ inputs.push_to_dockerhub }}
        run: |
          if [ -z "${{ inputs.release_image_tag }}" ]; then
            echo "::error::'release_image_tag' input must be provided when 'push_to_dockerhub' is true."
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ inputs.push_to_dockerhub }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.variant }}-backend-deployment
          path: backend/deployment/

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: ./backend/deployment/Dockerfile
          context: backend/deployment/
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            ${{ needs.generate_tags.outputs.tags }}
            ${{ inputs.push_to_dockerhub && format('docker.io/ritense/{0}:{1}', needs.resolve_variant.outputs.image_name, inputs.release_image_tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
