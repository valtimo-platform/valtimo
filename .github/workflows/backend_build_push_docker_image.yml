name: Backend - build and push docker image

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      backend_libraries_build_artifact_name:
        required: true
        description: Name of the backend build artifact to download with 'download-artifact'
        type: "string"
    outputs:
      tagged_image:
        description: "Tag of the Docker image that was built"
        value: ${{ jobs.build_image.outputs.image_tag }}

env:
  ORG_GRADLE_PROJECT_includeDev: false

defaults:
  run:
    working-directory: backend

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Download built libraries
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.backend_libraries_build_artifact_name }}
          path: .

      - run: ./gradlew -PincludeDev=false app:gzac:assemble

      - name: Prepare deployment folder
        run: |
          mkdir deployment
          mv app/gzac/build/ deployment/
          if [ -f app/gzac/Dockerfile ]; then mv app/gzac/Dockerfile deployment/; fi

      - name: Archive deployment folder
        uses: actions/upload-artifact@v4
        with:
          name: gzac-app-backend-deployment
          path: backend/deployment/
          retention-days: 1

  build_image:
    runs-on: ubuntu-latest
    needs: assemble
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ fromJson(steps.generate_tags.outputs.json).tags[0] }}
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve backend tree hash
        id: backend_tree
        run: echo "tree=$(git rev-parse HEAD:backend)" >> "$GITHUB_OUTPUT"

      - name: Generate image tags
        id: generate_tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gzac-backend
          tags: |
            type=raw,value=${{ env.BRANCH_NAME }}.${{ github.run_number }}
            type=raw,value=commit-${{ github.sha }}
            type=raw,value=contents-${{ steps.backend_tree.outputs.tree }}
          flavor: |
            latest=false

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: gzac-app-backend-deployment
          path: backend/deployment/

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: ./backend/deployment/Dockerfile
          context: backend/deployment/
          push: true
          tags: ${{ steps.generate_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
