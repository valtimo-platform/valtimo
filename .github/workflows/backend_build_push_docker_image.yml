name: Backend - build and push docker image

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      backend_libraries_build_artifact_name:
        required: true
        description: Name of the backend build artifact to download with 'download-artifact'
        type: "string"
    outputs:
      built_test_image:
        description: "Tag of the test Docker image that was built"
        # Equal to the first tag of 'generate_tags' step. Can't use its output directly because of the matrix job, so we reconstruct it.
        value: ${{ github.head_ref || github.ref_name }}-test.${{ github.run_number }}

jobs:
  assemble:
    strategy:
      matrix:
        build_type: ["production", "test"]

    runs-on: ubuntu-latest
    name: "assemble-${{ matrix.build_type }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Download built libraries
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.backend_libraries_build_artifact_name }}
          path: .

      - run: ./gradlew -PincludeDev=${{ matrix.build_type == 'test'}} :backend:app:gzac:assemble

      - name: Prepare deployment folder
        run: |
          mkdir backend/deployment
          mv backend/app/gzac/build/ backend/app/gzac/Dockerfile backend/deployment/

      - name: Archive deployment folder
        uses: actions/upload-artifact@v4
        with:
          name: gzac-app-backend-deployment-${{ matrix.build_type }}
          path: backend/deployment/
          retention-days: 1

  build_image:
    strategy:
      matrix:
        build_type: ["production", "test"]
    runs-on: ubuntu-latest
    needs: assemble
    permissions:
      contents: read
      packages: write
    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize branch name
        id: sanitize_branch
        run: echo "branch=$(echo "${{ env.BRANCH_NAME }}" | sed 's/[\/+|<>,;_]/-/g' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve backend tree hash
        id: backend_tree
        run: echo "tree=$(git rev-parse HEAD:backend)" >> "$GITHUB_OUTPUT"

      - name: Generate image tags
        id: generate_tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gzac-backend
          tags: |
            type=raw,value=${{ steps.sanitize_branch.outputs.branch }}-${{ matrix.build_type }}.${{ github.run_number }}
            type=raw,value=commit-${{ matrix.build_type }}-${{ github.sha }}
            type=raw,value=contents-${{ matrix.build_type }}-${{ steps.backend_tree.outputs.tree }}
          flavor: |
            latest=false

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: gzac-app-backend-deployment-${{ matrix.build_type }}
          path: backend/deployment/

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: ./backend/deployment/Dockerfile
          context: backend/deployment/
          push: true
          tags: ${{ steps.generate_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
