name: "Delete test environment"
on:
  pull_request:
    branches: ["next-minor"]
    types:
      - closed
  workflow_dispatch:
    inputs:
      envName:
        description: "Environment name"
        required: true
        type: string

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  determine_test_env:
    uses: ./.github/workflows/determine_test_env.yml

  create_test_environment:
    needs: determine_test_env
    runs-on: ubuntu-latest
    steps:
      - name: Delete test environment
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.VALTIMO_PRODUCT_DEVELOPMENT_INFRA_GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            ${{ secrets.VALTIMO_PRODUCT_DEVELOPMENT_WORKFLOW_DISPATCH_URL }} \
            -d '{"ref":"main","inputs":{"envName":"${{ needs.determine_test_env.outputs.name }}"}}'
