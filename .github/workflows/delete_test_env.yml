name: "Delete test environment"
on:
  workflow_call:
    inputs:
      env_name:
        description: "Environment name. The env to delete will be <env_name>.product-development.test.k8s.ritense.com"
        required: true
        type: string

# Assigns the same concurrency group to `delete_test_env` and `create_test_env`.
# This prevents creating and deleting from running simultaneously, which could cause race conditions.
concurrency:
  group: setup-test-env-${{ inputs.env_name }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write
  packages: none

jobs:
  delete_test_environment:
    runs-on: ubuntu-latest
    steps:
      - name: Delete test environment
        env:
          TOKEN: ${{ secrets.VALTIMO_PRODUCT_DEVELOPMENT_INFRA_GITHUB_TOKEN }}
          DISPATCH_URL: ${{ secrets.VALTIMO_PRODUCT_DEVELOPMENT_WORKFLOW_DELETE_URL }}
          ENV_NAME: ${{ inputs.env_name }}
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${DISPATCH_URL}" \
            -d "$(jq -n --arg env "$ENV_NAME" '{"ref":"main","inputs":{"envName":$env}}')"

      - name: Resolve PR number
        id: pr
        env:
          ENV_NAME: ${{ inputs.env_name }}
        run: |
          set -euo pipefail
          if [[ "${ENV_NAME}" =~ ^pr([0-9]+)$ ]]; then
            echo "number=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "number=" >> "$GITHUB_OUTPUT"
          fi

      - name: Find test environment comment
        if: ${{ steps.pr.outputs.number != '' }}
        uses: peter-evans/find-comment@v4
        id: find_comment
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          body-includes: "Will create a test environment."

      - name: Delete test environment PR comment
        if: ${{ steps.find_comment.outputs.comment-id != '' }}
        env:
          TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.find_comment.outputs.comment-id }}
        run: |
          set -euo pipefail
          delete_url="https://api.github.com/repos/${REPO}/issues/comments/${COMMENT_ID}"
          curl -sS -L -X DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${delete_url}"
