name: "Delete test environment"
on:
  workflow_call:
    inputs:
      env_name:
        description: "Environment name. The env to delete will be <env_name>.product-development.test.k8s.ritense.com"
        required: true
        type: string

# Assigns the same concurrency group to `delete_test_env` and `create_test_env`.
# This prevents creating and deleting from running simultaneously, which could cause race conditions.
concurrency:
  group: setup-test-env-${{ inputs.env_name }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  packages: none

jobs:
  delete_test_environment:
    runs-on: ubuntu-latest
    steps:
      - name: Delete test environment
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.VALTIMO_PRODUCT_DEVELOPMENT_INFRA_GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            ${{ secrets.VALTIMO_PRODUCT_DEVELOPMENT_WORKFLOW_DELETE_URL }} \
            -d '{"ref":"main","inputs":{"envName":"${{ inputs.env_name }}"}}'
