name: "Delete test environment"
on:
  pull_request:
    branches: ["next-minor"]
    types:
      - closed
  workflow_dispatch:
    inputs:
      envName:
        description: "Environment name"
        required: true
        type: string

# Assigns the same concurrency group to `delete_test_env` and `create_test_env`.
# This prevents creating and deleting from running simultaneously, which could cause race conditions.
concurrency:
  group: setup-test-env-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  packages: write

jobs:
  determine_test_env:
    uses: ./.github/workflows/determine_test_env.yml

  delete_test_environment:
    needs: determine_test_env
    runs-on: ubuntu-latest
    steps:
      - name: Delete test environment
        run: |
          set -euo pipefail
          curl --fail-with-body -sS -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.VALTIMO_PRODUCT_DEVELOPMENT_INFRA_GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            ${{ secrets.VALTIMO_PRODUCT_DEVELOPMENT_WORKFLOW_DELETE_URL }} \
            -d '{"ref":"main","inputs":{"envName":"${{ needs.determine_test_env.outputs.name }}"}}'
