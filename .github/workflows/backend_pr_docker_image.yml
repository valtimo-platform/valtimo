name: backend_pr_docker_image.yml
on:
  workflow_dispatch:
  push:
    branches:
      - "feature/dockerize-app"

defaults:
  run:
    working-directory: backend

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
      - run: ./gradlew app:gzac:assemble
  buildImage:
    runs-on: ubuntu-latest
    needs: assemble

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract branch name
        id: vars
        run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Generate image tags
        id: generate_tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gzac-backend
          tags: |
            type=raw,value=${{ env.BRANCH_NAME }}.${{github.run_number}},enable=true
          flavor: |
            latest=false

      - name: Change working directory
        run: cd app/gzac

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.generate_tags.outputs.tags }}