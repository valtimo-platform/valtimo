name: Backend - Publish release

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      project_version:
        description: "Base semantic version (e.g. 13.6.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      project_version:
        description: "Base semantic version (e.g. 13.6.0)"
        required: true

env:
  PROJECT_VERSION: ${{ inputs.project_version || github.event.inputs.project_version }}

jobs:
  build_run_tests:
    uses: ./.github/workflows/backend_build_test_libraries.yml

  build_and_push_gzac_image:
    name: Build and push gzac-backend image
    needs:
      - build_run_tests
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/backend_build_push_docker_image.yml
    with:
      backend_libraries_build_artifact_name: ${{ needs.build_run_tests.outputs.build_artifact_name }}
      variant: gzac
      push_to_dockerhub: true
      release_image_tag: ${{ inputs.project_version || github.event.inputs.project_version }}
      project_version: ${{ inputs.project_version || github.event.inputs.project_version }}
    secrets: inherit

  build_and_push_valtimo_image:
    name: Build and push valtimo-backend image
    needs:
      - build_run_tests
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/backend_build_push_docker_image.yml
    with:
      backend_libraries_build_artifact_name: ${{ needs.build_run_tests.outputs.build_artifact_name }}
      variant: valtimo
      push_to_dockerhub: true
      release_image_tag: ${{ inputs.project_version || github.event.inputs.project_version }}
      project_version: ${{ inputs.project_version || github.event.inputs.project_version }}
    secrets: inherit

  build_and_push_evenementenvergunning_image:
    name: Build and push gzac-evenementenvergunning-backend image
    needs:
      - build_run_tests
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/backend_build_push_docker_image.yml
    with:
      backend_libraries_build_artifact_name: ${{ needs.build_run_tests.outputs.build_artifact_name }}
      variant: evenementenvergunning
      push_to_dockerhub: true
      release_image_tag: ${{ inputs.project_version || github.event.inputs.project_version }}
      project_version: ${{ inputs.project_version || github.event.inputs.project_version }}
    secrets: inherit

  publish:
    needs:
      - build_run_tests
    runs-on: ubuntu-latest
    env:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Temurin 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Download built libraries
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_run_tests.outputs.build_artifact_name }}
          path: .

      - name: Check license compliance
        run: ./gradlew :backend:checkLicense

      - name: Fail if disallowed licenses found
        run: |
          sudo apt-get update -qq && sudo apt-get install -y jq
          FILE="backend/build/reports/dependency-license/dependencies-without-allowed-license.json"
          if [[ -f "$FILE" ]]; then
            COUNT=$(jq '.dependenciesWithoutAllowedLicenses | length' "$FILE" 2>/dev/null || echo 0)
            if [[ "$COUNT" -gt 0 ]]; then
              echo "::warning::Disallowed licenses found. See dependencies-without-allowed-license.json (count=$COUNT)."
            fi
          else
            echo "Error: dependency license report not found."
            exit 1
          fi

      # Idempotency guard: Maven Central releases are immutable, so re-running a
      # release whose artifacts already landed would fail on the duplicate. Probe
      # a representative artifact (core) on Maven Central; if this version is
      # already there, skip both publish steps so the release run is re-runnable.
      - name: Check whether this version is already on Maven Central
        id: maven_central
        run: |
          set -euo pipefail
          URL="https://repo1.maven.org/maven2/com/ritense/valtimo/core/${PROJECT_VERSION}.RELEASE/"
          code="$(curl -sS --max-time 30 -o /dev/null -w '%{http_code}' "$URL" || echo 000)"
          if [ "$code" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::com.ritense.valtimo:core:${PROJECT_VERSION}.RELEASE already on Maven Central — skipping Sonatype/JReleaser publish (idempotent re-run)."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "Not on Maven Central yet (HTTP ${code}) — proceeding with publish."
          fi

      - name: Publish to Sonatype staging
        if: ${{ steps.maven_central.outputs.already_published != 'true' }}
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ env.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ env.SONATYPE_PASSWORD }}
        run: ./gradlew --no-parallel publishAllPublicationsToSonatypeRepository -PprojectVersion="${PROJECT_VERSION}.RELEASE"

      - name: Deploy with JReleaser to Maven Central
        if: ${{ steps.maven_central.outputs.already_published != 'true' }}
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ env.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ env.SONATYPE_PASSWORD }}
        run: ./gradlew :backend:jreleaserDeploy --stacktrace -PprojectVersion="${PROJECT_VERSION}.RELEASE"

      - name: Archive Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: backend/build/reports
