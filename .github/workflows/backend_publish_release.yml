name: Backend - Publish release

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      project_version:
        description: "Base semantic version (e.g. 13.6.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      project_version:
        description: "Base semantic version (e.g. 13.6.0)"
        required: true

defaults:
  run:
    working-directory: backend

env:
  ORG_GRADLE_PROJECT_includeDev: false

jobs:
  determine_version:
    runs-on: ubuntu-latest
    outputs:
      project_version: ${{ inputs.project_version || github.event.inputs.project_version }}

  build_run_tests:
    uses: ./.github/workflows/backend_build_test_libraries.yml

  build_and_push_image:
    name: Build and push Docker image
    needs:
      - build_run_tests
    uses: ./.github/workflows/backend_build_push_docker_image.yml
    with:
      backend_libraries_build_artifact_name: ${{ needs.build_run_tests.outputs.build_artifact_name }}
      push_to_dockerhub: true
      release_image_tag: ${{ inputs.project_version || github.event.inputs.project_version }}
    secrets: inherit

  publish:
    needs:
      - build_run_tests
      - build_and_push_image
      - determine_version
    runs-on: ubuntu-latest
    env:
      PROVIDED_VERSION: ${{ inputs.project_version || github.event.inputs.project_version }}
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Temurin 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Download built libraries
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_run_tests.outputs.build_artifact_name }}
          path: .

      - name: Check license compliance
        run: ./gradlew -PincludeDev=false checkLicense

      - name: Fail if disallowed licenses found
        run: |
          FILE="build/reports/dependency-license/dependencies-without-allowed-license.json"
          if [[ -f "$FILE" ]]; then
            COUNT=$(jq '.dependenciesWithoutAllowedLicenses | length' "$FILE" 2>/dev/null || echo 0)
            if [[ "$COUNT" -gt 0 ]]; then
              echo "::warning::Disallowed licenses found. See dependencies-without-allowed-license.json (count=$COUNT)."
            fi
          else
            echo "Error: dependency license report not found."
            exit 1
          fi

      - name: Publish to Sonatype staging
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ env.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ env.SONATYPE_PASSWORD }}
        run: ./gradlew -PincludeDev=false --no-parallel publishAllPublicationsToSonatypeRepository -PprojectVersion="${{ needs.determine_version.outputs.project_version }}"

      - name: Deploy with JReleaser to Maven Central
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ env.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ env.SONATYPE_PASSWORD }}
        run: ./gradlew -PincludeDev=false jreleaserDeploy --stacktrace -PprojectVersion="${{ needs.determine_version.outputs.project_version }}"

      - name: Archive Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: backend/build/reports
