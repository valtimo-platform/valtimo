name: Publish release
run-name: Publish release ${{ github.ref_name }}

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - release/0.0.0 # Temporarily, for testing without having to have this workflow in the default branch

jobs:
  prepare:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Validate and extract release branch
        id: version
        run: |
          if [[ "${GITHUB_REF_NAME}" != release/* ]]; then
            echo "::error::This workflow can only run on release/* branches (current: ${GITHUB_REF_NAME})."
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" =~ ^release/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "::error::Branch must be release/<semver> (e.g. release/13.5.0). Current: ${GITHUB_REF_NAME}."
            exit 1
          fi

          if [[ -z "$VERSION" ]]; then
            echo "::error::Unable to derive a version from branch '${GITHUB_REF_NAME}'."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  backend_release:
    name: Backend pipeline
    needs: prepare
    uses: ./.github/workflows/backend_publish_release.yml
    with:
      project_version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  frontend_release:
    name: Frontend pipeline
    needs: prepare
    uses: ./.github/workflows/frontend_publish_release.yml
    with:
      project_version: ${{ needs.prepare.outputs.version }}
    secrets: inherit

  create_release:
    name: Create GitHub release
    needs:
      - backend_release
      - frontend_release
      - prepare
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          body: "Release for Valtimo version ${{ needs.prepare.outputs.version }}."
          draft: false
          prerelease: false
