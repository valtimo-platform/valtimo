name: "Run frontend CI"
on:
  push:
    branches:
      - feature/create-test-env-on-pr
    paths:
      - frontend/**
  pull_request:
    branches:
      - feature/create-test-env-on-pr
    paths:
      - frontend/**

permissions:
  actions: write
  contents: read
  packages: write

jobs:
  build_and_test_libraries:
    name: Build and test libraries
    uses: ./.github/workflows/frontend_build_test_libraries.yml
    secrets: inherit

  build_and_push_image:
    name: Build and push image
    needs: build_and_test_libraries
    uses: "./.github/workflows/frontend_build_push_docker_image.yml"
    secrets: inherit
    with:
      frontend_libraries_build_artifact_name: ${{ needs.build_and_test_libraries.outputs.build_artifact_name }}

  # For pushes
  publish_snapshot_to_s3:
    if: ${{ github.event_name == 'push' }}
    needs: [build_and_test_libraries]
    uses: ./.github/workflows/frontend_publish_to_s3.yml
    with:
      publish_type: "snapshot"
      frontend_libraries_build_artifact_name: ${{ needs.build_and_test_libraries.outputs.build_artifact_name }}
    secrets: inherit

  # For pull requests
  determine_test_env_name:
    if: ${{ github.event_name == 'pull_request' }}
    uses: ./.github/workflows/determine_test_env.yml

  update_test_env:
    if: ${{ github.event_name == 'pull_request' }}
    needs:
      - build_and_push_image
      - determine_test_env_name
    uses: ./.github/workflows/tag_test_env.yml
    secrets: inherit
    with:
      image: ghcr.io/${{ github.repository }}/gzac-frontend
      image_tag: ${{ needs.build_and_push_image.outputs.image_tag }}
      source_sha: ${{ needs.determine_test_env_name.outputs.source_sha }}
      test_environment_name: ${{ needs.determine_test_env_name.outputs.name }}
