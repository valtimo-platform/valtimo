name: frontend_pr_docker_image.yml
on:
  workflow_dispatch:
  push:
    branches:
      - "feature/dockerize-app"

env:
  NODE_VERSION: "20.x"

jobs:
  buildLibraries:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install NPM packages
        run: npm install

      - name: Build all libraries
        run: npm run libs-build-all

      - name: Prepare dist folder
        run: mkdir deployment && mv src httpd.conf dist Dockerfile deployment/

      - name: 'Retain build artifact: deployment'
        uses: actions/upload-artifact@v4
        with:
          name: gzac-app-frontend-deployment
          path: frontend/deployment/
          retention-days: 1
  buildImage:
    runs-on: ubuntu-latest
    needs: buildLibraries
    defaults:
      run:
        working-directory: frontend

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: gzac-app-frontend-deployment

      - name: Move local devDependencies to dependencies and install
        shell: bash
        run: |
          set -euo pipefail
          
          PROJECTS_DIR="projects/valtimo"
          SCOPE="@valtimo"
          LOCAL_ROOT="dist/valtimo"
          PKG_JSON="package.json"
          
          if [ ! -f "$PKG_JSON" ]; then
            echo "❌ $PKG_JSON niet gevonden in repo-root"; exit 1
          fi
          if [ ! -d "$PROJECTS_DIR" ]; then
            echo "ℹ️  '$PROJECTS_DIR' niet gevonden; niets te doen."; exit 0
          fi
          
          echo "🔎 Subfolders in '$PROJECTS_DIR' verzamelen…"
          mapfile -t NAMES < <(find "$PROJECTS_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -v '^\.' || true)
          
          if [ "${#NAMES[@]}" -eq 0 ]; then
            echo "ℹ️  Geen subfolders gevonden; niets te doen."; exit 0
          fi
          
          echo "💾 Backup package.json -> package.json.bak"
          cp "$PKG_JSON" "${PKG_JSON}.bak"
          
          # 1 jq-run voor alle mutaties (snel & atomair)
          FILTER='.'
          for name in "${NAMES[@]}"; do
            PKG="${SCOPE}/${name}"
            FILESPEC="file:${LOCAL_ROOT}/${name}"
            # Set dependency en verwijder devDependency als die bestaat
            FILTER+=" | .dependencies[\"$PKG\"] = \"$FILESPEC\" | ( .devDependencies? // {} | del(.\"$PKG\") ) as \$void | ."
          done
          
          tmp="${PKG_JSON}.tmp"
          jq "$FILTER" "$PKG_JSON" > "$tmp"
          mv "$tmp" "$PKG_JSON"
          
          echo "📦 npm install…"
          npm install
          
          echo "🎉 Klaar. Geüpdatet packages:"
          for name in "${NAMES[@]}"; do
            echo " - ${SCOPE}/${name} -> file:${LOCAL_ROOT}/${name}"
          done
          
          echo "Content of package.json:"
          cat package.json

          echo "Content of deployment directory:"
          ls -lR dist

      - name: Build app
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract branch name
        id: vars
        run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

      - name: Generate image tags
        id: generate_tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/gzac-frontend
          tags: |
            type=raw,value=${{ env.BRANCH_NAME }}.${{github.run_number}},enable=true
          flavor: |
            latest=false

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          context: .
          push: true
          tags: |
            ${{ steps.generate_tags.outputs.tags }}