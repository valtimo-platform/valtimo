name: Release

permissions:
    contents: write

on:
    workflow_dispatch:

jobs:
    prepare:
        name: Determine version
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
        steps:
            - name: Validate release branch
              run: |
                  if [[ "${GITHUB_REF_NAME}" != release/* ]]; then
                    echo "::error::This workflow can only run on release/* branches (current: ${GITHUB_REF_NAME})."
                    exit 1
                  fi
            - name: Extract version from branch
              id: version
              run: |
                  VERSION="${GITHUB_REF_NAME#release/}"
                  if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
                    echo "::error::Unable to derive a version from branch '${GITHUB_REF_NAME}'."
                    exit 1
                  fi
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    backend_release:
        name: Backend pipeline
        needs: prepare
        uses: ./.github/workflows/backend_publish_release.yml
        secrets: inherit

    frontend_release:
        name: Frontend pipeline
        needs: prepare
        uses: ./.github/workflows/frontend_publish_release.yml
        with:
            project_version: ${{ needs.prepare.outputs.version }}
        secrets: inherit

    create_release:
        name: Create GitHub release
        needs:
            - backend_release
            - frontend_release
            - prepare
        runs-on: ubuntu-latest
        steps:
            - name: Create release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ needs.prepare.outputs.version }}
                  release_name: ${{ needs.prepare.outputs.version }}
                  body: "Automated release for version ${{ needs.prepare.outputs.version }}."
                  draft: false
                  prerelease: false
