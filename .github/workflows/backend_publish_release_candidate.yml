name: Backend - Publish release candidate

permissions:
  contents: read

on:
  workflow_dispatch:

env:
  ORG_GRADLE_PROJECT_includeDev: false

jobs:
  build_run_tests:
    uses: ./.github/workflows/backend_build_test_libraries.yml

  publish:
    needs: [build_run_tests]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref_name, 'rc/') }}
    env:
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      JRELEASER_MAVENCENTRAL_sonatype_STAGE: UPLOAD

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Temurin 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Download built libraries
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_run_tests.outputs.build_artifact_name }}
          path: .

      - name: Compute version from branch
        id: version
        shell: bash
        run: |
          SEMVER_VERSION="${GITHUB_REF_NAME#rc/}"
          VERSION_RC="${SEMVER_VERSION}.RC-${GITHUB_RUN_NUMBER}-SNAPSHOT"
          echo "version_rc=$VERSION_RC" >> "$GITHUB_OUTPUT"

      - name: Check license compliance (non-blocking)
        continue-on-error: true
        run: ./gradlew -PincludeDev=false :backend:checkLicense

      - name: Warn if disallowed licenses found
        run: |
          sudo apt-get update -qq && sudo apt-get install -y jq
          FILE="backend/build/reports/dependency-license/dependencies-without-allowed-license.json"
          if [[ -f "$FILE" ]]; then
            COUNT=$(jq '.dependenciesWithoutAllowedLicenses | length' "$FILE" 2>/dev/null || echo 0)
            if [[ "$COUNT" -gt 0 ]]; then
              echo "::warning::Disallowed licenses found. See dependencies-without-allowed-license.json (count=$COUNT)."
            fi
          fi

      - name: Publish to Sonatype staging
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ env.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ env.SONATYPE_PASSWORD }}
        run: ./gradlew -PincludeDev=false --no-parallel :backend:publishAllPublicationsToSonatypeRepository -PprojectVersion="${{ steps.version.outputs.version_rc }}"

      - name: Deploy with JReleaser to Maven Central
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ env.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ env.SONATYPE_PASSWORD }}
        run: ./gradlew -PincludeDev=false :backend:jreleaserDeploy --stacktrace -PprojectVersion="${{ steps.version.outputs.version_rc }}"

      - name: Archive Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: backend/build/reports
