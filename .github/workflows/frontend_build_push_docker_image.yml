name: Frontend - build and push Docker image

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      frontend_libraries_build_artifact_name:
        required: true
        description: Name of the frontend build artifact to download with 'download-artifact'
        type: "string"
      push_to_dockerhub:
        description: "Push the built image to Docker Hub as well"
        required: false
        type: boolean
        default: false
      release_image_tag:
        description: "Tag to use when pushing the Docker Hub release image"
        required: false
        type: string

    outputs:
      tagged_image:
        description: "The Docker image tag"
        value: ${{ jobs.build_image.outputs.image_tag }}

defaults:
  run:
    working-directory: frontend

env:
  NODE_VERSION: "20.x"
  DOCKERHUB_IMAGE: ritense/gzac-frontend

jobs:
  build_and_push_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.primary_tag.outputs.tag }}

    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release image inputs
        if: ${{ inputs.push_to_dockerhub }}
        run: |
          if [ -z "${{ inputs.release_image_tag }}" ]; then
            echo "::error::'release_image_tag' input must be provided when 'push_to_dockerhub' is true."
            exit 1
          fi

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download libraries dist artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.frontend_libraries_build_artifact_name }}
          path: frontend/dist/

      - name: Move local devDependencies to dependencies and install
        shell: bash
        run: |
          set -euo pipefail

          PROJECTS_DIR="projects/valtimo"
          SCOPE="@valtimo"
          LOCAL_ROOT="dist/valtimo"
          PKG_JSON="package.json"

          if [ ! -f "$PKG_JSON" ]; then
            echo "❌ $PKG_JSON niet gevonden in repo-root"; exit 1
          fi
          if [ ! -d "$PROJECTS_DIR" ]; then
            echo "ℹ️  '$PROJECTS_DIR' niet gevonden; niets te doen."; exit 0
          fi

          echo "🔎 Subfolders in '$PROJECTS_DIR' verzamelen…"
          mapfile -t NAMES < <(find "$PROJECTS_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -v '^\.' || true)

          if [ "${#NAMES[@]}" -eq 0 ]; then
            echo "ℹ️  Geen subfolders gevonden; niets te doen."; exit 0
          fi

          for name in "${NAMES[@]}"; do
            npm pkg delete devDependencies."$SCOPE/$name" || true
            npm pkg set dependencies.@valtimo/$name="file:$LOCAL_ROOT/$name"
          done

          echo "📦 npm install…"
          npm install

          echo "🎉 Klaar. Geüpdatet packages:"
          for name in "${NAMES[@]}"; do
            echo " - ${SCOPE}/${name} -> file:${LOCAL_ROOT}/${name}"
          done

          echo "Content of package.json:"
          cat package.json

          sed -i "s/\"dist\/valtimo/\"dist\/valtimo/g" angular.json

      - name: Build app (optioneel voor andere outputs)
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ inputs.push_to_dockerhub }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Resolve frontend tree hash
        id: frontend_tree
        run: echo "tree=$(git rev-parse HEAD:frontend)" >> "$GITHUB_OUTPUT"

      - name: Normalize branch name for tags
        shell: bash
        run: |
          echo "BRANCH_NAME_SAFE=${BRANCH_NAME//\//-}" >> "$GITHUB_ENV"

      - name: Generate image tags
        id: generate_tags
        uses: docker/metadata-action@v5
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        with:
          images: ghcr.io/${{ github.repository }}/gzac-frontend
          tags: |
            type=raw,value=${{ env.BRANCH_NAME_SAFE }}.${{ github.run_number }}
            type=raw,value=commit-${{ github.sha }}
            type=raw,value=contents-${{ steps.frontend_tree.outputs.tree }}
          flavor: |
            latest=false

      - name: Extract primary image tag
        id: primary_tag
        run: |
          full_tag='${{ fromJson(steps.generate_tags.outputs.json).tags[0] }}'
          echo "tag=${full_tag##*:}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # gebruik het ge-downloadde artefact als build context
          context: frontend/
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            ${{ steps.generate_tags.outputs.tags }}
            ${{ inputs.push_to_dockerhub && format('docker.io/{0}:{1}', env.DOCKERHUB_IMAGE, inputs.release_image_tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
