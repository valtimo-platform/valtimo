name: Frontend - build and push Docker image

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      frontend_libraries_build_artifact_name:
        required: true
        description: Name of the frontend build artifact to download with 'download-artifact'
        type: "string"
      variant:
        description: "Angular app variant to build (matches an angular.json project name). Default 'dev' for CI test images; release flows pass 'gzac'."
        required: false
        type: string
        default: dev
      push_to_dockerhub:
        description: "Push the built image to Docker Hub as well"
        required: false
        type: boolean
        default: false
      release_image_tag:
        description: "Tag to use when pushing the Docker Hub release image"
        required: false
        type: string
      project_version:
        description: "Version stamped into the built app (shown in the UI as valtimo-frontend-libraries). Falls back to the committed versions.ts value when empty."
        required: false
        type: string
        default: ""

    outputs:
      built_image:
        description: "The Docker image tag"
        value: ${{ jobs.build_and_push_image.outputs.image_tag }}

defaults:
  run:
    working-directory: frontend

env:
  NODE_VERSION: "20.x"

jobs:
  resolve_variant:
    runs-on: ubuntu-latest
    # Override the workflow-level `defaults.run.working-directory: frontend` —
    # this job doesn't check the repo out, so `cd frontend` would fail.
    defaults:
      run:
        working-directory: .
    outputs:
      image_name: ${{ steps.resolve.outputs.image_name }}
      tag_kind: ${{ steps.resolve.outputs.tag_kind }}
    steps:
      - name: Resolve variant parameters
        id: resolve
        run: |
          case "${{ inputs.variant }}" in
            dev)
              # CI test-env image — ships under the gzac-frontend ghcr name with
              # `test` tags so it never collides with the released gzac-frontend
              # image (same name, built from variant=gzac with `production` tags).
              echo "image_name=gzac-frontend" >> "$GITHUB_OUTPUT"
              echo "tag_kind=test" >> "$GITHUB_OUTPUT"
              ;;
            gzac)
              echo "image_name=gzac-frontend" >> "$GITHUB_OUTPUT"
              echo "tag_kind=production" >> "$GITHUB_OUTPUT"
              ;;
            valtimo)
              echo "image_name=valtimo-frontend" >> "$GITHUB_OUTPUT"
              echo "tag_kind=production" >> "$GITHUB_OUTPUT"
              ;;
            evenementenvergunning)
              echo "image_name=gzac-evenementenvergunning-frontend" >> "$GITHUB_OUTPUT"
              echo "tag_kind=production" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown variant '${{ inputs.variant }}' (expected: dev, gzac, valtimo, evenementenvergunning)"
              exit 1
              ;;
          esac

  build_and_push_image:
    needs: resolve_variant
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.primary_tag.outputs.tag }}

    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release image inputs
        if: ${{ inputs.push_to_dockerhub }}
        run: |
          if [ -z "${{ inputs.release_image_tag }}" ]; then
            echo "::error::'release_image_tag' input must be provided when 'push_to_dockerhub' is true."
            exit 1
          fi

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download libraries dist artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.frontend_libraries_build_artifact_name }}
          path: frontend/dist/

      - name: Add release plugin dependencies
        shell: bash
        run: |
          set -euo pipefail

          # Plugin packages live outside package.json so local dev (npm start)
          # doesn't pull them in — the workspace symlinks would break Vite's
          # pre-bundling of their @valtimo/* transitive imports. Release builds
          # use fileReplacements to swap src/app/app-plugins.ts -> .prod.ts,
          # which imports these packages; CI installs them here per-branch
          # using the pins in release-plugins.json.
          if [ ! -f "release-plugins.json" ]; then
            echo "::notice::release-plugins.json not found; skipping release plugin pin"
            exit 0
          fi

          jq -r 'to_entries[] | "dependencies.\(.key)=\(.value)"' release-plugins.json \
            | while IFS= read -r entry; do
                npm pkg set "$entry"
              done

          echo "Release plugin pins applied:"
          jq -r 'to_entries[] | "  \(.key)@\(.value)"' release-plugins.json

      - name: "Rewrite local @valtimo/* deps to file: links and install"
        shell: bash
        run: |
          set -euo pipefail

          PROJECTS_DIR="projects/valtimo"
          SCOPE="@valtimo"
          LOCAL_ROOT="dist/valtimo"

          if [ ! -d "$PROJECTS_DIR" ]; then
            echo "::error::$PROJECTS_DIR not found"
            exit 1
          fi

          mapfile -t NAMES < <(find "$PROJECTS_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -v '^\.' || true)
          if [ "${#NAMES[@]}" -eq 0 ]; then
            echo "::error::no workspace packages found under $PROJECTS_DIR"
            exit 1
          fi

          # Drop the workspaces declaration so npm install honours the file:
          # deps below instead of symlinking @valtimo/* to source folders that
          # have no compiled output. Source resolution still works for the app
          # itself via tsconfig.paths; the plugin tarballs in node_modules need
          # the file: deps to find @valtimo/* via standard node resolution.
          npm pkg delete workspaces >/dev/null 2>&1 || true

          for name in "${NAMES[@]}"; do
            npm pkg delete devDependencies."$SCOPE/$name" >/dev/null 2>&1 || true
            npm pkg set "dependencies.$SCOPE/$name=file:$LOCAL_ROOT/$name"
          done

          npm install

      # The app bundles @valtimo/shared's versions.ts from source (via
      # tsconfig.paths), so stamp the version into that source file here — the
      # libs build's version bump happens on a different runner and never reaches
      # this checkout. No-op when project_version is empty (keeps committed value).
      - name: Stamp frontend version
        if: ${{ inputs.project_version != '' }}
        shell: bash
        env:
          PROJECT_VERSION: ${{ inputs.project_version }}
        run: |
          set -euo pipefail
          # versions.ts location differs per branch (shared/ on v13, config/ on
          # v12); locate the one holding frontendLibraries so this works on both.
          f=$(grep -rl 'frontendLibraries' projects/valtimo --include='versions.ts' 2>/dev/null | head -1 || true)
          if [ -z "$f" ]; then
            echo "::warning::no versions.ts with frontendLibraries found; skipping frontend version stamp"
            exit 0
          fi
          sed -i "s/\(frontendLibraries: *'\)[^']*'/\1${PROJECT_VERSION}'/" "$f"
          echo "Stamped $f:"; grep frontendLibraries "$f" || true

      - name: Build app
        run: npm run build:${{ inputs.variant }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ inputs.push_to_dockerhub }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Resolve frontend tree hash
        id: frontend_tree
        run: echo "tree=$(git rev-parse HEAD:frontend)" >> "$GITHUB_OUTPUT"

      - name: Normalize branch name for tags
        shell: bash
        run: |
          echo "BRANCH_NAME_SAFE=${BRANCH_NAME//\//-}" >> "$GITHUB_ENV"

      - name: Generate image tags
        id: generate_tags
        uses: docker/metadata-action@v5
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        with:
          images: ghcr.io/${{ github.repository }}/${{ needs.resolve_variant.outputs.image_name }}
          tags: |
            type=raw,value=${{ env.BRANCH_NAME }}-${{ needs.resolve_variant.outputs.tag_kind }}.${{ github.run_number }}
            type=raw,value=commit-${{ needs.resolve_variant.outputs.tag_kind }}-${{ github.sha }}
            type=raw,value=contents-${{ needs.resolve_variant.outputs.tag_kind }}-${{ steps.frontend_tree.outputs.tree }}
          flavor: |
            latest=false

      - name: Extract primary image tag
        id: primary_tag
        run: |
          full_tag='${{ fromJson(steps.generate_tags.outputs.json).tags[0] }}'
          echo "tag=${full_tag##*:}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # gebruik het ge-downloadde artefact als build context
          context: frontend/
          file: ./frontend/Dockerfile
          build-args: |
            VARIANT=${{ inputs.variant }}
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            ${{ steps.generate_tags.outputs.tags }}
            ${{ inputs.push_to_dockerhub && format('docker.io/ritense/{0}:{1}', needs.resolve_variant.outputs.image_name, inputs.release_image_tag) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
