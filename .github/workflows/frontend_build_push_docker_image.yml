name: Frontend - build and push Docker image

permissions:
  contents: read

on:
  workflow_call:
    outputs:
      built_image:
        description: "The Docker image tag"
        value: ${{ jobs.build_image.outputs.image_tag }}

defaults:
  run:
    working-directory: frontend

env:
  NODE_VERSION: "20.x"

jobs:
  build_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.primary_tag.outputs.tag }}

    env:
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve frontend tree hash
        id: frontend_tree
        run: echo "tree=$(git rev-parse HEAD:frontend)" >> "$GITHUB_OUTPUT"

      - name: Generate image tags
        id: generate_tags
        uses: docker/metadata-action@v5
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        with:
          images: ghcr.io/${{ github.repository }}/gzac-frontend
          tags: |
            type=raw,value=${{ env.BRANCH_NAME }}-test.${{ github.run_number }}
            type=raw,value=commit-test-${{ github.sha }}
            type=raw,value=contents-test-${{ steps.frontend_tree.outputs.tree }}
          flavor: |
            latest=false

      - name: Extract primary image tag
        id: primary_tag
        run: |
          full_tag='${{ fromJson(steps.generate_tags.outputs.json).tags[0] }}'
          echo "tag=${full_tag##*:}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          # gebruik het ge-downloadde artefact als build context
          context: frontend/
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.generate_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
