name: 'Create test environment'
on:
  workflow_call:
    inputs:
      envName:
        description: 'Environment name'
        required: true
  workflow_dispatch:
    inputs:
      envName:
        description: 'Environment name'
        required: true

permissions:
  actions: read
  contents: read

jobs:
  build_backend_image:
    uses: ./.github/workflows/backend_build_push_docker_image.yml
  build_frontend_image:
    uses: ./.github/workflows/frontend_build_push_docker_image.yml
  create_test_environment:
    steps:
      - name: Create test environment
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.VALTIMO_PRODUCT_DEVELOPMENT_INFRA_GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            ${{ secrets.VALTIMO_PRODUCT_DEVELOPMENT_WORKFLOW_DISPATCH_URL }} \
            -d '{"ref":"main","inputs":{"envName":"pr-test"}'