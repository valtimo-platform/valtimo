name: Tag image for use in a test environment
on:
  workflow_dispatch:
    inputs:
      target:
        description: "Can be one of 'gzac-frontend', 'gzac-backend', (TODO:) 'valtimo-frontend' or 'valtimo-backend'"
        required: true
        type: choice
        options:
          - gzac-frontend
          - gzac-backend
      env_name:
        description: "Optional environment name override (e.g. pr123). Defaults to branch/PR-derived name."
        required: false
        type: string
      contents_sha:
        description: "Git contents SHA for the built artifact (e.g. git rev-parse HEAD:frontend). Used in the test env tag."
        required: true
        type: string
      image_to_tag:
        description: "Existing image tag in GHCR that will receive an additional tag for the test environment. E.g. next-minor.15"
        required: true
        type: string
      source_sha:
        description: "Optional commit SHA to embed in the test env tag. Defaults to the resolved source SHA."
        required: false
        type: string

  workflow_call:
    inputs:
      target:
        description: "Can be one of 'gzac-frontend', 'gzac-backend', (TODO:) 'valtimo-frontend' or 'valtimo-backend'"
        required: true
        type: string
      env_name:
        description: "Optional environment name override (e.g. pr123). Defaults to branch/PR-derived name."
        required: false
        type: string
      contents_sha:
        description: "Git contents SHA for the built artifact (e.g. git rev-parse HEAD:frontend). Used in the test env tag."
        required: true
        type: string
      image_to_tag:
        description: "Existing image tag that will receive an additional tag for the test environment when the build succeeds. E.g. next-minor.15"
        required: false
        type: string
      source_sha:
        description: "Optional commit SHA to embed in the test env tag. Defaults to the resolved source SHA."
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  determine_test_env:
    uses: ./.github/workflows/determine_test_env.yml
    with:
      envName: ${{ inputs.env_name }}
      source_sha: ${{ inputs.source_sha }}

  tag_test_env:
    runs-on: ubuntu-latest
    needs:
      - determine_test_env
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Tag image for test environment
        env:
          IMAGE: "ghcr.io/${{ github.repository }}/${{ inputs.target }}"
          IMAGE_TO_TAG: "${{ inputs.image_to_tag }}"
          CONTENTS_SHA: "${{ inputs.contents_sha }}"
          SOURCE_SHA: "${{ inputs.source_sha || needs.determine_test_env.outputs.source_sha }}"
          ENV_NAME: "${{ needs.determine_test_env.outputs.name }}"
          RUN_NUMBER: "${{ github.run_number }}"
        run: |
          if [ -z "${IMAGE_TO_TAG}" ]; then
            echo "image_to_tag is required but was not provided." >&2
            exit 1
          fi
          SOURCE_SHA_SHORT=${SOURCE_SHA:0:10}
          CONTENTS_SHA_SHORT=${CONTENTS_SHA:0:10}
          TEST_ENV_TAG="testEnv.${ENV_NAME}_commit.${SOURCE_SHA_SHORT}_contents.${CONTENTS_SHA_SHORT}_build.${RUN_NUMBER}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${TEST_ENV_TAG}" \
            "${IMAGE}:${IMAGE_TO_TAG}"
