name: Frontend - Publish release

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      project_version:
        description: "Base semantic version (e.g. 13.6.0)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      project_version:
        description: "Base semantic version (e.g. 13.6.0)"
        required: true

defaults:
  run:
    working-directory: frontend

jobs:
  build_and_test_libs:
    uses: ./.github/workflows/frontend_build_test_libraries.yml
    with:
      project_version: ${{ inputs.project_version || github.event.inputs.project_version }}
    secrets: inherit

  publish_libs:
    needs:
      - build_and_test_libs
    uses: ./.github/workflows/frontend_publish_to_npm.yml
    with:
      project_version: ${{ inputs.project_version || github.event.inputs.project_version }}
      frontend_libraries_build_artifact_name: ${{ needs.build_and_test_libs.outputs.build_artifact_name }}
    secrets: inherit
