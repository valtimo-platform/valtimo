name: Determine test environment name and source SHA

on:
  workflow_call:
    inputs:
      envName:
        description: "Explicit environment name for manual runs"
        required: false
        type: string
      source_sha:
        description: "Optional commit SHA to use for the test environment source"
        required: false
        type: string
    outputs:
      name:
        description: "Resolved test environment name"
        value: ${{ jobs.determine.outputs.name }}
      source_sha:
        description: "Resolved test environment commit SHA"
        value: ${{ jobs.determine.outputs.source_sha }}

jobs:
  determine:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.resolve.outputs.name }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
    steps:
      - id: resolve
        shell: bash
        run: |
          EVENT="${{ github.event_name }}"
          INPUT_SOURCE_SHA="${{ inputs.source_sha }}"
          if [[ -n "$INPUT_SOURCE_SHA" ]]; then
            source_sha="$INPUT_SOURCE_SHA"
          elif [[ "$EVENT" == 'pull_request' ]]; then
            source_sha="${{ github.event.pull_request.head.sha }}"
          elif [[ "$EVENT" == 'push' ]]; then
            # Turn / into - and make all lowercase
            safe_branch_name=$(echo "${{ github.ref_name }}" | sed 's/[\/+|<>,;_]/-/g' | tr '[:upper:]' '[:lower:]')
            echo "name=$safe_branch_name" >> "$GITHUB_OUTPUT"
            echo "source_sha=$(echo '${{ github.sha }}')" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported event ${EVENT} and no source_sha provided" >&2
            exit 1
          fi

          if [[ "$EVENT" == 'pull_request' ]]; then
            echo "name=pr${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT" == 'push' ]]; then
            safe_branch_name=$(echo "${{ github.ref_name }}" | sed 's/[\/+|<>,;]/-/g' | tr '[:upper:]' '[:lower:]')
            echo "name=$safe_branch_name" >> "$GITHUB_OUTPUT"
          elif [[ -n "$INPUT_SOURCE_SHA" ]]; then
            echo "name=manual" >> "$GITHUB_OUTPUT"
          fi

          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"
