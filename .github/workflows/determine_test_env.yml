name: Determine test environment name and source SHA

on:
  workflow_call:
    inputs:
      envName:
        description: "Explicit environment name for manual runs"
        required: false
        type: string
      source_sha:
        description: "Optional commit SHA to use for the test environment source"
        required: false
        type: string
    outputs:
      name:
        description: "Resolved test environment name"
        value: ${{ jobs.determine.outputs.name }}
      source_sha:
        description: "Resolved test environment commit SHA"
        value: ${{ jobs.determine.outputs.source_sha }}

jobs:
  determine:
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.resolve.outputs.name }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
    steps:
      - id: resolve
        shell: bash
        env:
          INPUT_ENV_NAME: ${{ inputs.envName }}
          INPUT_SOURCE_SHA: ${{ inputs.source_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          if [[ -n "${INPUT_ENV_NAME}" ]]; then
            ENV_NAME="${INPUT_ENV_NAME}"
          elif [[ -n "${PR_NUMBER}" ]]; then
            ENV_NAME="pr${PR_NUMBER}"
          elif [[ -n "${REF_NAME}" ]]; then
            # Turn / into - and make all lowercase
            ENV_NAME=$(echo "${REF_NAME}" | sed 's/[\/+|<>,;_]/-/g' | tr '[:upper:]' '[:lower:]')
          else
            echo "Unable to resolve test environment name." >&2
            exit 1
          fi

          if [[ -n "${INPUT_SOURCE_SHA}" ]]; then
            SOURCE_SHA="${INPUT_SOURCE_SHA}"
          elif [[ -n "${PR_SHA}" ]]; then
            SOURCE_SHA="${PR_SHA}"
          elif [[ -n "${GITHUB_SHA}" ]]; then
            SOURCE_SHA="${GITHUB_SHA}"
          else
            echo "Unable to resolve test environment source SHA." >&2
            exit 1
          fi

          echo "name=${ENV_NAME}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${SOURCE_SHA}" >> "$GITHUB_OUTPUT"
