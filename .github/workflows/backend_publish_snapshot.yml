name: Backend - Publish snapshot

permissions:
  contents: read
  packages: write

on:
  workflow_call:
    inputs:
      project_version:
        description: "Optional semantic version (e.g. 13.6.0)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      project_version:
        description: "Optional semantic version (e.g. 13.6.0)"
        required: false

defaults:
  run:
    working-directory: backend

jobs:
  build_run_tests:
    name: Build libraries and run tests
    uses: ./.github/workflows/backend_build_test_libraries.yml
    secrets: inherit

  publish_snapshot:
    name: Publish snapshot to GitHub Packages
    needs:
      - build_run_tests
    runs-on: ubuntu-latest
    env:
      PROVIDED_VERSION: ${{ inputs.project_version || github.event.inputs.project_version || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Temurin 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Download built libraries
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build_run_tests.outputs.build_artifact_name }}
          path: .

      - name: Compute snapshot version
        id: version
        shell: bash
        run: |
          set -eo pipefail
          BASE_VERSION="${PROVIDED_VERSION}"
          DEFAULT_VERSION="$(grep -m1 '^projectVersion=' gradle.properties | cut -d'=' -f2- | tr -d '\r')"
          if [[ -z "${BASE_VERSION}" && "${GITHUB_REF_NAME}" == development/* ]]; then
            BASE_VERSION="${GITHUB_REF_NAME#development/}"
          fi
          if [[ -z "${BASE_VERSION}" && ( "${GITHUB_REF_NAME}" == next-major || "${GITHUB_REF_NAME}" == next-minor ) ]]; then
            BASE_VERSION="${DEFAULT_VERSION}"
          fi
          if [[ -z "${BASE_VERSION}" ]]; then
            BASE_VERSION="${DEFAULT_VERSION}"
          fi

          if [[ -z "${BASE_VERSION}" ]]; then
            echo "::error::Unable to determine base version for snapshot publishing."
            exit 1
          fi

          SNAPSHOT_VERSION="${BASE_VERSION}-SNAPSHOT"
          echo "snapshot_version=${SNAPSHOT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check license compliance (non-blocking)
        continue-on-error: true
        run: ./gradlew checkLicense

      - name: Warn if disallowed licenses found
        run: |
          sudo apt-get update -qq && sudo apt-get install -y jq
          FILE="build/reports/dependency-license/dependencies-without-allowed-license.json"
          if [[ -f "$FILE" ]]; then
            COUNT=$(jq '.dependenciesWithoutAllowedLicenses | length' "$FILE" 2>/dev/null || echo 0)
            if [[ "$COUNT" -gt 0 ]]; then
              echo "::warning::Disallowed licenses found. See dependencies-without-allowed-license.json (count=$COUNT)."
            fi
          fi

      - name: Publish snapshot
        env:
          ORG_GRADLE_PROJECT_publishToGitHubPackages: "true"
        run: ./gradlew --no-parallel publishAllPublicationsToGitHubPackagesRepository -PprojectVersion="${{ steps.version.outputs.snapshot_version }}"

      - name: Archive reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: backend/build/reports
