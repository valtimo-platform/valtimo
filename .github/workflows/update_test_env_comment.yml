name: "Update test environment comment"

on:
  repository_dispatch:
    types:
      - test_env_cannot_start
      - test_env_started
      - test_env_is_running
      - test_env_is_crash_looping

permissions:
  contents: read
  pull-requests: write

env:
  PAYLOAD_FILE: /tmp/client_payload.json

jobs:
  update_test_env_comment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare payload and schema
        id: prepare
        run: echo '${{ toJson(github.event.client_payload) }}' > ${{env.PAYLOAD_FILE}}

      - name: Validate client payload
        uses: dsanders11/json-schema-validate-action@v1.4.0
        with:
          schema: .github/test_env_update_schema.json
          files: ${{env.PAYLOAD_FILE}}

      - name: Determine comment message
        id: message
        run: |
          set -euo pipefail
          payload=${{env.PAYLOAD_FILE}}
          state=$(jq -r '.state' "$payload")
          if [ "$state" = "test_env_cannot_start" ]; then
            test_env_comment_id=$(jq -r '.test_env_comment_id' "$payload")
            test_env_image_tag=$(jq -r '.test_env_image_tag' "$payload")
            error_message=$(jq -r '.error_message' "$payload")
            msg="test_env_cannot_start: comment_id=${test_env_comment_id}, image_tag=${test_env_image_tag}, error=${error_message}"
          else
            test_env_comment_id=$(jq -r '.test_env_comment_id' "$payload")
            test_env_image_tag=$(jq -r '.test_env_image_tag' "$payload")
            grafana_backend_pod_metrics_url=$(jq -r '.grafana_backend_pod_metrics_url' "$payload")
            grafana_backend_pod_logs_url=$(jq -r '.grafana_backend_pod_logs_url' "$payload")
            msg="${state}: comment_id=${test_env_comment_id}, image_tag=${test_env_image_tag}, grafana_metrics=${grafana_backend_pod_metrics_url}, grafana_logs=${grafana_backend_pod_logs_url}"
          fi

          comment_id=$(jq -r '.test_env_comment_id' "$payload")
          {
            printf 'message_body=%s\n' "$msg"
            printf 'comment_id=%s\n' "$comment_id"
          } >> "$GITHUB_OUTPUT"

      - name: Generate token as GitHub App
        id: token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.VALTIMO_PLATFORM_APP_APPID }}
          private_key: ${{ secrets.VALTIMO_PLATFORM_APP_PRIVATE_KEY }}
      - name: Append update to PR comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.message.outputs.comment_id }}
          token: ${{ steps.token.outputs.token }}
          body: ${{ steps.message.outputs.message_body }}
          edit-mode: append
