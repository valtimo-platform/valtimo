name: Frontend - Publish release candidate

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      project_version:
        description: "Semantic version suffixed with -{rc_number}. E.g. 13.6.0-1"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      project_version:
        description: "Semantic version suffixed with -{rc_number}. E.g. 13.6.0-1"
        required: true

defaults:
  run:
    working-directory: frontend

jobs:
  determine_version:
    runs-on: ubuntu-latest
    outputs:
      project_version: ${{ steps.version.outputs.version_rc }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate project version
        id: version
        shell: bash
        run: |
          PROJECT_VERSION="${{ inputs.project_version || github.event.inputs.project_version }}"
          if [[ -z "$PROJECT_VERSION" ]]; then
            echo "::error::Project version input is required."
            exit 1
          fi
          if [[ ! "$PROJECT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-[0-9]+$ ]]; then
            echo "::error::Project version must be <semver>-<rc_number> (e.g. 13.5.0-1). Current: $PROJECT_VERSION."
            exit 1
          fi
          echo "version_rc=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"

  build_and_test:
    needs: ["determine_version"]
    uses: ./.github/workflows/frontend_build_test_libraries.yml
    with:
      project_version: ${{ needs.determine_version.outputs.project_version }}
    secrets: inherit

  publish:
    if: ${{ startsWith(github.ref_name, 'rc/') }}
    needs:
      - build_and_test
      - determine_version
    uses: ./.github/workflows/frontend_publish_to_s3.yml
    with:
      publish_type: "release-candidate"
      frontend_libraries_build_artifact_name: ${{ needs.build_and_test.outputs.build_artifact_name }}
      project_version: ${{ needs.determine_version.outputs.project_version }}
    secrets: inherit
