spring:
    datasource:
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://localhost:3365/case-opensearch-test
        username: valtimo
        password: password
        hikari:
            auto-commit: false
    jpa:
        database-platform: org.hibernate.dialect.PostgreSQLDialect
        database: postgresql
    elasticsearch:
        uris: http://localhost:39200

# The spring-data-opensearch starter binds its own client from the `opensearch.*` namespace
# (not spring.elasticsearch.*), defaulting to localhost:9200. The test OpenSearch is on 39200.
opensearch:
    uris: http://localhost:39200

valtimo:
    database: postgres
