spring:
  # The module uses spring-data-opensearch, not the Elastic client. Mirror the gzac app's exclusions so
  # Spring Boot's Elastic auto-configuration (which needs co.elastic.clients.*, absent here) does not load.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ReactiveElasticsearchClientAutoConfiguration
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
  liquibase:
    enabled: false
  jpa:
    show_sql: false
    open-in-view: false
    properties:
      hibernate:
        hbm2ddl.auto: none
        format_sql: true
        jdbc:
          time_zone: UTC
        connection:
          provider_disables_autocommit: true
    hibernate:
      ddl-auto: none

spring-actuator:
  username: test
  password: test

valtimo:
  versioning:
    enabled: false
  plugin:
    encryption-secret: "abcdefghijklmnop"

operaton:
  bpm:
    history-level: audit
    generic-properties:
      properties:
        enforceHistoryTimeToLive: false
