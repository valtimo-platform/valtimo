services:
    db:
        ports:
            - "3365:5432"
        environment:
            - POSTGRES_DB=case-opensearch-test
    opensearch:
        image: opensearchproject/opensearch:2.19.2
        environment:
            - discovery.type=single-node
            - DISABLE_SECURITY_PLUGIN=true
            - DISABLE_INSTALL_DEMO_CONFIG=true
        ports:
            - "39200:9200"
