description:
  en:
    localisedName: Valtimo
    shortDescription: >-
      Open source case management platform, including GZAC-edition for Dutch Common Ground government organizations,
      licensed under EUPL 1.2.
    longDescription: |
      Valtimo is an open-source, low-code, European made, case management platform. It includes a GZAC-edition specifically designed for Dutch government entities. The platform enables public administration organizations to manage cases and workflows efficiently.

      Key features include:
      - Comprehensive case management capabilities
      - Workflow automation and business process management
      - PBAC (Policy Based Access Control) framework
      - Support for DMN (Decision Model and Notation) and BPMN (Business Process Model and Notation)

      Valtimo GZAC-edition has been developed with funding and collaboration from major Dutch municipalities including Amsterdam, The Hague, Rotterdam, and Utrecht.
    features:
      - Case management
      - Document management
      - Workflow automation
      - Process orchestration
      - Integration framework
      - Public sector compliance
    documentation: 'https://docs.valtimo.nl/'
    screenshots:
      - https://www.valtimo.nl/wp-content/uploads/Screenshot-2025-01-28-at-20.19.54.png
      - https://www.valtimo.nl/wp-content/uploads/PE-plugins.png
      - https://www.valtimo.nl/wp-content/uploads/Form-editor-uitgelicht-1.png
      - https://www.valtimo.nl/wp-content/uploads/process-progress-uitgelicht.png
  nl:
    localisedName: Valtimo (GZAC)
    shortDescription: >-
      Open source zaakgericht werken platform voor Nederlandse overheden,
      gelicenseerd onder EUPL 1.2.
    longDescription: |
      Valtimo is een open-source platform voor case management. De GZAC editie is specifiek ontwikkeld voor Nederlandse overheidsorganisaties. Het platform stelt publieke organisaties in staat om zaken, documenten en workflows efficiënt te beheren.

      In de Nederlandse overheid staat het systeem ook bekend als GZAC (Gemeentelijk Zaaksysteem Aanbesteding Coalitie).
    documentation: 'https://gzac.gitbook.io/product-docs'
    features:
      - Zaakbeheer
      - Documentbeheer
      - Workflowautomatisering
      - Procesorchestratie
      - Integratieframework
      - Publieke sector compliance
