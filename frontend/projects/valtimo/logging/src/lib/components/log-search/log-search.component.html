<form
  *ngIf="theme$ | async as theme"
  class="valtimo-log-search"
  [formGroup]="formGroup"
  (click)="$event.stopImmediatePropagation()"
>
  <section class="valtimo-log-search__fields">
    <cds-text-label class="valtimo-log-search__message">
      {{ 'logging.columns.formattedMessage' | translate }}

      <input
        cdsText
        [attr.data-carbon-theme]="theme"
        formControlName="likeFormattedMessage"
        [placeholder]="'logging.columns.formattedMessage' | translate"
        [attr.data-test-id]="TEST_IDS.VALTIMO_LOG_SEARCH_MESSAGE_INPUT"
      />
    </cds-text-label>

    <cds-dropdown
      class="valtimo-log-search__level"
      formControlName="level"
      [attr.data-carbon-theme]="theme"
      [appendInline]="true"
      [label]="'logging.columns.level' | translate"
      [placeholder]="'logging.columns.level' | translate"
      [attr.data-test-id]="TEST_IDS.VALTIMO_LOG_SEARCH_LEVEL_DROPDOWN"
    >
      <cds-dropdown-list [items]="logLevelItems"></cds-dropdown-list>
    </cds-dropdown>

    <div class="valtimo-log-search__timestamp">
      <div class="valtimo-log-search__datetime">
        <cds-date-picker
          #afterTimestamp
          [attr.data-carbon-theme]="theme"
          [label]="'logging.search.afterTimestamp' | translate"
          placeholder="DD-MM-YYYY"
          [dateFormat]="'d-m-Y'"
          (valueChange)="onDateSelected('afterTimestamp', $event)"
          [attr.data-test-id]="TEST_IDS.VALTIMO_LOG_SEARCH_AFTER_DATE_PICKER"
        ></cds-date-picker>

        <cds-timepicker [attr.data-carbon-theme]="theme" formControlName="afterTime" [attr.data-test-id]="TEST_IDS.VALTIMO_LOG_SEARCH_AFTER_TIME_PICKER">
        </cds-timepicker>
      </div>

      <div class="valtimo-log-search__datetime">
        <cds-date-picker
          #beforeTimestamp
          [attr.data-carbon-theme]="theme"
          [label]="'logging.search.beforeTimestamp' | translate"
          placeholder="DD-MM-YYYY"
          [dateFormat]="'d-m-Y'"
          (valueChange)="onDateSelected('beforeTimestamp', $event)"
          [attr.data-test-id]="TEST_IDS.VALTIMO_LOG_SEARCH_BEFORE_DATE_PICKER"
        ></cds-date-picker>

        <cds-timepicker [attr.data-carbon-theme]="theme" formControlName="beforeTime" [attr.data-test-id]="TEST_IDS.VALTIMO_LOG_SEARCH_BEFORE_TIME_PICKER">
        </cds-timepicker>
      </div>
    </div>
  </section>

  <section formArrayName="properties" class="valtimo-log-search__properties">
    <span class="valtimo-log-search__label"> {{ 'logging.search.properties' | translate }} </span>

    @for (propertyGroup of propertiesArray.controls; track $index) {
      <form [formGroup]="propertyGroup" class="valtimo-log-search__property">
        <cds-text-label>
          <input
            cdsText
            [attr.data-carbon-theme]="theme"
            formControlName="key"
            [placeholder]="'interface.key' | translate"
            data-test-id="valtimo-log-search-property-key-input-{{$index}}"
          />
        </cds-text-label>

        <cds-text-label>
          <input
            cdsText
            [attr.data-carbon-theme]="theme"
            formControlName="value"
            [placeholder]="'interface.value' | translate"
            data-test-id="valtimo-log-search-property-value-input-{{$index}}"
          />
        </cds-text-label>

        <button
          cdsButton="danger--ghost"
          [disabled]="$count === 1"
          iconOnly="true"
          type="button"
          (click)="removePropertySearchField($index)"
          data-test-id="valtimo-log-search-remove-property-button-{{$index}}"
        >
          <svg cdsIcon="trash-can" size="16"></svg>
        </button>
      </form>
    }

    <button cdsButton="primary" size="sm" type="button" (click)="addPropertySearchField()" [attr.data-test-id]="TEST_IDS.VALTIMO_LOG_SEARCH_ADD_PROPERTY_BUTTON">
      {{ 'logging.search.addProperty' | translate }}

      <svg class="cds--btn__icon" cdsIcon="add" size="16"></svg>
    </button>
  </section>

  <button cdsButton="tertiary" type="button" (click)="onClearFilter()" [attr.data-test-id]="TEST_IDS.VALTIMO_LOG_SEARCH_CLEAR_BUTTON">
    {{ 'interface.clear' | translate }}

    <svg class="cds--btn__icon" cdsIcon="trash-can" size="16"></svg>
  </button>
</form>
