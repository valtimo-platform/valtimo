<form [formGroup]="form">
  <cds-text-label>
    {{ 'externalPlugin.processLink.configuration' | translate }}
    <select
      cdsSelect
      formControlName="externalPluginConfigurationId"
      [attr.data-test-id]="testIds.configurationSelect"
    >
      <option [ngValue]="null" disabled>
        {{ 'externalPlugin.processLink.configurationPlaceholder' | translate }}
      </option>
      <option *ngFor="let configuration of configurations" [ngValue]="configuration.id">
        {{ configuration.title }}
      </option>
    </select>
  </cds-text-label>

  <cds-text-label>
    {{ 'externalPlugin.processLink.actionKey' | translate }}
    <input
      cdsText
      formControlName="actionKey"
      [attr.data-test-id]="testIds.actionKeyInput"
      placeholder="send-notification"
    />
  </cds-text-label>

  <cds-text-label>
    {{ 'externalPlugin.processLink.actionProperties' | translate }}
    <textarea
      cdsTextArea
      formControlName="actionPropertiesJson"
      [attr.data-test-id]="testIds.actionPropertiesInput"
      rows="8"
      placeholder='{ "recipient": "pv:userEmail", "template": "welcome" }'
    ></textarea>
  </cds-text-label>

  <p *ngIf="propertiesError" class="cds--form-requirement">
    {{ propertiesError | translate }}
  </p>
</form>
