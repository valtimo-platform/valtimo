<cds-modal
  valtimoCdsModal
  [open]="open"
  [size]="'sm'"
  (overlaySelected)="onClose()"
>
  <cds-modal-header (closeSelect)="onClose()">
    <h3 cdsModalHeaderHeading>{{ 'externalPlugin.host.add' | translate }}</h3>
  </cds-modal-header>

  <section cdsModalContent>
    <form [formGroup]="form">
      <cds-text-label>
        {{ 'externalPlugin.host.name' | translate }}
        <input
          cdsText
          formControlName="name"
          [attr.data-test-id]="testIds.nameInput"
          placeholder="my-plugin-host"
        />
      </cds-text-label>

      <cds-text-label>
        {{ 'externalPlugin.host.baseUrl' | translate }}
        <input
          cdsText
          formControlName="baseUrl"
          [attr.data-test-id]="testIds.baseUrlInput"
          placeholder="https://plugin-host.internal:8090"
        />
      </cds-text-label>
    </form>
  </section>

  <cds-modal-footer>
    <button
      cdsButton="secondary"
      [attr.data-test-id]="testIds.cancelButton"
      (click)="onClose()"
    >
      {{ 'interface.cancel' | translate }}
    </button>

    <button
      cdsButton="primary"
      [attr.data-test-id]="testIds.saveButton"
      [disabled]="form.invalid"
      (click)="onSubmit()"
    >
      {{ 'interface.save' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
