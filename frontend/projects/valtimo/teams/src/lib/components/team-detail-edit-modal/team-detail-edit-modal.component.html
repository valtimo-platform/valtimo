<cds-modal
  *ngIf="{showModal: showModal$ | async} as obs"
  [open]="obs.showModal"
  showFooter="true"
  valtimoCdsModal
  (close)="onCloseModal()"
>
  <cds-modal-header showCloseButton="true" (closeSelect)="onCloseModal()">
    <h3 cdsModalHeaderHeading>
      {{ 'teams.createEditModal.editTitle' | translate }}
    </h3>
  </cds-modal-header>

  <form
    [formGroup]="formGroup"
    cdsModalContent
    class="valtimo-team-edit__content"
    [cdsLayer]="1"
  >
    <div class="cds--text-input__field-wrapper">
      <cds-label [disabled]="formGroup.disabled" [invalid]="title.touched && title.invalid">
        {{ 'teams.createEditModal.teamName' | translate }}

        <input
          formControlName="title"
          cdsText
          placeholder="{{ 'teams.createEditModal.teamNamePlaceholder' | translate }}"
        />
      </cds-label>
    </div>
  </form>

  <cds-modal-footer>
    <button cdsButton="secondary" (click)="onCloseModal()">
      {{ 'interface.cancel' | translate }}
    </button>

    <button
      cdsButton="primary"
      [disabled]="formGroup.invalid || formGroup.disabled"
      (click)="onSave()"
    >
      {{ 'teams.createEditModal.save' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
