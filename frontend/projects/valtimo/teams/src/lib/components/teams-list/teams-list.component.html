<ng-container
  *ngIf="{
    teams: teams$ | async,
    pagination: pagination$ | async,
    canCreateTeam: canCreateTeam$ | async,
  } as obs"
>
  <valtimo-carbon-list
    [fields]="FIELDS"
    [items]="obs.teams"
    [loading]="$loading()"
    [actionItems]="ACTION_ITEMS"
    [pagination]="obs.pagination"
    paginationIdentifier="teams"
    (rowClicked)="onRowClick($event)"
    (paginationClicked)="onPaginationClicked($event)"
    (paginationSet)="onPaginationSet($event)"
  >
    <ng-container carbonToolbarContent [ngTemplateOutlet]="teamActions"></ng-container>

    <valtimo-no-results
      [action]="teamActions"
      [description]="'teams.noResults.description' | translate"
      [title]="'teams.noResults.title' | translate"
    ></valtimo-no-results>
  </valtimo-carbon-list>
</ng-container>

<ng-template #teamActions>
  <button
    cdsButton="primary"
    [disabled]="(canCreateTeam$ | async) === false"
    (click)="showCreateModal()"
  >
    {{ 'teams.newTeam' | translate }}

    <svg cdsIcon="add" size="16" class="cds--btn__icon"></svg>
  </button>
</ng-template>

<valtimo-teams-create-edit-modal></valtimo-teams-create-edit-modal>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="teams.deleteModal.content"
  [outputOnConfirm]="teamToDelete$ | async"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="teams.deleteModal.title"
  (confirmEvent)="onDeleteConfirm($event)"
></valtimo-confirmation-modal>
