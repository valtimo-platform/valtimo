<ng-container
  *ngIf="{
    members: members$ | async,
    pagination: membersPagination$ | async,
    memberActionItems: memberActionItems$ | async,
    canAddMember: canAddMember$ | async,
  } as obs"
>
  <valtimo-carbon-list
    [fields]="MEMBER_FIELDS"
    [items]="obs.members"
    [loading]="$loadingMembers()"
    [actionItems]="obs.memberActionItems"
    [pagination]="obs.pagination"
    paginationIdentifier="teamMembers"
    (paginationClicked)="onPaginationClicked($event)"
    (paginationSet)="onPaginationSet($event)"
  >
    <div carbonToolbarContent>
      <valtimo-team-detail-add-member
        [disabled]="obs.canAddMember === false"
      ></valtimo-team-detail-add-member>
    </div>

    <valtimo-no-results
      [description]="'teams.detail.noMembers.description' | translate"
      [title]="'teams.detail.noMembers.title' | translate"
    ></valtimo-no-results>
  </valtimo-carbon-list>
</ng-container>

<ng-container renderInPageHeader>
  <ng-template>
    <div
      class="team-detail__header"
      *ngIf="{
        canModify: canModifyTeam$ | async,
        canDelete: canDeleteTeam$ | async,
      } as perms"
    >
      <v-overflow-menu
        class="overflow-button"
        [menuWidth]="250"
        placement="bottom-end"
      >
        <button overflowTrigger cdsButton="tertiary">
          {{ 'teams.detail.more' | translate }}
          <svg class="cds--btn__icon" cdsIcon="overflow-menu--vertical" size="16"></svg>
        </button>

        <v-overflow-menu-option (selected)="onEditTeam()" [disabled]="!perms.canModify">
          {{ 'teams.detail.editTeam' | translate }}
        </v-overflow-menu-option>

        <v-overflow-menu-option
          (selected)="onDeleteTeam()"
          type="danger"
          [disabled]="!perms.canDelete"
        >
          {{ 'teams.detail.deleteTeam' | translate }}
        </v-overflow-menu-option>
      </v-overflow-menu>
    </div>
  </ng-template>
</ng-container>

<valtimo-team-detail-edit-modal></valtimo-team-detail-edit-modal>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="teams.detail.removeMember"
  confirmButtonType="danger"
  contentTranslationKey="teams.detail.removeMemberModal.content"
  [outputOnConfirm]="memberToRemove$ | async"
  [showModalSubject$]="showRemoveMemberModal$"
  titleTranslationKey="teams.detail.removeMemberModal.title"
  (confirmEvent)="onRemoveMemberConfirm($event)"
></valtimo-confirmation-modal>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="teams.deleteModal.content"
  [outputOnConfirm]="team$ | async"
  [showModalSubject$]="showDeleteTeamModal$"
  titleTranslationKey="teams.deleteModal.title"
  (confirmEvent)="onDeleteTeamConfirm()"
></valtimo-confirmation-modal>
