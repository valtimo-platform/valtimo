<v-overflow-menu placement="bottom-end" [closeOnSelect]="false" (openChange)="onOpenChange($event)">
  <button overflowTrigger cdsButton="primary" [disabled]="disabled" class="add-member-button">
    {{ 'teams.detail.addMember' | translate }}

    <svg cdsIcon="add" size="16" class="cds--btn__icon"></svg>
  </button>

  <section
    overflowPane
    class="valtimo-team-add-member__pane"
    (click)="$event.stopImmediatePropagation()"
    *ngIf="{
      users: availableUsers$ | async,
      noUsersAvailable: noUsersAvailable$ | async,
      selectedUsername: selectedUsername$ | async,
      saving: saving$ | async,
      showComboBox: showComboBox$ | async,
    } as obs"
  >
    <cds-combo-box
      *ngIf="obs.showComboBox"
      [label]="'teams.detail.addMemberModal.selectMember' | translate"
      [placeholder]="
        obs.noUsersAvailable
          ? ('teams.detail.addMemberModal.noUsersAvailable' | translate)
          : ('teams.detail.addMemberModal.selectMemberPlaceholder' | translate)
      "
      [appendInline]="true"
      [dropUp]="false"
      [cdsLayer]="1"
      [items]="obs.users || []"
      [disabled]="obs.saving || obs.noUsersAvailable"
      itemValueKey="id"
      (selected)="onUserSelect($event)"
      (clear)="onComboBoxClear()"
    >
      <cds-dropdown-list onclick="event.stopPropagation()"></cds-dropdown-list>
    </cds-combo-box>

    <button
      cdsButton="primary"
      [cdsLayer]="1"
      class="add-to-team-button"
      [disabled]="!obs.selectedUsername || obs.saving || obs.noUsersAvailable"
      (click)="onAddToTeam()"
    >
      {{ 'teams.detail.addMemberModal.addToTeam' | translate }}
      <svg cdsIcon="user--follow" size="16" class="cds--btn__icon"></svg>
    </button>
  </section>
</v-overflow-menu>
