<valtimo-carbon-list
  *ngIf="{
    formDefinitions: formDefinitions$ | async,
    pagination: pagination$ | async,
    loading: loading$ | async,
    context: context$ | async,
  } as obs"
  [actionItems]="ACTION_ITEMS"
  [fields]="FIELDS"
  [header]="false"
  [isSearchable]="true"
  [items]="obs?.formDefinitions || []"
  [pagination]="obs.pagination"
  [loading]="obs.loading"
  paginationIdentifier="formManagementList"
  (paginationClicked)="paginationClicked($event)"
  (paginationSet)="paginationSet($event)"
  (rowClicked)="editFormDefinition($event)"
  (search)="searchTermEntered($event)"
>
  <ng-container carbonToolbarContent>
    <button cdsButton="ghost" [iconOnly]="true" (click)="navigateToUploadRoute()">
      <svg cdsIcon="upload" size="16"></svg>
    </button>

    <ng-container [ngTemplateOutlet]="createFormButton"></ng-container>
  </ng-container>

  <valtimo-no-results
    [action]="createFormButton"
    [description]="'formManagement.noResults.' + obs.context + 'Description' | translate"
    [title]="'formManagement.noResults.title' | translate"
  ></valtimo-no-results>
</valtimo-carbon-list>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="interface.deleteConfirmation"
  cancelButtonTextTranslationKey="interface.cancel"
  [outputOnConfirm]="formDefinitionToDelete$ | async"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="dashboardManagement.delete"
  (confirmEvent)="deleteFormDefinition($event)"
></valtimo-confirmation-modal>

<ng-template #createFormButton>
  <button
    *ngIf="canUpdateGlobalConfiguration$ | async"
    cdsButton="primary"
    (click)="navigateToCreateRoute()"
  >
    {{ 'Create Form' | translate }}

    <svg class="cds--btn__icon" cdsIcon="add" size="16"></svg>
  </button>
</ng-template>
