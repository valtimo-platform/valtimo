<ng-container
  *ngIf="{
    create: create$ | async,
    upload: upload$ | async,
  } as obs"
>
  <valtimo-form-management-list
    (navigateToCreateEvent)="onNavigateToCreateEvent()"
    (navigateToUploadEvent)="onNavigateToUploadEvent()"
    (navigateToEditEvent)="onFormDefinitionEditEvent($event)"
  ></valtimo-form-management-list>

  <valtimo-form-management-create
    *ngIf="obs.create"
    [upload]="obs.upload"
    (goBackEvent)="onGoBackFromCreateEvent()"
    (afterCreateEvent)="onFormDefinitionCreateEvent($event)"
    (afterUploadEvent)="onFormDefinitionUploadEvent($event)"
  ></valtimo-form-management-create>
</ng-container>
