<cds-modal valtimoCdsModal [open]="modalOpen$ | async" size="sm" (close)="closeModal()" data-test-id="form-management-modal">
  <cds-modal-header showCloseButton="true" (closeSelect)="closeModal()" data-test-id="form-management-modal-header">
    <h3 cdsModalHeaderHeading data-test-id="form-management-modal-title">{{ 'formManagement.upload.modalTitle' | translate }}</h3>
  </cds-modal-header>

  <section cdsModalContent [cdsLayer]="1" [formGroup]="form" data-test-id="form-management-modal-content">
    <cds-file-uploader
      [accept]="ACCEPTED_FILES"
      [buttonText]="'formManagement.upload.buttonText' | translate"
      [description]="'formManagement.upload.description' | translate"
      [multiple]="false"
      [title]="'formManagement.upload.title' | translate"
      buttonType="primary"
      formControlName="file"
      data-test-id="form-management-file-uploader"
    >
    </cds-file-uploader>
  </section>

  <cds-modal-footer data-test-id="form-management-modal-footer">
    <button cdsButton="ghost" (click)="closeModal()" data-test-id="form-management-cancel-button">
      {{ 'interface.cancel' | translate }}
    </button>

    <button
      cdsButton="primary"
      [disabled]="(fileSelected$ | async) === false"
      (click)="uploadFormDefinition()"
      data-test-id="form-management-upload-button"
    >
      {{ 'interface.upload' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
