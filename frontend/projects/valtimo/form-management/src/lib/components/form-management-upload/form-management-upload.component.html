<cds-modal valtimoCdsModal [open]="modalOpen$ | async" size="sm" (close)="closeModal()">
  <cds-modal-header showCloseButton="true" (closeSelect)="closeModal()">
    <h3 cdsModalHeaderHeading>{{ 'formManagement.upload.modalTitle' | translate }}</h3>
  </cds-modal-header>

  <section cdsModalContent [cdsLayer]="1" [formGroup]="form">
    <cds-file-uploader
      [accept]="ACCEPTED_FILES"
      [buttonText]="'formManagement.upload.buttonText' | translate"
      [description]="'formManagement.upload.description' | translate"
      [multiple]="false"
      [title]="'formManagement.upload.title' | translate"
      buttonType="primary"
      formControlName="file"
    >
    </cds-file-uploader>
  </section>

  <cds-modal-footer>
    <button cdsButton="ghost" (click)="closeModal()">
      {{ 'interface.cancel' | translate }}
    </button>

    <button
      cdsButton="primary"
      [disabled]="(fileSelected$ | async) === false"
      (click)="uploadFormDefinition()"
    >
      {{ 'interface.upload' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
