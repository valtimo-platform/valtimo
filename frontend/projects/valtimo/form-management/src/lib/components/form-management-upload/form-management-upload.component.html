<cds-modal valtimoCdsModal [open]="modalOpen$ | async" size="sm" (close)="closeModal()" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_MODAL">
  <cds-modal-header showCloseButton="true" (closeSelect)="closeModal()" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_MODAL_HEADER">
    <h3 cdsModalHeaderHeading [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_MODAL_TITLE">{{ 'formManagement.upload.modalTitle' | translate }}</h3>
  </cds-modal-header>

  <section cdsModalContent [cdsLayer]="1" [formGroup]="form" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_MODAL_CONTENT">
    <cds-file-uploader
      [accept]="ACCEPTED_FILES"
      [buttonText]="'formManagement.upload.buttonText' | translate"
      [description]="'formManagement.upload.description' | translate"
      [multiple]="false"
      [title]="'formManagement.upload.title' | translate"
      buttonType="primary"
      formControlName="file"
      [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_FILE_UPLOADER"
    >
    </cds-file-uploader>
  </section>

  <cds-modal-footer [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_MODAL_FOOTER">
    <button cdsButton="ghost" (click)="closeModal()" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CANCEL_BUTTON">
      {{ 'interface.cancel' | translate }}
    </button>

    <button
      cdsButton="primary"
      [disabled]="(fileSelected$ | async) === false"
      (click)="uploadFormDefinition()"
      [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_UPLOAD_BUTTON"
    >
      {{ 'interface.upload' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
