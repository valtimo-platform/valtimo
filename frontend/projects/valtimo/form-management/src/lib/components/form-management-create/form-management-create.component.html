<cds-modal
  valtimoCdsModal
  class="form-management-create"
  size="sm"
  [cdsLayer]="0"
  [open]="true"
  (close)="onCloseEvent()"
  [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL"
>
  <cds-modal-header [showCloseButton]="true" (closeSelect)="onCloseEvent()" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_HEADER">
    <h3 cdsModalHeaderHeading [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_TITLE">
      {{ 'formManagement.add' | translate }}
    </h3>
  </cds-modal-header>

  <form *ngIf="form" [formGroup]="form" (ngSubmit)="createFormDefinition()" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_FORM">
    <section cdsModalContent [cdsLayer]="1" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_CONTENT">
      <cds-label
        [invalid]="formControls?.name?.touched && formControls?.name?.errors"
        [invalidText]="
          (formControls?.name?.errors?.required && ('formManagement.nameIsRequired' | translate)) ||
          (formControls?.name?.errors?.duplicate && ('formManagement.nameIsInUse' | translate)) ||
          'test'
        "
        [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_NAME_LABEL"
      >
        {{ 'formManagement.name' | translate }}

        <input
          cdsText
          type="text"
          id="name"
          formControlName="name"
          [invalid]="formControls?.name?.touched && formControls?.name?.errors"
          required
          [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_NAME_INPUT"
        />
      </cds-label>
    </section>

    <cds-modal-footer [cdsLayer]="1" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_FOOTER">
      <cds-modal-footer>
        <button cdsButton="ghost" (click)="$event.preventDefault(); onBackButtonClick()" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_BACK_BUTTON">
          {{ 'formManagement.back' | translate }}
        </button>

        <button cdsButton="ghost" (click)="$event.preventDefault(); reset()" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_RESET_BUTTON">
          {{ 'formManagement.reset' | translate | translate }}
        </button>

        <button [disabled]="form?.invalid" type="submit" cdsButton="primary" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_SUBMIT_BUTTON">
          {{ 'formManagement.submit' | translate }}
        </button>
      </cds-modal-footer>
    </cds-modal-footer>
  </form>
</cds-modal>
