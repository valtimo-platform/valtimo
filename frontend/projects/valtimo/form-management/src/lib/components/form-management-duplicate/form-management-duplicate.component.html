<cds-modal
  valtimoCdsModal
  class="form-management-create"
  size="sm"
  [cdsLayer]="0"
  [open]="true"
  (close)="closeModal()"
  data-test-id="form-management-create-modal"
>
  <cds-modal-header [showCloseButton]="true" (closeSelect)="closeModal()" data-test-id="form-management-create-modal-header">
    <h3 cdsModalHeaderHeading data-test-id="form-management-create-modal-title">
      {{ 'formManagement.duplicate' | translate }}
    </h3>
  </cds-modal-header>

  <form [formGroup]="duplicateForm">
    <section cdsModalContent [cdsLayer]="1" data-test-id="form-management-create-modal-content">
      <cds-label
        [invalid]="duplicateFormName?.touched && duplicateFormName?.errors"
        [invalidText]="
          (duplicateFormName?.errors?.required && ('formManagement.nameIsRequired' | translate)) ||
          (duplicateFormName?.errors?.duplicate && ('formManagement.nameIsInUse' | translate)) ||
          'Error'
        "
        data-test-id="form-management-create-modal-name-label"
      >
        {{ 'formManagement.name' | translate }}

        <input
          cdsText
          type="text"
          id="duplicateFormName"
          formControlName="duplicateFormName"
          [invalid]="duplicateFormName?.touched && duplicateFormName?.errors"
          required
          data-test-id="form-management-create-modal-name-input"
        />
      </cds-label>
    </section>

    <cds-modal-footer [cdsLayer]="1" data-test-id="form-management-create-modal-footer">
      <cds-modal-footer>
        <button cdsButton="secondary" (click)="closeModal()" data-test-id="form-management-create-modal-cancel-button">
          {{ 'interface.cancel' | translate }}
        </button>

        <button [disabled]="duplicateForm.invalid" cdsButton="primary" (click)="duplicate()" data-test-id="form-management-create-modal-submit-button">
          {{ 'formManagement.submit' | translate }}
        </button>
      </cds-modal-footer>
    </cds-modal-footer>
  </form>
</cds-modal>
