<cds-modal
  valtimoCdsModal
  class="form-management-create"
  size="sm"
  [cdsLayer]="0"
  [open]="true"
  (close)="closeModal()"
  [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL"
>
  <cds-modal-header [showCloseButton]="true" (closeSelect)="closeModal()" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_HEADER">
    <h3 cdsModalHeaderHeading [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_TITLE">
      {{ 'formManagement.duplicate' | translate }}
    </h3>
  </cds-modal-header>

  <form [formGroup]="duplicateForm">
    <section cdsModalContent [cdsLayer]="1" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_CONTENT">
      <cds-label
        [invalid]="duplicateFormName?.touched && duplicateFormName?.errors"
        [invalidText]="
          (duplicateFormName?.errors?.required && ('formManagement.nameIsRequired' | translate)) ||
          (duplicateFormName?.errors?.duplicate && ('formManagement.nameIsInUse' | translate)) ||
          'Error'
        "
        [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_NAME_LABEL"
      >
        {{ 'formManagement.name' | translate }}

        <input
          cdsText
          type="text"
          id="duplicateFormName"
          formControlName="duplicateFormName"
          [invalid]="duplicateFormName?.touched && duplicateFormName?.errors"
          required
          [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_NAME_INPUT"
        />
      </cds-label>
    </section>

    <cds-modal-footer [cdsLayer]="1" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_FOOTER">
      <cds-modal-footer>
        <button cdsButton="secondary" (click)="closeModal()" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_CANCEL_BUTTON">
          {{ 'interface.cancel' | translate }}
        </button>

        <button [disabled]="duplicateForm.invalid" cdsButton="primary" (click)="duplicate()" [attr.data-test-id]="TEST_IDS.FORM_MANAGEMENT_CREATE_MODAL_SUBMIT_BUTTON">
          {{ 'formManagement.submit' | translate }}
        </button>
      </cds-modal-footer>
    </cds-modal-footer>
  </form>
</cds-modal>
