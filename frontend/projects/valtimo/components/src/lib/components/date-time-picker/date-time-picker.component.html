<v-input-label
  *ngIf="showFieldLabel && (title || titleTranslationKey)"
  [name]="name"
  [required]="required"
  [small]="smallLabel"
  [titleTranslationKey]="titleTranslationKey"
  [title]="title"
  [tooltip]="tooltip"
  [attr.data-test-id]="TEST_IDS.VALTIMO_DATE_TIME_PICKER_LABEL"
>
</v-input-label>

<div class="valtimo-date-time-picker__wrapper">
  <cds-date-picker
    class="date-only"
    [cdsLayer]="1"
    [attr.data-carbon-theme]="carbonTheme"
    [label]="labelText"
    [placeholder]="datePlaceholder || 'dd-mm-yyyy'"
    [dateFormat]="dateFormat"
    [disabled]="disabled"
    (valueChange)="onDateSelected($event)"
    [attr.data-test-id]="TEST_IDS.VALTIMO_DATE_TIME_PICKER_DATE_INPUT"
  ></cds-date-picker>

  <cds-timepicker
    *ngIf="enableTime"
    [cdsLayer]="1"
    [attr.data-carbon-theme]="carbonTheme"
    [placeholder]="timePlaceholder || 'hh:mm'"
    [value]="timeValue"
    [disabled]="disabled"
    (valueChange)="onTimeSelected($event)"
    [attr.data-test-id]="TEST_IDS.VALTIMO_DATE_TIME_PICKER_TIME_INPUT"
  >
  </cds-timepicker>
</div>
