<cds-sidenav
  *ngIf="{
    closestSequence: closestSequence$ | async,
    overflowMenuSequence: overflowMenuSequence$ | async,
    sideBarExpanded: sideBarExpanded$ | async,
    sideBarPinned: sideBarPinned$ | async,
    isRailMode: isRailMode$ | async,
    menuItemsLoaded: menuItemsLoaded$ | async,
    menuItems: menuItems$ | async,
  } as obs"
  [allowExpansion]="false"
  [rail]="obs.isRailMode"
  [expanded]="obs.sideBarExpanded"
  (mouseenter)="onSidenavMouseEnter()"
  (mouseleave)="onSidenavMouseLeave()"
  [attr.data-test-id]="TEST_IDS.SIDENAV_CONTAINER"
>
  <ng-container *ngIf="obs.menuItemsLoaded; else loadingTemplate">
    <ng-container *ngFor="let menuItem of obs.menuItems">
      <ng-container *ngIf="!menuItem.children">
        <div class="rail-only-icon">
          <ng-container *ngTemplateOutlet="subMenuIcon; context: {menuItem: menuItem}"></ng-container>
        </div>

        <ng-container
          *ngTemplateOutlet="
            topMenuItem;
            context: {
              menuItem: menuItem,
              closestSequence: obs.closestSequence,
              overflowMenuSequence: obs.overflowMenuSequence,
            }
          "
        ></ng-container>
      </ng-container>

      <ng-container *ngIf="menuItem.children">
        <ng-container
          *ngTemplateOutlet="
            topMenuItem;
            context: {
              closestSequence: obs.closestSequence,
              menuItem: menuItem,
              overflowMenuSequence: obs.overflowMenuSequence,
            }
          "
        ></ng-container>

        <ng-container *ngTemplateOutlet="subMenuIcon; context: {menuItem: menuItem}"></ng-container>

        <cds-sidenav-menu
          [title]="menuItem | menuItemTranslate | async"
          [attr.data-testid]="'sidenav-item-' + menuItem.title"
          [attr.data-test-id]="TEST_IDS.SIDENAV_MENU"
        >
          <ng-container *ngFor="let childMenuItem of menuItem.children">
            <ng-container
              *ngIf="{
                disableCaseCount: disableCaseCount$ | async,
                count: childMenuItem?.count$ && (childMenuItem?.count$ | async),
                sequence: '' + menuItem.sequence + childMenuItem.sequence,
              } as vars"
            >
              <cds-sidenav-item
                [attr.data-testid]="'sidenav-item-' + childMenuItem?.title"
                [ngClass]="{
                  'cds--side-nav__item--empty': !childMenuItem.link,
                  'menu-item--hidden': childMenuItem.includeFunction !== undefined,
                  'menu-item--visible':
                    childMenuItem.includeFunction !== undefined &&
                    (includeFunctionObservables[childMenuItem.title] | async),
                }"
                [active]="vars.sequence === obs.closestSequence"
                [href]="vars?.count ? 'javascript:return false;' : 'javascript:void(0);'"
                (click)="navigateToRoute(childMenuItem.link, $event)"
                (contextmenu)="onRightClick(vars.sequence)"
                (ctrl-click)="openInNewTab(childMenuItem.link)"
                [attr.data-test-id]="TEST_IDS.SIDENAV_ITEM"
              >
                <valtimo-menu-item-text
                  [accent]="!childMenuItem.link"
                  [menuItem]="childMenuItem"
                  [showOverFlowMenu]="obs.overflowMenuSequence === vars.sequence"
                  (openInNewTab)="openInNewTab(childMenuItem.link)"
                  (overflowMenuClosed)="onOverflowMenuClosed(vars.sequence)"
                ></valtimo-menu-item-text>

                <ng-container
                  *ngTemplateOutlet="countTemplate; context: {count: vars.count, disableCaseCount: vars.disableCaseCount}"
                ></ng-container>
              </cds-sidenav-item>
            </ng-container>
          </ng-container>
        </cds-sidenav-menu>
      </ng-container>
    </ng-container>
  </ng-container>

  <div class="sidenav-pin-container">
    <button
      class="sidenav-pin-button"
      (click)="togglePin()"
      [attr.title]="obs.sideBarPinned ? 'Unpin sidebar' : 'Pin sidebar'"
    >
      <svg
        *ngIf="!obs.sideBarPinned"
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 32 32"
        fill="currentColor"
      >
        <path d="M28.59 13.31L18.7 3.41l-1.42 1.42 1.38 1.37L12.4 12.8a9.42 9.42 0 0 0-4.75.69l6.36 6.36-8.48 8.49 1.42 1.42 8.48-8.49 6.36 6.36a9.42 9.42 0 0 0 .69-4.75l6.6-6.26 1.38 1.38z"/>
      </svg>
      <svg
        *ngIf="obs.sideBarPinned"
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 32 32"
        fill="currentColor"
      >
        <path d="M28.59 13.31L18.7 3.41l-1.42 1.42 1.38 1.37L12.4 12.8a9.42 9.42 0 0 0-4.75.69l6.36 6.36-8.48 8.49 1.42 1.42 8.48-8.49 6.36 6.36a9.42 9.42 0 0 0 .69-4.75l6.6-6.26 1.38 1.38z"/>
        <line x1="2" y1="30" x2="30" y2="2" stroke="currentColor" stroke-width="2"/>
      </svg>
    </button>
  </div>
</cds-sidenav>

<ng-template #subMenuIcon let-menuItem="menuItem">
  <div class="menu-item-icon-container"><i class="{{ menuItem.iconClass }}"></i></div>
</ng-template>

<ng-template
  #topMenuItem
  let-closestSequence="closestSequence"
  let-menuItem="menuItem"
  let-overflowMenuSequence="overflowMenuSequence"
>
  <ng-container *ngIf="{sequence: '' + menuItem.sequence} as vars"
    ><cds-sidenav-item
      *ngIf="!menuItem.children"
      [attr.data-testid]="'sidenav-item-' + menuItem.title"
      [ngClass]="{
        'menu-item--hidden': menuItem.includeFunction !== undefined,
        'menu-item--visible':
          menuItem.includeFunction !== undefined &&
          (includeFunctionObservables[menuItem.title] | async),
      }"
      [active]="vars.sequence === closestSequence"
      (click)="navigateToRoute(menuItem.link, $event)"
      (contextmenu)="onRightClick(vars.sequence)"
      (ctrl-click)="openInNewTab(menuItem.link.link)"
      href="javascript:void(0)"
      [attr.data-test-id]="TEST_IDS.SIDENAV_ITEM"
    >
      <valtimo-menu-item-text
        [menuItem]="menuItem"
        [showOverFlowMenu]="overflowMenuSequence === vars.sequence"
        (openInNewTab)="openInNewTab(menuItem.link.link)"
        (overflowMenuClosed)="onOverflowMenuClosed(vars.sequence)"
      ></valtimo-menu-item-text>
    </cds-sidenav-item>
  </ng-container>
</ng-template>

<ng-template #countTemplate let-count="count" let-disableCaseCount="disableCaseCount">
  <ng-container *ngIf="count && !disableCaseCount">
    <span class="case-count" [attr.data-test-id]="TEST_IDS.CASE_COUNT">
      {{ count | caseCount }}
    </span>
  </ng-container>
</ng-template>

<ng-template #loadingTemplate>
  <div class="loading-container" [attr.data-test-id]="TEST_IDS.LOADING_CONTAINER">
    <cds-loading size="sm"></cds-loading>
  </div>
</ng-template>
