<div
  *ngIf="{titleTranslation: menuItem | menuItemTranslate | async} as obs"
  class="menu-item-text-container"
  id="{{ menuItem?.id }}"
  data-test-id="menu-item-container"
>
  <span *ngIf="obs.titleTranslation" [ngClass]="{'cds--link empty-menu-icon-text': accent}"
    data-test-id="menu-item-text">
    <div class="menu-item-icon-container" data-test-id="menu-item-icon-container">
      <i class="{{ menuItem.iconClass }}" data-test-id="menu-item-icon"></i>
    </div>

    {{ obs.titleTranslation + (accent ? ' >' : '') }}
  </span>

  <ng-container *ngTemplateOutlet="overflowTrigger" data-test-id="menu-item-overflow-trigger"></ng-container>

  <cds-overflow-menu
    [customTrigger]="overflowTrigger"
    [open]="showOverFlowMenu"
    [offset]="{x: 100, y: -25}"
    placement="bottom"
    wrapperClass="--hide-after --wide"
    (openChange)="onOpenChange($event)"
    data-test-id="menu-item-overflow-menu"
  >
    <cds-overflow-menu-option (selected)="onSelectOpenInNewTab()" data-test-id="menu-item-open-in-new-tab-option">{{
      'interface.openInNewTab' | translate
    }}</cds-overflow-menu-option>
  </cds-overflow-menu>
</div>

<ng-template #overflowTrigger>
  <div></div>
</ng-template>
