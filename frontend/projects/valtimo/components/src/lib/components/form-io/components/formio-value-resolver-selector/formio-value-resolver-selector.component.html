@if (isIndependentContext$ | async) {
  <input
    cdsText
    type="text"
    [value]="defaultValue$ | async"
    [cdsLayer]="1"
    (input)="onValueChange($any($event.target).value)"
  />
} @else {
  <valtimo-value-path-selector
    [caseDefinitionKey]="caseDefinitionKey$ | async"
    [caseDefinitionVersionTag]="caseDefinitionVersionTag$ | async"
    [buildingBlockDefinitionKey]="buildingBlockDefinitionKey$ | async"
    [buildingBlockDefinitionVersionTag]="buildingBlockDefinitionVersionTag$ | async"
    [appendInline]="true"
    [defaultValue]="defaultValue$ | async"
    [label]="label"
    [showCaseDefinitionSelector]="true"
    notation="slashes"
    [prefixes]="[ValuePathSelectorPrefix.DOC]"
    [cdsLayer]="1"
    (valueChangeEvent)="onValueChange($event)"
  ></valtimo-value-path-selector>
}
