<cds-text-label>
  <v-input-label
    [title]="labelTranslationKey | translate"
    [tooltip]="tooltipTranslationKey | translate"
  >
  </v-input-label>

  <div class="mdi-icon-selector">
    <span *ngIf="value$ | async as icon" class="mdi-icon-preview mdi" [ngClass]="icon"></span>

    <cds-combo-box
      [items]="(items$ | async) || []"
      [placeholder]="placeholderTranslationKey | translate"
      [disabled]="$disabled()"
      (selected)="onSelected($event)"
      [appendInline]="appendInline"
      [dropUp]="dropUp"
      (blur)="onTouched()"
    >
      <cds-dropdown-list [listTpl]="iconListTemplate"></cds-dropdown-list>
    </cds-combo-box>
  </div>
</cds-text-label>

<ng-template #iconListTemplate let-item="item">
  <div class="mdi-list-item">
    <span class="mdi" [ngClass]="item.key" aria-hidden="true"></span>

    <span>{{ item.content }}</span>
  </div>
</ng-template>
