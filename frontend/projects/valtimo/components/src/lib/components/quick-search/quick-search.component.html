<ng-container
  *ngIf="{paramsToSave: paramsToSave$ | async, quickSearchItems: quickSearchItems$ | async} as obs"
>
  @for (item of obs.quickSearchItems; track item.title) {
    <cds-tooltip
      [description]="'quickSearch.rightClickTooltip' | translate"
      [enterDelayMs]="TOOLTIP_DELAY"
    >
      <cds-tag
        type="blue"
        [valtimoContextMenu]="contextMenuTpl"
        [contextData]="item"
        (click)="onItemClick(item)"
        data-test-id="quick-search-tag-{{$index}}"
      >
        {{ item.title }}
      </cds-tag>
    </cds-tooltip>
  }

  <valtimo-quick-search-modal
    [existingItems]="obs.quickSearchItems"
    (closeEvent)="onModalCloseEvent($event, obs.paramsToSave)"
    [attr.data-test-id]="TEST_IDS.QUICK_SEARCH_MODAL"
  ></valtimo-quick-search-modal>

  <valtimo-confirmation-modal
    confirmButtonTextTranslationKey="interface.delete"
    confirmButtonType="danger"
    contentTranslationKey="quickSearch.deleteModalContent"
    [outputOnConfirm]="$itemToDelete()"
    [showModalSubject$]="showDeleteModal$"
    titleTranslationKey="quickSearch.deleteModalTitle"
    (confirmEvent)="onDeleteConfirm($event)"
    [attr.data-test-id]="TEST_IDS.QUICK_SEARCH_CONFIRMATION_MODAL"
  ></valtimo-confirmation-modal>

  <ng-template #contextMenuTpl let-data="data" let-close="close">
    <cds-overflow-menu-option (click)="deleteItem(data); close()" [attr.data-test-id]="TEST_IDS.QUICK_SEARCH_DELETE_OPTION">
      {{ 'interface.delete' | translate }}

      <svg cdsIcon="trash-can" size="16"></svg
    ></cds-overflow-menu-option>
  </ng-template>
</ng-container>
