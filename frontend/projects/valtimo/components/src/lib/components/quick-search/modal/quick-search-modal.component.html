<cds-modal
  valtimoCdsModal
  [minContentHeight]="0"
  [open]="$modalOpen()"
  size="sm"
  showFooter="true"
  (close)="closeModal()"
  data-test-id="quick-search-modal"
>
  <cds-modal-header [showCloseButton]="true" (closeSelect)="closeModal()" data-test-id="quick-search-modal-header">
    <h3 cdsModalHeaderHeading data-test-id="quick-search-modal-title">{{ 'quickSearch.addItem' | translate }}</h3>
  </cds-modal-header>

  <form cdsModalContent class="valtimo-qiuck-search-modal__content" [formGroup]="formGroup" data-test-id="quick-search-modal-form">
    <cds-text-label data-test-id="quick-search-modal-title-label">
      {{ 'interface.title' | translate }}

      <input
        formControlName="title"
        cdsText
        type="text"
        maxlength="50"
        [placeholder]="'interface.title' | translate"
        [attr.modal-primary-focus]="true"
        data-test-id="quick-search-modal-title-input"
      />
    </cds-text-label>

    <div *ngIf="$showDuplicateError()" class="valtimo-qiuck-search-modal__error" data-test-id="quick-search-modal-error">
      <svg cdsIcon="warning--filled" size="16"></svg>

      {{ 'quickSearch.duplicateError' | translate }}
    </div>

    <cds-inline-notification
      [notificationObj]="{
        type: 'info',
        message: 'quickSearch.deleteHelperText' | translate,
        showClose: false,
        lowContrast: true,
      }"
      data-test-id="quick-search-modal-info-notification"
    ></cds-inline-notification>
  </form>

  <cds-modal-footer data-test-id="quick-search-modal-footer">
    <button cdsButton="ghost" (click)="closeModal()" data-test-id="quick-search-modal-cancel-button">
      {{ 'interface.cancel' | translate }}
    </button>

    <button [disabled]="formGroup.invalid" cdsButton="primary" (click)="closeModal(true)" data-test-id="quick-search-modal-save-button">
      {{ 'interface.save' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
