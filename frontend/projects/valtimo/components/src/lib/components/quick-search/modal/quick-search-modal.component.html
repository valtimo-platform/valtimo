<cds-modal
  valtimoCdsModal
  [minContentHeight]="0"
  [open]="$modalOpen()"
  size="sm"
  showFooter="true"
  (close)="closeModal()"
>
  <cds-modal-header [showCloseButton]="true" (closeSelect)="closeModal()">
    <h3 cdsModalHeaderHeading>{{ 'quickSearch.addItem' | translate }}</h3>
  </cds-modal-header>

  <form cdsModalContent class="valtimo-qiuck-search-modal__content" [formGroup]="formGroup">
    <cds-text-label>
      {{ 'interface.title' | translate }}

      <input
        formControlName="title"
        cdsText
        type="text"
        [placeholder]="'interface.title' | translate"
        [attr.modal-primary-focus]="true"
      />
    </cds-text-label>

    <cds-inline-notification
      [notificationObj]="{
        type: 'info',
        message: 'quickSearch.deleteHelperText' | translate,
        showClose: false,
        lowContrast: true,
      }"
    ></cds-inline-notification>
  </form>

  <cds-modal-footer>
    <button cdsButton="ghost" (click)="closeModal()">
      {{ 'interface.cancel' | translate }}
    </button>

    <button [disabled]="formGroup.invalid" cdsButton="primary" (click)="closeModal(true)">
      {{ 'interface.save' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
