<cds-overflow-menu
  [customTrigger]="customTrigger"
  [cdsOverflowMenu]="visibleColumns"
  [customPane]="true"
  [flip]="true"
  [description]="'listViewColumns.tooltip' | translate"
  [offset]="{x: 2, y: 64}"
  placement="bottom"
  (openChange)="onOpenChange($event)"
>
</cds-overflow-menu>

<ng-template #customTrigger>
  <button cdsButton="ghost" (click)="onOpenChange()">
    <svg cdsIcon="view--off" size="16"></svg>
  </button>

  <cds-tag type="blue" class="valtimo-list-column-view__tag">
    {{ $checkedItemsCount() }}/{{ $availableFields().length }}
  </cds-tag>
</ng-template>

<ng-template #visibleColumns>
  <section class="valtimo-list-column-view__container" (click)="$event.stopImmediatePropagation()">
    <cds-label>{{ 'listViewColumns.label' | translate }}</cds-label>

    <div class="valtimo-list-column-view__content">
      @for (field of $availableFields(); track field.key) {
        <cds-checkbox
          [class.valtimo-list-column-view__checkbox--disabled]="
            field.selected && $checkedItemsCount() === 1
          "
          [disabled]="field.selected && $checkedItemsCount() === 1"
          [checked]="field.selected"
          (checkedChange)="onCheckedChange($event, field.key)"
        >
          {{ field.label }}
        </cds-checkbox>

        @if (field.selected && $checkedItemsCount() === 1) {
          <div class="valtimo-list-column-view__warning">
            <svg cdsIcon="warning--alt--filled" size="16"></svg>

            {{ 'listViewColumns.warning' | translate }}
          </div>
        }
      }
    </div>
  </section>
</ng-template>
