<cds-overflow-menu
  [customTrigger]="customTrigger"
  [cdsOverflowMenu]="visibleColumns"
  [customPane]="true"
  [offset]="{x: -2, y: 74}"
  placement="bottom"
  (openChange)="onOpenChange($event)"
>
</cds-overflow-menu>

<ng-template #customTrigger>
  <div class="valtimo-list-column-view__icon">
    <button cdsButton="ghost" (click)="onOpenChange()">
      <svg cdsIcon="view" size="16"></svg>
    </button>

    <cds-tag type="blue" class="valtimo-list-column-view__tag">
      {{ $checkedItemsCount() }} {{ 'interface.of' | translate }} {{ $availableFields().length }}
    </cds-tag>
  </div>
</ng-template>

<ng-template #visibleColumns>
  <section
    class="valtimo-list-column-view__container"
    (click)="$event.stopImmediatePropagation()"
  >
    <h4>Columns available for view</h4>

    <div>
      @for (field of $availableFields(); track field.key) {
        <cds-checkbox
          [disabled]="field.selected && $checkedItemsCount() === 1"
          [checked]="field.selected"
          (checkedChange)="onCheckedChange($event, field.key)"
        >
          {{ field.label }}
        </cds-checkbox>
      }
    </div>
  </section>
</ng-template>
