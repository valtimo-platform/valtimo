@for (_ of amountOfArbitraryValuesArray$ | async; let i = $index; track i) {
  <div class="v-multi-input__input" [ngClass]="{'--full-width': fullWidth}">
    <cds-label *ngIf="index === 0">{{
      arbitraryAmountTitles ? arbitraryAmountTitles[i] : ''
    }}</cds-label>

    <input
      cdsText
      [defaultValue]="value ? value['' + i] : ''"
      [disabled]="disabled"
      (input)="onInputChange(i, $event.target.value)"
    />
  </div>

  @if (((amountOfArbitraryValuesArray$ | async) || []).length - 1 !== i) {
    <div class="v-multi-input__separator"></div>
  }
}
