<div class="v-input-container">
  <ng-container *ngTemplateOutlet="inputTitle"></ng-container>
  <ng-container *ngTemplateOutlet="textInput"></ng-container>
  <ng-container *ngTemplateOutlet="textareaInput"></ng-container>
  <ng-container *ngTemplateOutlet="passwordInput"></ng-container>
  <ng-container *ngTemplateOutlet="numberInput"></ng-container>
  <ng-container *ngTemplateOutlet="digitOnlyInput"></ng-container>
  <ng-container *ngTemplateOutlet="checkboxInput"></ng-container>
  <ng-container *ngTemplateOutlet="bsnInput"></ng-container>
  <ng-container *ngTemplateOutlet="presets"></ng-container>
</div>

<ng-template #inputTitle>
  <v-input-label
    *ngIf="title || titleTranslationKey"
    [name]="name"
    [required]="required"
    [small]="smallLabel"
    [titleTranslationKey]="titleTranslationKey"
    [title]="title"
    [tooltip]="tooltip"
    [attr.data-test-id]="TEST_IDS.V_INPUT_LABEL_TITLE"
  >
  </v-input-label>
</ng-template>

<ng-template #textInput>
  <input
    *ngIf="isText"
    [ngClass]="{
      'v-input--full-width': fullWidthClass,
      'v-input--margin': margin && presetOptions.length === 0,
      'v-input--small-margin': smallMargin && presetOptions.length === 0,
    }"
    [ngModel]="inputValue$ | async"
    cdsText
    [attr.data-testid]="dataTestId"
    [disabled]="disabled"
    [maxLength]="maxLength"
    [min]="0"
    [name]="name"
    [step]="step"
    (ngModelChange)="onValueChange($event)"
    [style.width.px]="widthPx"
    [placeholder]="placeholder"
    type="text"
    [attr.data-test-id]="TEST_IDS.V_INPUT_TEXT_INPUT"
  />
</ng-template>

<ng-template #textareaInput>
  <textarea
    *ngIf="isTextarea"
    [ngClass]="{
      'v-input--full-width': fullWidthClass,
      'v-input--margin': margin,
      'v-input--small-margin': smallMargin,
    }"
    cdsTextArea
    [attr.data-testid]="dataTestId"
    [disabled]="disabled"
    [name]="name"
    [ngModel]="inputValue$ | async"
    [rows]="rows"
    (ngModelChange)="onValueChange($event)"
    [style.width.px]="widthPx"
    [attr.data-test-id]="TEST_IDS.V_INPUT_TEXTAREA_INPUT"
  ></textarea>
</ng-template>

<ng-template #passwordInput>
  <ng-container *ngIf="isPassword">
    <div
      *ngIf="{showPassword: showPassword$ | async} as obs"
      [ngClass]="{
        'v-input--full-width': fullWidthClass,
        'v-input--margin': margin,
        'v-input--small-margin': smallMargin,
      }"
      class="v-input__password-container"
    >
      <input
        [ngClass]="{
          'v-input--full-width': fullWidthClass,
        }"
        cdsText
        [attr.data-testid]="dataTestId"
        [disabled]="disabled"
        [maxLength]="maxLength"
        [min]="0"
        [name]="name"
        [ngModel]="inputValue$ | async"
        [step]="step"
        (ngModelChange)="onValueChange($event)"
        [style.width.px]="widthPx"
        [type]="obs.showPassword ? 'text' : 'password'"
        [attr.data-test-id]="TEST_IDS.V_INPUT_PASSWORD_INPUT"
      />

      <div class="v-input__password-icon">
        <cds-icon-button align="top" (click)="toggleShowPassword()" [attr.data-test-id]="TEST_IDS.V_INPUT_TOGGLE_PASSWORD_BUTTON">
          <svg cdsIcon="{{ obs.showPassword ? 'view-off' : 'view' }}" size="16"></svg>
        </cds-icon-button>
      </div>
    </div>
  </ng-container>
</ng-template>

<ng-template #numberInput>
  <input
    *ngIf="isNumber"
    [ngClass]="{
      'v-input--full-width': fullWidthClass,
      'v-input--margin': margin,
      'v-input--small-margin': smallMargin,
      'v-input--hide-spinbox': hideNumberSpinBox,
    }"
    cdsText
    [attr.data-testid]="dataTestId"
    [disabled]="disabled"
    [maxLength]="maxLength"
    [min]="min"
    [name]="name"
    [ngModel]="inputValue$ | async"
    [step]="step"
    (ngModelChange)="onValueChange($event)"
    [placeholder]="placeholder"
    [style.width.px]="widthPx"
    type="number"
    [attr.data-test-id]="TEST_IDS.V_INPUT_NUMBER_INPUT"
  />
</ng-template>

<ng-template #digitOnlyInput>
  <input
    *ngIf="isDigitOnly"
    [ngClass]="{
      'v-input--full-width': fullWidthClass,
      'v-input--margin': margin,
      'v-input--small-margin': smallMargin,
    }"
    cdsText
    digitOnly
    [attr.data-testid]="dataTestId"
    [disabled]="disabled"
    [maxLength]="maxLength"
    [min]="0"
    [name]="name"
    [ngModel]="inputValue$ | async"
    [step]="step"
    (ngModelChange)="onValueChange($event)"
    [style.width.px]="widthPx"
    type="text"
    [attr.data-test-id]="TEST_IDS.V_INPUT_DIGIT_ONLY_INPUT"
  />
</ng-template>

<ng-template #checkboxInput>
  <div *ngIf="isCheckbox" (click)="stopCheckboxEventPropagation($event)" [attr.data-test-id]="TEST_IDS.V_INPUT_CHECKBOX_CONTAINER">
    <cds-checkbox
      [attr.data-testid]="dataTestId"
      [disabled]="disabled"
      [name]="name"
      [ngModel]="inputValue$ | async"
      (ngModelChange)="onValueChange($event)"
      [attr.data-test-id]="TEST_IDS.V_INPUT_CHECKBOX"
    >
    </cds-checkbox>
  </div>
</ng-template>

<ng-template #presets>
  <div
    *ngIf="isText && presetOptions.length > 0"
    [ngClass]="{
      'v-input--margin': margin,
      'v-input--small-margin': smallMargin,
    }"
    class="v-input--preset-options"
    [attr.data-test-id]="TEST_IDS.V_INPUT_PRESETS_CONTAINER"
  >
    <span [attr.data-test-id]="TEST_IDS.V_INPUT_PRESETS_TITLE">{{ presetsTitle }}:</span>

    @for (preset of presetOptions; track $index) {
      @if (!$first) {
        |
      }
      <a (click)="presetWithValue(preset)" class="v-input--preset-option" data-test-id="v-input-preset-option-{{$index}}">{{ preset }}</a>
    }
  </div>
</ng-template>

<ng-template #bsnInput>
  <input
    *ngIf="isBsn"
    [ngClass]="{
      'v-input--full-width': fullWidthClass,
      'v-input--margin': margin && presetOptions.length === 0,
      'v-input--small-margin': smallMargin && presetOptions.length === 0,
    }"
    [ngModel]="inputValue$ | async"
    cdsText
    [attr.data-testid]="dataTestId"
    [disabled]="disabled"
    [maxLength]="'9'"
    [min]="9"
    [name]="name"
    (ngModelChange)="onValueChange($event)"
    [style.width.px]="widthPx"
    [placeholder]="placeholder"
    type="text"
    [attr.data-test-id]="TEST_IDS.V_INPUT_BSN_INPUT"
  />
</ng-template>
