<ng-container
  *ngIf="{
    inputModeIsDropdown: inputModeIsDropdown$ | async,
    valuePathListItems: valuePathListItems$ | async,
    loadingValuePathItems: loadingValuePathItems$ | async,
    disabled: disabled$ | async,
  } as obs"
>
  <v-input-label [required]="required" [title]="label" [tooltip]="tooltip"> </v-input-label>

  <form
    [formGroup]="formGroup"
    class="value-path-selector__form"
    [ngClass]="{
      'value-path-selector__form--case-def-selection':
        showCaseDefinitionSelector && obs.inputModeIsDropdown,
    }"
  >
    <cds-toggle
      data-testid="value-path-selector-toggle"
      size="sm"
      [disabled]="obs.disabled"
      [onText]="'valuePathSelector.dropdown' | translate"
      [offText]="'valuePathSelector.manual' | translate"
      [checked]="obs.inputModeIsDropdown"
      (checkedChange)="onInputModeChange($event)"
    ></cds-toggle>

    @if (obs.inputModeIsDropdown) {
      <ng-container
        *ngIf="
          showCaseDefinitionSelector && {
            loadingCaseDefinitionItems: loadingCaseDefinitionItems$ | async,
            caseDefinitionListItems: caseDefinitionListItems$ | async,
          } as caseObs
        "
      >
        <cds-dropdown
          data-testid="value-path-selector-caseDefinition"
          [appendInline]="appendInline"
          [disabled]="
            obs.disabled ||
            caseObs.loadingCaseDefinitionItems ||
            !caseObs.caseDefinitionListItems ||
            (caseObs.caseDefinitionListItems || []).length === 0
          "
          (selected)="onCaseDefinitionSelected($event)"
          [placeholder]="'valuePathSelector.selectCaseDefPlaceholder' | translate"
          cdsLayer
        >
          <cds-dropdown-list [items]="caseObs.caseDefinitionListItems || []"></cds-dropdown-list>
        </cds-dropdown>
      </ng-container>

      <cds-dropdown
        data-testid="value-path-selector-valuePath"
        [appendInline]="appendInline"
        [disabled]="
          obs.disabled ||
          obs.loadingValuePathItems ||
          !obs.valuePathListItems ||
          (obs.valuePathListItems || []).length === 0
        "
        (selected)="onPathSelected($event)"
        cdsLayer
        [placeholder]="'valuePathSelector.placeholder' | translate"
      >
        <cds-dropdown-list [items]="obs.valuePathListItems || []"></cds-dropdown-list>
      </cds-dropdown>
    } @else {
      <input
        data-testid="value-path-selector-input"
        cdsText
        type="text"
        formControlName="selectedPath"
        cdsLayer
      />
    }
  </form>
</ng-container>
