<cds-label
  *ngIf="{
    mode: mode$ | async,
    idError: idError$ | async,
    editingKey: editingKey$ | async,
  } as obs"
  [invalid]="!!obs.idError"
  [invalidText]="obs.idError | translate"
  data-test-id="edit-key-label"
>
  {{ labelTranslationKey | translate }}

  <div class="edit-key-input" data-test-id="edit-key-input-container">
    <input
      cdsText
      type="text"
      [value]="value"
      [placeholder]="
        obs.mode === 'add' && !obs.editingKey
          ? ('caseManagement.statuses.keyAutoGenerated' | translate)
          : (placeholderTranslationKey | translate)
      "
      [readOnly]="!obs.editingKey || obs.mode === 'edit'"
      [invalid]="!!obs.idError"
      (input)="onInputChange($event)"
      (blur)="onTouched()"
      data-test-id="edit-key-input"
    />

    <cds-icon-button
      *ngIf="(obs.mode === 'add' || obs.mode === 'duplicate') && !obs.editingKey"
      [disabled]="$disabled()"
      (click)="enableKeyEditing()"
      kind="secondary"
      data-test-id="edit-key-edit-button"
    >
      <svg cdsIcon="edit" size="16" class="cds--btn__icon"></svg>
    </cds-icon-button>

    <cds-icon-button
      *ngIf="obs.mode === 'add' && obs.editingKey"
      [disabled]="$disabled()"
      (click)="disableKeyEditing()"
      kind="secondary"
      data-test-id="edit-key-close-button"
    >
      <svg cdsIcon="close" size="16" class="cds--btn__icon"></svg>
    </cds-icon-button>
  </div>
</cds-label>
