<div
  #pageHead
  class="page-head"
  [ngClass]="{
    'page-head--hidden': (showPageHeader$ | async) === false,
    'page-head--compact': compactMode$ | async,
    'page-head--no-content': (compactMode$ | async) && (pageActionsHasContent$ | async) === false,
    'page-head--no-margin': pageTitleHidden$ | async,
    'page-head--small-title': smallTitle$ | async,
  }"
  data-test-id="page-head-container"
>
  <ng-container #contentVcr></ng-container>

  <valtimo-page-subtitle data-test-id="page-head-subtitle"></valtimo-page-subtitle>

  <valtimo-page-actions data-test-id="page-head-actions"></valtimo-page-actions>
</div>

<ng-container renderPageHeader>
  <ng-template>
    <div
      class="page-header-container"
      [ngClass]="{
        'page-header-container--compact': compactMode$ | async,
        'page-header-container--small-title': smallTitle$ | async,
      }"
      data-test-id="page-header-container"
    >
      <valtimo-breadcrumb-navigation data-test-id="page-header-breadcrumb"></valtimo-breadcrumb-navigation>

      <valtimo-page-title data-test-id="page-header-title"></valtimo-page-title>
    </div>
  </ng-template>
</ng-container>
