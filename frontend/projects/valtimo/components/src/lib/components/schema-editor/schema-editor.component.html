<div class="schema-editor">
  <div class="cds--toolbar-content">
    <ng-content></ng-content>

    <cds-overflow-menu
      [customTrigger]="customTrigger"
      [cdsOverflowMenu]="requiredPropertiesPanel"
      [customPane]="true"
      [flip]="true"
      [description]="'listViewColumns.tooltip' | translate"
      [offset]="{x: 2, y: 64}"
      placement="bottom"
    >
    </cds-overflow-menu>

    <button
      cdsButton="primary"
      [disabled]="disabled || (valid$ | async) === false"
      (click)="onSaveClick()"
    >
      {{ 'interface.save' | translate }}
      <svg cdsIcon="save" size="16" class="cds--btn__icon"></svg>
    </button>
  </div>

  <div [attr.data-carbon-theme]="'g10'" class="jse-host" #host></div>
</div>

<valtimo-confirmation-modal
  [showModalSubject$]="showSaveConfirmationModal$"
  cancelButtonTextTranslationKey="interface.cancel"
  confirmButtonTextTranslationKey="interface.save"
  contentTranslationKey="interface.jsonEditor.saveModalContent"
  titleTranslationKey="interface.save"
  (cancelEvent)="hideConfirmationModal()"
  (confirmEvent)="onSaveChanges()"
>
</valtimo-confirmation-modal>

<ng-template #customTrigger>
  <button iconOnly="true" cdsButton="ghost">
    <svg cdsIcon="view--off" size="16"></svg>
  </button>
</ng-template>

<ng-template #requiredPropertiesPanel>
  <div class="schema-editor__required-panel" *ngIf="!disabled">
    <div class="schema-editor__required-title">
      {{ 'interface.jsonEditor.requiredFields' | translate }}
    </div>

    <div class="schema-editor__required-list">
      <label class="schema-editor__required-item" *ngFor="let prop of requiredProperties$ | async">
        <input
          type="checkbox"
          [checked]="prop.required"
          (change)="onRequiredToggle(prop, $event.target.checked)"
        />
        <span>{{ prop.label }}</span>
      </label>
    </div>
  </div>
</ng-template>
