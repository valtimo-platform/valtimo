<form
  *ngIf="theme$ | async as theme"
  class="valtimo-widget-interactive-table-search"
  [formGroup]="formGroup"
  (click)="$event.stopImmediatePropagation()"
>
  <section class="valtimo-widget-interactive-table-search__fields" formGroupName="filters">
    @for (filter of filters; track filter.key) {
      <cds-text-label class="valtimo-widget-interactive-table-search__filter-field">
        {{ filter.title }}

        <input
          cdsText
          [attr.data-carbon-theme]="theme"
          [formControlName]="filter.key"
          [placeholder]="filter.title"
        />
      </cds-text-label>
    }
  </section>

  <button cdsButton="tertiary" type="button" (click)="onClearFilter()">
    {{ 'interface.clear' | translate }}

    <svg class="cds--btn__icon" cdsIcon="trash-can" size="16"></svg>
  </button>
</form>
