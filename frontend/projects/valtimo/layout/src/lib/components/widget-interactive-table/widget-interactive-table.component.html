<ng-container
  *ngIf="{
    fields: fields$ | async,
    widgetData: widgetData$ | async,
    caseDefinitions: caseDefinitions$ | async,
    filters: filters$ | async,
  } as obs"
>
  <div class="valtimo-widget-interactive-table__title-container">
    <valtimo-mdi-icon-viewer
      *ngIf="widgetConfiguration?.icon"
      [mdiIcon]="widgetConfiguration.icon"
    ></valtimo-mdi-icon-viewer>

    <span class="widget-title">{{ widgetConfiguration?.title }}</span>
  </div>

  <valtimo-carbon-list
    [header]="false"
    [fields]="obs.fields"
    [initialSortState]="$initialSortState()"
    [items]="obs.widgetData || []"
    [loading]="obs.widgetData === null"
    [pagination]="$paginationModel()"
    [paginatorConfig]="$paginatorConfig()"
    (paginationClicked)="onPaginationClicked($event)"
    (paginationSet)="onPaginationSet($event)"
    (sortChanged)="onSortChanged($event)"
    (rowClicked)="rowClick($event)"
  >
    <section class="valtimo-widget-interactive-table__header" carbonToolbarContent>
      <button
        *ngIf="!!obs.filters.length"
        carbonToolbarContent
        [cdsOverflowMenu]="widgetInteractiveTableSearch"
        [customPane]="true"
        [iconOnly]="true"
        [flip]="true"
        [offset]="{x: 0, y: 47}"
        placement="bottom"
        cdsButton="ghost"
      >
        <svg cdsIcon="filter" size="16"></svg>
      </button>

      <cds-overflow-menu
        *ngIf="!!widgetConfiguration?.actions?.length"
        [customTrigger]="externalLinkTrigger"
        placement="bottom"
        flip="true"
        [offset]="{x: 4, y: 44}"
      >
        @for (action of widgetConfiguration?.actions; track action.name) {
          <cds-overflow-menu-option (click)="onActionClick(action)">
            {{ action.name }}
          </cds-overflow-menu-option>
        }
      </cds-overflow-menu>

      <cds-menu-button
        *ngIf="widgetConfiguration?.properties?.canStartCase"
        [label]="'Start Case' | translate"
      >
        @for (definition of obs.caseDefinitions; track definition.caseDefinitionKey) {
          <cds-menu-item
            [label]="definition.name"
            (click)="onCaseStart(definition)"
          ></cds-menu-item>
        }
      </cds-menu-button>
    </section>

    <valtimo-no-results
      *ngIf="obs.widgetData !== null"
      [collapseVertically]="true"
      [description]="'widgets.noData' | translate"
      [smallPadding]="true"
    ></valtimo-no-results>
  </valtimo-carbon-list>

  <ng-template #widgetInteractiveTableSearch>
    <valtimo-widget-interactive-table-search
      [filters]="obs.filters"
      [initSearchRequest]="searchRequest"
      (searchSubmitEvent)="onSearchSubmit($event)"
    ></valtimo-widget-interactive-table-search>
  </ng-template>

  <ng-template #externalLinkTrigger>
    <button cdsButton="ghost" iconOnly="true">
      <svg cdsIcon="link" size="16"></svg>
    </button>
  </ng-template>
</ng-container>
