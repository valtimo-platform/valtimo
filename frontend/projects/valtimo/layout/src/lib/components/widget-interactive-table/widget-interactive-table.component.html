<ng-container
  *ngIf="{
    fields: fields$ | async,
    widgetData: widgetData$ | async,
    caseDefinitions: caseDefinitions$ | async,
  } as obs"
>
  <div class="valtimo-widget-interactive-table__title-container">
    <valtimo-mdi-icon-viewer
      *ngIf="widgetConfiguration?.icon"
      [mdiIcon]="widgetConfiguration.icon"
      [attr.data-test-id]="TEST_IDS.WIDGET_INTERACTIVE_TABLE_ICON"
    ></valtimo-mdi-icon-viewer>

    <span class="widget-title" [attr.data-test-id]="TEST_IDS.WIDGET_INTERACTIVE_TABLE_TITLE">{{ widgetConfiguration?.title }}</span>
  </div>

  <valtimo-carbon-list
    [header]="false"
    [fields]="obs.fields"
    [items]="obs.widgetData"
    [pagination]="$paginationModel()"
    [paginatorConfig]="$paginatorConfig()"
    (paginationClicked)="onPaginationClicked($event)"
    (rowClicked)="rowClick($event)"
    [attr.data-test-id]="TEST_IDS.WIDGET_INTERACTIVE_TABLE_LIST"
  >
    <section class="valtimo-widget-interactive-table__header" carbonToolbarContent>
      <cds-overflow-menu
        *ngIf="!!widgetConfiguration?.actions?.length"
        [customTrigger]="externalLinkTrigger"
        placement="bottom"
        flip="true"
        [offset]="{x: 4, y: 44}"
        [attr.data-test-id]="TEST_IDS.WIDGET_INTERACTIVE_TABLE_ACTIONS_MENU"
      >
        @for (action of widgetConfiguration?.actions; track action.name) {
          <cds-overflow-menu-option (click)="onActionClick(action)" data-test-id="widget-interactive-table-action-{{action.name}}">
            {{ action.name }}
          </cds-overflow-menu-option>
        }
      </cds-overflow-menu>

      <cds-menu-button
        *ngIf="widgetConfiguration?.properties?.canStartCase"
        [label]="'Start Case' | translate"
        [attr.data-test-id]="TEST_IDS.WIDGET_INTERACTIVE_TABLE_START_CASE_BUTTON"
      >
        @for (definition of obs.caseDefinitions; track definition.caseDefinitionKey) {
          <cds-menu-item
            [label]="definition.name"
            (click)="onCaseStart(definition)"
            data-test-id="widget-interactive-table-case-definition-{{definition.caseDefinitionKey}}"
          ></cds-menu-item>
        }
      </cds-menu-button>
    </section>

    <valtimo-no-results
      [collapseVertically]="true"
      [description]="'widgets.noData' | translate"
      [smallPadding]="true"
      [attr.data-test-id]="TEST_IDS.WIDGET_INTERACTIVE_TABLE_NO_RESULTS"
    ></valtimo-no-results>
  </valtimo-carbon-list>

  <ng-template #externalLinkTrigger>
    <button cdsButton="ghost" iconOnly="true" [attr.data-test-id]="TEST_IDS.WIDGET_INTERACTIVE_TABLE_EXTERNAL_LINK_TRIGGER">
      <svg cdsIcon="link" size="16"></svg>
    </button>
  </ng-template>
</ng-container>
