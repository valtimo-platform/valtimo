<ng-container *ngIf="viewModel$ | async as vm">
  <section *ngIf="vm.widgetConfiguration?.title" class="valtimo-widget-metroline__header">
    <div class="valtimo-widget-metroline__title-container">
      <valtimo-mdi-icon-viewer
        *ngIf="vm.widgetConfiguration?.icon"
        [mdiIcon]="vm.widgetConfiguration.icon"
      ></valtimo-mdi-icon-viewer>

      <h4 class="valtimo-widget-metroline__title">{{ vm.widgetConfiguration?.title }}</h4>
    </div>

    <ng-content></ng-content>

    <valtimo-widget-action-button
      *ngIf="vm.widgetConfiguration"
      [widgetConfiguration]="vm.widgetConfiguration"
      [resolvedData]="vm.widgetData"
    ></valtimo-widget-action-button>
  </section>

  <div
    class="valtimo-widget-metroline__body"
    [class.valtimo-widget-metroline__body--vertical]="vm.orientation === 'vertical'"
  >
    @if (!vm.hasLoaded) {
      <!-- waiting for data -->
    } @else if (!vm.hasItems) {
      <valtimo-no-results
        [collapseVertically]="true"
        [description]="'widgets.noData' | translate"
        [smallPadding]="true"
      ></valtimo-no-results>
    } @else {
      <ul
        data-progress
        data-progress-current
        class="cds--progress"
        [ngClass]="{
          'cds--progress--vertical': vm.orientation === 'vertical',
          'cds--progress--space-equal': vm.orientation !== 'vertical'
        }"
      >
        <li
          *ngFor="let step of vm.steps; let i = index"
          class="cds--progress-step"
          [ngClass]="{
            'cds--progress-step--complete': step.complete,
            'cds--progress-step--incomplete': !step.complete && i !== vm.currentStepIndex,
            'cds--progress-step--current': i === vm.currentStepIndex
          }"
        >
          <ng-container *ngIf="getStepState(step, i, vm.currentStepIndex) as state">
            <div
              class="cds--progress-step-button cds--progress-step-button--unclickable"
              [title]="step.label"
            >
              <span class="cds--assistive-text">{{ getStepStateLabel(state) }}</span>
              <svg
                [cdsIcon]="getStepIcon(state)"
                size="16"
                [ngClass]="{'cds--progress__warning': step.invalid && i !== vm.currentStepIndex}"
              ></svg>
              <div class="cds--progress-text valtimo-widget-metroline__step-text">
                <div class="valtimo-widget-metroline__step-label-row">
                  <p class="cds--progress-label">{{ step.label }}</p>
                  <cds-toggletip align="bottom" [autoAlign]="true">
                    <button
                      cdsToggletipButton
                      [removeClassnames]="['cds--toggletip-button']"
                      type="button"
                      class="valtimo-widget-metroline__step-info"
                    >
                      <svg cdsIcon="information" size="16"></svg>
                    </button>
                    <div
                      cdsToggletipContent
                      class="valtimo-widget-metroline__step-toggletip-content"
                    >
                      {{ step.itemLabel || '-' }}
                    </div>
                  </cds-toggletip>
                </div>
                <p *ngIf="step.secondaryLabel" class="cds--progress-optional">
                  {{ step.secondaryLabel }}
                </p>
              </div>
              <span class="cds--progress-line"></span>
            </div>
          </ng-container>
        </li>
      </ul>
    }
  </div>
</ng-container>
