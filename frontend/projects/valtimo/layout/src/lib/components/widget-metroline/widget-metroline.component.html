<ng-container *ngIf="viewModel$ | async as vm">
  <section *ngIf="vm.widgetConfiguration?.title" class="valtimo-widget-metroline__header">
    <div class="valtimo-widget-metroline__title-container">
      <valtimo-mdi-icon-viewer
        *ngIf="vm.widgetConfiguration?.icon"
        [mdiIcon]="vm.widgetConfiguration.icon"
      ></valtimo-mdi-icon-viewer>

      <h4 class="valtimo-widget-metroline__title">{{ vm.widgetConfiguration?.title }}</h4>
    </div>

    <ng-content></ng-content>

    <valtimo-widget-action-button
      *ngIf="vm.widgetConfiguration"
      [widgetConfiguration]="vm.widgetConfiguration"
      [resolvedData]="vm.widgetData"
    ></valtimo-widget-action-button>
  </section>

  <div
    class="valtimo-widget-metroline__body"
    [class.valtimo-widget-metroline__body--vertical]="vm.orientation === 'vertical'"
  >
    @if (!vm.hasLoaded) {
      <!-- waiting for data -->
    } @else if (!vm.hasItems) {
      <valtimo-no-results
        [collapseVertically]="true"
        [description]="'widgets.noData' | translate"
        [smallPadding]="true"
      ></valtimo-no-results>
    } @else {
      <cds-progress-indicator
        [steps]="vm.steps"
        [current]="vm.currentStepIndex"
        [orientation]="vm.orientation"
        spacing="equal"
      ></cds-progress-indicator>
    }
  </div>
</ng-container>
