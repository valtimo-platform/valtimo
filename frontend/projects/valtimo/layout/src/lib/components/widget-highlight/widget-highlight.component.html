<ng-container
  *ngIf="{
    widgetConfiguration: widgetConfiguration$ | async,
    widgetData: widgetData$ | async,
    displayValue: displayValue$ | async,
    hasValue: hasValue$ | async,
  } as obs"
>
  <header class="valtimo-widget-highlight__header">
    <h4 class="valtimo-widget-highlight__title" [attr.title]="obs.widgetConfiguration?.title">
      {{ obs.widgetConfiguration?.title }}
    </h4>

    <span *ngIf="obs.widgetConfiguration?.icon" class="valtimo-widget-highlight__icon">
      <valtimo-mdi-icon-viewer
        [mdiIcon]="obs.widgetConfiguration.icon"
      ></valtimo-mdi-icon-viewer>
    </span>
  </header>

  <div class="valtimo-widget-highlight__value">
    @if (!obs.widgetData) {
      <cds-skeleton-text [lines]="1" [maxLineWidth]="60"></cds-skeleton-text>
    } @else if (obs.hasValue) {
      <span class="valtimo-widget-highlight__value-text" [attr.title]="obs.displayValue">{{
        obs.displayValue
      }}</span>
    } @else {
      <span class="valtimo-widget-highlight__value-empty">{{
        'widgets.highlight.noValue' | translate
      }}</span>
    }
  </div>

  <div class="valtimo-widget-highlight__actions">
    <valtimo-widget-action-button
      [widgetConfiguration]="obs.widgetConfiguration"
      [resolvedData]="obs.widgetData"
    ></valtimo-widget-action-button>
  </div>
</ng-container>
