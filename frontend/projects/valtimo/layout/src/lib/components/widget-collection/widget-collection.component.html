<ng-container
  *ngIf="{
    widgetConfiguration: widgetConfiguration$ | async,
    collectionWidgetCards: collectionWidgetCards$ | async,
    noVisibleFields: noVisibleFields$ | async,
    widgetData: widgetData$ | async,
  } as obs"
>
  <section class="valtimo-widget-collection__header" [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_COLLECTION_HEADER">
    <div class="valtimo-widget-collection__title-container">
      <valtimo-mdi-icon-viewer
        *ngIf="obs.widgetConfiguration?.icon"
        [mdiIcon]="obs.widgetConfiguration.icon"
        [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_COLLECTION_ICON"
      ></valtimo-mdi-icon-viewer>

      <span class="valtimo-widget-collection__title" [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_COLLECTION_TITLE">{{ $widgetTitle() }}</span>
    </div>

    <ng-content></ng-content>

    <valtimo-widget-action-button
      [widgetConfiguration]="obs.widgetConfiguration"
      [resolvedData]="obs.widgetData"
      [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_COLLECTION_ACTION_BUTTON"
    ></valtimo-widget-action-button>
  </section>

  <div
    #widgetCollection
    [ngClass]="{
      'valtimo-widget-collection__render-vertically': amountOfColumns() === 1,
      'valtimo-widget-collection__render-two-columns': amountOfColumns() === 2,
      'valtimo-widget-collection__render-three-columns': amountOfColumns() === 3,
      'valtimo-widget-collection__container': amountOfColumns() === 4,
    }"
    [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_COLLECTION_CONTAINER"
  >
    @for (card of obs?.collectionWidgetCards; track card.key) {
      <div
        *ngIf="!obs.noVisibleFields"
        class="valtimo-widget-collection__card"
        [ngClass]="{
          'valtimo-widget-collection__card--hidden': card.hidden,
        }"
        data-test-id="valtimo-widget-collection-card-{{$index}}"
      >
        <span class="valtimo-widget-collection__card-title" data-test-id="valtimo-widget-collection-card-title-{{$index}}">{{ card.title }}</span>

        <section
          class="valtimo-widget-collection__card-content"
          data-test-id="valtimo-widget-collection-card-content-{{$index}}"
        >
          @for (field of card.fields; track field.key) {
            <div
              *ngIf="
                (field?.value !== null && field?.value !== '-' && field?.hideWhenEmpty) ||
                !field?.hideWhenEmpty
              "
              [ngClass]="{
                'valtimo-widget-collection__full-width-input': field?.width === 'full',
                'valtimo-widget-collection__half-width-input': field?.width === 'half',
              }"
              data-test-id="valtimo-widget-collection-field-container-{{$parent.index}}-{{$index}}"
            >
              <cds-label
                class="valtimo-widget-collection__label"
                [attr.title]="field?.value ?? field?.title"
                data-test-id="valtimo-widget-collection-field-label-{{$parent.index}}-{{$index}}"
              >
                {{ field?.title }}

                <input
                  [value]="field?.value"
                  [readonly]="true"
                  class="valtimo-widget-collection__card-input"
                  cdsText
                  data-test-id="valtimo-widget-collection-field-input-{{$parent.index}}-{{$index}}"
                />
              </cds-label>
            </div>
          }
        </section>
      </div>
    }
  </div>

  @if (obs.noVisibleFields || !obs?.collectionWidgetCards?.length) {
    <valtimo-no-results
      [collapseVertically]="true"
      [description]="(obs.noVisibleFields ? 'widgets.emptyFields' : 'widgets.noData') | translate"
      [smallPadding]="true"
      [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_COLLECTION_NO_RESULTS"
    ></valtimo-no-results>
  }

  <cds-pagination-nav
    *ngIf="paginationModel() && (showPagination$ | async)"
    class="valtimo-widget-collection__pagination"
    [model]="paginationModel()"
    (selectPage)="onSelectPage($event)"
    [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_COLLECTION_PAGINATION"
  >
  </cds-pagination-nav>
</ng-container>
