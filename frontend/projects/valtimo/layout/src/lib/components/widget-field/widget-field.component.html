<ng-container
  *ngIf="{
    widgetConfiguration: widgetConfiguration$ | async,
    widgetPropertyValue: widgetPropertyValue$ | async,
    widgetData: widgetData$ | async,
    isEmptyWidgetData: isEmptyWidgetData$ | async,
    noVisibleFields: noVisibleFields$ | async,
  } as obs"
>
  <section *ngIf="obs?.widgetConfiguration?.title" class="valtimo-widget-field__header">
    <div class="valtimo-widget-field__title-container">
      <valtimo-mdi-icon-viewer
        *ngIf="obs.widgetConfiguration?.icon"
        [mdiIcon]="obs.widgetConfiguration.icon"
      ></valtimo-mdi-icon-viewer>

      <h4 class="valtimo-widget-field__title">{{ obs?.widgetConfiguration?.title }}</h4>
    </div>

    <ng-content></ng-content>

    <valtimo-widget-action-button
      [widgetConfiguration]="obs.widgetConfiguration"
      [resolvedData]="obs.widgetData"
    ></valtimo-widget-action-button>
  </section>
  <div
    #widgetField
    class="valtimo-widget-field__render"
    [ngClass]="{
      'valtimo-widget-field__render-vertically': renderVertically() === 1,
      'valtimo-widget-field__render-two-columns': renderVertically() === 2,
      'valtimo-widget-field__render-three-columns': renderVertically() === 3,
      'valtimo-widget-field__container': renderVertically() === 4,
    }"
  >
    @for (column of obs?.widgetPropertyValue; track column.key) {
      <div class="valtimo-widget-field__column">
        {{ column }}
        @for (property of column; track property) {
          <div
            *ngIf="
              (property?.value !== null && property?.value !== '-' && property?.hideWhenEmpty) ||
              !property?.hideWhenEmpty
            "
            class="valtimo-widget-field__field"
          >
            <cds-skeleton-text [lines]="1" [maxLineWidth]="30"></cds-skeleton-text>

            <label class="valtimo-widget-field__field-label" [attr.title]="property?.title">
              {{ property?.title }}</label
            >

            <div [attr.title]="property?.value" class="valtimo-widget-field__field-value">
              @if (property?.isRawValue) {
                <div [innerHTML]="property?.value"></div>
              } @else {
                {{ property?.value | valtimoEllipsis: property?.ellipsisCharacterLimit }}
              }
            </div>
          </div>
        }
      </div>
    }
  </div>
</ng-container>
