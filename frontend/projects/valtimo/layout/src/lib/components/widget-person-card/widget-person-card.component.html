@let data = $widgetData();

<div class="valtimo-widget-person-card__avatar" [attr.aria-hidden]="true">
  @if (data) {
    <span class="valtimo-widget-person-card__initials">{{ $initials() }}</span>
  } @else {
    <cds-skeleton-text [lines]="1" [maxLineWidth]="60"></cds-skeleton-text>
  }
</div>

<div class="valtimo-widget-person-card__body">
  <h3 class="valtimo-widget-person-card__name">
    @if (data) {
      {{ data.fullName || '-' }}
    } @else {
      <cds-skeleton-text [lines]="1" [maxLineWidth]="60"></cds-skeleton-text>
    }
  </h3>

  <p class="valtimo-widget-person-card__subtitle">{{ $subtitle() }}</p>

  <dl class="valtimo-widget-person-card__grid">
    <div class="valtimo-widget-person-card__field">
      <svg
        class="valtimo-widget-person-card__field-icon"
        cdsIcon="phone"
        size="20"
      ></svg>
      <span class="valtimo-widget-person-card__field-value">{{ data?.phone || '-' }}</span>
    </div>

    <div class="valtimo-widget-person-card__field">
      <svg
        class="valtimo-widget-person-card__field-icon"
        cdsIcon="email"
        size="20"
      ></svg>
      <span class="valtimo-widget-person-card__field-value">{{ data?.email || '-' }}</span>
    </div>

    <div class="valtimo-widget-person-card__field">
      <span class="valtimo-widget-person-card__field-icon valtimo-widget-person-card__bsn-icon">
        BSN
      </span>
      <span class="valtimo-widget-person-card__field-value">{{ data?.bsn || '-' }}</span>
    </div>

    <div class="valtimo-widget-person-card__field">
      <svg
        class="valtimo-widget-person-card__field-icon"
        cdsIcon="calendar"
        size="20"
      ></svg>
      <span class="valtimo-widget-person-card__field-value">{{
        $formattedBirthDate() || '-'
      }}</span>
    </div>
  </dl>
</div>
