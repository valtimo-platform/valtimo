<ng-container
  *ngIf="{
    widgetConfiguration: widgetConfiguration$ | async,
    widgetData: widgetData$ | async,
    isEmptyWidgetData: isEmptyWidgetData$ | async,
    noVisibleMap: noVisibleMap$ | async,
  } as obs"
>
  <section *ngIf="obs?.widgetConfiguration?.title" class="widget-map__header">
    <h4 class="widget-map__title">{{ obs?.widgetConfiguration?.title }}</h4>

    <ng-content></ng-content>

    <valtimo-widget-action-button
      [widgetConfiguration]="obs.widgetConfiguration"
      [resolvedData]="obs.widgetData"
    ></valtimo-widget-action-button>
  </section>

  @if (obs?.isEmptyWidgetData) {
    <valtimo-no-results
      [collapseVertically]="true"
      [description]="'widgets.noData' | translate"
      [smallPadding]="true"
    ></valtimo-no-results>
  } @else {
    <div class="widget-map__render" #widgetMap></div>
  }
</ng-container>
