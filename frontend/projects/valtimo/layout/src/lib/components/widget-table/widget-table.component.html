<cds-tile
  *ngIf="{
    fields: fields$ | async,
    widgetData: widgetData$ | async,
    resolvedData: resolvedData$ | async,
  } as obs"
  class="valtimo-widget-table"
  [class.valtimo-widget-table--compact]="widgetConfiguration?.isCompact"
  [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_TABLE_CONTAINER"
>
  <section class="valtimo-widget-table__header" [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_TABLE_HEADER">
    <div class="valtimo-widget-table__title-container" [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_TABLE_TITLE_CONTAINER">
      <valtimo-mdi-icon-viewer
        *ngIf="widgetConfiguration?.icon"
        [mdiIcon]="widgetConfiguration.icon"
        [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_TABLE_ICON"
      ></valtimo-mdi-icon-viewer>

      <span class="widget-title" [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_TABLE_TITLE">{{ widgetConfiguration?.title }}</span>
    </div>

    <ng-content></ng-content>

    <valtimo-widget-action-button
      [widgetConfiguration]="widgetConfiguration"
      [resolvedData]="obs.resolvedData"
      [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_TABLE_ACTION_BUTTON"
    ></valtimo-widget-action-button>
  </section>

  @if (obs.widgetData && obs.fields && obs.widgetData.length) {
    <section class="valtimo-widget-table__content" [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_TABLE_CONTENT">
      <valtimo-carbon-list
        [header]="false"
        [hideToolbar]="true"
        [fields]="obs.fields"
        [items]="obs.widgetData"
        [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_TABLE_LIST"
      >
      </valtimo-carbon-list>

      <cds-pagination-nav
        *ngIf="$paginationModel() && $showPagination()"
        class="valtimo-widget-table__pagination"
        [model]="$paginationModel()"
        (selectPage)="onSelectPage($event)"
        [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_TABLE_PAGINATION"
      >
      </cds-pagination-nav>
    </section>
  } @else {
    <valtimo-no-results
      [collapseVertically]="true"
      [description]="'widgets.noData' | translate"
      [smallPadding]="true"
      [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_TABLE_NO_RESULTS"
    ></valtimo-no-results>
  }
</cds-tile>
