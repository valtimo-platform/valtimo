<form
  class="valtimo-widget-management-custom"
  [formGroup]="form"
  [attr.data-carbon-theme]="theme$ | async"
>
  <div class="valtimo-widget-management-custom__title-container">
    <cds-text-label
      class="valtimo-widget-management-fields__input valtimo-widget-management-custom__title-input"
      data-test-id="valtimo-widget-management-custom-title-input"
    >
      <v-input-label
        [title]="'widgetTabManagement.content.widgetTitle' | translate"
        [tooltip]="'widgetTabManagement.content.widgetTitleTooltip' | translate"
      >
      </v-input-label>

      <input
        formControlName="widgetTitle"
        cdsText
        [placeholder]="'widgetTabManagement.content.widgetTitlePlaceholder' | translate"
        type="text"
        data-test-id="valtimo-widget-management-custom-widget-title-input"
      />
    </cds-text-label>

    <valtimo-mdi-icon-selector
      [cdsLayer]="0"
      formControlName="widgetIcon"
      data-test-id="valtimo-widget-management-custom-icon-selector"
    ></valtimo-mdi-icon-selector>
  </div>

  <ng-content></ng-content>

  <cds-label class="dropdown-label">
    {{ 'widgetTabManagement.content.custom.selectComponent' | translate }}

    <cds-dropdown
      *ngIf="componentListItems$ | async as componentListItems"
      [appendInline]="false"
      [placeholder]="'widgetTabManagement.content.custom.placeholder' | translate"
      [disabled]="componentListItems.length === 0"
      (selected)="componentDropDownChange($event)"
      data-test-id="valtimo-widget-management-custom-component-dropdown"
    >
      <cds-dropdown-list [items]="componentListItems"> </cds-dropdown-list>
    </cds-dropdown>
  </cds-label>

  <valtimo-carbon-multi-input
    type="keyValue"
    [addRowText]="'widgetTabManagement.content.custom.addCustomKeyValue' | translate"
    addButtonType="tertiary"
    [defaultValues]="$defaultComponentValues()"
    [keyColumnTitle]="'interface.key' | translate"
    [valueColumnTitle]="'interface.value' | translate"
    [fullWidth]="true"
    [initialAmountOfRows]="0"
    [minimumAmountOfRows]="0"
    (valueChange)="onKeyValueChange($event)"
    [keyColumnFlex]="1"
    [valueColumnFlex]="1"
    data-test-id="valtimo-widget-management-custom-multi-input"
  ></valtimo-carbon-multi-input>
</form>
