<form
  *ngIf="theme$ | async as theme"
  [formGroup]="form"
  class="valtimo-widget-management-table__form"
>
  <cds-text-label [attr.data-carbon-theme]="theme">
    <v-input-label
      [title]="'widgetTabManagement.content.widgetTitle' | translate"
      [tooltip]="'widgetTabManagement.content.widgetTitleTooltip' | translate"
    >
    </v-input-label>

    <input
      formControlName="title"
      cdsText
      [placeholder]="'widgetTabManagement.content.widgetTitlePlaceholder' | translate"
      type="text"
    />
  </cds-text-label>

  <cds-text-label [attr.data-carbon-theme]="theme">
    <v-input-label
      [title]="'widgetTabManagement.content.table.defaultPageSize' | translate"
      [tooltip]="'widgetTabManagement.content.table.defaultPageSizeTooltip' | translate"
    >
    </v-input-label>

    <input
      formControlName="defaultPageSize"
      cdsText
      [placeholder]="'widgetTabManagement.content.table.defaultPageSizePlaceholder' | translate"
      type="text"
    />
  </cds-text-label>

  <div class="valtimo-widget-management-table__path-selector">
    <v-input-label
      [title]="'widgetTabManagement.content.table.collection' | translate"
      [tooltip]="'widgetTabManagement.content.table.collectionTooltip' | translate"
    >
    </v-input-label>

    <input
      formControlName="collection"
      cdsText
      [attr.data-carbon-theme]="theme"
      [placeholder]="'widgetTabManagement.content.table.collection' | translate"
      type="text"
    />

    <!-- TODO: Implement to work for case as well -->

    <!-- <valtimo-value-path-selector
      formControlName="collection"
      [attr.data-carbon-theme]="obs.theme"
      [caseDefinitionKey]="obs.params?.caseDefinitionKey"
      [caseDefinitionVersionTag]="obs.params?.caseDefinitionVersionTag"
      [type]="ValuePathType.COLLECTION"
      (collectionSelected)="onCollectionSelected($event)"
    ></valtimo-value-path-selector> -->
  </div>
</form>

<!-- For projecting elements such as process selector in case widgets -->
<ng-content></ng-content>

<span class="valtimo-widget-management-table__subtitle">
  {{ 'widgetTabManagement.content.table.columns' | translate }}
</span>

<valtimo-widget-management-fields-column
  [addTranslateKey]="'widgetTabManagement.content.table.addColumn'"
  [columnData]="$content()?.columns"
  (columnUpdateEvent)="onColumnUpdateEvent($event)"
></valtimo-widget-management-fields-column>
<!-- TODO: Implement to work for case as well -->
<!-- [selectedCollection]="selectedCollection$ | async" -->

<section class="valtimo-widget-management-table__toggle">
  <span class="valtimo-widget-management-table__subtitle">
    {{ 'widgetTabManagement.content.table.options' | translate }}
  </span>

  <cds-toggle
    [checked]="$checked()"
    [label]="'widgetTabManagement.content.table.firstColumnAsTitle' | translate"
    [onText]="'interface.yes' | translate"
    [offText]="'interface.no' | translate"
    (checkedChange)="onCheckedChange($event)"
  ></cds-toggle>
</section>
