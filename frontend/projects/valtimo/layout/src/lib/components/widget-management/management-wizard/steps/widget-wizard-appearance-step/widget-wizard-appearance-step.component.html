<cds-tile-group
  [multiple]="false"
  (selected)="onColorSelected($event)"
  class="valtimo-widget-wizard-step__content widget-appearance__color-grid"
>
  @for (colorTile of colorTiles; track colorTile.color) {
    <cds-selection-tile
      class="valtimo-widget-wizard-step__tile widget-appearance__color-tile"
      [attr.data-test-id]="'widgetWizardAppearanceTile-' + colorTile.color"
      [value]="colorTile.color"
      [selected]="colorTile.color === $widgetColor()"
    >
      <h3 class="valtimo-widget-wizard-step__tile-title">
        {{ colorTile.labelKey | translate }}
      </h3>

      <img [src]="colorTile.illustration" [alt]="colorTile.labelKey | translate" />
    </cds-selection-tile>
  }
</cds-tile-group>
