<cds-tile-group
  [multiple]="false"
  (selected)="onSelectedEvent($event)"
  class="valtimo-widget-wizard-step__content"
>
  <cds-selection-tile
    class="valtimo-widget-wizard-step__tile"
    value="horizontal"
    [selected]="selectedOrientation === 'horizontal'"
  >
    <h3>{{ 'widgetTabManagement.progress.orientation.horizontal' | translate }}</h3>

    <img
      src="valtimo-layout/img/widget-management/orientation/horizontal.svg"
      [alt]="'widgetTabManagement.progress.orientation.horizontal' | translate"
    />
  </cds-selection-tile>

  <cds-selection-tile
    class="valtimo-widget-wizard-step__tile"
    value="vertical"
    [selected]="selectedOrientation === 'vertical'"
  >
    <h3>{{ 'widgetTabManagement.progress.orientation.vertical' | translate }}</h3>

    <img
      src="valtimo-layout/img/widget-management/orientation/vertical.svg"
      [alt]="'widgetTabManagement.progress.orientation.vertical' | translate"
    />
  </cds-selection-tile>
</cds-tile-group>
