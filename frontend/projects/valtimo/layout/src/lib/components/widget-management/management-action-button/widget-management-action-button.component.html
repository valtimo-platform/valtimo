<ng-container
  *ngIf="{
    dropdownItems: dropdownItems$ | async,
    buttonType: buttonType$ | async,
  } as obs"
>
  @if ($widgetContext() === 'case') {
    <cds-dropdown
      class="valtimo-widget-management-action-button__type"
      [label]="'Button action type'"
      [dropUp]="false"
      (selected)="onTypeSelected($event)"
    >
      <cds-dropdown-list [items]="obs.dropdownItems"></cds-dropdown-list>
    </cds-dropdown>
  }

  @if (obs.buttonType === 'process') {
    <valtimo-widget-management-process-selector></valtimo-widget-management-process-selector>
  } @else {
    <form class="valtimo-widget-management-action-button__form" [formGroup]="formGroup">
      <cds-text-label>
        External link

        <input cdsText formControlName="navigateTo" [placeholder]="'External link'" />
      </cds-text-label>

      <cds-text-label>
        Name

        <input cdsText formControlName="name" [placeholder]="'Name'" />
      </cds-text-label>
    </form>
  }
</ng-container>
