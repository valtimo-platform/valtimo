<form
  class="valtimo-case-management-widget-formio"
  [formGroup]="form"
  [attr.data-carbon-theme]="theme$ | async"
>
  <div class="valtimo-case-management-widget-formio__title-container">
    <cds-text-label
      class="valtimo-case-management-widget-field__input valtimo-case-management-widget-formio__title-input"
    >
      <v-input-label
        [title]="'widgetTabManagement.content.widgetTitle' | translate"
        [tooltip]="'widgetTabManagement.content.widgetTitleTooltip' | translate"
      >
      </v-input-label>

      <input
        formControlName="widgetTitle"
        cdsText
        [placeholder]="'widgetTabManagement.content.widgetTitlePlaceholder' | translate"
        type="text"
        data-test-id="valtimo-case-management-widget-formio-title-input"
      />
    </cds-text-label>

    <valtimo-mdi-icon-selector
      [cdsLayer]="0"
      formControlName="widgetIcon"
      data-test-id="valtimo-case-management-widget-formio-icon-selector"
    ></valtimo-mdi-icon-selector>
  </div>

  <ng-content></ng-content>

  <cds-label class="dropdown-label">
    {{ 'widgetTabManagement.content.formio.selectForm' | translate }}

    <cds-dropdown
      *ngIf="formListItems$ | async as formListItems"
      [appendInline]="false"
      [placeholder]="'widgetTabManagement.content.formio.placeholder' | translate"
      [disabled]="formListItems.length === 0"
      [dropUp]="false"
      (selected)="componentDropDownChange($event)"
      data-test-id="valtimo-case-management-widget-formio-form-dropdown"
    >
      <cds-dropdown-list [items]="formListItems"> </cds-dropdown-list>
    </cds-dropdown>
  </cds-label>
</form>
