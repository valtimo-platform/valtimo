<valtimo-widget-management-table [showFirstColumnOption]="false">
  <form [formGroup]="formGroup" class="valtimo-widget-management-interactive-table__form">
    <cds-checkbox formControlName="canStartInternalCase"> Can start internal case </cds-checkbox>

    <cds-text-label>
      {{ 'ikoManagement.rowAction' | translate }}

      <input
        cdsLayer="0"
        formControlName="rowClickAction"
        cdsText
        [placeholder]="'ikoManagement.rowAction' | translate"
        type="text"
      />
    </cds-text-label>

    <valtimo-carbon-multi-input
      type="keyValue"
      formControlName="actions"
      [addRowText]="'Add external link' | translate"
      [keyColumnTitle]="'interface.name' | translate"
      [minimumAmountOfRows]="0"
      [valueColumnTitle]="'interface.url' | translate"
    ></valtimo-carbon-multi-input>
  </form>
</valtimo-widget-management-table>
