<cds-modal valtimoCdsModal showFooter="true" [open]="open" (close)="onCloseModal()" data-test-id="divider-modal">
  <cds-modal-header [showCloseButton]="true" (closeSelect)="onCloseModal()" data-test-id="divider-modal-header">
    <h3 cdsModalHeaderHeading data-test-id="divider-modal-title">
      {{ 'widgetTabManagement.list.dividerModal.' + modalMode + 'DividerTitle' | translate }}
    </h3>
  </cds-modal-header>

  <form [formGroup]="dividerForm" cdsModalContent data-test-id="divider-modal-form">
    <cds-label data-test-id="divider-modal-title-label">
      {{ 'widgetTabManagement.list.dividerModal.dividerTitleLabel' | translate }}

      <input
        class="title-input"
        formControlName="title"
        cdsText
        placeholder="{{
          'widgetTabManagement.list.dividerModal.dividerTitlePlaceholder' | translate
        }}"
        [cdsLayer]="1"
        [attr.modal-primary-focus]="true"
        (keyup)="onFocusOut()"
        data-test-id="divider-modal-title-input"
      />
    </cds-label>

    <valtimo-auto-key-input
      [mode]="modalMode"
      [usedKeys]="usedKeys"
      [sourceText]="title.value"
      formControlName="key"
      labelTranslationKey="widgetTabManagement.list.dividerModal.dividerKeyLabel"
      placeholderTranslationKey="widgetTabManagement.list.dividerModal.dividerKeyPlaceholder"
      data-test-id="divider-modal-key-input"
    >
    </valtimo-auto-key-input>
  </form>

  <cds-modal-footer data-test-id="divider-modal-footer">
    <button cdsButton="ghost" (click)="onCloseModal()" data-test-id="divider-modal-cancel-button">
      {{ 'caseManagement.allVersionsModal.closeButton' | translate }}
    </button>

    <button [disabled]="!dividerForm.valid" cdsButton="primary" (click)="onCloseModal(true)" data-test-id="divider-modal-submit-button">
      {{ buttonLabel | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
