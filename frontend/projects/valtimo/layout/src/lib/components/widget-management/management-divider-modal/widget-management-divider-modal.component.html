<cds-modal valtimoCdsModal showFooter="true" [open]="open" (close)="onCloseModal()">
  <cds-modal-header [showCloseButton]="true" (closeSelect)="onCloseModal()">
    <h3 cdsModalHeaderHeading>
      {{ 'widgetTabManagement.list.dividerModal.' + modalMode + 'DividerTitle' | translate }}
    </h3>
  </cds-modal-header>

  <form [formGroup]="dividerForm" cdsModalContent>
    <cds-label>
      {{ 'widgetTabManagement.list.dividerModal.dividerTitleLabel' | translate }}

      <input
        class="title-input"
        formControlName="title"
        cdsText
        placeholder="{{
          'widgetTabManagement.list.dividerModal.dividerTitlePlaceholder' | translate
        }}"
        [cdsLayer]="1"
        [attr.modal-primary-focus]="true"
        (keyup)="onFocusOut()"
      />
    </cds-label>

    <valtimo-auto-key-input
      [mode]="modalMode"
      [usedKeys]="usedKeys"
      [sourceText]="title.value"
      formControlName="key"
      labelTranslationKey="widgetTabManagement.list.dividerModal.dividerKeyLabel"
      placeholderTranslationKey="widgetTabManagement.list.dividerModal.dividerKeyPlaceholder"
    >
    </valtimo-auto-key-input>
  </form>

  <cds-modal-footer [attr.data-test-id]="TEST_IDS.DIVIDER_MODAL_FOOTER">
    <button cdsButton="ghost" (click)="onCloseModal()" [attr.data-test-id]="TEST_IDS.DIVIDER_MODAL_CANCEL_BUTTON">
      {{ 'interface.cancel' | translate }}
    </button>

    <button [disabled]="!dividerForm.valid" cdsButton="primary" (click)="onCloseModal(true)">
      {{ buttonLabel | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
