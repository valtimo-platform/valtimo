<form
  [formGroup]="form"
  class="valtimo-widget-management-metroline__title-form"
>
  <cds-text-label class="valtimo-widget-management-metroline__title-input">
    <v-input-label
      [title]="'widgetTabManagement.content.widgetTitle' | translate"
      [tooltip]="'widgetTabManagement.content.widgetTitleTooltip' | translate"
    >
    </v-input-label>

    <input
      formControlName="widgetTitle"
      cdsText
      [attr.data-test-id]="testIds.widgetTitleInput"
      [placeholder]="'widgetTabManagement.content.widgetTitlePlaceholder' | translate"
      type="text"
    />
  </cds-text-label>

  <valtimo-mdi-icon-selector
    [cdsLayer]="1"
    formControlName="widgetIcon"
  ></valtimo-mdi-icon-selector>
</form>

<ng-content></ng-content>

<section
  class="valtimo-widget-management-metroline__settings"
  [formGroup]="form"
>
  <cds-radio-group
    class="valtimo-widget-management-metroline__radio-group"
    orientation="horizontal"
    formControlName="orientation"
    [attr.data-test-id]="testIds.displayTypeRadio"
    [legend]="'widgetTabManagement.content.metroline.displayType.label' | translate"
  >
    <cds-radio [value]="orientationOptions.HORIZONTAL">
      {{ 'widgetTabManagement.content.metroline.displayType.horizontal' | translate }}
    </cds-radio>
    <cds-radio [value]="orientationOptions.VERTICAL">
      {{ 'widgetTabManagement.content.metroline.displayType.vertical' | translate }}
    </cds-radio>
  </cds-radio-group>

  <cds-dropdown
    class="valtimo-widget-management-metroline__dropdown"
    [appendInline]="false"
    [attr.data-test-id]="testIds.statusSourceDropdown"
    [label]="'widgetTabManagement.content.metroline.statusSource.label' | translate"
    [placeholder]="'widgetTabManagement.content.metroline.statusSource.placeholder' | translate"
    (selected)="onModeSelected($event)"
  >
    <cds-dropdown-list [items]="modeItems$ | async"></cds-dropdown-list>
  </cds-dropdown>
</section>
