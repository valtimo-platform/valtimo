<form
  *ngIf="$showTitleInput()"
  [formGroup]="form"
  class="valtimo-widget-management-fields__title-form"
>
  <cds-text-label class="valtimo-widget-management-fields__input">
    <v-input-label
      [title]="'widgetTabManagement.content.widgetTitle' | translate"
      [tooltip]="'widgetTabManagement.content.widgetTitleTooltip' | translate"
    >
    </v-input-label>

    <input
      formControlName="widgetTitle"
      cdsText
      [placeholder]="'widgetTabManagement.content.widgetTitlePlaceholder' | translate"
      type="text"
    />
  </cds-text-label>

  <valtimo-mdi-icon-selector
    [cdsLayer]="1"
    formControlName="widgetIcon"
  ></valtimo-mdi-icon-selector>
</form>

<ng-content></ng-content>

<cds-tabs type="contained">
  @for (column of $columns(); track $index) {
    <cds-tab
      [active]="activeTab() === $index"
      [heading]="columnHeading"
      [context]="{index: $index, count: $count}"
      (selected)="onTabSelected($index)"
    >
      <valtimo-widget-management-fields-column
        *ngIf="activeTab() === $index"
        [isFieldWidget]="true"
        [columnData]="$selectedWidgetContent()?.[$index]"
        [showHideWhenEmptyCheckbox]="true"
        (columnUpdateEvent)="onColumnUpdateEvent($event, $index)"
      ></valtimo-widget-management-fields-column>
    </cds-tab>
  }

  <cds-tab
    *ngIf="$columns().length < $widgetWidth"
    [heading]="addColumn"
    [id]="'addColumn'"
    class="valtimo-widget-management-fields__add"
  ></cds-tab>
</cds-tabs>

<ng-template #addColumn>
  <button
    cdsButton="ghost"
    [iconOnly]="true"
    (click)="$event.stopImmediatePropagation(); onAddColumnClick()"
  >
    <svg cdsIcon="add" size="16"></svg>
  </button>
</ng-template>

<ng-template #columnHeading let-data>
  <div class="valtimo-widget-management-fields__heading">
    {{ 'widgetTabManagement.content.column' | translate: {number: data.index + 1} }}

    <button
      cdsButton="ghost"
      [disabled]="data.count === 1"
      [iconOnly]="true"
      size="sm"
      (click)="onDeleteColumnClick(data.index)"
    >
      <svg cdsIcon="close" size="16"></svg>
    </button>
  </div>
</ng-template>
