@if (!disableJsonEditor) {
  <cds-tabs type="contained" [attr.data-test-id]="TEST_IDS.WIDGET_MANAGEMENT_TABS">
    <cds-tab
      [heading]="'interface.editor.visualEditor' | translate"
      (selected)="switchTab(WidgetManagementTab.VISUAL)"
      [attr.data-test-id]="TEST_IDS.WIDGET_MANAGEMENT_VISUAL_TAB"
    >
      <ng-container *ngTemplateOutlet="widgetEditor"></ng-container>
    </cds-tab>

    <cds-tab
      [heading]="'interface.editor.jsonEditor' | translate"
      (selected)="switchTab(WidgetManagementTab.JSON)"
      [attr.data-test-id]="TEST_IDS.WIDGET_MANAGEMENT_JSON_TAB"
    >
      <valtimo-json-editor
        *ngIf="$activeTab() === WidgetManagementTab.JSON"
        [model]="jsonModel$ | async"
        [fitPage]="true"
        [fitPageSpaceAdjustment]="136"
        (saveEvent)="onSaveEvent($event)"
        [attr.data-test-id]="TEST_IDS.WIDGET_MANAGEMENT_JSON_EDITOR"
      ></valtimo-json-editor>
    </cds-tab>
  </cds-tabs>
} @else {
  <ng-container *ngTemplateOutlet="widgetEditor"></ng-container>
}

<ng-template #widgetEditor>
  <valtimo-widget-management-editor
    *ngIf="$activeTab() === WidgetManagementTab.VISUAL"
    [availableWidgetTypes]="availableWidgetTypes"
    [disableDuplicate]="disableDuplicate"
    [enableWidgetDivider]="enableWidgetDivider"
    [singleWidget]="singleWidget"
    [defaultWidth]="defaultWidth"
    [attr.data-test-id]="TEST_IDS.WIDGET_MANAGEMENT_VISUAL_EDITOR"
  ></valtimo-widget-management-editor>
</ng-template>
