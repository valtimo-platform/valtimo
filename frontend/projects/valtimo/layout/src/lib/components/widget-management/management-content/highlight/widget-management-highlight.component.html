<form [formGroup]="form" class="valtimo-widget-management-highlight__form">
  <section class="valtimo-widget-management-highlight__section">
    <h6 class="valtimo-widget-management-highlight__section-title">
      {{ 'widgetTabManagement.content.highlight.identitySection' | translate }}
    </h6>

    <cds-text-label class="valtimo-widget-management-highlight__input">
      <v-input-label
        [title]="'widgetTabManagement.content.widgetTitle' | translate"
        [tooltip]="'widgetTabManagement.content.widgetTitleTooltip' | translate"
      ></v-input-label>

      <input
        formControlName="widgetTitle"
        cdsText
        type="text"
        [placeholder]="'widgetTabManagement.content.widgetTitlePlaceholder' | translate"
      />
    </cds-text-label>

    <valtimo-mdi-icon-selector
      [cdsLayer]="1"
      formControlName="widgetIcon"
    ></valtimo-mdi-icon-selector>
  </section>

  <section class="valtimo-widget-management-highlight__section">
    <h6 class="valtimo-widget-management-highlight__section-title">
      {{ 'widgetTabManagement.content.highlight.actionSection' | translate }}
    </h6>

    <ng-content></ng-content>
  </section>

  <section class="valtimo-widget-management-highlight__section">
    <h6 class="valtimo-widget-management-highlight__section-title">
      {{ 'widgetTabManagement.content.highlight.valueAndAccentSection' | translate }}
    </h6>

    <div class="valtimo-widget-management-highlight__row">
      <cds-text-label class="valtimo-widget-management-highlight__row-item">
        <v-input-label
          [title]="'widgetTabManagement.content.highlight.value' | translate"
        ></v-input-label>

        <input
          formControlName="value"
          cdsText
          type="text"
          [placeholder]="'widgetTabManagement.content.highlight.valuePlaceholder' | translate"
        />

        <span class="valtimo-widget-management-highlight__helper">
          {{ 'widgetTabManagement.content.highlight.valueHelper' | translate }}
        </span>
      </cds-text-label>

      <cds-dropdown
        class="valtimo-widget-management-highlight__row-item"
        [label]="'widgetTabManagement.content.highlight.accentColor' | translate"
        (selected)="onColorSelected($event)"
      >
        <cds-dropdown-list [items]="$colorItems()"></cds-dropdown-list>
      </cds-dropdown>
    </div>
  </section>
</form>
