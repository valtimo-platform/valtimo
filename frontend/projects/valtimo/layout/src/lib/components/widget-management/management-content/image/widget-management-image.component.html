<form
  *ngIf="{params: params$ | async} as data"
  [formGroup]="form"
  class="valtimo-widget-management-image__form"
>
  <section class="valtimo-widget-management-image__panel">
    <div class="valtimo-widget-management-image__identity-row">
      <cds-text-label class="valtimo-widget-management-image__title-input">
        <v-input-label
          [title]="'widgetTabManagement.content.widgetTitle' | translate"
          [tooltip]="'widgetTabManagement.content.widgetTitleTooltip' | translate"
        ></v-input-label>

        <input
          formControlName="widgetTitle"
          cdsText
          type="text"
          [placeholder]="'widgetTabManagement.content.widgetTitlePlaceholder' | translate"
        />
      </cds-text-label>

      <valtimo-mdi-icon-selector
        [cdsLayer]="1"
        formControlName="widgetIcon"
      ></valtimo-mdi-icon-selector>
    </div>
  </section>

  <ng-content></ng-content>

  <section class="valtimo-widget-management-image__panel">
    <div
      class="valtimo-widget-management-image__value"
    >
      @if ($widgetContext() === 'case') {
        <valtimo-value-path-selector
          formControlName="value"
          [label]="'widgetTabManagement.content.image.value' | translate"
          [caseDefinitionKey]="data.params?.caseDefinitionKey"
          [caseDefinitionVersionTag]="data.params?.caseDefinitionVersionTag"
        ></valtimo-value-path-selector>
      } @else {
        <cds-text-label>
          <v-input-label
            [title]="'widgetTabManagement.content.image.value' | translate"
          ></v-input-label>

          <input
            formControlName="value"
            cdsText
            type="text"
            [placeholder]="'widgetTabManagement.content.image.valuePlaceholder' | translate"
          />
        </cds-text-label>
      }

      <span class="valtimo-widget-management-image__helper">
        {{ 'widgetTabManagement.content.image.valueHelper' | translate }}
      </span>
    </div>

    <cds-toggle
      class="valtimo-widget-management-image__carousel-toggle"
      formControlName="displayAsCarousel"
      [label]="'widgetTabManagement.content.image.displayAsCarousel' | translate"
    ></cds-toggle>
  </section>
</form>
