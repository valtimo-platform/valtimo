<valtimo-carbon-list
  [attr.data-test-id]="TEST_IDS.WIDGET_TAB_MANAGEMENT_LIST"
  [actionItems]="actionItems$ | async"
  [fields]="fields$ | async"
  [header]="false"
  [items]="widgets$ | async"
  [dragAndDrop]="!(singleWidget$ | async)"
  [dragAndDropDisabled]="$dragAndDropDisabled()"
  [loading]="loading$ | async"
  (itemsReordered)="onItemsReordered($event)"
  (rowClicked)="editWidget($event)"
>
  <ng-container carbonToolbarContent>
    <button *ngIf="enableWidgetDivider" cdsButton="ghost" (click)="openAddDividerModal()" [attr.data-test-id]="TEST_IDS.WIDGET_TAB_MANAGEMENT_ADD_DIVIDER_BUTTON">
      {{ 'widgetTabManagement.list.addDivider' | translate }}

      <svg class="cds--btn__icon" cdsIcon="drag--vertical" size="16"></svg>
    </button>

    <ng-container *ngTemplateOutlet="addWidgetButton"></ng-container>
  </ng-container>

  <valtimo-no-results
    [action]="addWidgetButton"
    [description]="
      ((singleWidget$ | async)
        ? 'widgetTabManagement.list.noResultsSingle.description'
        : 'widgetTabManagement.list.noResults.description'
      ) | translate
    "
    [title]="
      ((singleWidget$ | async)
        ? 'widgetTabManagement.list.noResultsSingle.title'
        : 'widgetTabManagement.list.noResults.title'
      ) | translate
    "
    [attr.data-test-id]="TEST_IDS.WIDGET_TAB_MANAGEMENT_NO_RESULTS"
  ></valtimo-no-results>
</valtimo-carbon-list>

<ng-template #addWidgetButton>
  <button
    cdsButton="primary"
    (click)="openAddModal()"
    [disabled]="(singleWidget$ | async) && ((widgets$ | async) || []).length === 1"
    [attr.data-test-id]="TEST_IDS.WIDGET_TAB_MANAGEMENT_ADD_WIDGET_BUTTON"
  >
    {{ 'widgetTabManagement.list.add' | translate }}

    <svg class="cds--btn__icon" cdsIcon="add" size="16"></svg>
  </button>
</ng-template>

<valtimo-widget-management-divider-modal
  [open]="$isDividerModalOpen()"
  [modalMode]="$dividerModalMode()"
  [prefillData]="dividerDefinition$ | async"
  [usedKeys]="usedKeys$ | async"
  (closeEvent)="onCloseEvent($event)"
  [attr.data-test-id]="TEST_IDS.WIDGET_TAB_MANAGEMENT_DIVIDER_MODAL"
></valtimo-widget-management-divider-modal>

<valtimo-widget-management-wizard
  [editMode]="$isEditMode()"
  [open]="$isWizardOpen()"
  [disableDuplicate]="disableDuplicate$ | async"
  (closeEvent)="onCloseEvent($event)"
  [attr.data-test-id]="TEST_IDS.WIDGET_TAB_MANAGEMENT_WIZARD"
></valtimo-widget-management-wizard>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="Are you sure you want to delete this widget?"
  [outputOnConfirm]="$deleteWidget()"
  [showModalSubject$]="deleteModalOpen$"
  titleTranslationKey="interface.delete"
  (confirmEvent)="onDeleteConfirm($event)"
  [attr.data-test-id]="TEST_IDS.WIDGET_TAB_MANAGEMENT_CONFIRMATION_MODAL"
></valtimo-confirmation-modal>
