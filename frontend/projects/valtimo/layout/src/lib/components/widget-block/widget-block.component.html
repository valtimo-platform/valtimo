<div class="widget-block" [attr.data-carbon-theme]="theme$ | async" [attr.data-test-id]="TEST_IDS.WIDGET_BLOCK">
  <div #widgetBlockContent class="widget-block__content" [attr.data-test-id]="TEST_IDS.WIDGET_BLOCK_CONTENT">
    <ng-template #widgetComponent [attr.data-test-id]="TEST_IDS.WIDGET_BLOCK_COMPONENT"></ng-template>
  </div>
</div>

<ng-container
  *ngIf="{
    documentId: documentId$ | async,
    widgetConfiguration: widget$ | async,
    theme: theme$ | async,
    blockHeightPx: blockHeightPx$ | async,
    blockWidthPercentage: blockWidthPercentage$ | async,
  } as obs"
  [attr.data-test-id]="TEST_IDS.WIDGET_BLOCK_CONTAINER">
</ng-container>
