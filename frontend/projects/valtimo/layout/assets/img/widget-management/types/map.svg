<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200">
  <defs>
    <style>
        .bg-white{fill:#ffffff;}
        .overlay-black{fill:#000000; opacity:.45;}
        .panel-white{fill:#ffffff;}
        .land-dark{fill:#353535;}
        .land-mid{fill:#7c7c7c;}
        .land-light{fill:#bababa;}
        .stroke-none{stroke-width:0px;}
    </style>
  </defs>
  <rect class="bg-white stroke-none" width="1920" height="1200"/>
  <rect class="overlay-black stroke-none" width="1920" height="1200"/>
  <rect class="panel-white stroke-none" x="350" y="150" width="1220" height="900" rx="8"/>

  <!-- WORLD MAP GROUP -->
  <g transform="translate(380,200) scale(1.15)">

    <!-- Africa -->
    <path class="land-mid stroke-none" d="
      M560,250 l40,60 20,80 -10,60 -40,40 -70,-20 -30,-60 10,-90 40,-70 40,-20z"/>

    <!-- South America -->
    <path class="land-dark stroke-none" d="
      M350,350 l40,70 -20,80 60,100 -10,80 -50,40 -40,-20 0,-60 20,-70 -40,-90 10,-100z"/>

    <!-- North America -->
    <path class="land-light stroke-none" d="
      M200,80 l120,-40 100,20 70,40 20,60 -40,40 -90,10 -20,40 -60,10 -70,-60 -50,-70 20,-50z"/>

    <!-- Europe -->
    <path class="land-light stroke-none" d="
      M520,120 l40,-20 40,10 20,40 -30,40 -50,0 -40,-30 20,-40z"/>

    <!-- Asia -->
    <path class="land-mid stroke-none" d="
      M620,140 l120,-20 120,40 70,60 -20,100 -80,80 -140,-40 -50,-70 20,-120 -40,-30z"/>

    <!-- Australia -->
    <path class="land-dark stroke-none" d="
      M820,420 l60,20 40,40 -20,60 -70,10 -50,-30 10,-50 30,-50z"/>

    <!-- Greenland -->
    <path class="land-mid stroke-none" d="
      M430,10 l60,-20 40,10 20,40 -20,30 -70,0 -40,-30 10,-30z"/>

    <!-- Simple Antarctica Strip -->
    <rect class="land-light stroke-none" x="150" y="520" width="800" height="30" rx="10"/>
  </g>
</svg>
