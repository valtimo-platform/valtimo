<section
  *ngIf="{
    compactMode: compactMode$ | async,
    isReadOnlyProcess: isReadOnlyProcess$ | async,
    changesPending: changesPending$ | async,
  } as obs"
  class="valtimo-process-builder__header"
>
  <button
    cdsButton="secondary"
    [size]="obs.compactMode ? 'sm' : 'md'"
    (click)="navigateBack.emit(null)"
  >
    <svg class="cds--btn__icon" cdsIcon="arrow--left" size="16"></svg>

    <span>{{ 'interface.back' | translate }}</span>
  </button>

  <div class="valtimo-process-builder__actions">
    <button cdsButton="tertiary" [size]="obs.compactMode ? 'sm' : 'md'" (click)="export()">
      {{ 'processManagement.download' | translate }}

      <svg class="cds--btn__icon" cdsIcon="download" size="16"></svg>
    </button>

    <button
      cdsButton="primary"
      [size]="obs.compactMode ? 'sm' : 'md'"
      [disabled]="!obs.changesPending"
      (click)="onDeployClick(obs.isReadOnlyProcess)"
    >
      {{ 'processManagement.deploy' | translate }}

      <svg class="cds--btn__icon" cdsIcon="deploy" size="16"></svg>
    </button>
  </div>
</section>

<div
  fitPage
  [extraSpace]="extraSpace()"
  [disableOverflow]="true"
  *ngIf="{
    loading: loading$ | async,
    isReadOnlyProcess: isReadOnlyProcess$ | async,
  } as obs"
  data-carbon-theme="g10"
  class="bpmn__container"
>
  <div class="bpmn__modeler" [style.display]="obs.isReadOnlyProcess ? 'none' : 'flex'">
    <div class="bpmn__modeler-canvas" #modeler></div>

    <div class="bpmn__modeler-panel" #modelerPanel></div>
  </div>

  <div class="bpmn__modeler" [style.display]="obs.isReadOnlyProcess ? 'flex' : 'none'">
    <div class="bpmn__modeler-canvas" #viewer></div>

    <div class="bpmn__modeler-panel" #viewerPanel></div>
  </div>
</div>

<valtimo-process-link-modal></valtimo-process-link-modal>
