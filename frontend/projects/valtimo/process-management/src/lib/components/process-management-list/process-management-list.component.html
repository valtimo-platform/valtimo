<valtimo-carbon-list
  [actionItems]="ACTION_ITEMS"
  [showActionItems]="hasEditPermissions$ | async"
  [fields]="FIELDS"
  [header]="false"
  [items]="processDefinitions$ | async"
  [loading]="loading$ | async"
  (rowClicked)="editProcessDefinition($event)"
>
  <ng-container carbonToolbarContent>
    <button
      *ngIf="hasEditPermissions$ | async"
      cdsButton="ghost"
      iconOnly="true"
      (click)="openModal()"
    >
      <svg cdsIcon="upload" size="16"></svg>
    </button>

    <ng-container [ngTemplateOutlet]="createProcess"></ng-container>
  </ng-container>

  <valtimo-no-results
    [action]="createProcess"
    [title]="'processManagement.noResults.title' | translate"
    [description]="'processManagement.noResults.' + $context() + 'Description' | translate"
  ></valtimo-no-results>
</valtimo-carbon-list>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="processManagement.deleteModal.content"
  [outputOnConfirm]="processToDelete$ | async"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="processManagement.deleteModal.title"
  (confirmEvent)="onDeleteConfirm($event)"
></valtimo-confirmation-modal>

<ng-template #createProcess>
  <button *ngIf="hasEditPermissions$ | async" cdsButton="primary" (click)="onCreateProcess()">
    {{ 'processManagement.createProcess' | translate }}

    <svg cdsIcon="add" size="16" class="cds--btn__icon"></svg>
  </button>
</ng-template>
