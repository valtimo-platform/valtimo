<div
  *ngIf="{
    decisionXml: decisionXml$ | async,
    decisionTitle: decisionTitle$ | async,
  } as obs"
  fitPage
  [disableOverflow]="true"
  class="dmn-editor"
>
  <ng-container *ngTemplateOutlet="diagram"></ng-container>
</div>

<ng-template #diagram>
  <div class="editor-parent">
    <div class="editor-container"></div>
    <div class="editor-tabs"></div>
  </div>
</ng-template>

<ng-container renderInPageHeader>
  <ng-template>
    <div
      *ngIf="{
        selectionId: selectionId$ | async,
        isCreating: isCreating$ | async,
        context: context$ | async,
        compactMode: compactMode$ | async,
        hasEditPermissions: hasEditPermissions$ | async,
      } as obs"
      class="decision-modeler-actions"
    >
      <ng-container *ngTemplateOutlet="versionSelection"></ng-container>

      <button
        *ngIf="obs.context === 'case' || obs.isCreating"
        cdsButton="secondary"
        [size]="obs.compactMode ? 'sm' : 'md'"
        (click)="navigateBack()"
        [attr.data-test-id]="testIds.backButton"
      >
        <svg class="cds--btn__icon" cdsIcon="arrow--left" size="16"></svg>

        <span>{{ 'interface.back' | translate }}</span>
      </button>

      @if (obs.selectionId && !obs.isCreating) {
        <button
          cdsButton="primary"
          [disabled]="!obs.hasEditPermissions"
          (click)="deploy()"
          [size]="obs.compactMode ? 'sm' : 'md'"
          [attr.data-test-id]="testIds.deployButton"
        >
          {{ 'decisions.deploy' | translate }}

          <svg class="cds--btn__icon" cdsIcon="deploy" size="16"></svg>
        </button>

        <v-overflow-menu class="overflow-button" placement="bottom-end">
          <v-overflow-menu-trigger overflowTrigger></v-overflow-menu-trigger>
          <v-overflow-menu-option
            [disabled]="!obs.hasEditPermissions"
            (selected)="openEditModal()"
            >{{ 'interface.edit' | translate }}
          </v-overflow-menu-option>
          <v-overflow-menu-option (selected)="download()"
            >{{ 'interface.export' | translate }}
          </v-overflow-menu-option>
          <v-overflow-menu-option
            [disabled]="!obs.hasEditPermissions || obs.context === 'independent'"
            type="danger"
            (selected)="onDeleteClick()"
            >{{ 'interface.delete' | translate }}
          </v-overflow-menu-option>
        </v-overflow-menu>
      } @else {
        <button
          cdsButton="primary"
          [disabled]="!obs.hasEditPermissions"
          (click)="deploy()"
          [size]="obs.compactMode ? 'sm' : 'md'"
          [attr.data-test-id]="testIds.deployButton"
        >
          {{ 'decisions.deploy' | translate }}

          <svg class="cds--btn__icon" cdsIcon="deploy" size="16"></svg>
        </button>
      }
    </div>
  </ng-template>
</ng-container>

<ng-template #versionSelection>
  <ng-container
    *ngIf="{
      selectItems: (decisionVersionSelectItems$ | async) || [],
      isIndependent: isIndependent$ | async,
      versionSelectionDisabled: versionSelectionDisabled$ | async,
      selectionId: selectionId$ | async,
    } as obs"
  >
    <v-select
      *ngIf="obs.isIndependent"
      name="version"
      [title]="'decisions.version' | translate"
      [disabled]="obs.versionSelectionDisabled"
      [clearable]="false"
      [loading]="obs.selectItems.length === 0"
      [items]="obs.selectItems"
      [defaultSelectionId]="obs.selectionId"
      [widthInPx]="120"
      (selectedChange)="switchVersion($event)"
    ></v-select>
  </ng-container>
</ng-template>

<valtimo-decision-form-modal
  #decisionEdit
  titleKey="decisions.editModal.title"
  submitKey="interface.save"
  (submitEvent)="onEditDecision($event)"
></valtimo-decision-form-modal>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="decisions.deleteModal.content"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="decisions.deleteModal.title"
  (confirmEvent)="onDeleteConfirm()"
></valtimo-confirmation-modal>
