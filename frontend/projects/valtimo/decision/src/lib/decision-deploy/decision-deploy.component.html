<cds-modal showFooter="true" valtimoCdsModal [open]="modalOpen$ | async" (close)="closeModal()" [attr.data-test-id]="TEST_IDS.DECISIONS_UPLOAD_MODAL">
  <cds-modal-header showCloseButton="true" (closeSelect)="closeModal()" [attr.data-test-id]="TEST_IDS.DECISIONS_UPLOAD_MODAL_HEADER">
    <h3 cdsModalHeaderHeading [attr.data-test-id]="TEST_IDS.DECISIONS_UPLOAD_MODAL_TITLE">{{ 'decisions.upload.title' | translate }}</h3>
  </cds-modal-header>

  <section cdsModalContent [cdsLayer]="1" [formGroup]="form" [attr.data-test-id]="TEST_IDS.DECISIONS_UPLOAD_MODAL_CONTENT">
    <cds-file-uploader
      [accept]="ACCEPTED_FILES"
      [multiple]="false"
      buttonType="primary"
      [title]="'decisions.upload.fileUploaderTitle' | translate"
      [description]="'decisions.upload.fileUploaderDescription' | translate"
      [buttonText]="'decisions.upload.fileUploaderButton' | translate"
      formControlName="file"
      [attr.data-test-id]="TEST_IDS.DECISIONS_UPLOAD_MODAL_FILE_UPLOADER"
    >
    </cds-file-uploader>
  </section>

  <cds-modal-footer [attr.data-test-id]="TEST_IDS.DECISIONS_UPLOAD_MODAL_FOOTER">
    <button cdsButton="ghost" (click)="closeModal()" [attr.data-test-id]="TEST_IDS.DECISIONS_UPLOAD_MODAL_CANCEL_BUTTON">
      {{ 'interface.cancel' | translate }}
    </button>

    <button cdsButton="primary" [disabled]="!selectedDmnFile" (click)="deployDmn()" [attr.data-test-id]="TEST_IDS.DECISIONS_UPLOAD_MODAL_UPLOAD_BUTTON">
      {{ 'interface.upload' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
