@if (currentTab$ | async; as currentTab) {
  <valtimo-case-management-draft-warning
    *ngIf="(isDraftVersion$ | async) === true && currentTab !== ZgwTabEnum.GENERAL"
    [name]="DRAFT_WARNING_MESSAGE[currentTab] | translate | lowercase"
    data-test-id="case-management-draft-warning"
  ></valtimo-case-management-draft-warning>
}

<cds-tabs class="case-management-tabs" type="contained" data-test-id="case-management-tabs">
  @for (zgwTab of (zgwTabs$ | async) || []; track zgwTab.tab) {
    <cds-tab
      [class]="zgwTab.class"
      [active]="zgwTab.active"
      [heading]="zgwTab.headingTranslationKey | translate"
      (selected)="displayTab(zgwTab.tab)"
      data-test-id="case-management-tab-{{zgwTab.tab}}"
    ></cds-tab>
  }
</cds-tabs>

<ng-template #zgwTabContent data-test-id="case-management-tab-content"></ng-template>
