<ng-container
  *ngIf="{
    loading: loading$ | async,
    documentUploadFields: documentUploadFields$ | async,
    uploadFieldModalType: uploadFieldModalType$ | async,
    caseDefinitionKey: caseDefinitionKey$ | async,
    prefill: prefill$ | async,
  } as obs"
>
  <valtimo-carbon-list
    [items]="obs.documentUploadFields"
    [fields]="FIELDS"
    [header]="false"
    [loading]="obs.loading"
    [actionItems]="ACTION_ITEMS"
    (rowClicked)="openEditModal($event)"
  >
    <valtimo-no-results
      title="{{ 'zgw.uploadFields.list.noResultsTitle' | translate }}"
      description="{{ 'zgw.uploadFields.list.noResultsDescription' | translate }}"
    ></valtimo-no-results>
  </valtimo-carbon-list>

  <valtimo-documenten-api-upload-field-modal
    [prefill]="obs.prefill"
    [caseDefinitionKey]="obs.caseDefinitionKey"
    [type]="obs.uploadFieldModalType"
    (closeModalEvent)="closeModal($event)"
  ></valtimo-documenten-api-upload-field-modal>
</ng-container>
