<div
  *ngIf="{
    processItems: processItems$ | async,
    disabled: disabled$ | async,
    isReadOnly: isReadOnly$ | async,
  } as obs"
  class="link-upload-process"
  data-test-id="link-upload-process-container"
>
  <p class="link-upload-process__title"
     data-test-id="link-upload-process-title">
    {{ 'caseManagement.tabs.generalTab.linkUploadProcess.title' | translate }}
  </p>

  <cds-combo-box
    [cdsLayer]="1"
    valtimoReadOnly
    [isReadOnly]="obs.isReadOnly"
    [appendInline]="true"
    [dropUp]="false"
    [label]="'caseManagement.tabs.generalTab.linkUploadProcess.label' | translate"
    [placeholder]="
      'processLinkConfiguration.' + (obs.isReadOnly ? 'noProcess' : 'selectProcess') | translate
    "
    [disabled]="obs.disabled || !obs.processItems || obs.isReadOnly"
    (selected)="selectProcess($event)"
    data-test-id="link-upload-process-combo-box"
  >
    <cds-dropdown-list [items]="obs.processItems || []"></cds-dropdown-list>
  </cds-combo-box>
</div>
