<cds-modal valtimoCdsModal [open]="type !== 'closed'" size="sm">
  <cds-modal-header showCloseButton="true" (closeSelect)="onClose()" [cdsLayer]="1">
    <h3 cdsModalHeaderHeading data-test-id="column-modal-title">
      {{ (type === 'add' ? 'zgw.columns.add' : 'zgw.columns.edit') | translate }}
    </h3>
  </cds-modal-header>

  <form
    class="valtimo-documenten-api-column-modal__content"
    cdsModalContent
    [formGroup]="formGroup"
    [cdsLayer]="1"
  >
    <cds-dropdown
      formControlName="column"
      [label]="'zgw.columns.column' | translate"
      [dropUp]="false"
      data-test-id="column-modal-column-dropdown"
    >
      <cds-dropdown-list
        [items]="!prefillColumn ? (availableColumns$ | async) : prefillColumn"
      ></cds-dropdown-list>
    </cds-dropdown>

    <cds-radio-group *ngIf="showRadioButtons" legend="Default sort" formControlName="defaultSort" data-test-id="column-modal-default-sort-radio-group">
      <cds-radio value="noDefault" data-test-id="column-modal-default-sort-no-default"> {{ 'interface.sorting.noDefault' | translate }} </cds-radio>

      <cds-radio value="DESC" data-test-id="column-modal-default-sort-descending"> {{ 'interface.sorting.descending' | translate }} </cds-radio>

      <cds-radio value="ASC" data-test-id="column-modal-default-sort-ascending"> {{ 'interface.sorting.ascending' | translate }} </cds-radio>
    </cds-radio-group>

    <cds-inline-notification [notificationObj]="notificationObj$ | async" data-test-id="column-modal-notification"></cds-inline-notification>
  </form>

  <cds-modal-footer [cdsLayer]="1">
    <button cdsButton="secondary" (click)="onClose()" data-test-id="column-modal-cancel-button">
      {{ 'interface.cancel' | translate }}
    </button>

    <button cdsButton="primary" [disabled]="formGroup.invalid" (click)="updateColumn()" data-test-id="column-modal-save-button">
      {{ (type === 'add' ? 'interface.add' : 'interface.save') | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
