<cds-modal
        valtimoCdsModal
        [open]="open"
        size="l"
        (close)="onClose()"
>
  <cds-modal-header showCloseButton="true" (closeSelect)="onClose()" [cdsLayer]="1" >
    <h3 cdsModalHeaderHeading>
      {{ 'zgw.documents.preview.modal.header' | translate }}
    </h3>
  </cds-modal-header>

  <pdf-viewer
            src="https://vadimdez.github.io/ng2-pdf-viewer/assets/pdf-test.pdf"
            [original-size]="false">
  </pdf-viewer>

  <cds-modal-footer [cdsLayer]="1">
    <button cdsButton="primary" (click)="onClose()" >
      {{ 'interface.close' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
