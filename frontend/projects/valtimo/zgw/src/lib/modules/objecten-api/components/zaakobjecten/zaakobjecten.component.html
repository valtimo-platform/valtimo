<ng-container
  *ngIf="{
    objecttypeSelectItems: objecttypeSelectItems$ | async,
    objects: objects$ | async,
    columns: columns$ | async,
    selectedObjectTypeUrl: selectedObjecttypeUrl$ | async,
  } as obs"
>
  <v-select
    [attr.data-test-id]="TEST_IDS.ZAAKOBJECTEN_OBJECTTYPE_SELECT"
    [items]="obs.objecttypeSelectItems"
    [margin]="true"
    [widthInPx]="350"
    name="objecttypes"
    [title]="'case.zaakobjecten.objecttype' | translate"
    [placeholder]="'case.zaakobjecten.objecttypePlaceholder' | translate"
    [loading]="!obs.objecttypeSelectItems"
    (selectedChange)="selectObjectType($event)"
  ></v-select>
  <v-input-label
    [attr.data-test-id]="TEST_IDS.ZAAKOBJECTEN_OBJECTS_LABEL"
    titleTranslationKey="case.zaakobjecten.objecten"
    [largeMargin]="!!obs.selectedObjectTypeUrl"
  ></v-input-label>
  <v-paragraph [attr.data-test-id]="TEST_IDS.ZAAKOBJECTEN_OBJECTS_PLACEHOLDER" *ngIf="!obs.selectedObjectTypeUrl">{{
    'case.zaakobjecten.objectenPlaceholder' | translate
  }}</v-paragraph>
  <v-table
    [attr.data-test-id]="TEST_IDS.ZAAKOBJECTEN_OBJECTS_TABLE"
    *ngIf="obs.selectedObjectTypeUrl"
    [loading]="!obs.objects"
    [items]="obs.objects"
    [columns]="obs.columns"
    [showEditButtons]="true"
    [amountOfLoadingRows]="2"
    [itemsTranslationKey]="'pluginManagement.tableItemsText'"
    [showPagination]="false"
    editButtonTranslationKey="case.zaakobjecten.objectType.viewObject"
    (editButtonClicked)="rowClicked($event, obs.objecttypeSelectItems)"
  ></v-table>
</ng-container>

<v-modal [attr.data-test-id]="TEST_IDS.ZAAKOBJECTEN_VIEW_MODAL" #viewZaakobjectModal (closeEvent)="hide()" [hideFooter]="true" [maxWidthPx]="750">
  <div role="header">
    <h4 [attr.data-test-id]="TEST_IDS.ZAAKOBJECTEN_OBJECT_NAME">{{
      objectName$ | async
    }}</h4>
  </div>

  <div role="content">
    <valtimo-form-io
      [attr.data-test-id]="TEST_IDS.ZAAKOBJECTEN_OBJECT_FORM"
      *ngIf="(noFormDefinitionComponent$ | async) === false"
      [form]="objectForm$ | async"
    ></valtimo-form-io>
    <v-paragraph [attr.data-test-id]="TEST_IDS.ZAAKOBJECTEN_NO_FORM_MESSAGE" *ngIf="noFormDefinitionComponent$ | async" [center]="true">{{
      'case.zaakobjecten.noFormDefinitionComponent' | translate
    }}</v-paragraph>
  </div>
</v-modal>
