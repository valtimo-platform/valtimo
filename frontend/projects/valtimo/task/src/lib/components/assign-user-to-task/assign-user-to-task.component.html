<ng-container
  *ngIf="
    (canAssignUserToTaskSet$ | async) && {
      candidateUsers: candidateUsersForTask$ | async,
      editCandidateUsers: editCandidateUsersForTask$ | async,
      disabled: disabled$ | async,
      idOnServer: assignedIdOnServer$ | async,
      mouseIsOverAssignee: mouseIsOverAssignee$ | async,
      assignedUserFullName: assignedUserFullName$ | async,
      selectedUserId: selectedUserId$ | async,
      canAssignUserToTask: canAssignUserToTask$ | async,
      toggletipView: toggletipView$ | async,
      showEditComboBox: showEditComboBox$ | async,
      editComboBoxValue: editComboBoxValue$ | async,
      editToggletipOpen: editToggletipOpen$ | async,
    } as obs
  "
>
  <ng-container *ngIf="{isAssigned: obs.idOnServer !== null} as vars">
    <div
      class="assign-user-container"
      *ngIf="obs.canAssignUserToTask || (!obs.canAssignUserToTask && vars.isAssigned)"
      (mouseenter)="onMouseEnterAssignee()"
      (mouseleave)="onMouseLeaveAssignee()"
    >
      <!-- ASSIGNED STATE: show assigned name, on hover show 'click to edit' toggletip -->

      <!-- Assignee text: visible when has assignee and NOT hovering (or no permission) -->
      <div
        class="assignee-text element"
        [ngClass]="{
          active: obs.canAssignUserToTask
            ? vars.isAssigned && !obs.mouseIsOverAssignee && !obs.editToggletipOpen
            : vars.isAssigned,
        }"
      >
        <span class="bold">{{ 'assignTask.assignedTo' | translate }}</span>

        &nbsp;

        <span class="name">{{ obs.assignedUserFullName }}</span>
      </div>

      <!-- Click to edit toggletip: visible on hover when has assignee -->
      <cds-toggletip
        *ngIf="obs.canAssignUserToTask"
        align="bottom"
        class="element"
        [autoAlign]="true"
        [isOpen]="open$ | async"
        [ngClass]="{active: vars.isAssigned && (obs.mouseIsOverAssignee || obs.editToggletipOpen)}"
        (onOpen)="onOpenEditToggletip()"
        (onClose)="onCloseEditToggletip()"
      >
        <button
          cdsToggletipButton
          [removeClassnames]="['cds--toggletip-button']"
          cdsButton="ghost"
          size="sm"
          class="click-to-edit-button"
        >
          {{ 'assignTask.clickToEdit' | translate }}
        </button>

        <div cdsToggletipContent class="assign-task-popover-content">
          <cds-combo-box
            *ngIf="obs.showEditComboBox"
            [attr.data-carbon-theme]="toggletipDropdownTheme$ | async"
            [label]="'assignTask.comboboxLabel' | translate"
            [placeholder]="'assignTask.placeholder' | translate"
            [appendInline]="true"
            [dropUp]="false"
            [cdsLayer]="1"
            [items]="obs?.editCandidateUsers || []"
            [disabled]="obs.disabled"
            itemValueKey="id"
            [ngModel]="obs.editComboBoxValue"
            (ngModelChange)="onEditComboBoxChange($event)"
            (selected)="onUserSelect($event)"
            (clear)="onEditComboBoxClear()"
          >
            <cds-dropdown-list onclick="event.stopPropagation()"></cds-dropdown-list>
          </cds-combo-box>

          <button
            cdsButton
            [attr.data-carbon-theme]="toggletipTheme$ | async"
            [cdsLayer]="1"
            class="submit-task-button"
            [disabled]="!obs.selectedUserId || obs.disabled"
            (click)="onSubmitButtonClick()"
          >
            {{ 'assignTask.submitButtonText' | translate }}

            <svg class="cds--btn__icon" cdsIcon="user--follow" size="16"></svg>
          </button>

          <button
            cdsButton="danger--tertiary"
            [cdsLayer]="1"
            [attr.data-carbon-theme]="toggletipTheme$ | async"
            [disabled]="obs.disabled"
            (click)="unassignTask()"
          >
            {{ 'assignTask.remove' | translate }}
          </button>
        </div>
      </cds-toggletip>

      <!-- UNASSIGNED STATE: show Assign button that opens choice toggletip -->
      <cds-toggletip
        align="bottom"
        class="element main"
        [autoAlign]="true"
        [isOpen]="open$ | async"
        [ngClass]="{active: !vars.isAssigned}"
        (onOpen)="onOpenAssignToggletip()"
      >
        <button
          cdsToggletipButton
          [removeClassnames]="['cds--toggletip-button']"
          cdsButton="tertiary"
          size="sm"
          class="assign-button"
        >
          {{ 'assignTask.buttonText' | translate }}

          <svg class="cds--btn__icon" cdsIcon="user--follow" size="16"></svg>
        </button>

        <div cdsToggletipContent class="assign-task-popover-content">
          <!-- Step 1: Choice between 'Assign to me' and 'Assign to other user' -->
          <ng-container *ngIf="obs.toggletipView === 'choice'">
            <button
              cdsButton
              [attr.data-carbon-theme]="toggletipTheme$ | async"
              class="choice-button"
              [disabled]="obs.disabled"
              [cdsLayer]="1"
              (click)="onAssignToMe()"
            >
              {{ 'assignTask.assignToMe' | translate }}

              <svg class="cds--btn__icon" cdsIcon="user--follow" size="16"></svg>
            </button>

            <button
              cdsButton="secondary"
              [attr.data-carbon-theme]="toggletipTheme$ | async"
              class="choice-button"
              [disabled]="obs.disabled"
              [cdsLayer]="1"
              (click)="onAssignToOtherUser(); $event.stopPropagation()"
            >
              {{ 'assignTask.assignToOtherUser' | translate }}

              <svg class="cds--btn__icon" cdsIcon="user--follow" size="16"></svg>
            </button>
          </ng-container>

          <!-- Step 2: Dropdown to select another user -->
          <ng-container *ngIf="obs.toggletipView === 'dropdown'">
            <cds-combo-box
              [attr.data-carbon-theme]="toggletipTheme$ | async"
              [label]="'assignTask.comboboxLabel' | translate"
              [placeholder]="'assignTask.placeholder' | translate"
              [appendInline]="true"
              [dropUp]="false"
              [cdsLayer]="1"
              [items]="obs?.candidateUsers || []"
              [disabled]="obs.disabled"
              (selected)="onUserSelect($event)"
              (clear)="onAssignToOtherUser()"
            >
              <cds-dropdown-list onclick="event.stopPropagation()"></cds-dropdown-list>
            </cds-combo-box>

            <button
              cdsButton
              [attr.data-carbon-theme]="toggletipTheme$ | async"
              class="submit-task-button"
              [disabled]="!obs.selectedUserId || obs.disabled"
              (click)="onSubmitButtonClick()"
            >
              {{ 'assignTask.submitButtonText' | translate }}

              <svg class="cds--btn__icon" cdsIcon="user--follow" size="16"></svg>
            </button>
          </ng-container>
        </div>
      </cds-toggletip>
    </div>
  </ng-container>
</ng-container>
