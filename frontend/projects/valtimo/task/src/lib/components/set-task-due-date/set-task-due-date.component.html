<ng-container
  *ngIf="
    (canModifyTaskSet$ | async) && {
      hasDueDate: hasDueDate$ | async,
      taskDueDate: taskDueDate$ | async,
      selectedDateString: selectedDateString$ | async,
      disabled: disabled$ | async,
      mouseIsOverDueDate: mouseIsOverDueDate$ | async,
      canModifyTask: canModifyTask$ | async,
      language: language$ | async,
      showDatePicker: showDatePicker$ | async,
      editToggletipOpen: editToggletipOpen$ | async,
    } as obs
  "
>
  <div
    *ngIf="obs.canModifyTask || (!obs.canModifyTask && obs.hasDueDate)"
    class="due-date-container"
    (mouseenter)="onMouseEnterDueDate()"
    (mouseleave)="onMouseLeaveDueDate()"
  >
    <!-- Due date text: visible when has due date and NOT hovering (or no permission) -->
    <div
      class="due-date-text element"
      [ngClass]="{
        active: obs.canModifyTask
          ? obs.hasDueDate && !obs.mouseIsOverDueDate && !obs.editToggletipOpen
          : obs.hasDueDate,
      }"
    >
      <span class="bold">{{ 'setTaskDueDate.dueDateText' | translate }}</span>

      &nbsp;

      {{ obs.taskDueDate | date: 'dd-MM-yyyy' }}
    </div>

    <!-- Click to edit toggletip: visible on hover when has due date -->
    <cds-toggletip
      *ngIf="obs.canModifyTask"
      align="bottom"
      class="element"
      [autoAlign]="true"
      [isOpen]="open$ | async"
      [ngClass]="{active: obs.hasDueDate && (obs.mouseIsOverDueDate || obs.editToggletipOpen)}"
      (onOpen)="initEditWithCurrentDate()"
      (onClose)="onCloseEditToggletip()"
    >
      <button
        cdsToggletipButton
        [removeClassnames]="['cds--toggletip-button']"
        cdsButton="ghost"
        size="sm"
        class="click-to-edit-button"
      >
        {{ 'setTaskDueDate.clickToEdit' | translate }}
      </button>

      <div cdsToggletipContent class="assign-due-date-popover-content">
        <cds-date-picker
          *ngIf="obs.showDatePicker"
          [attr.data-carbon-theme]="toggletipDropdownTheme$ | async"
          [cdsLayer]="1"
          [label]="'setTaskDueDate.label' | translate"
          [language]="obs.language"
          [placeholder]="'dd-mm-jjjj'"
          dateFormat="d/m/Y"
          [value]="obs.taskDueDate ? [obs.taskDueDate] : []"
          [disabled]="obs.disabled"
          (valueChange)="onDateValueChange($event)"
        ></cds-date-picker>

        <button
          cdsButton
          [attr.data-carbon-theme]="toggletipTheme$ | async"
          class="submit-due-date-button"
          [disabled]="!obs.selectedDateString || obs.disabled"
          (click)="onSubmitButtonClick()"
        >
          {{ 'setTaskDueDate.submitButtonText' | translate }}

          <svg class="cds--btn__icon" cdsIcon="calendar--add" size="16"></svg>
        </button>

        <button
          cdsButton="danger--tertiary"
          [cdsLayer]="1"
          [attr.data-carbon-theme]="toggletipTheme$ | async"
          [disabled]="obs.disabled"
          (click)="onRemoveButtonClick()"
        >
          {{ 'setTaskDueDate.removeButtonText' | translate }}
        </button>
      </div>
    </cds-toggletip>

    <!-- Set due date toggletip: visible when NO due date -->
    <cds-toggletip
      align="bottom"
      class="element main"
      [autoAlign]="true"
      [isOpen]="open$ | async"
      [ngClass]="{active: !obs.hasDueDate}"
      (onOpen)="clear()"
    >
      <button
        cdsToggletipButton
        [removeClassnames]="['cds--toggletip-button']"
        cdsButton="tertiary"
        size="sm"
        class="set-task-due-date-button"
      >
        {{ 'setTaskDueDate.buttonText' | translate }}

        <svg class="cds--btn__icon" cdsIcon="calendar--add" size="16"></svg>
      </button>

      <div cdsToggletipContent class="assign-due-date-popover-content">
        <cds-date-picker
          *ngIf="!obs.hasDueDate && obs.showDatePicker"
          [attr.data-carbon-theme]="toggletipDropdownTheme$ | async"
          [cdsLayer]="1"
          [label]="'setTaskDueDate.label' | translate"
          [language]="obs.language"
          [placeholder]="'dd-mm-jjjj'"
          dateFormat="d/m/Y"
          [disabled]="obs.disabled"
          (valueChange)="onDateValueChange($event)"
        ></cds-date-picker>

        <button
          cdsButton
          [attr.data-carbon-theme]="toggletipTheme$ | async"
          class="submit-due-date-button"
          [disabled]="!obs.selectedDateString || obs.disabled"
          (click)="onSubmitButtonClick()"
        >
          {{ 'setTaskDueDate.submitButtonText' | translate }}

          <svg class="cds--btn__icon" cdsIcon="calendar--add" size="16"></svg>
        </button>
      </div>
    </cds-toggletip>
  </div>
</ng-container>
