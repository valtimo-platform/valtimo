@if (activeTab$ | async; as activeTab) {
  <cds-tabs type="contained">
    <cds-tab
      [active]="activeTab === TaskManagementTab.COLUMNS"
      [heading]="'taskManagement.columns' | translate"
      (selected)="setActiveTab(TaskManagementTab.COLUMNS)"
    >
      <valtimo-task-management-columns *ngIf="activeTab === TaskManagementTab.COLUMNS">
      </valtimo-task-management-columns>
    </cds-tab>

    <cds-tab
      [active]="activeTab === TaskManagementTab.SEARCH_FIELDS"
      [heading]="'taskManagement.searchFields' | translate"
      (selected)="setActiveTab(TaskManagementTab.SEARCH_FIELDS)"
    >
      <valtimo-task-management-search-fields *ngIf="activeTab === TaskManagementTab.SEARCH_FIELDS">
      </valtimo-task-management-search-fields>
    </cds-tab>
  </cds-tabs>
}
