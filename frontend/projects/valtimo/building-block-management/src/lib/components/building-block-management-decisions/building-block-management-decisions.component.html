<valtimo-carbon-list
  [fields]="FIELDS"
  [actionItems]="ACTION_ITEMS"
  [items]="decisions$ | async"
  [loading]="$loading()"
  (rowClicked)="onRowClick($event)"
>
  <div carbonToolbarContent>
    <div class="valtimo-building-block-management-list__actions">
      <button
        cdsButton="ghost"
        [iconOnly]="true"
        (click)="deploy.openModal()"
        [disabled]="(isFinal$ | async) || $loading()"
      >
        <svg cdsIcon="upload" size="16"></svg>
      </button>

      <button
        cdsButton="primary"
        (click)="create.openModal()"
        [disabled]="(isFinal$ | async) || $loading()"
      >
        {{ 'decisions.create' | translate }}

        <svg class="cds--btn__icon" cdsIcon="add" size="16"></svg>
      </button>
    </div>
  </div>
</valtimo-carbon-list>

<valtimo-decision-deploy
  #deploy
  (deploySuccessful)="onDeploySuccessful()"
></valtimo-decision-deploy>

<valtimo-decision-form-modal
  #create
  (submitEvent)="onCreateDecision($event)"
></valtimo-decision-form-modal>

<valtimo-decision-form-modal
  #decisionEdit
  titleKey="decisions.editModal.title"
  submitKey="interface.save"
  (submitEvent)="onEditDecision($event)"
></valtimo-decision-form-modal>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="decisions.deleteModal.content"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="decisions.deleteModal.title"
  (confirmEvent)="onDeleteConfirm()"
></valtimo-confirmation-modal>
