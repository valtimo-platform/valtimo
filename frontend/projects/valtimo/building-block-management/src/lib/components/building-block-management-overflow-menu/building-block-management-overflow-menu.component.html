<ng-template #customTrigger>
  <button cdsButton="tertiary" [size]="(compactMode$ | async) ? 'sm' : 'md'">
    {{ 'caseManagement.more' | translate }}

    <svg
      class="cds--btn__icon case-management-overflow-icon"
      cdsIcon="overflow-menu--vertical"
      size="16"
    ></svg>
  </button>
</ng-template>

<cds-overflow-menu
  valtimoCdsOverflowButton
  [width]="250"
  [customTrigger]="customTrigger"
  [offset]="{y: 48, x: 37}"
  class="overflow-button"
>
  <cds-overflow-menu-option
    [id]="'exportDocumentDefinition'"
    (selected)="export()"
    [disabled]="(loadingDefinition$ | async) || (exporting$ | async)"
    >{{
      'buildingBlockManagement.overflowMenu.export' | translate: {value: buildingBlockName$ | async}
    }}
  </cds-overflow-menu-option>
</cds-overflow-menu>

<ng-template #exportingMessage>
  <div class="exporting-message">
    <span class="cds--inline-notification__title">{{
      'buildingBlockManagement.overflowMenu.preparingDownload' | translate
    }}</span>

    <cds-loading size="sm"></cds-loading>
  </div>
</ng-template>
