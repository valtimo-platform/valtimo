<valtimo-carbon-list
  [fields]="FIELDS"
  [actionItems]="ACTION_ITEMS"
  [items]="formFlowDefinitionItems$ | async"
  [loading]="$loading()"
  (rowClicked)="onRowClick($event)"
>
  <div carbonToolbarContent>
    <ng-container [ngTemplateOutlet]="addFormFlowButton"></ng-container>
  </div>

  <valtimo-no-results
    [action]="addFormFlowButton"
    description="{{ 'formFlow.noResults.description' | translate }}"
    title="{{ 'formFlow.noResults.title' | translate }}"
  ></valtimo-no-results>
</valtimo-carbon-list>

<ng-template #addFormFlowButton>
  <button
    cdsButton="primary"
    (click)="onCreateClick()"
    [disabled]="(isFinal$ | async) || $loading()"
  >
    {{ 'formFlow.add' | translate }}

    <svg cdsIcon="add" size="16" class="cds--btn__icon"></svg>
  </button>
</ng-template>

<valtimo-new-form-flow-modal
  [open]="showCreateModal$ | async"
  (closeEvent)="onAdd($event)"
></valtimo-new-form-flow-modal>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="formFlow.deleteModalContent"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="interface.delete"
  (confirmEvent)="onDeleteConfirm()"
></valtimo-confirmation-modal>
