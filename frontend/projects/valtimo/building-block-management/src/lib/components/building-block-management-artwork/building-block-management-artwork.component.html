<form
  *ngIf="{
    artwork: artwork$ | async,
    loadingArtwork: loadingArtwork$ | async,
  } as obs"
  class="building-block-management-artwork"
  [formGroup]="formGroup"
  [cdsLayer]="1"
>
  <h4 class="building-block-management-artwork__title">
    {{ 'buildingBlockManagement.artwork.title' | translate }}
  </h4>

  @if (obs.loadingArtwork) {
    <div class="loading-container"><cds-loading></cds-loading></div>
  }

  @if (!obs.loadingArtwork && obs.artwork) {
    <div class="building-block-management-artwork__preview">
      <img
        class="building-block-management-artwork__image"
        [src]="'data:image/png;base64,' + obs.artwork.imageBase64"
      />
    </div>

    <div class="building-block-management-artwork__buttons">
      <button cdsButton="danger" (click)="onDelete()">
        {{ 'interface.delete' | translate }}

        <svg class="cds--btn__icon" cdsIcon="trash-can" size="16"></svg>
      </button>
    </div>
  }

  @if (!obs.loadingArtwork && !obs.artwork) {
    <cds-file-uploader
      *ngIf="!obs.loadingArtwork && !obs.artwork"
      [accept]="ACCEPTED_FILES"
      [multiple]="false"
      buttonType="primary"
      [title]="'buildingBlockManagement.artwork.fileUploaderTitle' | translate"
      [description]="'buildingBlockManagement.artwork.fileUploaderDescription' | translate"
      [buttonText]="'interface.upload' | translate"
      formControlName="file"
    >
    </cds-file-uploader>

    <div class="building-block-management-artwork__buttons">
      <button
        cdsButton="primary"
        [disabled]="formGroup.disabled || formGroup.invalid || formGroup.pristine"
        (click)="onSave()"
      >
        {{ 'interface.upload' | translate }}

        <svg class="cds--btn__icon" cdsIcon="upload" size="16"></svg>
      </button>
    </div>
  }
</form>
