<div
  class="building-block-actions"
  *ngIf="{
    isFinal: isFinal$ | async,
  } as obs"
  [ngClass]="{'--compact': obs.compactMode}"
>
  <div class="building-block-metadata">
    <valtimo-building-block-management-version-selector></valtimo-building-block-management-version-selector>
  </div>

  <div class="building-block-buttons">
    <cds-overflow-menu
      [customTrigger]="trigger"
      class="overflow-button"
      valtimoCdsOverflowButton
      [width]="250"
      [offset]="{y: 48, x: 37}"
    >
      <cds-overflow-menu-option
        *ngIf="!obs.isFinal"
        [disabled]="actionInProgress$ | async"
        (selected)="finalizeDraft()"
      >
        {{ 'buildingBlockManagement.actions.makeFinal' | translate }}
      </cds-overflow-menu-option>

      <cds-overflow-menu-option
        *ngIf="obs.isFinal"
        [disabled]="actionInProgress$ | async"
        (selected)="openDraftModal()"
      >
        {{ 'buildingBlockManagement.actions.createDraft' | translate }}
      </cds-overflow-menu-option>
    </cds-overflow-menu>
  </div>
</div>

<ng-template #trigger>
  <button cdsButton="tertiary">
    {{ 'buildingBlockManagement.actions.more' | translate }}
    <svg class="cds--btn__icon" cdsIcon="overflow-menu--vertical" size="16"></svg>
  </button>
</ng-template>

<cds-modal
  *ngIf="{open: showDraftModal$ | async} as obs"
  [open]="obs.open"
  showFooter="true"
  valtimoCdsModal
  (close)="closeDraftModal()"
>
  <cds-modal-header showCloseButton="true" (closeSelect)="closeDraftModal()">
    <h3 cdsModalHeaderHeading>
      {{ 'buildingBlockManagement.actions.draft.title' | translate }}
    </h3>
  </cds-modal-header>

  <form [formGroup]="draftForm" cdsModalContent class="bb-management-actions__modal" [cdsLayer]="1">
    <div class="cds--text-input__field-wrapper">
      <cds-label
        [disabled]="draftForm.disabled"
        [invalid]="versionTag.touched && versionTag.invalid"
      >
        <span class="label-with-tooltip select-label">
          {{ 'buildingBlockManagement.actions.draft.version' | translate }}
        </span>

        <input
          formControlName="versionTag"
          cdsText
          placeholder="{{ 'buildingBlockManagement.actions.draft.placeholder' | translate }}"
        />
      </cds-label>
    </div>
  </form>

  <cds-modal-footer>
    <button cdsButton="ghost" (click)="closeDraftModal()">
      {{ 'interface.cancel' | translate }}
    </button>

    <button
      cdsButton="primary"
      [disabled]="draftForm.invalid || (actionInProgress$ | async)"
      (click)="createDraft()"
    >
      {{ 'buildingBlockManagement.actions.draft.confirm' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
