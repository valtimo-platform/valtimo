<p class="plugin-external-permissions__description">
  {{ 'pluginManagement.permissions.description' | translate }}
</p>

<div
  *ngIf="_$enrichedEndpoints().length === 0"
  class="plugin-external-permissions__no-endpoints"
>
  {{ 'pluginManagement.permissions.noEndpoints' | translate }}
</div>

<div
  *ngFor="let endpoint of _$enrichedEndpoints()"
  class="plugin-external-permissions__endpoint"
  [attr.data-test-id]="'external-plugin-permission-' + endpoint.method + '-' + endpoint.pattern"
>
  <cds-checkbox
    [checked]="_$grantedState()[endpoint.method.toUpperCase() + ':' + endpoint.pattern]"
    (checkedChange)="onCheckboxChange(endpoint, $event)"
  >
    <span class="plugin-external-permissions__endpoint-label">
      <span class="plugin-external-permissions__method">{{ endpoint.method | uppercase }}</span>
      <code class="plugin-external-permissions__pattern">{{ endpoint.pattern }}</code>
    </span>
  </cds-checkbox>

  <p
    *ngIf="endpoint.description"
    class="plugin-external-permissions__endpoint-description"
  >
    {{ endpoint.description }}
  </p>
</div>
