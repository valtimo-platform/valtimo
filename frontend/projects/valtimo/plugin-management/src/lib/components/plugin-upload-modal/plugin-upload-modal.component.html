<cds-modal
  *ngIf="open"
  [open]="open"
  size="sm"
  valtimoCdsModal
>
  <cds-modal-header (closeSelect)="onClose()">
    <h3 cdsModalHeaderHeading>{{ 'pluginManagement.uploadPlugin' | translate }}</h3>
  </cds-modal-header>

  <section cdsModalContent [cdsLayer]="1">
    <cds-dropdown
      [appendInline]="true"
      [label]="'pluginManagement.labels.pluginHost' | translate"
      [placeholder]="'pluginManagement.selectHost' | translate"
      (selected)="onHostSelected($event)"
    >
      <cds-dropdown-list [items]="_$hostItems()"></cds-dropdown-list>
    </cds-dropdown>

    <div [formGroup]="_fileForm">
      <cds-file-uploader
        [accept]="['zip']"
        [buttonText]="'pluginManagement.upload.buttonText' | translate"
        [description]="'pluginManagement.upload.description' | translate"
        [disabled]="_$uploading()"
        [multiple]="false"
        [title]="'pluginManagement.upload.title' | translate"
        buttonType="primary"
        formControlName="file"
      >
      </cds-file-uploader>
    </div>
  </section>

  <cds-modal-footer>
    <button
      cdsButton="secondary"
      [disabled]="_$uploading()"
      (click)="onClose()"
    >
      {{ 'interface.cancel' | translate }}
    </button>

    <button
      cdsButton="primary"
      [disabled]="!_$selectedHostId() || (_fileSelected$ | async) === false || _$uploading()"
      (click)="onUpload()"
    >
      <cds-loading *ngIf="_$uploading()" [isActive]="true" size="sm"></cds-loading>
      {{ 'interface.upload' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
