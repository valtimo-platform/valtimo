<ng-container
  *ngIf="{
    pluginConfigurations: pluginConfigurations$ | async,
    loading: loading$ | async,
  } as obs"
>
  <valtimo-carbon-list
    [attr.data-test-id]="TEST_IDS.PLUGIN_MANAGEMENT_LIST"
    [actionItems]="actionItems"
    [loading]="obs.loading"
    [items]="obs.pluginConfigurations"
    [fields]="fields"
    [header]="false"
    (rowClicked)="editConfiguration($event)"
  >
    <ng-container carbonToolbarContent [ngTemplateOutlet]="configurePluginButton"></ng-container>

    <valtimo-no-results
      [attr.data-test-id]="TEST_IDS.PLUGIN_MANAGEMENT_NO_RESULTS"
      [action]="configurePluginButton"
      [title]="'pages.plugins.noResults' | translate"
    ></valtimo-no-results>
  </valtimo-carbon-list>

  <ng-template #configurePluginButton>
    <button cdsButton="primary" [disabled]="obs.loading" (click)="showAddModal()" [attr.data-test-id]="TEST_IDS.PLUGIN_MANAGEMENT_ADD_BUTTON">
      {{ 'pluginManagement.add' | translate }}

      <svg cdsIcon="add" size="16" class="cds--btn__icon"></svg>
    </button>
  </ng-template>
</ng-container>

<valtimo-plugin-add-modal
  [attr.data-test-id]="TEST_IDS.PLUGIN_MANAGEMENT_ADD_MODAL"
  [open]="showAddModal$ | async"
  (closeModal)="closeAddModal()"
></valtimo-plugin-add-modal>

<valtimo-plugin-edit-modal
  [attr.data-test-id]="TEST_IDS.PLUGIN_MANAGEMENT_EDIT_MODAL"
  [open]="showEditModal$ | async"
  [saveNewConfiguration]="saveNewConfiguration$ | async"
  (closeModal)="closeEditModal()"
></valtimo-plugin-edit-modal>
