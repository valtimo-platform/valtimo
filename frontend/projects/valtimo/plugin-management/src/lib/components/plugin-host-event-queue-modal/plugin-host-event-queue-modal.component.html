<cds-modal
  *ngIf="open && host"
  [open]="open"
  size="sm"
  valtimoCdsModal
>
  <cds-modal-header (closeSelect)="onClose()">
    <h3 cdsModalHeaderHeading>
      {{ 'pluginManagement.editHostEventQueueModalTitle' | translate: {name: host.name} }}
    </h3>
  </cds-modal-header>

  <form
    [formGroup]="form"
    cdsModalContent
    [cdsLayer]="1"
  >
    <v-select
      [appendInline]="false"
      [dropUp]="false"
      [items]="queueModeItems"
      [title]="'pluginManagement.labels.eventQueueMode' | translate"
      formControlName="eventQueueMode"
    ></v-select>

    <cds-label *ngIf="form.controls.eventQueueMode.value === 'DURABLE'">
      {{ 'pluginManagement.labels.eventQueueTtlMs' | translate }}
      <input
        cdsText
        formControlName="eventQueueTtlMs"
        [max]="maxTtlMs"
        [min]="minTtlMs"
        [placeholder]="defaultTtlMs"
        type="number"
      />
      <small>{{ 'pluginManagement.hints.eventQueueTtlMs' | translate }}</small>
    </cds-label>
  </form>

  <cds-modal-footer>
    <button cdsButton="secondary" (click)="onClose()">
      {{ 'interface.cancel' | translate }}
    </button>

    <button cdsButton="primary" [disabled]="form.invalid" (click)="onSubmit()">
      {{ 'pluginManagement.saveEventQueue' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
