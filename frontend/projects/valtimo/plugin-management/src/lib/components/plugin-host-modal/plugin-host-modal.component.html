<cds-modal
  *ngIf="open"
  [open]="open"
  size="sm"
  valtimoCdsModal
>
  <cds-modal-header (closeSelect)="onClose()">
    <h3 cdsModalHeaderHeading>{{ 'pluginManagement.addHost' | translate }}</h3>
  </cds-modal-header>

  <section cdsModalContent>
    <form [formGroup]="form">
      <div class="cds--form-item">
        <label class="cds--label">{{ 'pluginManagement.labels.name' | translate }}</label>
        <input class="cds--text-input" formControlName="name" placeholder="my-plugin-host" />
      </div>

      <div class="cds--form-item">
        <label class="cds--label">{{ 'pluginManagement.labels.baseUrl' | translate }}</label>
        <input class="cds--text-input" formControlName="baseUrl" placeholder="https://plugin-host.internal:8090" />
      </div>

      <div class="cds--form-item">
        <label class="cds--label">{{ 'pluginManagement.labels.secret' | translate }}</label>
        <input class="cds--text-input" formControlName="secret" placeholder="admin-token" />
      </div>
    </form>
  </section>

  <cds-modal-footer>
    <button
      cdsButton="secondary"
      (click)="onClose()"
    >
      {{ 'interface.cancel' | translate }}
    </button>

    <button
      cdsButton="primary"
      [disabled]="form.invalid"
      (click)="onSubmit()"
    >
      {{ 'interface.save' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
