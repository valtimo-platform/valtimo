<valtimo-carbon-list
  [actionItems]="ACTION_ITEMS"
  [header]="false"
  [items]="formFlowDefinitions$ | async"
  [fields]="FIELDS"
  [loading]="loading$ | async"
  (rowClicked)="editFormFlowDetails($event)"
  [attr.data-test-id]="TEST_IDS.FORM_FLOW_LIST"
>
  <ng-container header> {{ 'formFlow.title' | translate }} </ng-container>

  <div carbonToolbarContent>
    <ng-container [ngTemplateOutlet]="addFormFlowButton"></ng-container>
  </div>

  <valtimo-no-results
    [action]="addFormFlowButton"
    description="{{ 'formFlow.noResults.description' | translate }}"
    title="{{ 'formFlow.noResults.title' | translate }}"
    [attr.data-test-id]="TEST_IDS.FORM_FLOW_NO_RESULTS"
  ></valtimo-no-results>
</valtimo-carbon-list>

<valtimo-new-form-flow-modal
  [open]="showAddModal$ | async"
  (closeEvent)="onAdd($event)"
  [attr.data-test-id]="TEST_IDS.FORM_FLOW_NEW_MODAL"
></valtimo-new-form-flow-modal>

<ng-template #addFormFlowButton>
  <button *ngIf="hasEditPermissions$ | async" cdsButton="primary" (click)="openAddModal()" [attr.data-test-id]="TEST_IDS.FORM_FLOW_ADD_BUTTON">
    {{ 'formFlow.add' | translate }}

    <svg class="cds--btn__icon" cdsIcon="add" size="16"></svg>
  </button>
</ng-template>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="formFlow.deleteModalContent"
  [outputOnConfirm]="deleteDefinitionKey$ | async"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="interface.delete"
  (confirmEvent)="onDelete($event)"
  [attr.data-test-id]="TEST_IDS.FORM_FLOW_CONFIRMATION_MODAL"
></valtimo-confirmation-modal>
