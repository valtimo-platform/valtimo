<cds-modal
  [open]="open"
  showFooter="true"
  [title]="'formFlow.add' | translate"
  valtimoCdsModal
  (close)="onCancel()"
  [attr.data-test-id]="TEST_IDS.FORM_FLOW_MODAL"
>
  <cds-modal-header [showCloseButton]="true" (closeSelect)="onCancel()" [attr.data-test-id]="TEST_IDS.FORM_FLOW_MODAL_HEADER">
    <h3 cdsModalHeaderHeading [attr.data-test-id]="TEST_IDS.FORM_FLOW_MODAL_TITLE">
      {{ 'formFlow.add' | translate }}
    </h3>
  </cds-modal-header>

  <section cdsModalContent [attr.data-test-id]="TEST_IDS.FORM_FLOW_MODAL_CONTENT">
    <form [formGroup]="form">
      <cds-label [invalid]="key.dirty && key.invalid" [attr.data-test-id]="TEST_IDS.FORM_FLOW_MODAL_KEY_LABEL">
        {{ 'formFlow.key' | translate }}

        <input
          formControlName="key"
          cdsText
          placeholder="{{ 'formFlow.key' | translate }}"
          [attr.modal-primary-focus]="true"
          [invalid]="key.dirty && key.invalid"
          [attr.data-test-id]="TEST_IDS.FORM_FLOW_MODAL_KEY_INPUT"
        />
      </cds-label>
    </form>
  </section>

  <cds-modal-footer [attr.data-test-id]="TEST_IDS.FORM_FLOW_MODAL_FOOTER">
    <button cdsButton="ghost" (click)="onCancel()" [attr.data-test-id]="TEST_IDS.FORM_FLOW_MODAL_CANCEL_BUTTON">
      {{ 'interface.cancel' | translate }}
    </button>

    <button [disabled]="this.form.invalid" (click)="onConfirm()" cdsButton="primary" [attr.data-test-id]="TEST_IDS.FORM_FLOW_MODAL_CREATE_BUTTON">
      {{ 'interface.create' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
