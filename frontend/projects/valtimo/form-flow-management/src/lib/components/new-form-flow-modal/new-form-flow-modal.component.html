<cds-modal
  [open]="open"
  showFooter="true"
  [title]="'formFlow.add' | translate"
  valtimoCdsModal
  (close)="onCancel()"
  data-test-id="form-flow-modal"
>
  <cds-modal-header [showCloseButton]="true" (closeSelect)="onCancel()" data-test-id="form-flow-modal-header">
    <h3 cdsModalHeaderHeading data-test-id="form-flow-modal-title">
      {{ 'formFlow.add' | translate }}
    </h3>
  </cds-modal-header>

  <section cdsModalContent data-test-id="form-flow-modal-content">
    <form [formGroup]="form">
      <cds-label [invalid]="key.dirty && key.invalid" data-test-id="form-flow-modal-key-label">
        {{ 'formFlow.key' | translate }}

        <input
          formControlName="key"
          cdsText
          placeholder="{{ 'formFlow.key' | translate }}"
          [attr.modal-primary-focus]="true"
          [invalid]="key.dirty && key.invalid"
          data-test-id="form-flow-modal-key-input"
        />
      </cds-label>
    </form>
  </section>

  <cds-modal-footer data-test-id="form-flow-modal-footer">
    <button cdsButton="ghost" (click)="onCancel()" data-test-id="form-flow-modal-cancel-button">
      {{ 'interface.cancel' | translate }}
    </button>

    <button [disabled]="this.form.invalid" (click)="onConfirm()" cdsButton="primary" data-test-id="form-flow-modal-create-button">
      {{ 'interface.create' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
