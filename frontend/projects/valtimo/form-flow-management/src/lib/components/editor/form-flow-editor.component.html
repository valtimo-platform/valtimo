@if (model$ | async; as model) {
  <valtimo-editor
    [disabled]="(loading$ | async) === false && readOnly$ | async"
    [model]="model"
    [jsonSchema]="formFlowSchemaJson"
    (validEvent)="onValid($event)"
    (valueChangeEvent)="onValueChange($event)"
    [fitPage]="true"
  ></valtimo-editor>
} @else {
  <cds-loading></cds-loading>
}

<ng-container renderInPageHeader>
  <ng-template>
    <div
      *ngIf="{
        compactMode: compactMode$ | async,
        valid: valid$ | async,
        readOnly: readOnly$ | async,
        model: model$ | async,
      } as obs"
      class="buttons-container"
    >
      <cds-overflow-menu>
        <cds-overflow-menu-option
          [disabled]="!obs.valid && !obs.readOnly"
          (selected)="downloadFormFlowDefinition(obs.model)"
          >{{ 'interface.export' | translate }}
        </cds-overflow-menu-option>

        <cds-overflow-menu-option
          [disabled]="obs.readOnly"
          type="danger"
          (selected)="showDeleteModal()"
          >{{ 'interface.delete' | translate }}
        </cds-overflow-menu-option>
      </cds-overflow-menu>

      <button
        cdsButton="secondary"
        [size]="obs.compactMode ? 'sm' : 'md'"
        (click)="navigateBack()"
      >
        {{ 'interface.back' | translate }}

        <svg class="cds--btn__icon" cdsIcon="arrow--left" size="16"></svg>
      </button>

      <button
        [disabled]="!obs.valid || obs.readOnly"
        cdsButton="primary"
        [size]="obs.compactMode ? 'sm' : 'md'"
        (click)="updateFormFlowDefinition()"
      >
        {{ 'interface.save' | translate }}

        <svg class="cds--btn__icon" cdsIcon="save" size="16"></svg>
      </button>
    </div>
  </ng-template>
</ng-container>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="formFlow.deleteModalContent"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="interface.delete"
  (confirmEvent)="onDelete()"
></valtimo-confirmation-modal>
