@if (selectedLabel) {
  <p>selected: {{ selectedLabel }}</p>
  <div class="iko-search-formio__footer">
    <button cdsButton="tertiary" size="sm" (click)="backToList()">
      {{ 'iko.formio.back' | translate }}
    </button>
  </div>
} @else if (searchParams) {
  <valtimo-iko-list
    [ikoViewKey]="ikoViewKey"
    [searchParams]="searchParams"
    (rowSelected)="onRowSelected($event)"
  ></valtimo-iko-list>
  <div class="iko-search-formio__footer">
    <button cdsButton="tertiary" size="sm" (click)="backToSearch()">
      {{ 'iko.formio.back' | translate }}
    </button>
  </div>
} @else {
  <valtimo-iko-search
    [ikoViewKey]="ikoViewKey"
    [searchTitle]="label"
    [embedded]="true"
    (searchSubmit)="onSearchSubmit($event)"
  ></valtimo-iko-search>
}
