<ng-container
  *ngIf="{tabs: tabs$ | async, activeTabKey: activeTabKey$ | async} as obs"
  renderInPageHeader
>
  <ng-template>
    <cds-tabs>
      @for (tab of obs.tabs; track tab.key) {
        <cds-tab
          [active]="obs.activeTabKey === tab.key"
          [heading]="tab.title"
          (selected)="onTabSelected(tab)"
        >
        </cds-tab>
      }
    </cds-tabs>
  </ng-template>
</ng-container>

<ng-container #content></ng-container>
