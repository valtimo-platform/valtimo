<cds-modal
  valtimoCdsModal
  [open]="$isOpen()"
  size="sm"
  showFooter="true"
  [title]="'ikoManagement.searchActions.' + $modalType() + 'ActionTitle' | translate"
  (close)="onCancel()"
>
  <cds-modal-header [showCloseButton]="true" (closeSelect)="onCancel()">
    <h3 cdsModalHeaderHeading>
      {{ 'ikoManagement.searchActions.' + $modalType() + 'ActionTitle' | translate }}
    </h3>
  </cds-modal-header>

  <form cdsModalContent [formGroup]="formGroup">
    <cds-label>
      {{ 'interface.title' | translate }}

      <input
        formControlName="title"
        cdsText
        cdsLayer
        placeholder="{{ 'interface.title' | translate }}"
        [attr.modal-primary-focus]="true"
      />
    </cds-label>

    <cds-label>
      {{ 'interface.key' | translate }}

      <input
        formControlName="key"
        cdsText
        cdsLayer
        placeholder="{{ 'interface.key' | translate }}"
        [attr.modal-primary-focus]="true"
      />
    </cds-label>
  </form>

  <cds-modal-footer>
    <button cdsButton="ghost" (click)="onCancel()">
      {{ 'interface.cancel' | translate }}
    </button>

    <button cdsButton="primary" [disabled]="formGroup.invalid" (click)="onSave()">
      {{ 'interface.save' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
