<cds-modal
  valtimoCdsModal
  *ngIf="{
    title:
      (modalMode === 'add' ? 'ikoManagement.addColumn' : 'ikoManagement.editColumn') | translate,
  } as state"
  [open]="$openModal()"
  [title]="state.title"
  (close)="closeModal()"
>
  <cds-modal-header [showCloseButton]="true" (closeSelect)="closeModal()">
    <h3 cdsModalHeaderHeading>
      {{ state.title }}
    </h3>
  </cds-modal-header>

  <form cdsModalContent [cdsLayer]="1" [formGroup]="form" class="iko-column-form">
    <cds-label>
      {{ 'ikoManagement.titleTitle' | translate }}

      <input
        [mode]="modalMode"
        [invalid]="title.dirty && title.invalid"
        formControlName="title"
        cdsText
        placeholder="{{ 'ikoManagement.columnTitlePlaceholder' | translate }}"
        data-test-id="iko-column-form-title-input"
      />
    </cds-label>

    <valtimo-auto-key-input
      [mode]="modalMode"
      [usedKeys]="usedKeys$ | async"
      [sourceText]="title.value"
      formControlName="key"
      placeholderTranslationKey="ikoManagement.columnKeyPlaceholder"
      data-test-id="iko-column-form-key-input"
    >
    </valtimo-auto-key-input>

    <cds-label>
      {{ 'ikoManagement.pathTitle' | translate }}

      <input
        [invalid]="path.dirty && path.invalid"
        formControlName="path"
        cdsText
        placeholder="{{ 'ikoManagement.columnPathPlaceholder' | translate }}"
        data-test-id="iko-column-form-path-input"
      />
    </cds-label>

    <cds-toggle
      formControlName="sortable"
      [label]="'ikoManagement.sortableTitle' | translate"
      [onText]="'ikoManagement.sortingEnabled' | translate"
      [offText]="'ikoManagement.sortingDisabled' | translate"
      data-test-id="iko-column-form-sortable-toggle"
    ></cds-toggle>

    <v-select
      [invalid]="defaultSort.dirty && defaultSort.invalid"
      formControlName="defaultSort"
      [items]="sortSelectItems"
      titleTranslationKey="ikoManagement.defaultSortTitle"
      [appendInline]="false"
      data-test-id="iko-column-form-default-sort-select"
    ></v-select>

    <v-select
      [invalid]="displayType.dirty && displayType.invalid"
      formControlName="displayType"
      [items]="displayTypeSelectItems"
      titleTranslationKey="ikoManagement.displayType"
      [appendInline]="false"
      data-test-id="iko-column-form-display-type-select"
    ></v-select>

    <v-input-label
      *ngIf="isDateDisplayType$ | async"
      titleTranslationKey="listColumn.dateFormat"
      tooltipTranslationKey="listColumn.dateFormatTooltip"
    >
      <input cdsText formControlName="dateFormat" data-test-id="iko-column-form-date-format-input" />
    </v-input-label>

    <v-input-label
      *ngIf="isBooleanDisplayType$ | async"
      titleTranslationKey="listColumn.enumTitleOptional"
      tooltipTranslationKey="listColumn.enumTooltipOptional"
    >
      <valtimo-carbon-multi-input
        type="keyValue"
        formControlName="booleanDisplayTypeParameters"
        [hideAddButton]="true"
        [hideDeleteButton]="true"
        [maxRows]="1"
        [keyColumnTitle]="'viewTypeConverter.Yes' | translate"
        [valueColumnTitle]="'viewTypeConverter.No' | translate"
        data-test-id="iko-column-form-boolean-display-type-parameters-input"
      ></valtimo-carbon-multi-input>
    </v-input-label>

    <v-input-label
      *ngIf="isEnumDisplayType$ | async"
      titleTranslationKey="listColumn.enumTitle"
      tooltipTranslationKey="listColumn.enumTooltip"
    >
      <valtimo-carbon-multi-input
        type="keyValue"
        formControlName="enumDisplayTypeParameters"
        data-test-id="iko-column-form-enum-display-type-parameters-input"
      ></valtimo-carbon-multi-input>
    </v-input-label>

    <v-input-label
      *ngIf="isTagsDisplayType$ | async"
      titleTranslationKey="listColumn.tagAmount"
      tooltipTranslationKey="listColumn.tagAmountTooltip"
    >
      <cds-number formControlName="tagAmount" [min]="1" [step]="1" data-test-id="iko-column-form-tag-amount-input"></cds-number>
    </v-input-label>
  </form>

  <cds-modal-footer>
    <button cdsButton="ghost" (click)="closeModal()" data-test-id="iko-column-form-cancel-button">
      {{ 'interface.cancel' | translate }}
    </button>

    <button
      [disabled]="form.invalid || form.disabled || !form.dirty"
      cdsButton="primary"
      (click)="addColumn()"
      data-test-id="iko-column-form-save-button"
    >
      {{ 'interface.save' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
