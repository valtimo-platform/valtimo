<cds-modal
        (close)="closeModal()"
        *ngIf="{
    title: (modalMode === 'add' ? 'ikoManagement.addTab' : 'ikoManagement.editTab') | translate,
  } as state"
        [open]="$openModal()"
        [title]="state.title"
        valtimoCdsModal
>
  <cds-modal-header [showCloseButton]="true" (closeSelect)="closeModal()">
    <h3 cdsModalHeaderHeading>
      {{ state.title }}
    </h3>
  </cds-modal-header>

  <form cdsModalContent [cdsLayer]="1" [formGroup]="form" class="iko-tab-form">
    <cds-label>
      {{ 'ikoManagement.tabTitle' | translate }}

      <input
        [invalid]="title.dirty && title.invalid"
        formControlName="title"
        cdsText
        placeholder="{{ 'ikoManagement.tabTitlePlaceholder' | translate }}"
      />
    </cds-label>

    <valtimo-auto-key-input
      formControlName="key"
      labelTranslationKey="ikoManagement.keyTitle"
      placeholderTranslationKey="ikoManagement.tabKeyPlaceholder"
      [usedKeys]="usedKeys"
      [sourceText]="modalMode === 'edit' ? $selectedKey() : title.value"
      [mode]="modalMode"
    >
    </valtimo-auto-key-input>

    <v-select
      [invalid]="type.dirty && type.invalid"
      [dropUp]="false"
      formControlName="type"
      [items]="tabTypeSelectItems"
      titleTranslationKey="ikoManagement.tabTypeTitle"
      [appendInline]="false"
    ></v-select>
  </form>

  <cds-modal-footer>
    <button cdsButton="ghost" (click)="closeModal()">
      {{ 'interface.cancel' | translate }}
    </button>

    <button
      [disabled]="form.invalid || form.disabled || !form.dirty"
      cdsButton="primary"
      (click)="addTab()"
    >
      {{ 'interface.save' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
