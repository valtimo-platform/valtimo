<cds-modal
  (close)="closeModal()"
  *ngIf="{
    title: (modalMode === 'add' ? 'ikoManagement.addTab' : 'ikoManagement.editTab') | translate,
  } as state"
  [open]="$openModal()"
  [title]="state.title"
  valtimoCdsModal
>
  <cds-modal-header [showCloseButton]="true" (closeSelect)="closeModal()" [attr.data-test-id]="TEST_IDS.IKO_TAB_MODAL_HEADER">
    <h3 cdsModalHeaderHeading [attr.data-test-id]="TEST_IDS.IKO_TAB_MODAL_TITLE">
      {{ state.title }}
    </h3>
  </cds-modal-header>

  <form cdsModalContent [cdsLayer]="1" [formGroup]="form" class="iko-tab-form" [attr.data-test-id]="TEST_IDS.IKO_TAB_MODAL_FORM">
    <cds-label [attr.data-test-id]="TEST_IDS.IKO_TAB_MODAL_TITLE_LABEL">
      {{ 'ikoManagement.tabTitle' | translate }}

      <input
        [invalid]="title.dirty && title.invalid"
        formControlName="title"
        cdsText
        placeholder="{{ 'ikoManagement.tabTitlePlaceholder' | translate }}"
        [attr.data-test-id]="TEST_IDS.IKO_TAB_MODAL_TITLE_INPUT"
      />
    </cds-label>

    <valtimo-auto-key-input
      formControlName="key"
      labelTranslationKey="ikoManagement.keyTitle"
      placeholderTranslationKey="ikoManagement.tabKeyPlaceholder"
      [usedKeys]="usedKeys"
      [sourceText]="modalMode === 'edit' ? $selectedKey() : title.value"
      [mode]="modalMode"
      [attr.data-test-id]="TEST_IDS.IKO_TAB_MODAL_KEY_INPUT"
    >
    </valtimo-auto-key-input>

    <v-select
      [invalid]="type.dirty && type.invalid"
      [dropUp]="false"
      formControlName="type"
      [items]="tabTypeSelectItems"
      titleTranslationKey="ikoManagement.tabTypeTitle"
      [appendInline]="false"
      [attr.data-test-id]="TEST_IDS.IKO_TAB_MODAL_TYPE_SELECT"
    ></v-select>

    <valtimo-iko-management-properties
      [propertiesFormGroup]="properties"
      [fields]="propertyFields$ | async"
      [prefillData]="properties?.value"
    />
  </form>

  <cds-modal-footer [attr.data-test-id]="TEST_IDS.IKO_TAB_MODAL_FOOTER">
    <button cdsButton="ghost" (click)="closeModal()" [attr.data-test-id]="TEST_IDS.IKO_TAB_MODAL_CANCEL_BUTTON">
      {{ 'interface.cancel' | translate }}
    </button>

    <button
      [disabled]="form.invalid || form.disabled || !form.dirty"
      cdsButton="primary"
      (click)="addTab()"
      [attr.data-test-id]="TEST_IDS.IKO_TAB_MODAL_SAVE_BUTTON"
    >
      {{ 'interface.save' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
