@if (aggregateKey$ | async; as aggregateKey) {
  <valtimo-carbon-list
    [actionItems]="ACTION_ITEMS"
    [dragAndDrop]="true"
    [fields]="FIELDS"
    [items]="searchActions$ | async"
    [loading]="loading$ | async"
    (itemsReordered)="onItemsReordered($event, aggregateKey)"
    (rowClicked)="onSearchActionClick($event)"
  >
    <div carbonToolbarContent>
      <ng-container [ngTemplateOutlet]="exportButton"></ng-container>
      <ng-container [ngTemplateOutlet]="addActionButton"></ng-container>
    </div>

    <valtimo-no-results
      [action]="addActionButton"
      [description]="'ikoManagement.searchActions.noResultsDescription' | translate"
      [title]="'ikoManagement.searchActions.noResultsTitle' | translate"
    ></valtimo-no-results>
  </valtimo-carbon-list>

  <valtimo-iko-management-search-action-modal
    [usedKeys]="usedKeys$ | async"
    [modalMode]="$modalMode()"
    [repositoryKey]="repositoryKey$ | async"
    [aggregateKey]="aggregateKey"
    [open]="actionModalOpen$ | async"
    [prefillData]="prefillData$ | async"
    (modalClose)="onModalClose($event)"
  ></valtimo-iko-management-search-action-modal>

  <valtimo-confirmation-modal
    confirmButtonTextTranslationKey="interface.delete"
    confirmButtonType="danger"
    contentTranslationKey="ikoManagement.searchActions.deleteModalText"
    [outputOnConfirm]="deleteSearchActionKey$ | async"
    [showModalSubject$]="deleteModalOpen$"
    titleTranslationKey="interface.delete"
    (confirmEvent)="onDeleteSearchAction($event)"
  ></valtimo-confirmation-modal>

  <ng-template #exportButton>
    <button [iconOnly]="true" cdsButton="ghost" (click)="exportConfiguration()">
      <svg cdsIcon="download" size="16"></svg>
    </button>
  </ng-template>

  <ng-template #addActionButton>
    <button
      cdsButton="primary"
      [attr.data-test-id]="testIds.addActionButton"
      (click)="openAddModal()"
    >
      {{ 'ikoManagement.searchActions.addActionTitle' | translate }}

      <svg class="cds--btn__icon" cdsIcon="add" size="16"></svg>
    </button>
  </ng-template>

  <ng-template #exportingMessage>
    <div class="exporting-message">
      <span class="cds--inline-notification__title">{{
        'ikoManagement.preparingDownload' | translate
      }}</span>

      <cds-loading size="sm"></cds-loading>
    </div>
  </ng-template>
}
