@if (dataRequests$ | async; as dataRequests) {
  @if (dataRequests.length === 0) {
    <valtimo-no-results [title]="'iko.searchFieldsNoResults' | translate"></valtimo-no-results>
  } @else {
    <h4>{{ 'iko.searchVia' | translate }}</h4>

    <cds-tabs class="iko-search-tabs" type="line">
      @for (param of dataRequests; track param.key ?? param.fields?.[0]?.key) {
        <cds-tab class="query-group" [heading]="param.title" [cdsLayer]="1">
          <div class="query-group__row">
            @for (field of param.searchFields; track field.key) {
              <div class="query-group__field">
                <ng-container
                  class="query-group__field"
                  *ngTemplateOutlet="searchFieldTemplate; context: {searchField: field}"
                ></ng-container>
              </div>
            }
          </div>

          <button
            cdsButton="primary"
            class="query-group__search-button"
            [disabled]="searchDisabled(param.searchFields)"
            (click)="searchGroup(param.key, param.searchFields)"
          >
            {{ 'searchFields.searchButtonText' | translate }}
            <svg cdsIcon="search" size="16"></svg>
          </button>
        </cds-tab>
      }
    </cds-tabs>
  }
}

<ng-template #searchFieldTemplate let-searchField="searchField">
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateText; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateTextRange; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateNumber; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateNumberRange; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateBoolean; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateBooleanRange; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateDate; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateDateRange; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateTime; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateTimeRange; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateDateTime; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateDateTimeRange; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateSingleSelectDropdown; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateMultiSelectDropdown; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateBsn; context: {searchField: searchField}"
  ></ng-container>
  <ng-container
    *ngTemplateOutlet="searchFieldTemplateBsnRange; context: {searchField: searchField}"
  >
  </ng-container>
</ng-template>

<ng-template #searchFieldTemplateText let-searchField="searchField">
  <v-input-label [title]="searchField.title"></v-input-label>
  <v-input
    *ngIf="searchField.dataType === 'text' && searchField.fieldType === 'single'"
    [placeholder]="'searchFields.textPlaceholder' | translate"
    [dataTestId]="'iko-search-field-' + searchField.key"
    [name]="searchField.key"
    [fullWidth]="true"
    [(ngModel)]="formValues[searchField.key]"
    ngDefaultControl
  ></v-input>
</ng-template>

<ng-template #searchFieldTemplateTextRange let-searchField="searchField">
  <ng-container *ngIf="searchField.dataType === 'text' && searchField.fieldType === 'range'">
    <v-form class="multiple-search-fields">
      <v-input
        name="start"
        [fullWidth]="true"
        [placeholder]="'searchFields.textPlaceholder' | translate"
        [(ngModel)]="formValues[searchField.key + '_start']"
        ngDefaultControl
      ></v-input>

      <ng-container *ngTemplateOutlet="toText"></ng-container>

      <v-input
        name="end"
        [fullWidth]="true"
        [placeholder]="'searchFields.textPlaceholder' | translate"
        [(ngModel)]="formValues[searchField.key + '_end']"
        ngDefaultControl
      ></v-input>
    </v-form>
  </ng-container>
</ng-template>

<ng-template #searchFieldTemplateNumber let-searchField="searchField">
  <v-input
    *ngIf="searchField.dataType === 'number' && searchField.fieldType === 'single'"
    type="number"
    [dataTestId]="'iko-search-field-' + searchField.key"
    [placeholder]="'searchFields.numberPlaceholder' | translate"
    [name]="searchField.key"
    [hideNumberSpinBox]="true"
    [(ngModel)]="formValues[searchField.key]"
    ngDefaultControl
  ></v-input>
</ng-template>

<ng-template #searchFieldTemplateNumberRange let-searchField="searchField">
  <ng-container *ngIf="searchField.dataType === 'number' && searchField.fieldType === 'range'">
    <v-form class="multiple-search-fields">
      <v-input
        name="start"
        type="number"
        [hideNumberSpinBox]="true"
        [fullWidth]="true"
        [placeholder]="'searchFields.numberPlaceholder' | translate"
        [(ngModel)]="formValues[searchField.key + '_start']"
        ngDefaultControl
      ></v-input>

      <ng-container *ngTemplateOutlet="toText"></ng-container>

      <v-input
        name="end"
        type="number"
        [hideNumberSpinBox]="true"
        [fullWidth]="true"
        [placeholder]="'searchFields.numberPlaceholder' | translate"
        [(ngModel)]="formValues[searchField.key + '_end']"
        ngDefaultControl
      ></v-input>
    </v-form>
  </ng-container>
</ng-template>

<ng-template #searchFieldTemplateBoolean let-searchField="searchField">
  <ng-container *ngIf="searchField.dataType === 'boolean' && searchField.fieldType === 'single'">
    <v-select
      [items]="booleanItems"
      [name]="searchField.key"
      [(ngModel)]="formValues[searchField.key]"
      ngDefaultControl
    ></v-select>
  </ng-container>
</ng-template>

<ng-template #searchFieldTemplateBooleanRange let-searchField="searchField">
  <ng-container *ngIf="searchField.dataType === 'boolean' && searchField.fieldType === 'range'">
    <v-form class="multiple-search-fields">
      <v-select
        name="start"
        [items]="booleanItems"
        [(ngModel)]="formValues[searchField.key + '_start']"
        ngDefaultControl
      ></v-select>

      <ng-container *ngTemplateOutlet="toText"></ng-container>

      <v-select
        name="end"
        [items]="booleanItems"
        [(ngModel)]="formValues[searchField.key + '_end']"
        ngDefaultControl
      ></v-select>
    </v-form>
  </ng-container>
</ng-template>

<ng-template #searchFieldTemplateTime let-searchField="searchField">
  <cds-timepicker
    *ngIf="searchField.dataType === 'time' && searchField.fieldType === 'single'"
    [placeholder]="'searchFields.timePlaceholder' | translate"
    [(ngModel)]="formValues[searchField.key]"
    ngDefaultControl
  ></cds-timepicker>
</ng-template>

<ng-template #searchFieldTemplateTimeRange let-searchField="searchField">
  <ng-container *ngIf="searchField.dataType === 'time' && searchField.fieldType === 'range'">
    <v-form class="multiple-search-fields">
      <cds-timepicker
        [placeholder]="'searchFields.timePlaceholder' | translate"
        [(ngModel)]="formValues[searchField.key + '_start']"
        ngDefaultControl
      ></cds-timepicker>

      <ng-container *ngTemplateOutlet="toText"></ng-container>

      <cds-timepicker
        [placeholder]="'searchFields.timePlaceholder' | translate"
        [(ngModel)]="formValues[searchField.key + '_end']"
        ngDefaultControl
      ></cds-timepicker>
    </v-form>
  </ng-container>
</ng-template>

<ng-template #searchFieldTemplateDate let-searchField="searchField">
  <v-date-picker
    *ngIf="searchField.dataType === 'date' && searchField.fieldType === 'single'"
    [placeholder]="'searchFields.datePlaceholder' | translate"
    [(ngModel)]="formValues[searchField.key]"
    ngDefaultControl
  ></v-date-picker>
</ng-template>

<ng-template #searchFieldTemplateDateRange let-searchField="searchField">
  <ng-container *ngIf="searchField.dataType === 'date' && searchField.fieldType === 'range'">
    <v-form class="multiple-search-fields">
      <v-date-picker
        name="start"
        [placeholder]="'searchFields.datePlaceholder' | translate"
        [(ngModel)]="formValues[searchField.key]"
        ngDefaultControl
      ></v-date-picker>

      <ng-container *ngTemplateOutlet="toText"></ng-container>

      <v-date-picker
        name="end"
        [placeholder]="'searchFields.datePlaceholder' | translate"
        [(ngModel)]="formValues[searchField.key + '_end']"
        ngDefaultControl
      ></v-date-picker>
    </v-form>
  </ng-container>
</ng-template>

<ng-template #searchFieldTemplateDateTime let-searchField="searchField">
  <ng-container *ngIf="searchField.dataType === 'datetime' && searchField.fieldType === 'single'">
  </ng-container>
</ng-template>

<ng-template #searchFieldTemplateDateTimeRange let-searchField="searchField">
  <ng-container *ngIf="searchField.dataType === 'datetime' && searchField.fieldType === 'range'">
  </ng-container>
</ng-template>

<ng-template #searchFieldTemplateSingleSelectDropdown let-searchField="searchField">
  <ng-container
    *ngIf="
      searchField.dataType === 'text' &&
      (searchField.fieldType === 'single-select-dropdown' ||
        searchField.fieldType === 'single_select_dropdown')
    "
  >
    <v-select
      *ngIf="dropdownSelectItemsMap[searchField.key] as searchFieldSelectItems"
      [items]="searchFieldSelectItems"
      [(ngModel)]="formValues[searchField.key]"
      [disabled]="inputDisabled"
    ></v-select>
  </ng-container>
</ng-template>

<ng-template #searchFieldTemplateMultiSelectDropdown let-searchField="searchField">
  <ng-container
    *ngIf="
      searchField.dataType === 'text' &&
      (searchField.fieldType === 'multi-select-dropdown' ||
        searchField.fieldType === 'multi_select_dropdown')
    "
  >
    <v-select
      *ngIf="dropdownSelectItemsMap[searchField.key] as searchFieldSelectItems"
      [items]="searchFieldSelectItems"
      [multiple]="true"
      [(ngModel)]="formValues[searchField.key]"
      ngDefaultControl
    ></v-select>
  </ng-container>
</ng-template>

<ng-template #searchFieldTemplateBsn let-searchField="searchField">
  <v-input
    *ngIf="searchField.dataType === 'bsn' && searchField.fieldType === 'single'"
    [dataTestId]="'iko-search-field-' + searchField.key"
    [name]="searchField.key"
    [placeholder]="'searchFields.bsnPlaceholder' | translate"
    [(ngModel)]="formValues[searchField.key]"
    [errorKey]="bsnErrorKey"
    ngDefaultControl
  ></v-input>
</ng-template>

<ng-template #toText>
  <div class="to-text">
    <v-paragraph>{{ 'searchFields.to' | translate }}</v-paragraph>
  </div>
</ng-template>

<ng-template #searchFieldTemplateBsnRange let-searchField="searchField">
  <ng-container *ngIf="searchField.dataType === 'bsn' && searchField.fieldType === 'range'">
    <v-form class="multiple-search-fields">
      <v-input
        name="start"
        [placeholder]="'searchFields.bsnPlaceholder' | translate"
        [dataTestId]="'iko-search-field-' + searchField.key + '-start'"
        [(ngModel)]="formValues[searchField.key + '_start']"
        [errorKey]="bsnErrorKey"
        ngDefaultControl
      ></v-input>

      <ng-container *ngTemplateOutlet="toText"></ng-container>

      <v-input
        name="end"
        [placeholder]="'searchFields.bsnPlaceholder' | translate"
        [dataTestId]="'iko-search-field-' + searchField.key + '-end'"
        [(ngModel)]="formValues[searchField.key + '_end']"
        [errorKey]="bsnErrorKey"
        ngDefaultControl
      ></v-input>
    </v-form>
  </ng-container>
</ng-template>
