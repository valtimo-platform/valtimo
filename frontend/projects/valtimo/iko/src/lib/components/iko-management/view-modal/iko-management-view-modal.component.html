<cds-modal valtimoCdsModal [open]="open$ | async" size="sm" showFooter="true" (close)="onCancel()" [attr.data-test-id]="TEST_IDS.IKO_MANAGEMENT_MODAL">
  <cds-modal-header [showCloseButton]="true" (closeSelect)="onCancel()" [attr.data-test-id]="TEST_IDS.IKO_MANAGEMENT_MODAL_HEADER">
    <h3 cdsModalHeaderHeading [attr.data-test-id]="TEST_IDS.IKO_MANAGEMENT_MODAL_TITLE">
      {{ 'ikoManagement.views.' + modalMode | translate }}
    </h3>
  </cds-modal-header>

  <form [formGroup]="formGroup" cdsModalContent [attr.data-test-id]="TEST_IDS.IKO_MANAGEMENT_MODAL_FORM">
    <cds-label [attr.data-test-id]="TEST_IDS.IKO_MANAGEMENT_MODAL_TITLE_LABEL">
      {{ 'interface.title' | translate }}

      <input
        formControlName="title"
        cdsText
        cdsLayer
        placeholder="{{ 'interface.title' | translate }}"
        [attr.modal-primary-focus]="true"
        [attr.data-test-id]="TEST_IDS.IKO_MANAGEMENT_MODAL_TITLE_INPUT"
      />
    </cds-label>

    <valtimo-auto-key-input
      [mode]="modalMode"
      [usedKeys]="usedKeys"
      [sourceText]="title.value"
      formControlName="key"
      placeholderTranslationKey="interface.key"
      [attr.data-test-id]="TEST_IDS.IKO_MANAGEMENT_MODAL_KEY_INPUT"
    >
    </valtimo-auto-key-input>

    <valtimo-iko-management-properties
      [propertiesFormGroup]="properties"
      [fields]="propertyFields$ | async"
      [prefillData]="$prefillData()?.properties"
      [attr.data-test-id]="TEST_IDS.IKO_MANAGEMENT_MODAL_PROPERTIES"
    />
  </form>

  <cds-modal-footer [attr.data-test-id]="TEST_IDS.IKO_MANAGEMENT_MODAL_FOOTER">
    <button cdsButton="ghost" (click)="onCancel()" [attr.data-test-id]="TEST_IDS.IKO_MANAGEMENT_MODAL_CANCEL_BUTTON">
      {{ 'interface.cancel' | translate }}
    </button>

    <button [disabled]="formGroup.invalid" cdsButton="primary" (click)="onSave()" [attr.data-test-id]="TEST_IDS.IKO_MANAGEMENT_MODAL_SAVE_BUTTON">
      {{ 'interface.save' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
