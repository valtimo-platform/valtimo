<valtimo-widget-interactive-table
  *ngIf="{
    widgetConfiguration: widgetConfiguration$ | async,
    widgetData: widgetData$ | async,
  } as obs"
  [widgetData]="obs.widgetData"
  [widgetConfiguration]="obs.widgetConfiguration"
  (actionEvent)="onActionEvent($event, obs.widgetData.resolved)"
  (paginationEvent)="onPaginationEvent($event)"
  (rowClickEvent)="onRowClickEvent($event, obs.widgetConfiguration)"
  (caseStartEvent)="onCaseStartEvent($event)"
  [attr.data-test-id]="TEST_IDS.VALTIMO_WIDGET_INTERACTIVE_TABLE"
>
</valtimo-widget-interactive-table>

<valtimo-case-list-actions [navigateAfterSubmit]="false" [attr.data-test-id]="TEST_IDS.VALTIMO_CASE_LIST_ACTIONS"></valtimo-case-list-actions>
