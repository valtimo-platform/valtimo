<cds-modal valtimoCdsModal [open]="open$ | async" size="sm" showFooter="true" (close)="onCancel()" data-test-id="iko-api-modal">
  <cds-modal-header [showCloseButton]="true" (closeSelect)="onCancel()" data-test-id="iko-api-modal-header">
    <h3 cdsModalHeaderHeading data-test-id="iko-api-modal-title">{{ 'ikoManagement.configureIkoServer' | translate }}</h3>
  </cds-modal-header>

  <form cdsModalContent [cdsLayer]="1" [formGroup]="formGroup" class="iko-api-form" data-test-id="iko-api-form">
    <cds-label [invalid]="getControlInvalid('title')" data-test-id="iko-api-title-label">
      {{ 'ikoManagement.titleTitle' | translate }}

      <input
        [invalid]="getControlInvalid('title')"
        formControlName="title"
        cdsText
        placeholder="{{ 'ikoManagement.titlePlaceholder' | translate }}"
        data-test-id="iko-api-title-input"
      />
    </cds-label>

    <valtimo-auto-key-input
      [mode]="modalMode"
      [usedKeys]="usedKeys$ | async"
      [sourceText]="title.value"
      formControlName="key"
      placeholderTranslationKey="interface.key"
      data-test-id="iko-api-key-input"
    >
    </valtimo-auto-key-input>

    <v-select
      *ngIf="enableIkoType"
      [invalid]="getControlInvalid('type')"
      formControlName="type"
      [disabled]="true"
      [items]="ikoRepositoryTypeSelectItems$ | async"
      [title]="'ikoManagement.typeTitle' | translate"
      [appendInline]="false"
      [dropUp]="false"
      data-test-id="iko-api-type-select"
    ></v-select>

    <valtimo-iko-management-properties
      [propertiesFormGroup]="properties"
      [fields]="propertyFields$ | async"
      [prefillData]="$prefillData()?.properties"
      data-test-id="iko-api-properties"
    />
  </form>

  <cds-modal-footer data-test-id="iko-api-modal-footer">
    <button cdsButton="ghost" (click)="onCancel()" data-test-id="iko-api-cancel-button">
      {{ 'interface.cancel' | translate }}
    </button>

    <button [disabled]="formGroup.invalid" cdsButton="primary" (click)="onSave()" data-test-id="iko-api-save-button">
      {{ 'interface.save' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
