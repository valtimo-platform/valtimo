<valtimo-carbon-list
  [actionItems]="ACTION_ITEMS"
  [fields]="FIELDS"
  [items]="apiConfigs$ | async"
  [loading]="loading$ | async"
  (rowClicked)="onRowClicked($event)"
>
  <ng-container carbonToolbarContent [ngTemplateOutlet]="addViewButton"></ng-container>

  <valtimo-no-results
    [action]="addViewButton"
    [description]="'ikoManagement.views.noResultsDescription' | translate"
    [title]="'ikoManagement.views.noResultsTitle' | translate"
  ></valtimo-no-results>
</valtimo-carbon-list>

<ng-template #addViewButton>
  <button cdsButton="primary" (click)="openModal()">
    {{ 'ikoManagement.addApiConfig' | translate }}

    <svg cdsIcon="add" size="16" class="cds--btn__icon"></svg>
  </button>
</ng-template>

<valtimo-iko-management-repository-modal
  [open]="$modalOpen()"
  [prefillData]="$prefillData()"
  (modalClose)="closeModal($event)"
></valtimo-iko-management-repository-modal>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="ikoManagement.views.deleteContent"
  [outputOnConfirm]="$keyToDelete()"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="interface.delete"
  (confirmEvent)="onDeleteConfirm($event)"
></valtimo-confirmation-modal>
