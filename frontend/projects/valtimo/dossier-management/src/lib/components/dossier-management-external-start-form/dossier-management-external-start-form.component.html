<cds-tile
  class="external-case-form-container"
  *ngIf="{
    documentDefinitionName: documentDefinitionName$ | async,
    caseSettings: caseSettings$ | async,
  } as obs"
  [cdsLayer]="1"
>
  <h4>{{ 'dossierManagement.externalStartForm.title' | translate }}</h4>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" [cdsLayer]="0">
    <cds-toggle
      formControlName="hasExternalForm"
      label="{{ 'dossierManagement.externalStartForm.enabledToggle' | translate }}"
      onText="{{ 'dossierManagement.externalStartForm.enabledToggleOn' | translate }}"
      offText="{{ 'dossierManagement.externalStartForm.enabledToggleOff' | translate }}"
    ></cds-toggle>

    <cds-label>
      {{ 'dossierManagement.externalStartForm.externalUrl' | translate }}
      <input
        cdsText
        type="text"
        formControlName="externalFormUrl"
        placeholder="{{ 'dossierManagement.externalStartForm.externalUrlPlaceholder' | translate }}"
        maxlength="512"
      />
    </cds-label>

    <cds-label>
      {{ 'dossierManagement.externalStartForm.description' | translate }}
      <input
        cdsText
        type="text"
        formControlName="description"
        placeholder="{{ 'dossierManagement.externalStartForm.descriptionPlaceholder' | translate }}"
        maxlength="512"
      />
    </cds-label>

    <button cdsButton="primary" type="submit" [disabled]="!form.valid">
      {{ 'dossierManagement.externalStartForm.apply' | translate }}
    </button>
  </form>
</cds-tile>
