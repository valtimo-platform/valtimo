<ng-container *ngIf="model$ | async as model; else loading">
  <cds-tabs type="contained">
    <cds-tab
      [active]="$activeTab() === AccessControlEditorTab.SUMMARY"
      [heading]="'accessControl.roles.tabs.summary' | translate"
      (selected)="setActiveTab(AccessControlEditorTab.SUMMARY)"
    >
      <valtimo-access-control-overview-tab
        *ngIf="$activeTab() === AccessControlEditorTab.SUMMARY"
        [permissions]="permissions$ | async"
        [roleKey]="roleKey$ | async"
      ></valtimo-access-control-overview-tab>
    </cds-tab>

    <cds-tab
      [active]="$activeTab() === AccessControlEditorTab.JSON_EDITOR"
      [heading]="'accessControl.roles.tabs.jsonEditor' | translate"
      (selected)="setActiveTab(AccessControlEditorTab.JSON_EDITOR)"
    >
      <valtimo-access-control-json-editor-tab
        *ngIf="$activeTab() === AccessControlEditorTab.JSON_EDITOR"
        [disabled]="editorDisabled$ | async"
        [model]="model"
        (validEvent)="onValid($event)"
        (valueChangeEvent)="onValueChange($event)"
      ></valtimo-access-control-json-editor-tab>
    </cds-tab>
  </cds-tabs>
</ng-container>

<ng-container renderInPageHeader>
  <ng-template>
    <div
      *ngIf="{
        model: model$ | async,
        moreDisabled: moreDisabled$ | async,
        compactMode: compactMode$ | async,
      } as obs"
      class="buttons-container"
    >
      <v-overflow-menu class="overflow-button" placement="bottom-end">
        <v-overflow-menu-trigger overflowTrigger></v-overflow-menu-trigger>
        <v-overflow-menu-option [disabled]="obs.moreDisabled" (selected)="showEditModal()">{{
          'accessControl.roles.editMetadata' | translate
        }}</v-overflow-menu-option>

        <v-overflow-menu-option [disabled]="obs.moreDisabled" (selected)="exportPermissions()">{{
          'interface.export' | translate
        }}</v-overflow-menu-option>

        <v-overflow-menu-option
          [disabled]="obs.moreDisabled"
          type="danger"
          (selected)="showDeleteModal()"
          >{{ 'interface.delete' | translate }}</v-overflow-menu-option
        >
      </v-overflow-menu>

      <button
        [disabled]="saveDisabled$ | async"
        cdsButton="primary"
        [size]="obs.compactMode ? 'sm' : 'md'"
        (click)="updatePermissions()"
      >
        {{ 'interface.save' | translate }}

        <svg class="cds--btn__icon" cdsIcon="save" size="16"></svg>
      </button>
    </div>
  </ng-template>
</ng-container>

<ng-container *ngIf="{selectedRowKeys: selectedRowKeys$ | async} as obs">
  <valtimo-delete-role-modal
    [deleteRowKeys]="obs.selectedRowKeys"
    [showDeleteModal$]="showDeleteModal$"
    (deleteEvent)="onDelete($event)"
  >
  </valtimo-delete-role-modal>

  <valtimo-role-metadata-modal
    [defaultKeyValue]="obs.selectedRowKeys[0]"
    [open]="showEditModal$ | async"
    type="edit"
    (closeEvent)="onEdit(obs.selectedRowKeys[0], $event)"
  ></valtimo-role-metadata-modal>
</ng-container>

<ng-template #loading>
  <div class="loading-container">
    <cds-loading></cds-loading>
  </div>
</ng-template>
