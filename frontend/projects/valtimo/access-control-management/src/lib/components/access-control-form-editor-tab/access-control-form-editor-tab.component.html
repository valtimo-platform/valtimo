<div *ngIf="ready && permissionsArray as permissions" class="form-editor">
  @if (permissions.length === 0) {
    <div class="form-editor__empty">
      <h4 class="form-editor__empty-title">
        {{ 'accessControl.editor.empty.title' | translate }}
      </h4>
      <p class="form-editor__empty-message">
        {{ 'accessControl.editor.empty.message' | translate }}
      </p>
    </div>
  }

  <cds-accordion class="form-editor__list">
    @for (control of permissions.controls; track control; let i = $index) {
      <cds-accordion-item
        [expanded]="isExpanded(control)"
        [title]="permissionTitle(control)"
        (selected)="onAccordionToggle(control, $event)"
      >
        <valtimo-permission-form
          [disabled]="!!disabled"
          [group]="$any(control)"
          [index]="i"
          (removeEvent)="removePermission(i)"
        ></valtimo-permission-form>
      </cds-accordion-item>
    }
  </cds-accordion>

  <button
    class="form-editor__add"
    cdsButton="tertiary"
    [attr.data-test-id]="testIds.addPermissionButton"
    [disabled]="!!disabled"
    (click)="addPermission()"
  >
    {{ 'accessControl.editor.addPermission' | translate }}

    <svg class="cds--btn__icon" cdsIcon="add" size="16"></svg>
  </button>
</div>
