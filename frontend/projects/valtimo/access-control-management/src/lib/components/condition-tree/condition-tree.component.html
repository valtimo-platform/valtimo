<div class="condition-tree" [class.condition-tree--nested]="depth > 0">
  @for (control of conditions.controls; track control; let i = $index) {
    <div class="condition-tree__row" [cdsLayer]="rowLayerLevel" [formGroup]="asFormGroup(control)">
      <div class="condition-tree__content">
        <v-select
          class="condition-tree__type"
          formControlName="type"
          [cdsLayer]="inputLayerLevel"
          [clearable]="false"
          [dataTestId]="testIds.conditionTypeSelect"
          [defaultSelectionId]="typeOf(i)"
          [items]="typeItems"
          [tooltip]="'accessControl.editor.tooltips.conditionType' | translate"
          titleTranslationKey="accessControl.editor.conditionType"
          (selectedChange)="onTypeChange()"
        ></v-select>

        @switch (typeOf(i)) {
          @case ('container') {
            <v-select
              formControlName="resourceType"
              [cdsLayer]="inputLayerLevel"
              [dataTestId]="testIds.conditionFieldSelect"
              [defaultSelectionId]="containerResourceTypeAt(i)"
              [invalid]="!!asFormGroup(control).errors?.['resourceTypeRequired']"
              [items]="containerTargetItems"
              [placeholder]="'accessControl.editor.relatedResourcePlaceholder' | translate"
              [tooltip]="'accessControl.editor.tooltips.relatedResource' | translate"
              titleTranslationKey="accessControl.editor.relatedResource"
            ></v-select>

            <div class="condition-tree__nested">
              <valtimo-condition-tree
                [conditions]="nestedConditions(i)"
                [depth]="depth + 1"
                [disabled]="disabled"
                [resourceType]="containerResourceType(i)"
              ></valtimo-condition-tree>
            </div>
          }

          @default {
            <div class="condition-tree__fields">
              <v-select
                class="condition-tree__field"
                formControlName="field"
                [cdsLayer]="inputLayerLevel"
                [dataTestId]="testIds.conditionFieldSelect"
                [defaultSelectionId]="fieldValueAt(i)"
                [invalid]="!!asFormGroup(control).errors?.['fieldRequired']"
                [items]="fieldItems"
                [placeholder]="'accessControl.editor.fieldPlaceholder' | translate"
                [tooltip]="'accessControl.editor.tooltips.field' | translate"
                titleTranslationKey="accessControl.editor.field"
              ></v-select>

              <v-select
                class="condition-tree__operator"
                formControlName="operator"
                [cdsLayer]="inputLayerLevel"
                [clearable]="false"
                [dataTestId]="testIds.conditionOperatorSelect"
                [defaultSelectionId]="operatorValueAt(i)"
                [items]="operatorItems"
                [tooltip]="'accessControl.editor.tooltips.operator' | translate"
                titleTranslationKey="accessControl.editor.operator"
              ></v-select>

              <div class="condition-tree__value cds--form-item" [cdsLayer]="inputLayerLevel">
                <label class="cds--label label-with-tooltip">
                  {{ 'accessControl.editor.value' | translate }}
                  <v-tooltip-icon
                    [tooltip]="'accessControl.editor.tooltips.value' | translate"
                  ></v-tooltip-icon>
                </label>
                <input
                  cdsText
                  [attr.data-test-id]="testIds.conditionValueInput"
                  [placeholder]="'accessControl.editor.valuePlaceholder' | translate"
                  formControlName="value"
                />
              </div>
            </div>

            @if (typeOf(i) === 'expression') {
              <div class="condition-tree__fields">
                <div class="condition-tree__value cds--form-item" [cdsLayer]="inputLayerLevel">
                  <label class="cds--label label-with-tooltip">
                    {{ 'accessControl.editor.path' | translate }}
                    <v-tooltip-icon
                      [tooltip]="'accessControl.editor.tooltips.path' | translate"
                    ></v-tooltip-icon>
                  </label>
                  <input
                    cdsText
                    [attr.data-test-id]="testIds.conditionPathInput"
                    [class.cds--text-input--invalid]="asFormGroup(control).errors?.['pathRequired']"
                    [placeholder]="'accessControl.editor.pathPlaceholder' | translate"
                    formControlName="path"
                  />
                </div>

                <div class="condition-tree__value cds--form-item" [cdsLayer]="inputLayerLevel">
                  <label class="cds--label label-with-tooltip">
                    {{ 'accessControl.editor.clazz' | translate }}
                    <v-tooltip-icon
                      [tooltip]="'accessControl.editor.tooltips.clazz' | translate"
                    ></v-tooltip-icon>
                  </label>
                  <input
                    cdsText
                    [attr.data-test-id]="testIds.conditionClazzInput"
                    [class.cds--text-input--invalid]="
                      asFormGroup(control).errors?.['clazzRequired']
                    "
                    [placeholder]="'accessControl.editor.clazzPlaceholder' | translate"
                    formControlName="clazz"
                  />
                </div>
              </div>
            }
          }
        }
      </div>

      <button
        class="condition-tree__remove"
        cdsButton="ghost"
        [attr.data-test-id]="testIds.removeConditionButton"
        [disabled]="disabled"
        [iconOnly]="true"
        (click)="removeCondition(i)"
      >
        <svg cdsIcon="trash-can" size="16"></svg>
      </button>
    </div>
  }

  <button
    class="condition-tree__add"
    cdsButton="ghost"
    size="sm"
    [attr.data-test-id]="testIds.addConditionButton"
    [disabled]="disabled"
    (click)="addCondition()"
  >
    {{ 'accessControl.editor.addCondition' | translate }}

    <svg class="cds--btn__icon" cdsIcon="add" size="16"></svg>
  </button>
</div>
