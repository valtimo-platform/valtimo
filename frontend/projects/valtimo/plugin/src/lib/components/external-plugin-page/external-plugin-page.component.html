<div class="external-plugin-page">
  <ng-container [ngSwitch]="$state()">
    <div *ngSwitchCase="'loading'" class="external-plugin-page__status">
      <cds-loading [isActive]="true" [overlay]="false" size="normal"></cds-loading>
    </div>

    <div
      *ngSwitchCase="'error'"
      class="external-plugin-page__status external-plugin-page__status--error"
    >
      {{ 'externalPluginPage.loadError' | translate }}
    </div>

    <ng-container *ngSwitchCase="'ready'">
      <div *ngIf="!$iframeReady()" class="external-plugin-page__status">
        <cds-loading [isActive]="true" [overlay]="false" size="normal"></cds-loading>
      </div>

      <valtimo-external-plugin-iframe
        [bundleUrl]="$page()!.bundleUrl!"
        [configurationId]="$page()!.configurationId"
        [context]="$context()"
        [pluginDataUrl]="$pluginDataUrl()"
        [userToken]="$userToken()"
        (readyEvent)="onIframeReady()"
      ></valtimo-external-plugin-iframe>
    </ng-container>
  </ng-container>
</div>
