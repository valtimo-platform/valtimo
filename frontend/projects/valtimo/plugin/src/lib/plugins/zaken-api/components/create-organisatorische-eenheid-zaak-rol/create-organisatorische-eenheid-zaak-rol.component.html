<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
  } as obs"
  data-test-id="roltype-form"
>
  <v-input
    name="roltypeUrl"
    [title]="'roltypeUrl' | pluginTranslate: pluginId | async"
    [tooltip]="'roltypeUrlTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.roltypeUrl"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="roltype-form-roltype-url-input"
  >
  </v-input>

  <v-input
    name="rolToelichting"
    [title]="'rolToelichting' | pluginTranslate: pluginId | async"
    [tooltip]="'rolToelichtingTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.rolToelichting"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="roltype-form-rol-toelichting-input"
  >
  </v-input>

  <v-input
    name="identificatie"
    [title]="'identificatie' | pluginTranslate: pluginId | async"
    [tooltip]="'identificatieOrganisatorischeEenheidTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.identificatie"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="roltype-form-identificatie-input"
  >
  </v-input>

  <v-input
    name="naam"
    [title]="'naam' | pluginTranslate: pluginId | async"
    [tooltip]="'naamTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.naam"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="roltype-form-naam-input"
  >
  </v-input>

  <v-input
    name="isGehuisvestIn"
    [title]="'isGehuisvestIn' | pluginTranslate: pluginId | async"
    [tooltip]="'isGehuisvestInTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.isGehuisvestIn"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="roltype-form-is-gehuisvest-in-input"
  >
  </v-input>

  <v-input
    name="afwijkendeNaamBetrokkene"
    [title]="'afwijkendeNaamBetrokkene' | pluginTranslate: pluginId | async"
    [tooltip]="'afwijkendeNaamBetrokkeneTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.afwijkendeNaamBetrokkene"
    [disabled]="obs.disabled"
    [required]="false"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="roltype-form-afwijkende-naam-betrokkene-input"
  >
  </v-input>

  <v-radio
    name="indicatieMachtiging"
    [title]="'indicatieMachtiging' | pluginTranslate: pluginId | async"
    [tooltip]="'indicatieMachtigingTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.indicatieMachtiging"
    [disabled]="obs.disabled"
    [required]="false"
    [margin]="true"
    [fullWidth]="true"
    [radioValues]="INDICATIE_MACHTIGING_VALUES"
    data-test-id="roltype-form-indicatie-machtiging-radio"
  >
  </v-radio>

  <v-input
    name="resultProcessVariable"
    [title]="'resultProcessVariable' | pluginTranslate: pluginId | async"
    [tooltip]="'resultProcessVariable' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.resultProcessVariable"
    [disabled]="obs.disabled"
    [required]="false"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="roltype-form-result-process-variable-input"
  >
  </v-input>
</v-form>
