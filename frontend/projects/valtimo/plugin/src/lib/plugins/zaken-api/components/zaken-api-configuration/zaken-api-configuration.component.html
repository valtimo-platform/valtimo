<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
    noteEventListenerEnabled: noteEventListenerEnabled$ | async
  } as obs"
  [attr.data-test-id]="TEST_IDS.CONFIGURATION_FORM"
>
  <v-input
    name="configurationTitle"
    placeholder="Zaken API Plugin"
    [title]="'configurationTitle' | pluginTranslate: pluginId | async"
    [tooltip]="'configurationTitleTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.configurationTitle"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [attr.data-test-id]="TEST_IDS.CONFIGURATION_TITLE_INPUT"
  >
  </v-input>

  <v-input
    name="url"
    placeholder="https://openzaak.example.com/zaken/api/v1/ "
    [title]="'url' | pluginTranslate: pluginId | async"
    [tooltip]="'urlTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.url"
    [disabled]="obs.disabled"
    [required]="true"
    [trim]="true"
    [margin]="true"
    [attr.data-test-id]="TEST_IDS.URL_INPUT"
  >
  </v-input>

  <ng-container
    *ngIf="{authenticationPluginSelectItems: authenticationPluginSelectItems$ | async} as authObs"
  >
    <v-select
      name="authenticationPluginConfiguration"
      [title]="'authenticationPluginConfiguration' | pluginTranslate: pluginId | async"
      [tooltip]="'authenticationPluginConfigurationTooltip' | pluginTranslate: pluginId | async"
      [disabled]="obs.disabled"
      [required]="true"
      [margin]="true"
      [items]="authObs.authenticationPluginSelectItems"
      [loading]="!authObs.authenticationPluginSelectItems"
      [defaultSelectionId]="obs.prefill?.authenticationPluginConfiguration"
      [attr.data-test-id]="TEST_IDS.AUTHENTICATION_PLUGIN_SELECT"
    ></v-select>
  </ng-container>

  <div class="input-toggle--small-margin">
    <v-input-label
      [title]="'noteEventListenerEnabled' | pluginTranslate: pluginId | async"
      [tooltip]="'noteEventListenerEnabledTooltip' | pluginTranslate: pluginId | async"
      [attr.data-test-id]="TEST_IDS.NOTE_EVENT_LISTENER_LABEL"
    >
    </v-input-label>

    <cds-toggle
      [checked]="obs.noteEventListenerEnabled"
      [disabled]="obs.disabled"
      [onText]="'noteEventListenerEnabled.toggleOn' | pluginTranslate: pluginId | async"
      [offText]="'noteEventListenerEnabled.toggleOff' | pluginTranslate: pluginId | async"
      (checkedChange)="onNoteEventListenerEnabledChange($event)"
      [attr.data-test-id]="TEST_IDS.NOTE_EVENT_LISTENER_TOGGLE"
    ></cds-toggle>
  </div>

  <v-input
    *ngIf="obs.noteEventListenerEnabled"
    name="noteSubject"
    [title]="'noteSubject' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.noteSubject"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [attr.data-test-id]="TEST_IDS.NOTE_SUBJECT_INPUT"
  >
  </v-input>
</v-form>
