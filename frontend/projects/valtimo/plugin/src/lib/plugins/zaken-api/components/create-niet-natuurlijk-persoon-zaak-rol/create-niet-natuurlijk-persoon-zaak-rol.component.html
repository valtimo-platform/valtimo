<ng-container
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
  } as obs"
>
  <div class="notification--margin">
    <cds-inline-notification
      [notificationObj]="{
        type: 'info',
        message: 'createZaakrolNietNatuurlijkPersoonIdentifierFieldsInformation' | pluginTranslate: pluginId | async,
        showClose: false,
        lowContrast: true
      }"
      data-test-id="create-zaakrol-niet-natuurlijk-persoon-identifier-fields-information"
    >
    </cds-inline-notification>
  </div>

  <v-form (valueChange)="formValueChange($event)" data-test-id="create-zaakrol-niet-natuurlijk-persoon-form">
    <v-input
      name="roltypeUrl"
      [title]="'roltypeUrl' | pluginTranslate: pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.roltypeUrl"
      [disabled]="obs.disabled"
      [required]="true"
      [trim]="true"
      [tooltip]="'roltypeUrlTooltip' | pluginTranslate: pluginId | async"
      [fullWidth]="true"
      data-test-id="create-zaakrol-niet-natuurlijk-persoon-roltype-url-input"
    >
    </v-input>

    <v-input
      name="rolToelichting"
      [title]="'rolToelichting' | pluginTranslate: pluginId | async"
      [tooltip]="'rolToelichtingTooltip' | pluginTranslate: pluginId | async"
      [defaultValue]="obs.prefill?.rolToelichting"
      [disabled]="obs.disabled"
      [required]="true"
      [margin]="true"
      [fullWidth]="true"
      data-test-id="create-zaakrol-niet-natuurlijk-persoon-rol-toelichting-input"
    >
    </v-input>

    <v-input
      name="innNnpId"
      [title]="'innNnpId' | pluginTranslate: pluginId | async"
      [tooltip]="'innNnpIdTooltip' | pluginTranslate: pluginId | async"
      [defaultValue]="obs.prefill?.innNnpId"
      [disabled]="obs.disabled"
      [required]="false"
      [margin]="true"
      [trim]="true"
      [fullWidth]="true"
      data-test-id="create-zaakrol-niet-natuurlijk-persoon-inn-nnp-id-input"
    >
    </v-input>

    <v-input
      name="annIdentificatie"
      [title]="'annIdentificatie' | pluginTranslate: pluginId | async"
      [tooltip]="'annIdentificatieTooltip' | pluginTranslate: pluginId | async"
      [defaultValue]="obs.prefill?.annIdentificatie"
      [disabled]="obs.disabled"
      [required]="false"
      [margin]="true"
      [trim]="true"
      [fullWidth]="true"
      data-test-id="create-zaakrol-niet-natuurlijk-persoon-ann-identificatie-input"
    >
    </v-input>

    <v-input
      name="kvkNummer"
      [title]="'kvkNummer' | pluginTranslate: pluginId | async"
      [tooltip]="'kvkNummerTooltip' | pluginTranslate: pluginId | async"
      [defaultValue]="obs.prefill?.kvkNummer"
      [disabled]="obs.disabled"
      [required]="false"
      [margin]="true"
      [trim]="true"
      [fullWidth]="true"
      data-test-id="create-zaakrol-niet-natuurlijk-persoon-kvk-nummer-input"
    >
    </v-input>

    <v-input
      name="vestigingsNummer"
      [title]="'vestigingsNummer' | pluginTranslate: pluginId | async"
      [tooltip]="'vestigingsNummerTooltip' | pluginTranslate: pluginId | async"
      [defaultValue]="obs.prefill?.vestigingsNummer"
      [disabled]="obs.disabled"
      [required]="false"
      [margin]="true"
      [trim]="true"
      [fullWidth]="true"
      data-test-id="create-zaakrol-niet-natuurlijk-persoon-vestigings-nummer-input"
    >
    </v-input>

    <v-input
      name="resultProcessVariable"
      [title]="'resultProcessVariable' | pluginTranslate: pluginId | async"
      [tooltip]="'resultProcessVariable' | pluginTranslate: pluginId | async"
      [defaultValue]="obs.prefill?.resultProcessVariable"
      [disabled]="obs.disabled"
      [required]="false"
      [margin]="true"
      [trim]="true"
      [fullWidth]="true"
      data-test-id="create-zaakrol-niet-natuurlijk-persoon-result-process-variable-input"
    >
    </v-input>
  </v-form>
</ng-container>
