<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
    pluginId: pluginId$ | async,
    selectedInputOption: selectedInputOption$ | async,
    datumStatusGezetSelectedInputOption: datumStatusGezetSelectedInputOption$ | async,
    loading: loading$ | async,
    statusTypeItems: statusTypeSelectItems$ | async,
    context: context$ | async,
    datePickerInvalid: datePickerInvalid$ | async
  } as obs"
>
  <ng-container *ngIf="obs.loading === false; else loading">
    <v-input
      name="statustoelichting"
      [title]="'statustoelichting' | pluginTranslate: obs.pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.statustoelichting"
      [disabled]="obs.disabled"
      [required]="false"
      [tooltip]="'statustoelichtingTooltip' | pluginTranslate: obs.pluginId | async"
      [fullWidth]="true"
      [placeholder]="'statustoelichting' | pluginTranslate: obs.pluginId | async"
      [attr.data-test-id]="TEST_IDS.STATUS_EXPLANATION_INPUT"
    >
    </v-input>

    <cds-date-picker
      [attr.data-carbon-theme]="theme$ | async"
      [label]="'logging.search.afterTimestamp' | translate"
      placeholder="DD-MM-YYYY"
      [dateFormat]="'d-m-Y'"
      [value]="[selectedDate]"
      (valueChange)="onDateSelected($event)"
      [attr.data-test-id]="TEST_IDS.STATUS_DATE_PICKER"
    ></cds-date-picker>

    <cds-timepicker
      [attr.data-carbon-theme]="theme$ | async"
      [value]="selectedTime"
      (valueChange)="onTimeSelected($event)"
      [attr.data-test-id]="TEST_IDS.STATUS_TIME_PICKER"
    ></cds-timepicker>

    <v-radio
      name="inputDatumStatusGezetToggle"
      [disabled]="obs.disabled"
      [title]="'inputDatumStatusGezetToggle' | pluginTranslate: obs.pluginId | async"
      [radioValues]="datePickerInputTypeOptions$ | async"
      [defaultValue]="obs.datumStatusGezetSelectedInputOption"
      [margin]="true"
      [attr.data-test-id]="TEST_IDS.STATUS_DATE_INPUT_TOGGLE"
    ></v-radio>

    <div class="date-time-row" *ngIf="obs.datumStatusGezetSelectedInputOption === 'selection'">
      <cds-date-picker
        [attr.data-carbon-theme]="theme$ | async"
        [label]="'logging.search.afterTimestamp' | translate"
        placeholder="DD-MM-YYYY"
        [dateFormat]="'d-m-Y'"
        [value]="[selectedDate]"
        [invalid]="obs.datePickerInvalid"
        [invalidText]="'datumStatusGezetInvalidText' | pluginTranslate: obs.pluginId | async"
        (valueChange)="onDateSelected($event)"
        [attr.data-test-id]="TEST_IDS.STATUS_DATE_PICKER_SELECTION"
      ></cds-date-picker>

      <cds-timepicker
        class="timepicker"
        [attr.data-carbon-theme]="theme$ | async"
        [value]="selectedTime"
        [invalid]="obs.datePickerInvalid"
        (valueChange)="onTimeSelected($event)"
        [attr.data-test-id]="TEST_IDS.STATUS_TIME_PICKER_SELECTION"
      ></cds-timepicker>
    </div>

    <v-input
      *ngIf="obs.datumStatusGezetSelectedInputOption === 'text'"
      name="datumStatusGezet"
      [title]="'datumStatusGezet' | pluginTranslate: obs.pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.datumStatusGezet"
      [disabled]="obs.disabled"
      [required]="true"
      [trim]="true"
      [tooltip]="'datumStatusGezetTooltip' | pluginTranslate: obs.pluginId | async"
      [fullWidth]="true"
      [attr.data-test-id]="TEST_IDS.STATUS_DATE_TEXT_INPUT"
    ></v-input>

    <v-radio
      *ngIf="obs?.context?.[0] === 'case'"
      name="inputTypeZaakStatusToggle"
      [disabled]="obs.disabled"
      [title]="'inputTypeZaakStatusToggle' | pluginTranslate: obs.pluginId | async"
      [radioValues]="inputTypeOptions$ | async"
      [defaultValue]="selectedInputOption$ | async"
      [margin]="true"
      [attr.data-test-id]="TEST_IDS.CASE_STATUS_INPUT_TOGGLE"
    >
    </v-radio>

    <v-input
      *ngIf="obs.selectedInputOption === 'text'"
      name="statustypeUrl"
      [title]="'statustypeUrl' | pluginTranslate: obs.pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.statustypeUrl"
      [disabled]="obs.disabled"
      [required]="true"
      [trim]="true"
      [tooltip]="'statustypeUrlTooltip' | pluginTranslate: obs.pluginId | async"
      [fullWidth]="true"
      [attr.data-test-id]="TEST_IDS.STATUS_TYPE_TEXT_INPUT"
    >
    </v-input>

    <ng-container *ngIf="obs.selectedInputOption === 'selection'">
      <v-select
        [items]="obs.statusTypeItems"
        [margin]="true"
        [widthInPx]="350"
        name="statustypeUrl"
        [title]="'statustypeUrlSelect' | pluginTranslate: obs.pluginId | async"
        [disabled]="obs.disabled || obs.selectedInputOption === 'text' || !obs.statusTypeItems"
        [defaultSelectionId]="obs.prefill?.statustypeUrl"
        [required]="true"
        [loading]="!obs.statusTypeItems"
        [tooltip]="'statustypeUrlSelectTooltip' | pluginTranslate: obs.pluginId | async"
        [clearSelectionSubject$]="clearStatusSelection$"
        [attr.data-test-id]="TEST_IDS.STATUS_TYPE_SELECT"
      ></v-select>
    </ng-container>
  </ng-container>
</v-form>

<ng-template #loading>
  <div class="loading-container">
    <cds-loading [attr.data-test-id]="TEST_IDS.STATUS_LOADING"></cds-loading>
  </div>
</ng-template>
