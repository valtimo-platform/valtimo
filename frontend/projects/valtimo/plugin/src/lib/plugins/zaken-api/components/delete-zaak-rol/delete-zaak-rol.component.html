<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
  } as obs"
  data-test-id="form-rol-uuid"
>
  <v-input
    name="rolUuid"
    [title]="'rolUuid' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.rolUuid"
    [disabled]="obs.disabled"
    [required]="true"
    [trim]="true"
    [tooltip]="'rolUuidTooltip' | pluginTranslate: pluginId | async"
    [fullWidth]="true"
    data-test-id="form-rol-uuid-input"
  >
  </v-input>
</v-form>
