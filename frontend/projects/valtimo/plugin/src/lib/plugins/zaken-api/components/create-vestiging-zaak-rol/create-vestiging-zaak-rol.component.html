<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
  } as obs"
>
  <v-input
    name="roltypeUrl"
    [title]="'roltypeUrl' | pluginTranslate: pluginId | async"
    [tooltip]="'roltypeUrlTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.roltypeUrl"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="form-roltype-url-input"
  >
  </v-input>

  <v-input
    name="rolToelichting"
    [title]="'rolToelichting' | pluginTranslate: pluginId | async"
    [tooltip]="'rolToelichtingTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.rolToelichting"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [fullWidth]="true"
    data-test-id="form-rol-toelichting-input"
  >
  </v-input>

  <v-input
    name="vestigingsNummer"
    [title]="'vestigingsNummer' | pluginTranslate: pluginId | async"
    [tooltip]="'vestigingsNummerTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.vestigingsNummer"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="form-vestigings-nummer-input"
  >
  </v-input>

  <v-input
    name="handelsnaam"
    [title]="'handelsnaam' | pluginTranslate: pluginId | async"
    [tooltip]="'handelsnaamTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.handelsnaam"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="form-handelsnaam-input"
  >
  </v-input>

  <v-input
    name="kvkNummer"
    [title]="'kvkNummer' | pluginTranslate: pluginId | async"
    [tooltip]="'kvkNummerTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.kvkNummer"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="form-kvk-nummer-input"
  >
  </v-input>

  <v-input
    name="resultProcessVariable"
    [title]="'resultProcessVariable' | pluginTranslate: pluginId | async"
    [tooltip]="'resultProcessVariable' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.resultProcessVariable"
    [disabled]="obs.disabled"
    [required]="false"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    data-test-id="form-result-process-variable-input"
  >
  </v-input>
</v-form>
