<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
  } as obs"
>
  <v-input
    name="roltypeUrl"
    [title]="'roltypeUrl' | pluginTranslate: pluginId | async"
    [tooltip]="'roltypeUrlTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.roltypeUrl"
    [required]="true"
    [margin]="true"
    [disabled]="obs.disabled"
    [trim]="true"
    [fullWidth]="true"
    [attr.data-test-id]="TEST_IDS.ROLTYPE_URL_INPUT"
  >
  </v-input>

  <v-input
    name="rolToelichting"
    [title]="'rolToelichting' | pluginTranslate: pluginId | async"
    [tooltip]="'rolToelichtingTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.rolToelichting"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    [attr.data-test-id]="TEST_IDS.ROL_TOELICHTING_INPUT"
  >
  </v-input>

  <v-input
    name="identificatie"
    [title]="'identificatie' | pluginTranslate: pluginId | async"
    [tooltip]="'identificatieMedewerkerTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.identificatie"
    [disabled]="obs.disabled"
    [required]="true"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    [attr.data-test-id]="TEST_IDS.IDENTIFICATIE_INPUT"
  >
  </v-input>

  <v-input
    name="achternaam"
    [title]="'achternaam' | pluginTranslate: pluginId | async"
    [tooltip]="'achternaamTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.achternaam"
    [required]="true"
    [disabled]="obs.disabled"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    [attr.data-test-id]="TEST_IDS.ACHTERNAAM_INPUT"
  >
  </v-input>

  <v-input
    name="voorletters"
    [title]="'voorletters' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.voorletters"
    [disabled]="obs.disabled"
    [required]="true"
    [trim]="true"
    [tooltip]="'voorlettersTooltip' | pluginTranslate: pluginId | async"
    [fullWidth]="true"
    [attr.data-test-id]="TEST_IDS.VOORLETTERS_INPUT"
  >
  </v-input>

  <v-input
    name="voorvoegselAchternaam"
    [title]="'voorvoegselAchternaam' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.voorvoegselAchternaam"
    [disabled]="obs.disabled"
    [required]="false"
    [trim]="true"
    [tooltip]="'voorvoegselAchternaamTooltip' | pluginTranslate: pluginId | async"
    [fullWidth]="true"
    [attr.data-test-id]="TEST_IDS.VOORVOEGSEL_ACHTERNAAM_INPUT"
  >
  </v-input>

  <v-input
    name="afwijkendeNaamBetrokkene"
    [title]="'afwijkendeNaamBetrokkene' | pluginTranslate: pluginId | async"
    [tooltip]="'afwijkendeNaamBetrokkeneTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.afwijkendeNaamBetrokkene"
    [disabled]="obs.disabled"
    [required]="false"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    [attr.data-test-id]="TEST_IDS.AFWIJKENDE_NAAM_BETROKKENE_INPUT"
  >
  </v-input>

  <v-radio
    name="indicatieMachtiging"
    [title]="'indicatieMachtiging' | pluginTranslate: pluginId | async"
    [tooltip]="'indicatieMachtigingTooltip' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.indicatieMachtiging"
    [disabled]="obs.disabled"
    [required]="false"
    [margin]="true"
    [fullWidth]="true"
    [radioValues]="INDICATIE_MACHTIGING_VALUES"
    [attr.data-test-id]="TEST_IDS.INDICATIE_MACHTIGING_RADIO"
  >
  </v-radio>

  <v-input
    name="resultProcessVariable"
    [title]="'resultProcessVariable' | pluginTranslate: pluginId | async"
    [tooltip]="'resultProcessVariable' | pluginTranslate: pluginId | async"
    [defaultValue]="obs.prefill?.resultProcessVariable"
    [disabled]="obs.disabled"
    [required]="false"
    [margin]="true"
    [trim]="true"
    [fullWidth]="true"
    [attr.data-test-id]="TEST_IDS.RESULT_PROCESS_VARIABLE_INPUT"
  >
  </v-input>
</v-form>
