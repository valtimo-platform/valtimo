<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
    pluginId: pluginId$ | async,
    selectedInputOption: selectedInputOption$ | async,
    loading: loading$ | async,
    resultaatTypeItems: resultaatTypeSelectItems$ | async,
    context: context$ | async,
  } as obs"
>
  <ng-container *ngIf="obs.loading === false; else loading">
    <v-input
      name="toelichting"
      [title]="'resultaattoelichting' | pluginTranslate: obs.pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.toelichting"
      [disabled]="obs.disabled"
      [required]="false"
      [tooltip]="'resultaattoelichtingTooltip' | pluginTranslate: obs.pluginId | async"
      [fullWidth]="true"
    >
    </v-input>

    <v-radio
      *ngIf="obs?.context?.[0] === 'case'"
      name="inputTypeZaakResultaatToggle"
      [disabled]="obs.disabled"
      [title]="'inputTypeZaakResultaatToggle' | pluginTranslate: obs.pluginId | async"
      [radioValues]="inputTypeOptions$ | async"
      [defaultValue]="selectedInputOption$ | async"
      [margin]="true"
    >
    </v-radio>

    <v-input
      *ngIf="obs.selectedInputOption === 'text'"
      name="resultaattypeUrl"
      [title]="'resultaattypeUrl' | pluginTranslate: obs.pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.resultaattypeUrl"
      [disabled]="obs.disabled"
      [required]="true"
      [trim]="true"
      [tooltip]="'resultaattypeUrlTooltip' | pluginTranslate: obs.pluginId | async"
      [fullWidth]="true"
    >
    </v-input>

    <ng-container *ngIf="obs.selectedInputOption === 'selection'">
      <v-select
        [items]="obs.resultaatTypeItem"
        [margin]="true"
        [widthInPx]="350"
        name="resultaattypeUrl"
        [title]="'resultaattypeUrlSelect' | pluginTranslate: obs.pluginId | async"
        [disabled]="obs.disabled || obs.selectedInputOption === 'text' || !obs.resultaatTypeItems"
        [defaultSelectionId]="obs.prefill?.resultaattypeUrl"
        [required]="true"
        [loading]="!obs.resultaatTypeItems"
        [tooltip]="'resultaattypeUrlSelectTooltip' | pluginTranslate: obs.pluginId | async"
        [clearSelectionSubject$]="clearStatusSelection$"
      ></v-select>
    </ng-container>
  </ng-container>
</v-form>

<ng-template #loading>
  <div class="loading-container">
    <cds-loading></cds-loading>
  </div>
</ng-template>
