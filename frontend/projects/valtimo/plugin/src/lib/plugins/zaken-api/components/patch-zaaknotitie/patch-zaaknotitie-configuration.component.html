<ng-container
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null
  } as obs"
>
  <v-paragraph [margin]="true" [italic]="true">
    {{ 'patchZaakNotitieInformation' | pluginTranslate: pluginId | async }}
  </v-paragraph>

  <v-form (valueChange)="onFormValueChanged($event)">
    <v-input
      name="zaakNotitieUrl"
      [title]="'zaakNotitieUrl' | pluginTranslate: pluginId | async"
      [tooltip]="'zaakNotitieUrlTooltip' | pluginTranslate: pluginId | async"
      [required]="true"
      [defaultValue]="obs.prefill?.zaakNotitieUrl"
      [disabled]="obs.disabled"
      [margin]="true"
      [trim]="true"
    ></v-input>

    <div class="row">
      <div class="col-12">
        <v-overflow-menu placement="bottom-start" class="add-button">
          <button overflowTrigger cdsButton="primary" [size]="'md'">
            {{ 'addPatchZaakNotitieProperty' | pluginTranslate: pluginId | async }}

            <svg class="cds--btn__icon" cdsIcon="add" size="16"></svg>
          </button>

          @for (propertyOption of propertyOptions; track propertyOption) {
            <v-overflow-menu-option
              *ngIf="!hasPropertyBeenAdded(propertyOption)"
              (selected)="addProperty(propertyOption)"
            >
              {{ translationKeyForPropertyList(propertyOption) | pluginTranslate: pluginId | async }}
            </v-overflow-menu-option>
          }
        </v-overflow-menu>
      </div>
    </div>

    @for (property of propertyList; track property) {
      <div class="row">
        <div class="col-11">
          <v-input
            [type]="property.type"
            [name]="property.name"
            [title]="property.translationKey | pluginTranslate: pluginId | async"
            [required]="true"
            [defaultValue]="prefillValueFor(property.name, obs.prefill)"
            [margin]="true"
            [trim]="true"
            [presetOptions]="property.presetOptions"
            (valueChange)="onPropertyChanged(property.name, $event)"
          />
        </div>
        <div class="col-1">
          <button class="btn btn-space delete-button" (click)="removeProperty(property.name)">
            <svg class="cds--btn__icon" cdsIcon="trash-can" size="16"></svg>
          </button>
        </div>
      </div>
    }
  </v-form>
</ng-container>
