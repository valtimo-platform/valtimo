<v-form
  (valueChange)="onFormValueChanged($event)"
  *ngIf="{ disabled: disabled$ | async, prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null, pluginId: pluginId } as obs"
>
  <v-input
    name="notitieUrl"
    [title]="'notitieUrl' | pluginTranslate: obs.pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.notitieUrl"
    [disabled]="obs.disabled"
    [required]="true"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>

  <v-input
    name="onderwerp"
    [title]="'onderwerp' | pluginTranslate: obs.pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.onderwerp"
    [disabled]="obs.disabled"
    [required]="false"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>

  <v-input
    name="tekst"
    [title]="'tekst' | pluginTranslate: obs.pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.tekst"
    [disabled]="obs.disabled"
    [required]="false"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>

  <v-input
    name="aangemaaktDoor"
    [title]="'aangemaaktDoor' | pluginTranslate: obs.pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.aangemaaktDoor"
    [disabled]="obs.disabled"
    [required]="false"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>

  <v-input
    name="notitieType"
    [title]="'notitieType' | pluginTranslate: obs.pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.notitieType"
    [disabled]="obs.disabled"
    [required]="false"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>

  <v-input
    name="status"
    [title]="'status' | pluginTranslate: obs.pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.status"
    [disabled]="obs.disabled"
    [required]="false"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>
</v-form>
