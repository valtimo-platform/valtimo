<ng-container
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null
  } as obs"
>
  <v-paragraph [margin]="true" [italic]="true">
    {{ 'patchZaakNotitieInformation' | pluginTranslate: pluginId | async }}
  </v-paragraph>

  <div class="row">
    <div class="col-12">
      <button
        cdsButton="primary"
        class="add-button"
        [size]="'md'"
        [cdsOverflowMenu]="addPropertyList"
        [customPane]="true"
        placement="bottom"
      >
        {{ 'addPatchZaakNotitieProperty' | pluginTranslate: pluginId | async }}
        <svg class="cds--btn__icon" cdsIcon="add" size="16"></svg>
      </button>
    </div>
  </div>

  <v-form (valueChange)="onFormValueChanged($event)">
    @for (property of propertyList; track property) {
      <div class="row">
        <div class="col-11">
          <v-input
            [type]="property.type"
            [name]="property.name"
            [title]="property.titleTranslationKey | pluginTranslate: pluginId | async"
            [required]="property.required"
            [defaultValue]="prefillValueFor(property.name, obs.prefill)"
            [margin]="true"
            [trim]="true"
            [presetOptions]="property.presetOptions"
            (valueChange)="onPropertyChanged(property.name, $event)"
          />
        </div>
        <div class="col-1">
            <button class="btn btn-space delete-button" (click)="removeProperty(property)">
              <svg class="cds--btn__icon" cdsIcon="trash-can" size="16"></svg>
            </button>
        </div>
      </div>
    }
  </v-form>
</ng-container>

<ng-template #addPropertyList>
  @for (propertyOption of propertyOptions; track propertyOption) {
    <cds-overflow-menu-option
      *ngIf="!hasPropertyBeenAdded(propertyOption)"
      (click)="addProperty(propertyOption)"
    >
      {{ translationKeyForPropertyList(propertyOption) | pluginTranslate: pluginId | async }}
    </cds-overflow-menu-option>
  }
</ng-template>
