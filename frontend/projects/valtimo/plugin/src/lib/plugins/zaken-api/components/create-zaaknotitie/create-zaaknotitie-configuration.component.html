<ng-container
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
  } as obs"
>
  <v-paragraph [margin]="true" [italic]="true">
    {{ 'createZaakNotitieInformation' | pluginTranslate: pluginId | async }}
  </v-paragraph>

  <v-form (valueChange)="onFormValueChanged($event)">
    <v-input
      name="onderwerp"
      [title]="'onderwerp' | pluginTranslate: pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.onderwerp"
      [disabled]="obs.disabled"
      [required]="true"
      [trim]="true"
      [fullWidth]="true"
    ></v-input>

    <v-input
      name="tekst"
      [title]="'tekst' | pluginTranslate: pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.tekst"
      [disabled]="obs.disabled"
      [required]="true"
      [trim]="true"
      [fullWidth]="true"
    ></v-input>

    <v-input
      name="aangemaaktDoor"
      [title]="'aangemaaktDoor' | pluginTranslate: pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.aangemaaktDoor"
      [disabled]="obs.disabled"
      [required]="false"
      [trim]="true"
      [fullWidth]="true"
    ></v-input>

    <v-input
      name="notitieType"
      [title]="'notitieType' | pluginTranslate: pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.notitieType"
      [disabled]="obs.disabled"
      [required]="false"
      [trim]="true"
      [fullWidth]="true"
      [presetOptions]="notitieTypeOptions"
    ></v-input>

    <v-input
      name="status"
      [title]="'status' | pluginTranslate: pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.status"
      [disabled]="obs.disabled"
      [required]="false"
      [trim]="true"
      [fullWidth]="true"
      [presetOptions]="statusOptions"
    ></v-input>
  </v-form>
</ng-container>
