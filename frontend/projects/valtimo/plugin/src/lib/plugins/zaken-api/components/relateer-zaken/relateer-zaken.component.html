<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    pluginId: pluginId$ | async,
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
  } as obs"
  [attr.data-test-id]="TEST_IDS.FORM"
>
  <v-input
    name="teRelaterenZaakUri"
    [title]="'teRelaterenZaakUri' | pluginTranslate: obs.pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.teRelaterenZaakUri"
    [disabled]="obs.disabled"
    [required]="true"
    [attr.data-test-id]="TEST_IDS.FORM_TE_RELATEREN_ZAAK_URI_INPUT"
  ></v-input>
  <v-select
    [items]="aardRelatieOptions$ | async"
    name="aardRelatie"
    [title]="'aardRelatie' | pluginTranslate: obs.pluginId | async"
    [disabled]="obs.disabled"
    [defaultSelectionId]="obs.prefill?.aardRelatie"
    [required]="true"
    [attr.data-test-id]="TEST_IDS.FORM_AARD_RELATIE_SELECT"
  ></v-select>
</v-form>
