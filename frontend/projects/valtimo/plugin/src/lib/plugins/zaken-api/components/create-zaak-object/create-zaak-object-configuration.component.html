<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    pluginId: pluginId$ | async,
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
    formValue: formValue$ | async,
  } as obs"
  [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_FORM"
>
  <v-input
    name="object"
    [title]="'zaakObjectObjectUrl' | pluginTranslate: obs.pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.zaakObjectRequest?.object"
    [disabled]="obs.disabled"
    [required]="false"
    [tooltip]="'zaakObjectObjectUrlTooltip' | pluginTranslate: obs.pluginId | async"
    [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_OBJECT_INPUT"
  ></v-input>

  <v-select
    [items]="objectTypeOptions"
    name="objectType"
    [title]="'objectType' | pluginTranslate: obs.pluginId | async"
    [disabled]="obs.disabled"
    [defaultSelectionId]="obs.prefill?.zaakObjectRequest?.objectType"
    [required]="true"
    [tooltip]="'objectTypeTooltip' | pluginTranslate: obs.pluginId | async"
    [margin]="true"
    [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_OBJECT_TYPE_SELECT"
  ></v-select>

  <v-input
    name="relatieomschrijving"
    [title]="'relatieomschrijving' | pluginTranslate: obs.pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.zaakObjectRequest?.relatieomschrijving"
    [disabled]="obs.disabled"
    [required]="false"
    [tooltip]="'relatieomschrijvingTooltip' | pluginTranslate: obs.pluginId | async"
    [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_RELATIEOMSCHRIJVING_INPUT"
  ></v-input>

  @if (obs.formValue?.zaakObjectRequest?.objectType === 'zakelijk_recht') {
    <v-input
      type="checkbox"
      name="includeZakelijkRechtObjectIdentificatie"
      [title]="'objectIdentificatie' | pluginTranslate: obs.pluginId | async"
      [margin]="true"
      [defaultValue]="
        !!(
          obs.prefill?.zaakObjectRequest?.objectIdentificatie?.identificatie ||
          obs.prefill?.zaakObjectRequest?.objectIdentificatie?.avgAard
        )
      "
      [disabled]="obs.disabled"
      [required]="false"
      [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_INCLUDE_ZAKELIJK_RECHT_OBJECT_IDENTIFICATIE_CHECKBOX"
    ></v-input>

    @if (obs.formValue?.includeZakelijkRechtObjectIdentificatie) {
      <v-input
        name="zakelijkRechtIdentificatie"
        [title]="'zakelijkRechtIdentificatie' | pluginTranslate: obs.pluginId | async"
        [margin]="true"
        [defaultValue]="obs.prefill?.zaakObjectRequest?.objectIdentificatie?.identificatie"
        [disabled]="obs.disabled"
        [required]="obs.formValue?.includeZakelijkRechtObjectIdentificatie"
        [tooltip]="'zakelijkRechtIdentificatieTooltip' | pluginTranslate: obs.pluginId | async"
        [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_ZAKELIJK_RECHT_IDENTIFICATIE_INPUT"
      ></v-input>

      <v-input
        name="zakelijkRechtAvgAard"
        [title]="'zakelijkRechtAvgAard' | pluginTranslate: obs.pluginId | async"
        [margin]="true"
        [defaultValue]="obs.prefill?.zaakObjectRequest?.objectIdentificatie?.avgAard"
        [disabled]="obs.disabled"
        [required]="obs.formValue?.includeZakelijkRechtObjectIdentificatie"
        [tooltip]="'zakelijkRechtAvgAardTooltip' | pluginTranslate: obs.pluginId | async"
        [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_ZAKELIJK_RECHT_AVG_AARD_INPUT"
      ></v-input>
    }
  }

  @if (obs.formValue?.zaakObjectRequest?.objectType === 'overige') {
    <v-input
      name="objectTypeOverige"
      [title]="'objectTypeOverige' | pluginTranslate: obs.pluginId | async"
      [margin]="true"
      [defaultValue]="obs.prefill?.zaakObjectRequest?.objectTypeOverige"
      [disabled]="obs.disabled"
      [required]="obs.formValue?.zaakObjectRequest?.objectType === 'overige'"
      [tooltip]="'objectTypeOverigeTooltip' | pluginTranslate: obs.pluginId | async"
      [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_OBJECT_TYPE_OVERIGE_INPUT"
    ></v-input>

    <v-input
      type="checkbox"
      name="includeObjectTypeOverigeDefinitie"
      [title]="'objectTypeOverigeDefinitie' | pluginTranslate: obs.pluginId | async"
      [margin]="true"
      [defaultValue]="
        !!(
          obs.prefill?.zaakObjectRequest?.objectTypeOverigeDefinitie?.url ||
          obs.prefill?.zaakObjectRequest?.objectTypeOverigeDefinitie?.schema ||
          obs.prefill?.zaakObjectRequest?.objectTypeOverigeDefinitie?.objectData
        )
      "
      [disabled]="obs.disabled"
      [required]="false"
      [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_INCLUDE_OBJECT_TYPE_OVERIGE_DEFINITIE_CHECKBOX"
    ></v-input>

    @if (obs.formValue?.includeObjectTypeOverigeDefinitie) {
      <v-input
        name="objectTypeOverigeDefinitieUrl"
        [title]="'objectTypeOverigeDefinitieUrl' | pluginTranslate: obs.pluginId | async"
        [margin]="true"
        [defaultValue]="obs.prefill?.zaakObjectRequest?.objectTypeOverigeDefinitie?.url"
        [disabled]="obs.disabled"
        [required]="obs.formValue?.includeObjectTypeOverigeDefinitie"
        [tooltip]="'objectTypeOverigeDefinitieUrlTooltip' | pluginTranslate: obs.pluginId | async"
        [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_OBJECT_TYPE_OVERIGE_DEFINITIE_URL_INPUT"
      ></v-input>

      <v-input
        name="objectTypeOverigeDefinitieSchema"
        [title]="'objectTypeOverigeDefinitieSchema' | pluginTranslate: obs.pluginId | async"
        [margin]="true"
        [defaultValue]="obs.prefill?.zaakObjectRequest?.objectTypeOverigeDefinitie?.schema"
        [disabled]="obs.disabled"
        [required]="obs.formValue?.includeObjectTypeOverigeDefinitie"
        [tooltip]="
          'objectTypeOverigeDefinitieSchemaTooltip' | pluginTranslate: obs.pluginId | async
        "
        [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_OBJECT_TYPE_OVERIGE_DEFINITIE_SCHEMA_INPUT"
      ></v-input>

      <v-input
        name="objectTypeOverigeDefinitieObjectData"
        [title]="'objectTypeOverigeDefinitieObjectData' | pluginTranslate: obs.pluginId | async"
        [margin]="true"
        [defaultValue]="obs.prefill?.zaakObjectRequest?.objectTypeOverigeDefinitie?.objectData"
        [disabled]="obs.disabled"
        [required]="obs.formValue?.includeObjectTypeOverigeDefinitie"
        [tooltip]="
          'objectTypeOverigeDefinitieObjectDataTooltip' | pluginTranslate: obs.pluginId | async
        "
        [attr.data-test-id]="TEST_IDS.ZAAK_OBJECT_OBJECT_TYPE_OVERIGE_DEFINITIE_OBJECT_DATA_INPUT"
      ></v-input>
    }
  }
</v-form>
