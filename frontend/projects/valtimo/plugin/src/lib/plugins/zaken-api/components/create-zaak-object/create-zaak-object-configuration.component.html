<v-form
        (valueChange)="formValueChange($event)"
        *ngIf="{
    pluginId: pluginId$ | async,
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
    formValue: formValue$ | async,
  } as obs"
>
  <v-input
          name="zaak"
          [title]="'zaakObjectZaakUrl' | pluginTranslate: obs.pluginId | async"
          [margin]="true"
          [defaultValue]="obs.prefill?.zaakObjectRequest?.zaak"
          [disabled]="obs.disabled"
          [required]="false"
          [tooltip]="'zaakObjectZaakUrlTooltip' | pluginTranslate: obs.pluginId | async"
  ></v-input>

  <v-input
          name="object"
          [title]="'zaakObjectObjectUrl' | pluginTranslate: obs.pluginId | async"
          [margin]="true"
          [defaultValue]="obs.prefill?.zaakObjectRequest?.object"
          [disabled]="obs.disabled"
          [required]="false"
          [tooltip]="'zaakObjectObjectUrlTooltip' | pluginTranslate: obs.pluginId | async"
  ></v-input>

  <v-input
          name="zaakobjecttype"
          [title]="'zaakObjectType' | pluginTranslate: obs.pluginId | async"
          [margin]="true"
          [defaultValue]="obs.prefill?.zaakObjectRequest?.zaakobjecttype"
          [disabled]="obs.disabled"
          [required]="false"
          [tooltip]="'zaakObjectTypeTooltip' | pluginTranslate: obs.pluginId | async"
  ></v-input>

  <v-select
          [items]="objectTypeOptions"
          name="objectType"
          [title]="'objectType' | pluginTranslate: obs.pluginId | async"
          [disabled]="obs.disabled"
          [defaultSelectionId]="obs.prefill?.zaakObjectRequest?.objectType"
          [required]="true"
          [tooltip]="'objectTypeTooltip' | pluginTranslate: obs.pluginId | async"
          [margin]="true"
  ></v-select>

  <v-input
          name="relatieomschrijving"
          [title]="'relatieomschrijving' | pluginTranslate: obs.pluginId | async"
          [margin]="true"
          [defaultValue]="obs.prefill?.zaakObjectRequest?.relatieomschrijving"
          [disabled]="obs.disabled"
          [required]="false"
          [tooltip]="'relatieomschrijvingTooltip' | pluginTranslate: obs.pluginId | async"
  ></v-input>

  @if (obs.formValue?.zaakObjectRequest?.objectType === 'zakelijk_recht') {
    <v-input
            name="zakelijkRechtIdentificatie"
            [title]="'zakelijkRechtIdentificatie' | pluginTranslate: obs.pluginId | async"
            [margin]="true"
            [defaultValue]="obs.prefill?.zaakObjectRequest?.objectIdentificatie?.identificatie"
            [disabled]="obs.disabled"
            [required]="false"
            [tooltip]="'zakelijkRechtIdentificatieTooltip' | pluginTranslate: obs.pluginId | async"
    ></v-input>

    <v-input
            name="zakelijkRechtAvgAard"
            [title]="'zakelijkRechtAvgAard' | pluginTranslate: obs.pluginId | async"
            [margin]="true"
            [defaultValue]="obs.prefill?.zaakObjectRequest?.objectIdentificatie?.avgAard"
            [disabled]="obs.disabled"
            [required]="false"
            [tooltip]="'zakelijkRechtAvgAardTooltip' | pluginTranslate: obs.pluginId | async"
    ></v-input>
  }

  @if (obs.formValue?.zaakObjectRequest?.objectType === 'overige') {
    <v-input
            name="objectTypeOverige"
            [title]="'objectTypeOverige' | pluginTranslate: obs.pluginId | async"
            [margin]="true"
            [defaultValue]="obs.prefill?.zaakObjectRequest?.zaakObjectRequest?.objectTypeOverige"
            [disabled]="obs.disabled"
            [required]="false"
            [tooltip]="'objectTypeOverigeTooltip' | pluginTranslate: obs.pluginId | async"
    ></v-input>

    <v-input
            name="objectTypeOverigeDefinitieUrl"
            [title]="'objectTypeOverigeDefinitieUrl' | pluginTranslate: obs.pluginId | async"
            [margin]="true"
            [defaultValue]="obs.prefill?.zaakObjectRequest?.objectTypeOverigeDefinitie?.url"
            [disabled]="obs.disabled"
            [required]="false"
            [tooltip]="'objectTypeOverigeDefinitieUrlTooltip' | pluginTranslate: obs.pluginId | async"
    ></v-input>

    <v-input
            name="objectTypeOverigeDefinitieSchema"
            [title]="'objectTypeOverigeDefinitieSchema' | pluginTranslate: obs.pluginId | async"
            [margin]="true"
            [defaultValue]="obs.prefill?.zaakObjectRequest?.objectTypeOverigeDefinitie?.schema"
            [disabled]="obs.disabled"
            [required]="false"
            [tooltip]="'objectTypeOverigeDefinitieSchemaTooltip' | pluginTranslate: obs.pluginId | async"
    ></v-input>

    <v-input
            name="objectTypeOverigeDefinitieObjectData"
            [title]="'objectTypeOverigeDefinitieObjectData' | pluginTranslate: obs.pluginId | async"
            [margin]="true"
            [defaultValue]="obs.prefill?.zaakObjectRequest?.objectTypeOverigeDefinitie?.objectData"
            [disabled]="obs.disabled"
            [required]="false"
            [tooltip]="'objectTypeOverigeDefinitieObjectDataTooltip' | pluginTranslate: obs.pluginId | async"
    ></v-input>
  }

</v-form>
