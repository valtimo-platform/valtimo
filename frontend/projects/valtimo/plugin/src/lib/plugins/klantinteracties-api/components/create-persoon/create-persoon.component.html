<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
  } as obs"
>
  <v-input
    name="bsn"
    [title]="'bsn' | pluginTranslate: pluginId | async"
    [tooltip]="'bsnTooltip' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.bsn"
    [disabled]="obs.disabled"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>
  <v-input
    name="voorletters"
    [title]="'voorletters' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.voorletters"
    [disabled]="obs.disabled"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>
  <v-input
    name="voornaam"
    [title]="'voornaam' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.voornaam"
    [disabled]="obs.disabled"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>
  <v-input
    name="voorvoegselAchternaam"
    [title]="'voorvoegselAchternaam' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.voorvoegselAchternaam"
    [disabled]="obs.disabled"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>
  <v-input
    name="achternaam"
    [title]="'achternaam' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.achternaam"
    [disabled]="obs.disabled"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>
  <v-input
    name="processVariableName"
    [title]="'processVariableName' | pluginTranslate: pluginId | async"
    [tooltip]="'processVariableNameTooltip' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.processVariableName"
    [disabled]="obs.disabled"
    [trim]="true"
    [fullWidth]="true"
  ></v-input>
</v-form>
