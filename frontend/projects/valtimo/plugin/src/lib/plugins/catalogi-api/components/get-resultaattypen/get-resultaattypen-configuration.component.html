<ng-container
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null
  } as obs"
>
  <v-paragraph [margin]="true" [italic]="true">
    {{ 'getResultaattypenInformation' | pluginTranslate: pluginId }}
  </v-paragraph>

  <v-form (valueChange)="formValueChange($event)">
    <v-input
      name="processVariable"
      [title]="'processVariable' | pluginTranslate: pluginId"
      [margin]="true"
      [defaultValue]="obs.prefill?.processVariable"
      [disabled]="obs.disabled"
      [required]="true"
      [trim]="true"
      [tooltip]="'processVariableTooltip' | pluginTranslate: pluginId"
      [fullWidth]="true"
    >
    </v-input>

    <v-input
      name="zaakTypeUrl"
      [title]="'zaakTypeUrl' | pluginTranslate: pluginId"
      [margin]="true"
      [defaultValue]="obs.prefill?.zaakTypeUrl"
      [disabled]="obs.disabled"
      [required]="false"
      [trim]="true"
      [tooltip]="'zaakTypeUrlTooltip' | pluginTranslate: pluginId"
      [fullWidth]="true"
    >
    </v-input>
  </v-form>
</ng-container>
