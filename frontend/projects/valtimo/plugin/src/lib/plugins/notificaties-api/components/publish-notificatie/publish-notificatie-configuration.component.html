<v-form
  (valueChange)="formValueChange($event)"
  *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
  } as obs"
>
  <v-input
    name="kanaal"
    [title]="'kanaal' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.kanaal"
    [disabled]="obs.disabled"
    [required]="true"
    [trim]="true"
    [tooltip]="'kanaalTooltip' | pluginTranslate: pluginId | async"
    [fullWidth]="true"
  >
  </v-input>
  <v-input
    name="hoofdObject"
    [title]="'hoofdObject' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.hoofdObject"
    [disabled]="obs.disabled"
    [required]="true"
    [trim]="true"
    [tooltip]="'hoofdObjectTooltip' | pluginTranslate: pluginId | async"
    [fullWidth]="true"
  >
  </v-input>
  <v-input
    name="resource"
    [title]="'resource' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.resource"
    [disabled]="obs.disabled"
    [required]="true"
    [trim]="true"
    [tooltip]="'resourceTooltip' | pluginTranslate: pluginId | async"
    [fullWidth]="true"
  >
  </v-input>
  <v-input
    name="resourceUrl"
    [title]="'resourceUrl' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.resourceUrl"
    [disabled]="obs.disabled"
    [required]="true"
    [trim]="true"
    [tooltip]="'resourceUrlTooltip' | pluginTranslate: pluginId | async"
    [fullWidth]="true"
  >
  </v-input>
  <v-input
    name="actie"
    [title]="'actie' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.actie"
    [disabled]="obs.disabled"
    [required]="true"
    [trim]="true"
    [tooltip]="'actieTooltip' | pluginTranslate: pluginId | async"
    [fullWidth]="true"
  >
  </v-input>
  <v-input
    name="aanmaakdatum"
    [title]="'aanmaakdatum' | pluginTranslate: pluginId | async"
    [margin]="true"
    [defaultValue]="obs.prefill?.aanmaakdatum"
    [disabled]="obs.disabled"
    [required]="false"
    [trim]="true"
    [tooltip]="'aanmaakdatumTooltip' | pluginTranslate: pluginId | async"
    [fullWidth]="true"
  >
  </v-input>
  <valtimo-carbon-multi-input
    type="keyValue"
    [title]="'kenmerken' | pluginTranslate: pluginId | async"
    [keyColumnTitle]="'kenmerkenKey' | pluginTranslate: pluginId | async"
    [valueColumnTitle]="'kenmerkenValue' | pluginTranslate: pluginId | async"
    [addRowTranslationKey]="'kenmerkenAddRow' | pluginTranslate: pluginId | async"
    [deleteRowTranslationKey]="'kenmerkenDeleteRow' | pluginTranslate: pluginId | async"
    [tooltip]="'kenmerkenTooltip' | pluginTranslate: pluginId | async"
    [disabled]="obs.disabled"
    [margin]="true"
    [defaultValues]="kenmerkenDefaultValues"
    [minimumAmountOfRows]="0"
    [initialAmountOfRows]="0"
    (valueChange)="kenmerkenChange($event)"
  >
  </valtimo-carbon-multi-input>
</v-form>
