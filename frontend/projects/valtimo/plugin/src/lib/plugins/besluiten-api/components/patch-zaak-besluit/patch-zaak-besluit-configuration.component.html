<ng-container
        *ngIf="{
    disabled: disabled$ | async,
    prefill: prefillConfiguration$ ? (prefillConfiguration$ | async) : null,
  } as obs"
>
  <v-paragraph [margin]="true" [italic]="true">
    {{ 'patchZaakBesluitInformation' | pluginTranslate: pluginId | async }}
  </v-paragraph>

  <v-form (valueChange)="formValueChange($event)">
    <v-input
            name="besluitUrl"
            [title]="'besluitUrl' | pluginTranslate: pluginId | async"
            [margin]="true"
            [defaultValue]="obs.prefill?.besluitUrl"
            [disabled]="obs.disabled"
            [required]="true"
            [trim]="true"
            [tooltip]="'besluitUrlTooltip' | pluginTranslate: pluginId | async"
            [widthPx]="350"
    ></v-input>

    <v-input
            name="beslisdatum"
            [title]="'beslisdatum' | pluginTranslate: pluginId | async"
            [defaultValue]="obs.prefill?.beslisdatum"
            [disabled]="obs.disabled"
            [required]="false"
            [trim]="true"
            [tooltip]="'beslisdatumTooltip' | pluginTranslate: pluginId | async"
            [widthPx]="350"
            [margin]="true"
    ></v-input>

    <v-input
            name="toelichting"
            [title]="'toelichting' | pluginTranslate: pluginId | async"
            [margin]="true"
            [defaultValue]="obs.prefill?.toelichting"
            [disabled]="obs.disabled"
            [required]="false"
            [tooltip]="'toelichtingTooltip' | pluginTranslate: pluginId | async"
            [widthPx]="350"
    ></v-input>
    <v-input
            name="bestuursorgaan"
            [title]="'bestuursorgaan' | pluginTranslate: pluginId | async"
            [margin]="true"
            [defaultValue]="obs.prefill?.bestuursorgaan"
            [disabled]="obs.disabled"
            [required]="false"
            [trim]="true"
            [tooltip]="'bestuursorgaanTooltip' | pluginTranslate: pluginId | async"
            [widthPx]="350"
    >
    </v-input>

    <v-input
            name="ingangsdatum"
            [title]="'ingangsdatum' | pluginTranslate: pluginId | async"
            [defaultValue]="obs.prefill?.ingangsdatum"
            [disabled]="obs.disabled"
            [required]="false"
            [trim]="true"
            [tooltip]="'ingangsdatumTooltip' | pluginTranslate: pluginId | async"
            [widthPx]="350"
            [margin]="true"
    ></v-input>

    <v-input
            name="vervaldatum"
            [title]="'vervaldatum' | pluginTranslate: pluginId | async"
            [defaultValue]="obs.prefill?.vervaldatum"
            [disabled]="obs.disabled"
            [required]="false"
            [trim]="true"
            [tooltip]="'vervaldatumTooltip' | pluginTranslate: pluginId | async"
            [widthPx]="350"
            [margin]="true"
    ></v-input>
    <v-input
            name="vervalreden"
            [title]="'vervalreden' | pluginTranslate: pluginId | async"
            [defaultValue]="obs.prefill?.vervalreden"
            [disabled]="obs.disabled"
            [required]="false"
            [trim]="true"
            [tooltip]="'vervalredenTooltip' | pluginTranslate: pluginId | async"
            [widthPx]="350"
            [margin]="true"
    ></v-input>
    <v-input
            name="publicatiedatum"
            [title]="'publicatiedatum' | pluginTranslate: pluginId | async"
            [defaultValue]="obs.prefill?.publicatiedatum"
            [disabled]="obs.disabled"
            [required]="false"
            [trim]="true"
            [tooltip]="'publicatiedatumTooltip' | pluginTranslate: pluginId | async"
            [widthPx]="350"
            [margin]="true"
    ></v-input>

    <v-input
            name="verzenddatum"
            [title]="'verzenddatum' | pluginTranslate: pluginId | async"
            [defaultValue]="obs.prefill?.verzenddatum"
            [disabled]="obs.disabled"
            [required]="false"
            [trim]="true"
            [tooltip]="'verzenddatumTooltip' | pluginTranslate: pluginId | async"
            [widthPx]="350"
            [margin]="true"
    ></v-input>

    <v-input
            name="uiterlijkeReactieDatum"
            [title]="'uiterlijkeReactieDatum' | pluginTranslate: pluginId | async"
            [defaultValue]="obs.prefill?.uiterlijkeReactieDatum"
            [disabled]="obs.disabled"
            [required]="false"
            [trim]="true"
            [tooltip]="'uiterlijkeReactieDatumTooltip' | pluginTranslate: pluginId | async"
            [widthPx]="350"
            [margin]="true"
    ></v-input>

  </v-form>

</ng-container>
