<ng-container *ngIf="listItems$ | async as items; else loading">
  <p class="step-description">
    {{ pageHeaderText$ | async | translate }}
  </p>
  <div class="list-container">
    <cds-structured-list (selected)="selected($event)" selection="true">
      <cds-list-header>
        <cds-list-column nowrap="true"></cds-list-column>
        <cds-list-column nowrap="true">
          {{ columnHeaderText$ | async | translate }}
        </cds-list-column>
        <cds-list-column>
          {{ 'processLinkConfiguration.pluginDescription' | translate }}
        </cds-list-column>
      </cds-list-header>
      <cds-list-row *ngFor="let item of items" [value]="item.payload">
        <cds-list-column>
          <div *ngIf="item.logo">
            <img [src]="item.logo" [title]="item.title" class="plugin-configuration-logo" />
          </div>
        </cds-list-column>
        <cds-list-column>{{ item.title }}</cds-list-column>
        <cds-list-column>{{ item.description }}</cds-list-column>
      </cds-list-row>
    </cds-structured-list>
  </div>
</ng-container>

<ng-template #loading>
  <div class="loading-container">
    <cds-loading></cds-loading>
  </div>
</ng-template>
