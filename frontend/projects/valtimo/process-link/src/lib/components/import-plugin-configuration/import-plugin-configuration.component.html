<cds-toggletip [autoAlign]="true" [isOpen]="open$ | async">
  <button
    class="process-link-configuration-import-button"
    [disabled]="((compatiblePluginProcessLinks$ | async) || []).length === 0"
    cdsToggletipButton
  >
    {{ 'processLinkConfiguration.importConfiguration' | translate }}
  </button>

  <div cdsToggletipContent data-carbon-theme="g90" class="process-link-configuration-select">
    <cds-dropdown
      [label]="'processLinkConfiguration.process' | translate"
      [placeholder]="'processLinkConfiguration.selectProcess' | translate"
      (selected)="processSelected($event)"
      [appendInline]="true"
    >
      <cds-dropdown-list
        [items]="processListItems$ | async"
        onclick="event.stopPropagation()"
      ></cds-dropdown-list>
    </cds-dropdown>

    <cds-dropdown
      [label]="'processLinkConfiguration.version' | translate"
      [placeholder]="'processLinkConfiguration.selectVersion' | translate"
      [disabled]="!process.value"
      (selected)="versionSelected($event)"
      [appendInline]="true"
    >
      <cds-dropdown-list
        [items]="versionListItems$ | async"
        onclick="event.stopPropagation()"
      ></cds-dropdown-list>
    </cds-dropdown>

    <cds-dropdown
      [label]="'processLinkConfiguration.activity' | translate"
      [placeholder]="'processLinkConfiguration.selectActivity' | translate"
      [disabled]="!process.value || !version.value"
      (selected)="activitySelected($event)"
      [appendInline]="true"
    >
      <cds-dropdown-list
        [items]="activityListItems$ | async"
        onclick="event.stopPropagation()"
      ></cds-dropdown-list>
    </cds-dropdown>

    <button cdsButton [disabled]="!importPluginForm.valid" (click)="onSubmit()">
      {{ 'processLinkConfiguration.importConfiguration' | translate }}
    </button>
  </div>
</cds-toggletip>
