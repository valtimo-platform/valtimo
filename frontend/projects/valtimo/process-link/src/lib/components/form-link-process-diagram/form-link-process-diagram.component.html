<div class="container-fluid">
  <div class="row p-4 bg-white">
    <div class="col">
      <div #ref class="diagram-container" data-test-id="diagram-container"></div>
    </div>
  </div>
</div>
<div class="p-4 text-center legenda-holder">
  <span data-test-id="diagram-instructions">Click on a User Task to specify a form definition for that User Task.</span>
</div>

<ng-container renderInPageHeader [fullWidth]="true">
  <ng-template>
    <div class="form-link-dossier-actions">
      <cds-select [label]="'Process'" (change)="setProcessDefinitionKey($event.target.value)" data-test-id="diagram-process-select">
        <option
          *ngFor="let processDefinition of processDefinitions"
          [value]="processDefinition.key"
          [selected]="processDefinitionKey === processDefinition.key"
          data-test-id="diagram-process-option-{{$index}}"
        >
          {{ processDefinition.name }}
        </option>
      </cds-select>
      <cds-select [label]="'Version'" (change)="setProcessDefinitionVersion($event.target.value)" data-test-id="diagram-version-select">
        <option
          *ngFor="let processDefinitionVersion of processDefinitionVersions"
          [value]="processDefinitionVersion.version"
          [selected]="processDefinitionVersion.version === version"
          data-test-id="diagram-version-option-{{$index}}"
        >
          {{ processDefinitionVersion.version }}
        </option>
      </cds-select>
    </div>
  </ng-template>
</ng-container>
