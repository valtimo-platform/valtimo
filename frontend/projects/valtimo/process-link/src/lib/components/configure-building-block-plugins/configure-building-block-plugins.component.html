<div class="configure-building-block-plugins">

  <ng-container *ngIf="versions$ | async as versions">
    <div class="version-select">
      <cds-select
        cdsLayer
        [label]="'processLinkConfiguration.buildingBlock.versionLabel' | translate"
        [value]="selectedVersion || ''"
        (change)="onVersionChange($event.target.value)"
      >
        <option value="">
          {{ 'processLinkConfiguration.buildingBlock.versionPlaceholder' | translate }}
        </option>
        <option *ngFor="let version of versions" [value]="version">
          {{ version }}
        </option>
      </cds-select>
    </div>
  </ng-container>

  <div class="loading-container" *ngIf="loading$ | async">
    <cds-loading></cds-loading>
  </div>

  <ng-container *ngIf="!(loading$ | async)">

    <ng-container *ngIf="selectedVersion">
      <ng-container *ngIf="pluginKeys$ | async as pluginKeys">
        <div class="empty-state" *ngIf="pluginKeys.length === 0">
          {{ 'processLinkConfiguration.buildingBlock.noRequirements' | translate }}
        </div>

        <div
          class="plugin-row"
          *ngFor="let pluginKey of pluginKeys; trackBy: trackByPluginKey"
        >
          <div class="plugin-row__header">
            <h4>{{ pluginLabel(pluginKey) }}</h4>
          </div>

          <ng-container *ngIf="optionsFor(pluginKey) | async as options">
            <cds-select
              cdsLayer
              [label]="
                'processLinkConfiguration.buildingBlock.configurationLabel' | translate
              "
              [value]="selectedMappings[pluginKey] || ''"
              (change)="onMappingChange(pluginKey, $event.target.value)"
            >
              <option value="">
                {{
                  'processLinkConfiguration.buildingBlock.configurationPlaceholder'
                    | translate
                }}
              </option>
              <option *ngFor="let option of options" [value]="option.id">
                {{ option.title }}
              </option>
            </cds-select>

            <div class="helper-text warning" *ngIf="options.length === 0">
              {{
                'processLinkConfiguration.buildingBlock.noConfigurationsForPlugin'
                  | translate
              }}
            </div>

            <div
              class="helper-text warning"
              *ngIf="options.length > 0 && !selectedMappings[pluginKey]"
            >
              {{
                'processLinkConfiguration.buildingBlock.selectConfigurationWarning'
                  | translate
              }}
            </div>
          </ng-container>
        </div>
      </ng-container>
    </ng-container>
  </ng-container>
</div>
