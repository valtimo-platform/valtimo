<ng-container *ngIf="isExternalPlugin$ | async; else embeddedConfig">
  <div class="external-action-config">
    <p class="step-description">
      {{ 'processLinkConfiguration.externalPluginActionProperties' | translate }}
    </p>
    <div class="cds--form-item">
      <label class="cds--label">{{ 'processLinkConfiguration.actionPropertiesJson' | translate }}</label>
      <textarea
        class="cds--text-area"
        rows="10"
        [ngModel]="externalActionPropertiesJson"
        (ngModelChange)="onExternalActionPropertiesChange($event)"
        [class.cds--text-area--invalid]="!externalActionPropertiesValid"
      ></textarea>
      <div *ngIf="!externalActionPropertiesValid" class="cds--form-requirement">
        {{ 'processLinkConfiguration.invalidJson' | translate }}
      </div>
    </div>
  </div>
</ng-container>

<ng-template #embeddedConfig>
  <valtimo-import-plugin-configuration
    [pluginActionKey]="functionKey$ | async"
    (configurationEvent)="onImportConfiguration($event)"
  ></valtimo-import-plugin-configuration>

  <valtimo-plugin-configuration-container
    [pluginDefinitionKey]="pluginDefinitionKey$ | async"
    [functionKey]="functionKey$ | async"
    [save$]="save$"
    [disabled$]="saving$"
    [selectedPluginConfiguration$]="selectedPluginConfiguration$"
    [prefillConfiguration$]="prefillConfiguration$"
    (valid)="onValid($event)"
    (configuration)="onConfiguration($event)"
    type="function"
  ></valtimo-plugin-configuration-container>
</ng-template>
