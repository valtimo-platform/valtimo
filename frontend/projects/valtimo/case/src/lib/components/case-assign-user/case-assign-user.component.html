<ng-container
  *ngIf="{
    disabled: disabled$ | async,
    assigneeFullName: assigneeFullName$ | async,
    assigneeId: assigneeId$ | async,
    userItems: userItems$ | async,
    mouseIsOverAssignee: mouseIsOverAssignee$ | async,
    selectedUserId: selectedUserId$ | async,
  } as obs"
>
  <ng-container *ngIf="obs.assigneeId || hasPermission">
    <div
      class="assign-user-container"
      (mouseenter)="onMouseEnterAssignee()"
      (mouseleave)="onMouseLeaveAssignee()"
    >
      <div
        class="assignee-text element"
        [ngClass]="{
          active: hasPermission
            ? obs.assigneeId && !obs.mouseIsOverAssignee
            : obs.assigneeId,
        }"
      >
        <span class="bold">{{ 'assignDocument.assignedTo' | translate }}</span>
        &nbsp;
        <span class="name">{{ obs.assigneeFullName }}</span>
      </div>

      <button
        *ngIf="hasPermission && obs.assigneeId"
        cdsButton="ghost"
        class="element remove-button"
        [ngClass]="{active: obs.assigneeId && obs.mouseIsOverAssignee}"
        [disabled]="obs.disabled"
        size="sm"
        (click)="unassignDocument()"
      >
        {{ 'assignDocument.remove' | translate }}
      </button>

      <cds-toggletip
        *ngIf="hasPermission"
        align="bottom"
        class="element main"
        [autoAlign]="true"
        [isOpen]="open$ | async"
        [ngClass]="{active: !obs.assigneeId}"
        (onOpen)="clear()"
      >
        <button
          cdsToggletipButton
          [removeClassnames]="['cds--toggletip-button']"
          cdsButton="tertiary"
          size="sm"
          class="set-assignee-button"
        >
          {{ 'assignDocument.header' | translate }}

          <svg class="cds--btn__icon" cdsIcon="user--follow" size="16"></svg>
        </button>

        <div
          cdsToggletipContent
          class="assign-case-popover-content"
        >
          <cds-combo-box
            *ngIf="!obs.assigneeId"
            [attr.data-carbon-theme]="toggletipTheme$ | async"
            [label]="'assignDocument.header' | translate"
            [placeholder]="'interface.typeToSearch' | translate"
            [appendInline]="true"
            [dropUp]="false"
            [cdsLayer]="1"
            [items]="obs?.userItems || []"
            [disabled]="obs.disabled"
            (selected)="onUserSelect($event)"
          >
            <cds-dropdown-list onclick="event.stopPropagation()"></cds-dropdown-list>
          </cds-combo-box>

          <button
            cdsButton
            [attr.data-carbon-theme]="toggletipTheme$ | async"
            class="submit-assignee-button"
            [disabled]="!obs.selectedUserId || obs.disabled"
            (click)="onSubmitButtonClick()"
          >
            {{ 'assignDocument.submitButtonText' | translate }}

            <svg class="cds--btn__icon" cdsIcon="user--follow" size="16"></svg>
          </button>

          <ng-container *ngIf="!obs.userItems">
            <span class="loading-text" [attr.data-carbon-theme]="toggletipTheme$ | async">{{ 'assignDocument.fetchingUsers' | translate }}</span>
          </ng-container>
        </div>
      </cds-toggletip>
    </div>
  </ng-container>
</ng-container>
