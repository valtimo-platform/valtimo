<ng-container
  *ngIf="{
    fields: fields$ | async,
    documentItems: documentItems$ | async,
    noResultsMessage: noResultsMessage$ | async,
    searchFields: searchFields$ | async,
    schema: schema$ | async,
    showAssignModal: showAssignModal$ | async,
    selectedCaseIds: selectedCaseIds$ | async,
    statuses: statuses$ | async,
    caseTags: caseTags$ | async,
    selectedStatuses: selectedStatuses$ | async,
    selectedCaseTags: selectedCaseTags$ | async,
    showStatusSelector: showStatusSelector$ | async,
    showCaseTagsSelector: showCaseTagsSelector$ | async,
    loaded:
      !loadingFields &&
      !loadingPagination &&
      !loadingSearchFields &&
      !loadingAssigneeFilter &&
      !loadingDocumentItems,
  } as obs"
>
  <valtimo-case-list-actions
    [loading]="!obs.loaded"
    (formFlowComplete)="forceRefresh()"
    (startButtonDisableEvent)="onStartButtonDisableEvent($event)"
  ></valtimo-case-list-actions>

  <ng-container *ngTemplateOutlet="searchFields; context: {obs: obs}"></ng-container>

  <ng-container *ngIf="obs.loaded; else loading">
    <ng-container *ngTemplateOutlet="list; context: {obs: obs}"></ng-container>
  </ng-container>

  <ng-container *ngTemplateOutlet="bulkAssignModal; context: {obs: obs}"></ng-container>

  <ng-container *ngTemplateOutlet="changePageModal"></ng-container>

  <ng-container *ngTemplateOutlet="changeTabModal"></ng-container>
</ng-container>

<ng-template #searchFields let-obs="obs">
  <valtimo-search-fields
    [searchFields]="obs.searchFields"
    (doSearch)="search($event)"
    [caseDefinitionKey]="caseDefinitionKey$ | async"
    [defaultValues]="searchFieldValues$ | async"
    [inputDisabled]="!obs.loaded"
    [externalSearchField]="obs.showStatusSelector"
  >
    <valtimo-status-selector
      *ngIf="obs.showStatusSelector"
      [statuses]="obs.statuses"
      [selectedStatuses]="obs.selectedStatuses"
      [disabled]="!obs.loaded"
      (selectedStatusesChangeEvent)="onSelectedStatusesChange($event)"
    ></valtimo-status-selector>

    <valtimo-case-tags-selector
      *ngIf="obs.showCaseTagsSelector"
      [caseTags]="obs.caseTags"
      [selectedCaseTags]="obs.selectedCaseTags"
      [disabled]="!obs.loaded"
      (selectedCaseTagsChangeEvent)="onSelectedCaseTagsChange($event)"
    ></valtimo-case-tags-selector>
  </valtimo-search-fields>
</ng-template>

<ng-template #list let-obs="obs">
  <valtimo-carbon-list
    [fields]="obs.fields"
    [header]="false"
    [initialSortState]="pagination.sort"
    [items]="obs.documentItems"
    [pagination]="pagination"
    paginationIdentifier="caseList"
    lockedTooltipTranslationKey="case.rowLocked"
    [showSelectionColumn]="canHaveAssignee"
    [tableTranslations]="tableTranslations"
    (paginationClicked)="pageChange($event)"
    (paginationSet)="pageSizeChange($event)"
    (rowClicked)="rowClick($event)"
    (sortChanged)="sortChanged($event)"
  >
    <ng-container carbonToolbarActions>
      <button cdsButton="primary" (click)="showAssignModal()">
        {{ 'case.bulkAssign.assign' | translate }}
      </button>
    </ng-container>

    <div carbonToolbarContent>
      <ng-container *ngTemplateOutlet="caseListActions"></ng-container>
    </div>

    <valtimo-no-results
      [action]="obs.noResultsMessage.isSearchResult ? null : caseListActions"
      [description]="obs.noResultsMessage.description | translate"
      [title]="obs.noResultsMessage.title | translate"
    ></valtimo-no-results>

    <div tabs *ngIf="canHaveAssignee">
      <ng-container *ngTemplateOutlet="tabs"></ng-container>
    </div>
  </valtimo-carbon-list>
</ng-template>

<ng-template #tabs>
  <ng-container *ngIf="assigneeFilter$ | async as assigneeFilter">
    <cds-tabs *ngIf="!visibleCaseTabs; else configuredTabs" type="contained" class="case-list-tabs">
      <cds-tab
        *ngFor="let tab of defaultTabs; trackBy: trackByIndex"
        [active]="assigneeFilter === tab"
        heading="{{ 'case.tabs.' + tab | translate }}"
        [id]="tab"
        (selected)="tabChange(tab)"
      ></cds-tab>
    </cds-tabs>
  </ng-container>
</ng-template>

<ng-template #configuredTabs>
  <ng-container *ngIf="assigneeFilter$ | async as assigneeFilter">
    <cds-tabs type="contained" class="case-list-tabs">
      <cds-tab
        *ngFor="let tab of visibleCaseTabs; trackBy: trackByIndex"
        [active]="assigneeFilter === tab"
        heading="{{ 'case.tabs.' + tab | translate }}"
        [id]="tab"
        (selected)="tabChange(tab)"
      ></cds-tab>
    </cds-tabs>
  </ng-container>
</ng-template>

<ng-template #loading
  ><valtimo-carbon-list [loading]="true">
    <div tabs *ngIf="canHaveAssignee">
      <ng-container *ngTemplateOutlet="tabs"></ng-container>
    </div> </valtimo-carbon-list
></ng-template>

<ng-template #bulkAssignModal let-obs="obs">
  <valtimo-case-bulk-assign-modal
    [documentIds]="obs.selectedCaseIds"
    [open]="obs.showAssignModal"
    (closeEvent)="onCloseEvent($event, obs.selectedCaseIds)"
  ></valtimo-case-bulk-assign-modal>
</ng-template>

<ng-template #changePageModal>
  <valtimo-confirmation-modal
    confirmButtonTextTranslationKey="case.changePageModal.confirm"
    contentTranslationKey="case.changePageModal.content"
    [outputOnConfirm]="paginationChange$ | async"
    [showModalSubject$]="showChangePageModal$"
    titleTranslationKey="case.changePageModal.title"
    (confirmEvent)="onChangePageConfirm($event)"
  ></valtimo-confirmation-modal>
</ng-template>

<ng-template #changeTabModal>
  <valtimo-confirmation-modal
    confirmButtonTextTranslationKey="case.changeTabModal.confirm"
    contentTranslationKey="case.changeTabModal.content"
    [outputOnConfirm]="tabChange$ | async"
    [showModalSubject$]="showChangeTabModal$"
    titleTranslationKey="case.changeTabModal.title"
    (cancelEvent)="onChangeTabCancel()"
    (confirmEvent)="onChangeTabConfirm($event)"
  ></valtimo-confirmation-modal>
</ng-template>

<ng-template #caseListActions>
  <button
    *ngIf="canCreateCase$ | async"
    cdsButton="primary"
    [disabled]="disableStartButton$ | async"
    (click)="startCase()"
  >
    {{ 'Start Case' | translate }}

    <svg cdsIcon="add" size="16" class="cds--btn__icon"></svg>
  </button>
</ng-template>
