<ng-container [ngSwitch]="$state()">
  <div *ngSwitchCase="'loading'" class="external-plugin-tab__status">
    <cds-loading [isActive]="true" [overlay]="false" size="normal"></cds-loading>
  </div>

  <div *ngSwitchCase="'error'" class="external-plugin-tab__status external-plugin-tab__status--error">
    {{ 'caseManagement.tabManagement.externalPlugin.loadError' | translate }}
  </div>

  <ng-container *ngSwitchCase="'ready'">
    <div *ngIf="!$iframeReady()" class="external-plugin-tab__status">
      <cds-loading [isActive]="true" [overlay]="false" size="normal"></cds-loading>
    </div>

    <valtimo-external-plugin-iframe
      [bundleUrl]="$content()!.bundleUrl!"
      [configurationId]="$content()!.configurationId"
      [context]="$content()!.context"
      [pluginDataUrl]="$pluginDataUrl()"
      [userToken]="$userToken()"
      (readyEvent)="onIframeReady()"
    ></valtimo-external-plugin-iframe>
  </ng-container>
</ng-container>
