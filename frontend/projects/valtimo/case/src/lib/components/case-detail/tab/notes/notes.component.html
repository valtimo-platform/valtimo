<ng-container
  *ngIf="{
    canAdd: canAdd$ | async,
    notes: notes$ | async,
    pagination: pagination$ | async,
    loading: loading$ | async,
  } as obs"
>
  <div class="cds--toolbar-content">
    <button
      cdsButton="primary"
      *ngIf="obs.canAdd"
      [disabled]="obs.loading"
      (click)="showAddModal()"
      aria-expanded="false"
      aria-haspopup="true"
      [attr.data-test-id]="TEST_IDS.CASE_DETAIL_ADD_NOTE_BUTTON"
    >
      {{ 'case.notes.addNote' | translate }}

      <svg class="cds--btn__icon" cdsIcon="add" size="16"></svg>
    </button>
  </div>

  <div *ngIf="timelineItems">
    <valtimo-timeline
      *ngIf="timelineItems.length > 0"
      [actions]="actions"
      [items]="timelineItems"
      [attr.data-test-id]="TEST_IDS.CASE_DETAIL_TIMELINE"
    ></valtimo-timeline>

    <valtimo-no-results
      *ngIf="timelineItems.length === 0"
      [description]="'case.notes.noResults.description' | translate"
      [title]="'case.notes.noResults.title' | translate"
      illustration="valtimo-layout/img/emptystate-no-result.svg"
      [attr.data-test-id]="TEST_IDS.CASE_DETAIL_NO_RESULTS"
    ></valtimo-no-results>
  </div>

  <valtimo-spinner
    [useBootstrapSpinner]="false"
    name="auditSpinner"
    bdColor="rgba(125, 125, 125, 0.35)"
    color="#264251"
    type="square-jelly-box"
    [attr.data-test-id]="TEST_IDS.CASE_DETAIL_SPINNER"
  >
  </valtimo-spinner>

  <div *ngIf="obs.pagination" class="d-flex justify-content-end row mr-0 ml-0">
    <ngb-pagination
      *ngIf="obs.pagination.collectionSize > obs.pagination.size"
      [collectionSize]="obs.pagination.collectionSize"
      [maxSize]="obs.pagination.size"
      [pageSize]="obs.pagination.size"
      [rotate]="true"
      [(page)]="obs.pagination.page"
      (pageChange)="paginationClicked($event)"
      [attr.data-test-id]="TEST_IDS.CASE_DETAIL_PAGINATION"
    ></ngb-pagination>
  </div>
</ng-container>

<valtimo-note-modal
  [customData]="customData$ | async"
  [modalType]="modalType$ | async"
  [open]="modalOpen$ | async"
  (modalClosed)="onModalClosed($event)"
  [attr.data-test-id]="TEST_IDS.CASE_DETAIL_NOTE_MODAL"
></valtimo-note-modal>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="case.notes.deleteConfirmation.description"
  [outputOnConfirm]="idToDelete$ | async"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="case.notes.deleteConfirmation.title"
  (confirmEvent)="onDeleteConfirm($event)"
  [attr.data-test-id]="TEST_IDS.CASE_DETAIL_CONFIRMATION_MODAL"
></valtimo-confirmation-modal>
