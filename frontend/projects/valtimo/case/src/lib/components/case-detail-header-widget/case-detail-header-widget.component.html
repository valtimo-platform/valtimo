@if (canViewCaseHeaderWidget$ | async) {
  <ng-container
    *ngIf="{
      headerWidget: headerWidget$ | async,
      headerWidgetData: headerWidgetData$ | async,
    } as obs"
  >
    <div *ngIf="obs.headerWidget" class="header-widget-container">
      @if (!obs.headerWidgetData) {
        <div class="header-widget-container__loader"><cds-loading size="sm"></cds-loading></div>
      } @else {
        <valtimo-widget-field
          [cdsLayer]="1"
          [widgetConfiguration]="obs.headerWidget"
          [widgetData]="obs.headerWidgetData"
        ></valtimo-widget-field>
      }
    </div>
  </ng-container>
}
