<cds-modal valtimoCdsModal [open]="open" size="sm" showFooter="true" (close)="onCancel()" [attr.data-test-id]="TEST_IDS.NOTE_MODAL">
  <cds-modal-header [showCloseButton]="true" (closeSelect)="onCancel()" [attr.data-test-id]="TEST_IDS.NOTE_MODAL_HEADER">
    <h3 cdsModalHeaderHeading [attr.data-test-id]="TEST_IDS.NOTE_MODAL_TITLE">
      {{ 'case.notes.' + modalType + 'Note' | translate }}
    </h3>
  </cds-modal-header>

  <form [formGroup]="formGroup" cdsModalContent [attr.data-test-id]="TEST_IDS.NOTE_MODAL_FORM">
    <cds-textarea-label [attr.data-test-id]="TEST_IDS.NOTE_MODAL_CONTENT_LABEL">
      {{ 'case.notes.input.content' | translate }}

      <textarea
        cdsTextArea
        cdsLayer="1"
        class="valtimo-note-modal__textarea"
        formControlName="content"
        [rows]="10"
        [attr.data-test-id]="TEST_IDS.NOTE_MODAL_CONTENT_TEXTAREA"
      ></textarea>
    </cds-textarea-label>
  </form>

  <cds-modal-footer [attr.data-test-id]="TEST_IDS.NOTE_MODAL_FOOTER">
    <button cdsButton="ghost" (click)="onCancel()" [attr.data-test-id]="TEST_IDS.NOTE_MODAL_CANCEL_BUTTON">
      {{ 'interface.cancel' | translate }}
    </button>

    <button [disabled]="!formGroup.valid" cdsButton="primary" (click)="onConfirm()" [attr.data-test-id]="TEST_IDS.NOTE_MODAL_CONFIRM_BUTTON">
      {{ 'case.notes.' + modalType + 'Note' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
