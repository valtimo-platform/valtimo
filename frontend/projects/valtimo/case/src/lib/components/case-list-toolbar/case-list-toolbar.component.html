<div class="case-list-toolbar">
  <valtimo-list-column-view
    [availableFields]="availableFields"
    [disabled]="!hasApiColumnConfig"
    [hiddenColumns]="hiddenColumns"
    (viewUpdateEvent)="viewUpdateEvent.emit($event)"
  ></valtimo-list-column-view>

  <cds-tooltip *ngIf="canExport" [description]="'case.exportButtonTooltip' | translate">
    <cds-loading *ngIf="loadingExport" size="sm" class="loading-spinner"></cds-loading>

    <button
      *ngIf="!loadingExport"
      data-testid="case-list-export-button"
      cdsButton="ghost"
      iconOnly="true"
      (click)="exportEvent.emit()"
      [disabled]="disableExport"
    >
      <svg cdsIcon="download" size="16"></svg>
    </button>
  </cds-tooltip>

  <button
    *ngIf="canCreate"
    cdsButton="primary"
    [disabled]="disableStart"
    (click)="startCaseEvent.emit()"
  >
    {{ 'Start Case' | translate }}

    <svg cdsIcon="add" size="16" class="cds--btn__icon"></svg>
  </button>
</div>
