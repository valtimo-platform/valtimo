<ng-container *ngIf="!$loading() && !$accessDenied()">
  <cds-tabs type="contained">
    <cds-tab
      [active]="$activeTab() === CaseInspectionTab.DOCUMENT"
      [heading]="'case.inspection.tabs.document' | translate"
      (selected)="onTabSelected(CaseInspectionTab.DOCUMENT)"
    >
      <div cdsLayer class="case-inspection__pane">
        <valtimo-case-inspection-document
          *ngIf="$activeTab() === CaseInspectionTab.DOCUMENT"
          [documentId]="$documentId()"
        ></valtimo-case-inspection-document>
      </div>
    </cds-tab>

    <cds-tab
      [active]="$activeTab() === CaseInspectionTab.PROCESSES"
      [heading]="'case.inspection.tabs.processes' | translate"
      (selected)="onTabSelected(CaseInspectionTab.PROCESSES)"
    >
      <div cdsLayer class="case-inspection__pane">
        <valtimo-case-inspection-processes
          *ngIf="$activeTab() === CaseInspectionTab.PROCESSES"
          [documentId]="$documentId()"
          (viewBuildingBlockEvent)="onViewBuildingBlock($event)"
        ></valtimo-case-inspection-processes>
      </div>
    </cds-tab>

    <cds-tab
      [active]="$activeTab() === CaseInspectionTab.BUILDING_BLOCKS"
      [heading]="'case.inspection.tabs.buildingBlocks' | translate"
      (selected)="onTabSelected(CaseInspectionTab.BUILDING_BLOCKS)"
    >
      <div cdsLayer class="case-inspection__pane">
        <valtimo-case-inspection-building-blocks
          *ngIf="$activeTab() === CaseInspectionTab.BUILDING_BLOCKS"
          [documentId]="$documentId()"
          [pendingInstanceId]="$pendingBuildingBlockInstanceId()"
        ></valtimo-case-inspection-building-blocks>
      </div>
    </cds-tab>

    <cds-tab
      [active]="$activeTab() === CaseInspectionTab.METADATA"
      [heading]="'case.inspection.tabs.metadata' | translate"
      (selected)="onTabSelected(CaseInspectionTab.METADATA)"
    >
      <div cdsLayer class="case-inspection__pane">
        <valtimo-case-inspection-metadata
          *ngIf="$activeTab() === CaseInspectionTab.METADATA"
          [documentId]="$documentId()"
        ></valtimo-case-inspection-metadata>
      </div>
    </cds-tab>
  </cds-tabs>
</ng-container>
