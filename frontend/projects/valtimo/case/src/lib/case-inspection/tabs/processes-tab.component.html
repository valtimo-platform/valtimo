<section class="case-inspection-processes-tab">
  <ng-container *ngIf="$loading()">
    <p>{{ 'case.inspection.processes.loading' | translate }}</p>
  </ng-container>

  <ng-container *ngIf="$errorMessage() as message">
    <p class="case-inspection-processes-tab__error">{{ message }}</p>
  </ng-container>

  <ng-container *ngIf="!$loading() && $rows() as rows">
    <p *ngIf="rows.length === 0" class="case-inspection-processes-tab__empty">
      {{ 'case.inspection.processes.empty' | translate }}
    </p>

    <div *ngIf="rows.length > 0" class="case-inspection-processes-tab__layout">
      <nav
        class="case-inspection-processes-tab__list"
        [attr.aria-label]="'case.inspection.processes.listAriaLabel' | translate"
      >
        <button
          *ngFor="let row of rows"
          type="button"
          class="case-inspection-processes-tab__list-item"
          [class.case-inspection-processes-tab__list-item--selected]="isSelected(row)"
          (click)="onSelect(row)"
        >
          <span class="case-inspection-processes-tab__list-item-title">
            {{ row.processName || row.processDefinitionKey }}

            <span
              *ngIf="row.buildingBlock as bb"
              class="case-inspection-processes-tab__list-item-bb"
              [attr.title]="
                ('case.inspection.processes.buildingBlockTagTooltip' | translate) +
                ': ' +
                bb.definitionKey +
                ' ' +
                bb.definitionVersionTag
              "
            >
              {{ 'case.inspection.processes.buildingBlockTag' | translate }}
            </span>
          </span>
          <span class="case-inspection-processes-tab__list-item-meta">
            <code>{{ row.processInstanceId }}</code>
          </span>

          <span class="case-inspection-processes-tab__list-item-indicators">
            <ng-container *ngIf="row.incidents.length > 0; else noIncidents">
              <span
                class="case-inspection-processes-tab__row-incident"
                [attr.title]="'case.inspection.processes.incidentTooltip' | translate"
              >
                <svg cdsIcon="warning--alt--filled" size="16"></svg>
                {{ row.incidents.length }}
              </span>
            </ng-container>

            <ng-template #noIncidents>
              <span
                *ngIf="row.active"
                class="case-inspection-processes-tab__row-healthy"
                [attr.title]="'case.inspection.processes.active' | translate"
              >
                <svg cdsIcon="checkmark--filled" size="16"></svg>
              </span>

              <span
                *ngIf="!row.active"
                class="case-inspection-processes-tab__row-completed"
                [attr.title]="'case.inspection.processes.completed' | translate"
              >
                <svg cdsIcon="checkmark--outline" size="16"></svg>
              </span>
            </ng-template>
          </span>
        </button>
      </nav>

      <article class="case-inspection-processes-tab__detail">
        <valtimo-case-inspection-process-detail
          *ngIf="$selected() as selected"
          [row]="selected"
          (viewBuildingBlockEvent)="viewBuildingBlockEvent.emit($event)"
        ></valtimo-case-inspection-process-detail>
      </article>
    </div>
  </ng-container>
</section>
