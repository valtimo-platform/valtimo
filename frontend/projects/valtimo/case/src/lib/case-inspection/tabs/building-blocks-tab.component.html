<section class="case-inspection-bb">
  <ng-container *ngIf="$errorMessage() as message">
    <p class="case-inspection-bb__error">{{ message }}</p>
  </ng-container>

  <ng-container *ngIf="$notSupported()">
    <p class="case-inspection-bb__notice">
      {{ 'case.inspection.buildingBlocks.notEnabled' | translate }}
    </p>
  </ng-container>

  <ng-container *ngIf="$loading()">
    <p>{{ 'case.inspection.buildingBlocks.loading' | translate }}</p>
  </ng-container>

  <ng-container *ngIf="!$loading() && !$notSupported() && $instances() as instances">
    <p *ngIf="instances.length === 0" class="case-inspection-bb__empty">
      {{ 'case.inspection.buildingBlocks.empty' | translate }}
    </p>

    <div *ngIf="instances.length > 0" class="case-inspection-bb__layout">
      <div
        class="case-inspection-bb__list"
        role="listbox"
        [attr.aria-label]="'case.inspection.buildingBlocks.listAriaLabel' | translate"
      >
        <button
          *ngFor="let instance of instances"
          type="button"
          role="option"
          class="case-inspection-bb__list-item"
          [attr.aria-selected]="isSelected(instance)"
          [class.case-inspection-bb__list-item--selected]="isSelected(instance)"
          (click)="onSelect(instance)"
        >
          <span class="case-inspection-bb__list-item-title">{{ instance.definitionKey }}</span>
          <span class="case-inspection-bb__list-item-meta">
            {{ instance.definitionVersionTag }}
          </span>
        </button>
      </div>

      <article class="case-inspection-bb__detail">
        <valtimo-case-inspection-building-block-detail
          *ngIf="$selected() as selected"
          [instance]="selected"
          (viewProcessLogsEvent)="viewProcessLogsEvent.emit($event)"
        ></valtimo-case-inspection-building-block-detail>
      </article>
    </div>
  </ng-container>
</section>
