<ng-container
  *ngIf="{
    currentValue: currentValue$ | async,
    caseDefinitionKey: caseDefinitionKey$ | async,
    caseVersionTag: caseVersionTag$ | async,
    loading: loading$ | async,
    disabled: disabled$ | async,
  } as obs"
>
  <div class="case-handler-process" [cdsLayer]="0">
    <p class="case-handler-process__title">
      {{ 'dossierManagement.tabs.generalTab.caseHandler.title' | translate }}
    </p>

    <div class="case-handler-process__toggles">
      <ng-container>
        <cds-toggle
          [checked]="obs?.currentValue?.canHaveAssignee"
          [disabled]="obs.disabled"
          (checkedChange)="
            toggleAssignee(obs?.currentValue, obs.caseDefinitionKey, obs.caseVersionTag)
          "
          [label]="'dossierManagement.tabs.generalTab.caseHandler.canHaveHandler' | translate"
          [onText]="'dossierManagement.tabs.generalTab.caseHandler.toggle.onText' | translate"
          [offText]="'dossierManagement.tabs.generalTab.caseHandler.toggle.offText' | translate"
        ></cds-toggle>
      </ng-container>

      <ng-container>
        <cds-toggle
          [checked]="obs?.currentValue?.autoAssignTasks"
          [disabled]="!obs?.currentValue?.canHaveAssignee"
          (checkedChange)="
            toggleTaskAssignment(obs?.currentValue, obs?.caseDefinitionKey, obs.caseVersionTag)
          "
          [label]="'dossierManagement.toggleAutoAssignTasks.checkboxDescription' | translate"
          [onText]="'dossierManagement.tabs.generalTab.caseHandler.toggle.onText' | translate"
          [offText]="'dossierManagement.tabs.generalTab.caseHandler.toggle.offText' | translate"
        ></cds-toggle>
      </ng-container>
    </div>
  </div>
</ng-container>
