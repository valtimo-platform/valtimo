@if (currentTab$ | async; as currentTab) {
  <valtimo-case-management-draft-warning
    *ngIf="(isDraftVersion$ | async) === true && currentTab === TabEnum.STATUSES"
    [name]="'caseManagement.tabs.caseDetailsTab.statuses' | translate | lowercase"
  ></valtimo-case-management-draft-warning>

  <cds-tabs class="case-management-tabs" type="contained">
    <cds-tab
      [active]="currentTab === TabEnum.TABS"
      [heading]="'caseManagement.tabs.caseDetailsTab.tabs' | translate"
      (selected)="switchTab(TabEnum.TABS)"
    >
      <valtimo-case-management-tabs
        *ngIf="currentTab === TabEnum.TABS"
      ></valtimo-case-management-tabs>
    </cds-tab>

    <cds-tab
      [active]="currentTab === TabEnum.STATUSES"
      [heading]="'caseManagement.tabs.caseDetailsTab.statuses' | translate"
      (selected)="switchTab(TabEnum.STATUSES)"
    >
      <valtimo-case-management-statuses
        *ngIf="currentTab === TabEnum.STATUSES"
      ></valtimo-case-management-statuses>
    </cds-tab>

    <cds-tab
      [active]="currentTab === TabEnum.TAGS"
      [heading]="'caseManagement.tabs.caseDetailsTab.tags' | translate"
      (selected)="switchTab(TabEnum.TAGS)"
    >
      <valtimo-case-management-tags
        *ngIf="currentTab === TabEnum.TAGS"
      ></valtimo-case-management-tags>
    </cds-tab>
  </cds-tabs>
}
