<cds-modal *ngIf="{
    editDisabled: editDisabled$ | async,
    idError: idError$ | async,
    editActive: editActive$ | async,
    submitDisabled: submitDisabled$ | async,
  } as obs"
     valtimoCdsModal showFooter="true" [open]="open" (close)="onCloseModal()">
  <cds-modal-header [showCloseButton]="true" (closeSelect)="onCloseModal()">
    <h3 cdsModalHeaderHeading>
      {{ ('widgetTabManagement.list.dividerModal.' + mode + 'DividerTitle') | translate }}
    </h3>
  </cds-modal-header>

  <section cdsModalContent>
    <form [formGroup]="dividerForm" cdsModalContent>
      <cds-label>
        {{ 'widgetTabManagement.list.dividerModal.dividerTitleLabel' | translate }}

        <input
          class="title-input"
          formControlName="title"
          cdsText
          placeholder="{{ 'widgetTabManagement.list.dividerModal.dividerTitlePlaceholder' | translate }}"
          [cdsLayer]="1"
          [attr.modal-primary-focus]="true"
          (focusout)="onFocusOut()"
        />
      </cds-label>

      <cds-label [invalid]="!!obs.idError" [invalidText]="obs.idError | translate">
        {{ 'widgetTabManagement.list.dividerModal.dividerKeyLabel' | translate }}

        <div class="divider-key-wrapper">
          <input
            cdsText
            formControlName="key"
            [invalid]="!!obs.idError"
            placeholder="{{ 'widgetTabManagement.list.dividerModal.dividerKeyPlaceholder' | translate }}"
          />

          <button
            *ngIf="!obs.editActive"
            cdsButton="secondary"
            size="md"
            [disabled]="mode === 'edit' || obs.editDisabled"
            [iconOnly]="true"
            (click)="enableEdit()"
          >
            <svg cdsIcon="edit" size="16"></svg>
          </button>
        </div>
      </cds-label>
    </form>
  </section>

  <cds-modal-footer>
    <button cdsButton="ghost" (click)="onCloseModal()">
      {{ 'caseManagement.allVersionsModal.closeButton' | translate }}
    </button>

    <button [disabled]="!dividerForm.valid" cdsButton="primary" (click)="onCloseModal(true)">
      {{ buttonLabel | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
