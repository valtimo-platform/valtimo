<cds-label
  [helperText]="'widgetTabManagement.displayConditions.conditionsHelperText' | translate"
  class="conditions-label"
>
  {{ 'widgetTabManagement.displayConditions.conditions' | translate }}
</cds-label>

<valtimo-carbon-multi-input
  type="valuePathSelectorDropdownValue"
  class="valtimo-widget-wizard-condition-step__multi-input"
  [addRowText]="'widgetTabManagement.displayConditions.addCondition' | translate"
  addButtonType="tertiary"
  [defaultValues]="defaultConditionValues$ | async"
  [dropdownColumnTitle]="'widgetTabManagement.displayConditions.operator' | translate"
  [dropdownItems]="operatorItems$ | async"
  [fullWidth]="true"
  [initialAmountOfRows]="0"
  [keyColumnTitle]="'widgetTabManagement.displayConditions.path' | translate"
  [minimumAmountOfRows]="0"
  [valueColumnTitle]="'widgetTabManagement.displayConditions.value' | translate"
  (allValuesValidEvent)="onAllConditionsValid($event)"
  (valueChange)="conditionsValueChange($event)"
  valuePathSelectorNotation="dots"
  [valuePathSelectorPrefixes]="[ValuePathSelectorPrefix.DOC, ValuePathSelectorPrefix.CASE]"
  [valuePathSelectorShowCaseDefinitionSelector]="false"
  [valuePathSelectorCaseDefinitionKey]="(params$ | async)?.caseDefinitionKey"
  [keyColumnFlex]="2"
  [dropdownColumnFlex]="1"
  [valueColumnFlex]="1"
></valtimo-carbon-multi-input>
