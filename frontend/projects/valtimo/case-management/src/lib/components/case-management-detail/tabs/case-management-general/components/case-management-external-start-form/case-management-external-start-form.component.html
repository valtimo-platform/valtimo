<cds-tile
  class="external-case-form-container"
  *ngIf="{params: params$ | async, caseSettings: caseSettings$ | async} as obs"
  [attr.data-test-id]="TEST_IDS.EXTERNAL_CASE_FORM_CONTAINER"
>
  <h4 class="external-case-form-container__title" [attr.data-test-id]="TEST_IDS.EXTERNAL_CASE_FORM_CONTAINER_TITLE">
    {{ 'caseManagement.externalStartForm.title' | translate }}
  </h4>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" [cdsLayer]="1" [attr.data-test-id]="TEST_IDS.EXTERNAL_CASE_FORM_CONTAINER_FORM">
    <cds-toggle
      valtimoReadOnly
      [isReadOnly]="isReadOnly"
      [disabled]="isReadOnly"
      formControlName="hasExternalForm"
      label="{{ 'caseManagement.externalStartForm.enabledToggle' | translate }}"
      onText="{{ 'caseManagement.externalStartForm.enabledToggleOn' | translate }}"
      offText="{{ 'caseManagement.externalStartForm.enabledToggleOff' | translate }}"
      [attr.data-test-id]="TEST_IDS.EXTERNAL_CASE_FORM_CONTAINER_ENABLED_TOGGLE"
    ></cds-toggle>

    <cds-label [attr.data-test-id]="TEST_IDS.EXTERNAL_CASE_FORM_CONTAINER_EXTERNAL_URL_LABEL">
      {{ 'caseManagement.externalStartForm.externalUrl' | translate }}

      <input
        cdsText
        valtimoReadOnly
        [isReadOnly]="isReadOnly"
        type="text"
        formControlName="externalFormUrl"
        [placeholder]="
          isReadOnly ? '-' : ('caseManagement.externalStartForm.externalUrlPlaceholder' | translate)
        "
        maxlength="512"
        [attr.data-test-id]="TEST_IDS.EXTERNAL_CASE_FORM_CONTAINER_EXTERNAL_URL_INPUT"
      />
    </cds-label>

    <cds-label [attr.data-test-id]="TEST_IDS.EXTERNAL_CASE_FORM_CONTAINER_DESCRIPTION_LABEL">
      {{ 'caseManagement.externalStartForm.description' | translate }}

      <input
        cdsText
        valtimoReadOnly
        [isReadOnly]="isReadOnly"
        type="text"
        formControlName="description"
        [placeholder]="
          isReadOnly ? '-' : ('caseManagement.externalStartForm.descriptionPlaceholder' | translate)
        "
        maxlength="512"
        [attr.data-test-id]="TEST_IDS.EXTERNAL_CASE_FORM_CONTAINER_DESCRIPTION_INPUT"
      />
    </cds-label>

    <button
      *ngIf="!isReadOnly"
      cdsButton="primary"
      type="submit"
      [disabled]="!form.valid || isReadOnly"
      [attr.data-test-id]="TEST_IDS.EXTERNAL_CASE_FORM_CONTAINER_SUBMIT_BUTTON"
    >
      {{ 'caseManagement.externalStartForm.apply' | translate }}
    </button>
  </form>
</cds-tile>
