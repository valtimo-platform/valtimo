<ng-container
  *ngIf="{
    routeParams: caseManagementRouteParams$ | async,
    hasEditPermissions: hasEditPermissions$ | async,
  } as obs"
>
  <cds-inline-notification
    [notificationObj]="{
      type: 'info',
      title: '',
      message: ('caseManagement.actions.infoNotification.message' | translate),
      showClose: false,
      lowContrast: true
    }"
  ></cds-inline-notification>

  <valtimo-carbon-list
    *ngIf="{fields: fields$ | async, loading: loading$ | async, items: items$ | async} as listObs"
    [items]="listObs.items"
    [fields]="listObs.fields"
    [header]="false"
    [loading]="listObs.loading"
    [dragAndDrop]="true"
    [dragAndDropDisabled]="dragAndDropDisabled() || !obs.hasEditPermissions"
    [actionItems]="ACTION_ITEMS"
    [showActionItems]="obs.hasEditPermissions"
    (itemsReordered)="onItemsReorderedEvent($event)"
  >
    <ng-container carbonToolbarContent>
      <ng-container [ngTemplateOutlet]="addItemButton"></ng-container>
    </ng-container>

    <valtimo-no-results
      [action]="addItemButton"
      [description]="'caseManagement.actions.noResultsDescription' | translate"
      [title]="'caseManagement.actions.noResults' | translate"
    ></valtimo-no-results>
  </valtimo-carbon-list>

  <ng-template #typeColumn let-data="data">
    <cds-tag
      class="cds-tag--no-margin"
      [type]="data.item.type === StartableItemType.PROCESS ? 'blue' : 'purple'"
    >
      {{ 'caseManagement.actions.type.' + data.item.type | translate }}
    </cds-tag>
  </ng-template>

  <ng-template #addItemButton>
    <button
      *ngIf="obs.hasEditPermissions"
      cdsButton="primary"
      (click)="onAddItemClick()"
    >
      {{ 'caseManagement.actions.addItem' | translate }}

      <svg cdsIcon="add" size="16" class="cds--btn__icon"></svg>
    </button>
  </ng-template>
</ng-container>

<valtimo-case-management-actions-modal
  (configureBuildingBlockEvent)="onConfigureBuildingBlock($event)"
></valtimo-case-management-actions-modal>

<valtimo-process-link-modal></valtimo-process-link-modal>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="caseManagement.actions.deleteModal.content"
  [outputOnConfirm]="itemToDelete$ | async"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="caseManagement.actions.deleteModal.title"
  (confirmEvent)="onDeleteConfirm($event)"
></valtimo-confirmation-modal>
