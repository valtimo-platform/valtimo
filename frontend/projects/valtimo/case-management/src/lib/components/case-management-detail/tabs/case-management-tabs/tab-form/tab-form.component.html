<form *ngIf="form" [formGroup]="form" class="valtimo-tab-form-modal" [cdsLayer]="1">
  <cds-label>
    {{ 'caseManagement.tabManagement.addModal.tabNameLabel' | translate }}

    <input cdsText formControlName="name" [attr.modal-primary-focus]="true" />
  </cds-label>

  <cds-label [invalid]="!!isKeyError()" [invalidText]="getKeyErrorMessage() | translate">
    {{ 'caseManagement.tabManagement.addModal.tabKeyLabel' | translate }}

    <input
      cdsText
      formControlName="key"
      pattern="[a-zA-Z0-9\-]+"
      [invalid]="!!isKeyError()"
      [attr.modal-primary-focus]="true"
    />
  </cds-label>

  <cds-combo-box
    *ngIf="tabType !== 'widgets'"
    [cdsLayer]="1"
    [dropUp]="false"
    formControlName="contentKey"
    [items]="listItems$ | async"
    itemValueKey="contentKey"
    [label]="'caseManagement.tabManagement.contentLabels.' + tabType | translate"
    (search)="onSearch($event)"
    (selected)="onSelected($event)"
  >
    <cds-dropdown-list [cdsLayer]="1"></cds-dropdown-list>
  </cds-combo-box>

  <cds-toggle
    [label]="'caseManagement.tabManagement.addModal.visibleTitle' | translate"
    [onText]="'caseManagement.tabManagement.addModal.visible' | translate"
    [offText]="'caseManagement.tabManagement.addModal.invisible' | translate"
    [checked]="showTasks?.value"
    (checkedChange)="toggleCheckedChange($event)"
    [disabled]="disableTaskListVisibleToggle()"
  ></cds-toggle>
</form>
