<ng-container
  *ngIf="{
    isReadOnly: isReadOnly$ | async,
  } as obs"
>
  @if (obs.isReadOnly) {
    <cds-notification
      class="read-only-notification"
      [notificationObj]="{
        type: 'info',
        title: 'caseManagement.tabs.generalTab.readOnlyNotification.title' | translate,
        message: 'caseManagement.tabs.generalTab.readOnlyNotification.message' | translate,
        showClose: false,
        lowContrast: true,
      }"
    >
    </cds-notification>
  }

  <div class="case-management-general-tab">
    <ng-template #extensions></ng-template>

    <valtimo-case-management-case-handler
      [isReadOnly]="obs.isReadOnly"
      *ngIf="documentDefinition$ | async"
    ></valtimo-case-management-case-handler>

    <valtimo-case-management-external-start-form [isReadOnly]="obs.isReadOnly">
    </valtimo-case-management-external-start-form>
  </div>
</ng-container>
