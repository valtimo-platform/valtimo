<valtimo-json-editor
  [model]="documentDefinitionModel$ | async"
  [fitPage]="true"
  [fitPageExtraSpace]="128"
  [showEditButton]="hasEditPermissions$ | async"
  (changeEvent)="onChangeEvent()"
  (discardEvent)="onDiscardEvent()"
  (keepEditingEvent)="onKeepEditingEvent()"
  (saveEvent)="onSaveEvent($event)"
>
  <button
    cdsButton="ghost"
    [disabled]="
      (loadingDocumentDefinition$ | async) || (selectedDocumentDefinition$ | async) === null
    "
    (click)="downloadDefinition()"
  >
    {{ 'interface.download' | translate }}

    <svg cdsIcon="download" size="16" class="cds--btn__icon"></svg>
  </button>
</valtimo-json-editor>

<a id="downloadAnchorElement" style="display: none"></a>

<ng-template #loading>
  <div class="loading-container">
    <cds-loading></cds-loading>
  </div>
</ng-template>
