<valtimo-carbon-list
  *ngIf="{loading: loading$ | async, caseStatuses: caseStatuses$ | async} as obs"
  [items]="obs.caseStatuses"
  [fields]="fields$ | async"
  [header]="false"
  [loading]="obs.loading"
  [dragAndDrop]="true"
  [dragAndDropDisabled]="obs.loading || !(hasEditPermissions$ | async)"
  [actionItems]="ACTION_ITEMS"
  (rowClicked)="openEditModal($event)"
  (itemsReordered)="onItemsReordered($event)"
>
  <ng-container carbonToolbarContent *ngTemplateOutlet="addStatusButton"></ng-container>

  <valtimo-no-results
    [action]="addStatusButton"
    [description]="'caseManagement.statuses.noResults.description' | translate"
    [title]="'caseManagement.statuses.noResults.title' | translate"
  ></valtimo-no-results>
</valtimo-carbon-list>

<valtimo-case-management-status-modal
  [type]="statusModalType$ | async"
  [prefill]="prefillStatus$ | async"
  [usedKeys]="usedKeys$ | async"
  [caseDefinitionKey]="caseDefinitionKey$ | async"
  (closeModalEvent)="closeModal($event)"
></valtimo-case-management-status-modal>

<valtimo-confirmation-modal
  confirmButtonTextTranslationKey="interface.delete"
  confirmButtonType="danger"
  contentTranslationKey="caseManagement.statuses.deleteText"
  [outputOnConfirm]="statusToDelete$ | async"
  [showModalSubject$]="showDeleteModal$"
  titleTranslationKey="interface.delete"
  (confirmEvent)="confirmDeleteStatus($event)"
></valtimo-confirmation-modal>

<ng-template #addStatusButton>
  <button
    *ngIf="hasEditPermissions$ | async"
    cdsButton="primary"
    [disabled]="loading$ | async"
    (click)="openAddModal()"
  >
    {{ 'caseManagement.statuses.add' | translate }}

    <svg cdsIcon="add" size="16" class="cds--btn__icon"></svg>
  </button>
</ng-template>

<ng-template #colorColumnTemplate let-data="data">
  <cds-tag class="cds-tag--no-margin" [type]="data?.item?.tagType">
    {{ 'interface.tagType.' + data?.item?.tagType | translate }}
  </cds-tag>
</ng-template>
