<form
  [attr.data-carbon-theme]="theme$ | async"
  [formGroup]="formGroup"
  class="valtimo-case-management-widget-process-selector"
>
  <cds-dropdown
    [label]="'widgetTabManagement.processes.buttonTextLabel' | translate"
    [placeholder]="'widgetTabManagement.processes.selectorPlaceholder' | translate"
    formControlName="processDefinitionKey"
    (selected)="onProcessSelected()"
  >
    <cds-dropdown-list [items]="processDefinitionItems$ | async"></cds-dropdown-list>
  </cds-dropdown>

  <cds-text-label>
    {{ 'widgetTabManagement.processes.buttonTextLabel' | translate }}

    <input
      cdsText
      type="text"
      formControlName="name"
      [placeholder]="'widgetTabManagement.processes.buttonTextPlaceholder' | translate"
    />
  </cds-text-label>
</form>
