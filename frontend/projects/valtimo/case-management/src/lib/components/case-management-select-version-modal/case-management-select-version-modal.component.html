<cds-modal valtimoCdsModal showFooter="true" [open]="open" (close)="onCloseModal()">
  <cds-modal-header [showCloseButton]="true" (closeSelect)="onCloseModal()">
    <h3 cdsModalHeaderHeading>
      {{
        'caseManagement.allVersionsModal.title'
          | translate: {value: (caseDefinitionTitle$ | async) ?? ''}
      }}
    </h3>
  </cds-modal-header>

  <section cdsModalContent>
    <valtimo-carbon-list
      [hideToolbar]="true"
      [items]="versionItems$ | async"
      [fields]="FIELDS"
      (rowClicked)="selectActiveVersion($event)"
      [pagination]="pagination$ | async"
      paginationIdentifier="caseManagementList"
      (paginationClicked)="paginationClicked($event)"
      (paginationSet)="paginationSet($event)"
      cdsLayer="1"
    >
      <valtimo-no-results
        [title]="'caseManagement.allVersionsModal.noResults.description' | translate"
        [description]="'caseManagement.allVersionsModal.noResults.title' | translate"
      ></valtimo-no-results>
    </valtimo-carbon-list>
  </section>

  <cds-modal-footer>
    <button cdsButton="ghost" (click)="onCloseModal()">
      {{ 'caseManagement.allVersionsModal.closeButton' | translate }}
    </button>
  </cds-modal-footer>
</cds-modal>
