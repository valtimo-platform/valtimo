<valtimo-carbon-list
  [items]="caseListItems$ | async"
  [fields]="fields$ | async"
  (rowClicked)="redirectToDetails($event)"
  [pagination]="pagination$ | async"
  paginationIdentifier="caseManagementList"
  (paginationClicked)="paginationClicked($event)"
  (paginationSet)="paginationSet($event)"
>
  <ng-container carbonToolbarContent [ngTemplateOutlet]="importCaseDefinitionButton"></ng-container>

  <valtimo-no-results
    [action]="importCaseDefinitionButton"
    [description]="'caseManagement.noResults.description' | translate"
    [title]="'caseManagement.noResults.title' | translate"
  ></valtimo-no-results>
</valtimo-carbon-list>

<ng-template #loading>
  <valtimo-carbon-list loading="true"></valtimo-carbon-list>
</ng-template>

<valtimo-case-management-upload
  [open]="showUploadModal$ | async"
  (closeModal)="onCloseUploadModal($event)"
></valtimo-case-management-upload>

<valtimo-case-management-create
  [open]="showCreateModal$ | async"
  (closeModal)="onCloseCreateModal($event)"
></valtimo-case-management-create>

<ng-template #statusColumnTemplate let-data="data">
  @if (!data?.item?.active) {
    <cds-tag type="purple" class="cds-tag--no-margin">
      {{ 'caseManagement.inactive' | translate }}
    </cds-tag>
  }
  @if (data?.item?.hasConfigurationIssues) {
    <cds-tag type="red" class="cds-tag--no-margin">
      {{ 'caseManagement.needsConfiguration' | translate }}
    </cds-tag>
  }
</ng-template>

<ng-template #importCaseDefinitionButton>
  <div class="valtimo-case-management-list__actions">
    <button data-test-id="caseManagementUploadButton" cdsButton="ghost" (click)="showUploadModal()">
      {{ 'Upload' | translate }}

      <svg cdsIcon="upload" size="16" class="cds--btn__icon"></svg>
    </button>

    <button
      *ngIf="canUpdateGlobalConfiguration$ | async"
      data-test-id="caseManagementCreateButton"
      cdsButton="primary"
      (click)="showCreateModal()"
    >
      {{ 'interface.create' | translate }}

      <svg cdsIcon="add" size="16" class="cds--btn__icon"></svg>
    </button>
  </div>
</ng-template>
