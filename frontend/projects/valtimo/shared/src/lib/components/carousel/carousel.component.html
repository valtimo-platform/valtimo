<ng-container
  *ngIf="{
    prev: canScrollPrev$ | async,
    next: canScrollNext$ | async,
    count: itemCount$ | async,
    active: activeIndex$ | async,
    dots: dots$ | async
  } as vm"
>
  <div class="valtimo-carousel__viewport">
    <ul
      #track
      class="valtimo-carousel__track"
      [attr.aria-label]="ariaLabel"
      (scroll)="onScroll()"
    >
      <ng-content></ng-content>
    </ul>
  </div>

  <div *ngIf="vm.count > 1" class="valtimo-carousel__controls">
    <cds-icon-button
      class="valtimo-carousel__nav"
      kind="ghost"
      size="md"
      align="top-left"
      [description]="'carousel.previous' | translate"
      [disabled]="!vm.prev"
      (click)="scrollPrev()"
    >
      <svg cdsIcon="chevron--left" size="16"></svg>
    </cds-icon-button>

    <div class="valtimo-carousel__dots" role="tablist">
      <button
        *ngFor="let index of vm.dots"
        type="button"
        class="valtimo-carousel__dot"
        [class.valtimo-carousel__dot--active]="index === vm.active"
        [attr.aria-label]="('carousel.goToSlide' | translate) + ' ' + (index + 1)"
        [attr.aria-current]="index === vm.active"
        (click)="scrollToIndex(index)"
      ></button>
    </div>

    <cds-icon-button
      class="valtimo-carousel__nav"
      kind="ghost"
      size="md"
      align="top-right"
      [description]="'carousel.next' | translate"
      [disabled]="!vm.next"
      (click)="scrollNext()"
    >
      <svg cdsIcon="chevron--right" size="16"></svg>
    </cds-icon-button>
  </div>
</ng-container>
