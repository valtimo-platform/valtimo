<section class="valtimo-donut-widget__header">
  <h3 class="valtimo-donut-widget__title" [attr.data-test-id]="TEST_IDS.VALTIMO_DONUT_WIDGET_TITLE">{{ displayTypeProperties.title }}</h3>

  <span *ngIf="displayTypeProperties.subtitle" class="valtimo-donut-widget__subtitle" [attr.data-test-id]="TEST_IDS.VALTIMO_DONUT_WIDGET_SUBTITLE">
    {{ displayTypeProperties.subtitle }}
  </span>
</section>

<section class="valtimo-donut-widget__content">
  <ng-container *ngIf="barChartData$ | async as barChartData">
    @if (barChartData.length > 0) {
      <ibm-bar-chart
        [data]="barChartData"
        [options]="barChartChartOptions$ | async"
        [attr.data-test-id]="TEST_IDS.VALTIMO_DONUT_WIDGET_BAR_CHART"
      ></ibm-bar-chart>
    } @else {
      <valtimo-no-results
        [collapseVertically]="true"
        [description]="'widgets.noData' | translate"
        [smallPadding]="true"
        [attr.data-test-id]="TEST_IDS.VALTIMO_DONUT_WIDGET_NO_RESULTS"
      ></valtimo-no-results>
    }
  </ng-container>
</section>
