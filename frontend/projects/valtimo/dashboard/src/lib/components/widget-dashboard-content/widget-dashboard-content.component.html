<ng-container *ngIf="{loaded: loaded$ | async} as obs">
  <div *ngIf="!obs.loaded" class="loading-container">
    <cds-loading [attr.data-test-id]="TEST_IDS.WIDGET_CONTAINER_LOADING"></cds-loading>
  </div>
</ng-container>

<div
  #widgetContainer
  class="widget-container"
  [ngClass]="{'widget-container__visible': loaded$ | async}"
  [attr.data-test-id]="TEST_IDS.WIDGET_CONTAINER"
>
  <ng-container *ngIf="widgetConfigurations$ | async as widgetConfigurations">
    <ng-container *ngFor="let config of widgetConfigurations; let i = index">
      <div #widgetConfiguration [id]="config.key" class="widget-configuration" data-test-id="widget-configuration-{{i}}">
        <div
          (click)="navigateToRoute(config, $event)"
          [ngClass]="{
            'widget-configuration-content-clickable': config.url,
          }"
          class="widget-configuration-content"
          data-test-id="widget-configuration-content-{{i}}"
        >
          <ng-container #widgetConfigurationContent></ng-container>
        </div>
      </div>
    </ng-container>

    <valtimo-no-results
      *ngIf="!widgetConfigurations.length"
      [title]="'dashboard.noWidgets' | translate"
      [description]="'dashboard.noWidgetsDescription' | translate"
      illustration="valtimo-layout/img/no-widgets.svg"
      [attr.data-test-id]="TEST_IDS.WIDGET_CONTAINER_NO_RESULTS"
    ></valtimo-no-results>
  </ng-container>
</div>
