@if (activeTabKey$ | async; as activeTabKey) {
  <cds-tabs type="line">
    @if ({active: activeTabKey === ADMIN_SETTINGS_TABS.APPEARANCE}; as obs) {
      <cds-tab
        [active]="obs.active"
        [heading]="'adminSettings.tabs.appearance' | translate"
        (selected)="switchTab(ADMIN_SETTINGS_TABS.APPEARANCE)"
      >
        @if (obs.active) {
          <valtimo-admin-settings-appearance></valtimo-admin-settings-appearance>
        }
      </cds-tab>
    }

    @if ({active: activeTabKey === ADMIN_SETTINGS_TABS.FEATURE_TOGGLES}; as obs) {
      <cds-tab
        [active]="obs.active"
        [heading]="'adminSettings.tabs.featureToggles' | translate"
        (selected)="switchTab(ADMIN_SETTINGS_TABS.FEATURE_TOGGLES)"
      >
        @if (obs.active) {
          <valtimo-admin-settings-feature-toggles></valtimo-admin-settings-feature-toggles>
        }
      </cds-tab>
    }
  </cds-tabs>
}
