<div class="notification-test">
  <h1 class="notification-test__title">Send test notification</h1>
  <p class="notification-test__description">
    Compose a notification and send it to the test endpoint.
  </p>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="notification-test__toolbar">
      <button type="button" cdsButton="ghost" (click)="applySuccessTemplate()">
        Use success template
      </button>
      <button type="button" cdsButton="ghost" (click)="applyFailureTemplate()">
        Use failure template
      </button>
    </div>

    <label for="notification-message" class="notification-test__label">
      Message
    </label>
    <textarea
      id="notification-message"
      formControlName="message"
      class="notification-test__textarea"
      rows="12"
      placeholder="Type the notification message..."
    ></textarea>
    <div class="notification-test__error" *ngIf="form.get('message')?.invalid && form.get('message')?.touched">
      Message is required.
    </div>

    <div class="notification-test__actions">
      <button
        type="submit"
        cdsButton="primary"
        [disabled]="(sending$ | async) || form.invalid"
      >
        <ng-container *ngIf="!(sending$ | async); else sending">
          Send
        </ng-container>
      </button>
    </div>
  </form>
</div>

<ng-template #sending>
  Sending...
</ng-template>
